          onClick={() => setShowLocal(true)}
          title={showLocal ? 'Heure locale (revient en Zulu dans 2s)' : 'Cliquer pour voir l\'heure locale'}
          className="text-center cursor-pointer select-none transition-colors">
          <div className="text-sm font-bold tracking-[0.3em]"
            style={{ color: showLocal ? 'var(--accent)' : 'var(--text-dim)' }}>
            {showLocal ? 'LOCAL' : 'ZULU'}
          </div>
          <div className="font-mono text-4xl font-bold tabular-nums leading-none mt-2"
            style={{ color: showLocal ? 'var(--accent)' : 'inherit' }}>
            {time}
          </div>
          <div className="text-[11px] italic mt-2 opacity-60"
            style={{ color: 'var(--text-dim)' }}>
            {showLocal ? 'retour Zulu…' : 'clic = local'}
          </div>
        </button>
      );
    }

    // Segment visuel "▶— LABEL X.X —◀" pour le diagramme temps de vol.
    // Pas de flex-grow proportionnel : tous les segments ont la même taille minimum
    // pour éviter chevauchement/troncature du texte sur mobile et desktop.
    function TimeBracket({ minutes = 0, label = '', compact = false, highlight = false, fullWidth = false }) {
      const hours = (minutes / 60).toFixed(1);
      const color = highlight ? 'var(--accent)' : 'var(--text-dim)';
      const textColor = highlight ? 'var(--accent)' : 'var(--text)';
      return (
        <div
          className="flex items-center select-none"
          style={{
            flex: fullWidth ? '1 1 auto' : '1 1 0',
            minWidth: compact ? 56 : 80,
            color,
          }}>
          <span className="text-sm leading-none flex-shrink-0">▶</span>
          <span className="flex-1 h-px mx-0.5" style={{ background: 'currentColor', opacity: 0.5 }} />
          <span
            className={`font-mono tabular-nums whitespace-nowrap px-1.5 flex-shrink-0 ${
              compact
                ? 'text-[0.78rem] sm:text-[0.9rem]'
                : 'text-[0.95rem] sm:text-[1.1rem]'
            }`}
            style={{
              color: textColor,
              fontWeight: highlight ? 700 : (label ? 600 : 500),
              lineHeight: 1,
            }}>
            {label && <span className="opacity-80 mr-1">{label}</span>}
            {hours}
          </span>
          <span className="flex-1 h-px mx-0.5" style={{ background: 'currentColor', opacity: 0.5 }} />
          <span className="text-sm leading-none flex-shrink-0">◀</span>
        </div>
      );
    }

    function FlightForm({ initial, aircraft, pilots=[], addExpense, onSave, onCancel, settings={}, flights=[] }) {
      const tx = useTx();
      const { lang } = React.useContext(I18nContext);
      const blank = {
        id: null,
        date: todayZuluDate(),
        aircraftId: aircraft[0]?.id || '',
        pilotId: '',          // pilote principal (sélectionné dans le roster)
        copilotId: '',        // co-pilote (optionnel)
        from: '',
        to: '',
        // v8 : type de mission par défaut Navigation. TDP retiré de l'UI v9 (donnée
        // legacy préservée). v11 : ajout d'une case Duo (vol effectué à 2 pilotes
        // pour formation, vérif, transfert d'expérience, etc.).
        isNavigation: true,
        isTDP:        false,
        isDuo:        false,
        blockOut: '',     // HHMM Zulu
        takeOff: '',
        landing: '',
        blockIn: '',
        // Offsets jour relatifs à `date` — pour les vols qui s'étendent sur plus d'un jour UTC.
        // Utilisés par la validation absolue et par le calcul Flight/Air time.
        blockOutDateOffset: 0,
        takeOffDateOffset:  0,
        landingDateOffset:  0,
        blockInDateOffset:  0,
        functionType: 'PIC',  // legacy v3 — gardé pour rétrocompat lecture
        flightType: 'equipage',  // v7 : Equipage / Solo / Duo training
        rules: 'IFR',
        // Nuit (v8) : temps de nuit calculé en minutes (à partir de sunset/sunrise + TO/LD)
        // ou saisi manuellement. Le champ booléen `night` legacy est gardé pour rétrocompat.
        night: false,
        nightTime: 0,    // minutes
        sunset:  '',     // HHMM Zulu, optionnel
        sunrise: '',     // HHMM Zulu, optionnel
        approaches: [],
        // Compteurs par pilote — utilisés pour les currencies (PPC, etc.)
        takeoffsPic:  1, landingsPic:  1,
        takeoffsSic:  0, landingsSic:  0,
        // Champs legacy v2 — préservés mais non saisis (migrés via takeoffsPic/landingsPic)
        takeoffs: 1,
        landings: 1,
        nightLandings: 0,
        // TTSN avion (Total Time Since New) — heures décimales avant et après le vol
        ttsnBefore: '',
        ttsnAfter:  '',
        // Champs legacy v2 — préservés pour rétrocompat lecture, mais le formulaire écrit
        // désormais dans fuelEntries[]/oilEntries[] (v3).
        fuelUplift: '',
        fuelUnit: 'L',
        oilUplift: '',
        oilUnit: 'qt',
        fuelEntries: [],  // [{ id, qty, unit, supplier, amount, currency, invoiceDocId, ... }]
        oilEntries: [],
        documents: [],    // documents par vol : { id, type, fileName, dataUrl, mime, addedAt }
        // v14 : statut de vérification posé par l'équipe Ops
        verificationStatus: 'pending',  // 'pending' | 'incomplete' | 'complete'
        notes: '',
      };
      // À l'ouverture, normaliser un flightType legacy (production, ferry, vpc, ppc, duo) vers
      // 'equipage' (Multiéquipage). La modification n'est persistée que si l'utilisateur sauve.
      const merged = { ...blank, ...(initial||{}) };
      if (merged.flightType && !FLIGHT_TYPES.some(t => t.id === merged.flightType)) {
        merged.flightType = 'equipage';
      }
      const [f, setF] = useState(merged);

      // Validation absolue (gère les offsets de date par champ)
      const timeValidation = useMemo(
        () => validateFlightTimesAbs(
          f.date, f.blockOut, f.takeOff, f.landing, f.blockIn,
          f.blockOutDateOffset||0, f.takeOffDateOffset||0,
          f.landingDateOffset||0,  f.blockInDateOffset||0
        ),
        [f.date, f.blockOut, f.takeOff, f.landing, f.blockIn,
         f.blockOutDateOffset, f.takeOffDateOffset, f.landingDateOffset, f.blockInDateOffset]
      );
      const flightTime = timeValidation.ftMin;
      const airTime    = timeValidation.atMin;
      const taxiOut    = timeValidation.taxiOutMin;
      const taxiIn     = timeValidation.taxiInMin;

      // Calcul auto du temps de nuit dès qu'on a sunset+sunrise+TO+LD
      const computedNight = useMemo(
        () => computeNightTime(f.date, f.takeOff, f.takeOffDateOffset||0, f.landing, f.landingDateOffset||0, f.sunset, f.sunrise),
        [f.date, f.takeOff, f.takeOffDateOffset, f.landing, f.landingDateOffset, f.sunset, f.sunrise]
      );
      // Mémorise dans nightTime (priorité au calcul auto si sunset+sunrise renseignés)
      useEffect(() => {
        if (f.sunset && f.sunrise && computedNight !== f.nightTime) {
          setF(prev => ({...prev, nightTime: computedNight}));
        }
      }, [computedNight, f.sunset, f.sunrise]);

      // Auto-calcul TTSN après = TTSN avant + Air Time (en heures décimales).
      // Convention métier : seul le temps en vol (AT) compte pour les heures cellule,
      // pas le roulage. L'utilisateur peut toujours surcharger TTSN après manuellement.
      useEffect(() => {
        if (f.ttsnBefore !== '' && f.ttsnBefore != null && airTime != null && airTime > 0) {
          const before = parseFloat(f.ttsnBefore);
          if (!isNaN(before)) {
            const computedAfter = (before + airTime / 60).toFixed(1);
            if (String(computedAfter) !== String(f.ttsnAfter)) {
              setF(prev => ({ ...prev, ttsnAfter: computedAfter }));
            }
          }
        }
      }, [airTime, f.ttsnBefore]);

      function set(k, v) { setF(prev => ({...prev, [k]: v})); }
      function shiftOffset(field, delta) {
        setF(prev => ({...prev, [field]: (prev[field]||0) + delta}));
      }
      // Bloc nuit pliable : ouvert par défaut seulement si une donnée nuit existe déjà
      const [nightOpen, setNightOpen] = useState(
        !!(initial?.sunset || initial?.sunrise || initial?.nightTime || initial?.night)
      );
      function toggleApproach(t) {
        set('approaches', f.approaches.includes(t) ? f.approaches.filter(x=>x!==t) : [...f.approaches, t]);
      }
      function fillNow(field) { set(field, nowZuluHHMM()); }
      // Détecte si l'avion sélectionné est un simulateur — masque alors les blocs
      // sans intérêt (carburant, huile, W&B, FPL, OFPL).
      const selectedAircraft = aircraft.find(x => x.id === f.aircraftId);
      const isSim = selectedAircraft?.kind === 'simulator';
      // En simu, pas de roulage : on aligne automatiquement Block Out = Take Off
      // et Block In = Landing pour que le calcul Flight Time existant fonctionne.
      useEffect(() => {
        if (!isSim) return;
        const updates = {};
        if (f.takeOff && f.blockOut !== f.takeOff) updates.blockOut = f.takeOff;
        if (f.landing && f.blockIn !== f.landing) updates.blockIn = f.landing;
        if (f.takeOffDateOffset != null && f.blockOutDateOffset !== f.takeOffDateOffset) updates.blockOutDateOffset = f.takeOffDateOffset;
        if (f.landingDateOffset != null && f.blockInDateOffset !== f.landingDateOffset) updates.blockInDateOffset = f.landingDateOffset;
        if (Object.keys(updates).length > 0) setF(prev => ({ ...prev, ...updates }));
      }, [isSim, f.takeOff, f.landing, f.takeOffDateOffset, f.landingDateOffset]);

      function handleSave() {
        // === Validation MINIMALE pour enregistrer ===
        // On veut pouvoir créer un vol PLANIFIÉ à l'avance avec juste les
        // essentiels (date, avion, départ, arrivée, pilote). Les heures et le
        // reste seront remplis pendant ou après le vol. Le statut Ops (vert)
        // n'est exigé qu'au moment où on bascule explicitement sur "Complet".
        if (!f.date) return alert(tx('Date requise.','Date required.'));
        if (!f.aircraftId) return alert(tx('Sélectionne un avion (onglet Avions pour en créer un).','Select an aircraft (use the Aircraft tab to create one).'));
        if (!f.from || !f.to) return alert(tx('Codes OACI départ/arrivée requis.','Departure/arrival ICAO codes required.'));
        if (!f.pilotId) return alert(tx('Pilote (PIC) requis.','Pilot (PIC) required.'));

        // Si l'utilisateur a commencé à saisir des heures, on vérifie quand
        // même la cohérence pour éviter des données absurdes (ex: BI < BO).
        // Mais si aucune heure n'est saisie, on laisse passer (vol planifié).
        const anyTime = !!(f.blockOut || f.takeOff || f.landing || f.blockIn);
        if (anyTime && timeValidation.errors.length > 0) {
          // Filtre les erreurs "heure manquante" — elles ne bloquent pas un vol planifié,
          // sauf si l'utilisateur tente de passer en "Complet" (vérifié plus bas).
          const blockingErrors = timeValidation.errors.filter(e => !e.startsWith('Heure(s) manquante'));
          if (blockingErrors.length > 0) {
            return alert(tx('Heures incohérentes :','Inconsistent times:') + '\n\n• ' + blockingErrors.join('\n• '));
          }
        }
        // Si statut "Complet" : on exige toutes les règles métier (heures, docs, etc.).
        // Auparavant on rétrogradait silencieusement → l'utilisateur ne comprenait pas
        // pourquoi sa card devenait orange. Désormais on affiche les conditions
        // manquantes et on lui propose de garder Complet quand même (cas archivés
        // où les données sont là mais le pilote veut valider explicitement).
        if (f.verificationStatus === 'complete') {
          const errs = getCompleteValidationErrors(f, aircraft);
          if (errs.length > 0) {
            const ok = confirm(
              tx('⚠ Conditions « Complet » manquantes :','⚠ Missing "Complete" conditions:') + '\n\n• ' + errs.join('\n• ') +
              tx('\n\nOK : enregistrer Complet quand même (les données seront vérifiables visuellement)\nAnnuler : enregistrer en statut auto (orange)','\n\nOK: save as Complete anyway (data can be visually checked)\nCancel: save with auto status (orange)')
            );
            if (!ok) {
              f.verificationStatus = computeAutoVerificationStatus(f, aircraft);
            }
            // Sinon : on laisse 'complete' tel quel
          }
        }
        // Statut auto-calculé pour tous les vols non-Complet (rouge si pas de landing,
        // orange si landing+erreurs). Le pilote/dispatch peut explicitement passer en
        // vert via le bouton "Marquer Complet".
        const finalStatus = f.verificationStatus === 'complete'
          ? 'complete'
          : computeAutoVerificationStatus(f);
        const out = { ...f, verificationStatus: finalStatus, id: f.id || ('flt_' + Date.now()), flightTime, airTime };
        onSave(out);
      }

      return (
        <div className="space-y-3">
          {/* Date + Avion : empilés sur mobile (sinon le select Avion empiète sur
              la colonne Date dès que le nom de l'avion est long), 2 colonnes en desktop. */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div className="min-w-0">
              <div className="label whitespace-nowrap">Date (Zulu)</div>
              <input type="date" className="input" value={f.date} onChange={e=>set('date', e.target.value)} />
            </div>
            <div className="min-w-0">
              <div className="label whitespace-nowrap">{tx('Avion','Aircraft')}</div>
              <select className="select" value={f.aircraftId} onChange={e=>set('aircraftId', e.target.value)}>
                {aircraft.length === 0 && <option value="">{tx('— aucun avion —','— no aircraft —')}</option>}
                {aircraft.map(a => (
                  <option key={a.id} value={a.id}>
                    {a.kind === 'simulator' ? '🖥️ ' : ''}{a.registration} · {a.type}
                  </option>
                ))}
              </select>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">{tx('OACI départ','Departure ICAO')}</div>
              <input className="input uppercase" maxLength={4} placeholder="LFPB" value={f.from} onChange={e=>set('from', e.target.value.toUpperCase())} />
            </div>
            <div>
              <div className="label">{tx('OACI arrivée','Arrival ICAO')}</div>
              <input className="input uppercase" maxLength={4} placeholder="EGLL" value={f.to} onChange={e=>set('to', e.target.value.toUpperCase())} />
            </div>
          </div>

          {/* Type de mission : navigation par défaut. Le statut Duo est désormais dérivé
              du type de vol = "Duo/Training" (voir dropdown Type de vol ci-dessous). */}
          <div className="flex flex-col items-center gap-3 pt-6 pb-2">
            <button type="button"
              onClick={()=>set('isNavigation', !f.isNavigation)}
              className={`relative inline-flex items-center gap-3 px-6 py-3 rounded-full border-2 font-semibold transition-all select-none ${
                f.isNavigation
                  ? 'border-[#38bdf8] bg-[#38bdf8]/15 text-[#38bdf8] shadow-md shadow-[#38bdf8]/20 scale-105'
                  : 'border-[var(--border)] bg-transparent text-[var(--text-dim)] hover:border-[#38bdf8]/50'
              }`}>
              <LucideIcon name="compass" size={22} strokeWidth={2.5} />
              <span className="text-base">{tx('Navigation / Ferry flight','Navigation / Ferry flight')}</span>
              {f.isNavigation ? (
                <span className="inline-flex items-center justify-center w-7 h-7 rounded-full bg-emerald-500 text-white shadow-md">
                  <LucideIcon name="check" size={16} strokeWidth={3.5} />
                </span>
              ) : (
                <span className="inline-flex items-center justify-center w-7 h-7 rounded-full border-2 border-[var(--border)] bg-transparent" />
              )}
            </button>
            <div className="w-full">
              <Hint title={tx('À quoi sert Navigation / Ferry flight ?','What is Navigation / Ferry flight for?')}>
                {tx('Compte automatiquement les heures de navigation dans Stats et dans le logbook.','Automatically counts navigation hours in Stats and in the logbook.')}
              </Hint>
            </div>
          </div>

          <div className="space-y-3">
            <div>
              <Hint title={tx('Format des heures','Time format')}>
                {tx('Heures Zulu (format HHMM). Flèches J / J+1 si le vol s\'étend sur plusieurs jours.','Zulu times (HHMM format). D / D+1 arrows if the flight spans several days.')}
              </Hint>
            </div>
            {/* === LAYOUT MOBILE : grille 2 colonnes (label+date au-dessus, input+Now Z dessous) === */}
            <div className="grid grid-cols-2 gap-3 md:hidden">
              {(isSim
                ? [
                    ['takeOff', 'Take Off', 'takeOffDateOffset'],
                    ['landing', 'Landing',  'landingDateOffset'],
                  ]
                : [
                    ['blockOut','Block Out','blockOutDateOffset'],
                    ['takeOff', 'Take Off', 'takeOffDateOffset'],
                    ['landing', 'Landing',  'landingDateOffset'],
                    ['blockIn', 'Block In', 'blockInDateOffset'],
                  ]
              ).map(([k,label,offsetKey]) => {
                const off = f[offsetKey] || 0;
                const resolvedDate = addDaysISO(f.date, off);
                return (
                  <div key={k}>
                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                      <div className="label !mb-0">{label}</div>
                      <div className="flex items-center gap-1 text-[11px] text-[var(--text-dim)]">
                        <button type="button"
                          className="w-5 h-5 grid place-items-center rounded bg-[var(--bg-card)] hover:bg-[var(--border)] leading-none"
                          onClick={()=>shiftOffset(offsetKey, -1)} title={tx('Jour précédent','Previous day')}>‹</button>
                        <span className="font-mono">{resolvedDate || '—'}</span>
                        {off !== 0 && (
                          <span className="text-[var(--accent)] font-semibold">({tx('J','D')}{off > 0 ? '+'+off : off})</span>
                        )}
                        <button type="button"
                          className="w-5 h-5 grid place-items-center rounded bg-[var(--bg-card)] hover:bg-[var(--border)] leading-none"
                          onClick={()=>shiftOffset(offsetKey, +1)} title={tx('Jour suivant','Next day')}>›</button>
                      </div>
                    </div>
                    <div className="flex gap-2">
                      <input className="input font-mono" inputMode="numeric" maxLength={5} placeholder="0830"
                        value={f[k]} onChange={e=>set(k, e.target.value.replace(/[^0-9:]/g,''))} />
                      <button type="button" className="btn btn-secondary !px-2 text-xs" onClick={()=>fillNow(k)}>Now Z</button>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* === LAYOUT DESKTOP : Zulu clock à gauche (centré verticalement avec la grille),
                 grille 2×2 légèrement décalée à gauche pour mieux s'aligner avec AT en dessous.
                 Cellules de gauche → justify-end, cellules de droite → justify-start. === */}
            <div className="hidden md:block relative">
              {/* Afficheur Zulu — décalé encore un peu plus à droite, vertical centré sur la grille */}
              <div className="absolute left-20 top-1/2 -translate-y-1/2">
                <FlightZuluClock />
              </div>
              {/* Grille 2×2 — légèrement décalée à gauche (-translate-x-4) pour aligner avec AT,
                  taille augmentée (gap + dimensions des inputs) */}
              <div className="grid grid-cols-2 gap-x-24 gap-y-7 max-w-3xl mx-auto -translate-x-4">
                {(isSim
                  ? [
                      ['takeOff', 'Take Off', 'takeOffDateOffset'],
                      ['landing', 'Landing',  'landingDateOffset'],
                    ]
                  : [
                      ['blockOut','Block Out','blockOutDateOffset'],
                      ['takeOff', 'Take Off', 'takeOffDateOffset'],
                      ['landing', 'Landing',  'landingDateOffset'],
                      ['blockIn', 'Block In', 'blockInDateOffset'],
                    ]
                ).map(([k,label,offsetKey], idx) => {
                  const off = f[offsetKey] || 0;
                  const resolvedDate = addDaysISO(f.date, off);
                  const isLeftCol = idx % 2 === 0;
                  const isTopRow = idx < 2;
                  return (
                    <div key={k} className={`flex items-center gap-4 ${isLeftCol ? 'justify-end' : 'justify-start'} ${isTopRow ? '-mt-3' : ''}`}>
                      {/* Nom de l'heure à gauche — taille un peu plus grande */}
                      <div className="text-xl font-bold tracking-wide flex-shrink-0 whitespace-nowrap">{label}</div>
                      {/* Bloc droit : date centrée pile au-dessus de l'input, Now Z en dessous */}
                      <div className="flex flex-col items-center gap-1.5">
                        {/* Date centrée pile au-dessus de l'input */}
                        <div className="flex items-center gap-1.5 text-base text-[var(--text-dim)]">
                          <button type="button"
                            className="w-7 h-7 grid place-items-center rounded bg-[var(--bg-card)] hover:bg-[var(--border)] leading-none text-lg"
                            onClick={()=>shiftOffset(offsetKey, -1)} title={tx('Jour précédent','Previous day')}>‹</button>
                          <span className="font-mono font-semibold text-[var(--text)]">{resolvedDate || '—'}</span>
                          {off !== 0 && (
                            <span className="text-[var(--accent)] font-semibold">({tx('J','D')}{off > 0 ? '+'+off : off})</span>
                          )}
                          <button type="button"
                            className="w-7 h-7 grid place-items-center rounded bg-[var(--bg-card)] hover:bg-[var(--border)] leading-none text-lg"
                            onClick={()=>shiftOffset(offsetKey, +1)} title={tx('Jour suivant','Next day')}>›</button>
                        </div>
                        {/* Input agrandi */}
                        <input className="input font-mono text-3xl text-center tracking-widest font-bold py-2.5 w-[170px]"
                          inputMode="numeric" maxLength={5} placeholder="0830"
                          value={f[k]} onChange={e=>set(k, e.target.value.replace(/[^0-9:]/g,''))} />
                        {/* Now Z compact sous l'input */}
                        <button type="button"
                          className="btn btn-secondary !px-3 !py-0.5 text-xs mt-0.5"
                          onClick={()=>fillNow(k)}>Now Z</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            {/* Diagramme visuel temps : 3 segments du haut (taxi out / FT / taxi in)
                + 1 segment du bas (BT = block time = total). Les largeurs sont
                proportionnelles aux durées pour qu'on voie d'un coup d'œil
                la part du roulage vs vol effectif.
                FT = Flight Time aviation = TO→Landing (= notre airTime).
                BT = Block Time = BO→BI (= notre flightTime). */}
            {isSim ? (
              <div className="mt-1 px-1 py-1 overflow-hidden">
                <div className="flex"><TimeBracket label="FT" minutes={flightTime} fullWidth /></div>
              </div>
            ) : (
              <div className="mt-1 px-1 py-1 space-y-2 sm:space-y-4 overflow-hidden">
                {/* Ligne du haut : taxi out | AT (= air time) | taxi in
                    AT est aligné horizontalement avec FT du bas (les deux sont centrés). */}
                <div className="flex items-stretch gap-2">
                  <TimeBracket minutes={taxiOut || 0} compact />
                  <TimeBracket label="AT" minutes={airTime || 0} highlight />
                  <TimeBracket minutes={taxiIn || 0} compact />
                </div>
                {/* Ligne du bas : FT (flight time / block time = total) */}
                <div className="flex"><TimeBracket label="FT" minutes={flightTime || 0} fullWidth /></div>
              </div>
            )}
            {/* TTSN avion (Total Time Since New) — TTSN après = TTSN avant + Air Time.
                Caché en simu : un sim n'a pas d'heures cellule. */}
            {!isSim && (
              <>
                <div className="mt-3 grid grid-cols-2 gap-3">
                  <div>
                    <div className="label">{tx('TTSN avant (h)','TTSN before (h)')}</div>
                    <input type="number" step="0.1" className="input" placeholder="2540.6"
                      value={f.ttsnBefore} onChange={e=>set('ttsnBefore', e.target.value)} />
                  </div>
                  <div>
                    <div className="label">{tx('TTSN après (h)','TTSN after (h)')}</div>
                    <input type="number" step="0.1" className="input" placeholder="2542.0"
                      value={f.ttsnAfter} onChange={e=>set('ttsnAfter', e.target.value)} />
                  </div>
                </div>
                <div className="mt-1">
                  <Hint title={tx('Calcul TTSN','TTSN calculation')}>
                    {tx('TTSN après = TTSN avant + Air Time (le roulage ne compte pas). Recalculé automatiquement.','TTSN after = TTSN before + Air Time (taxi time excluded). Auto-recalculated.')}
                  </Hint>
                </div>
              </>
            )}
            {timeValidation.errors.length > 0 && (
              <div className="mt-3 p-2 rounded-lg border border-[var(--err)] bg-[var(--err)]/10 text-sm">
                <div className="font-semibold text-[var(--err)] mb-1">⚠ {tx('Heures incohérentes — l\'enregistrement est bloqué','Inconsistent times — save is blocked')}</div>
                <ul className="list-disc pl-5 text-[var(--err)] space-y-0.5">
                  {timeValidation.errors.map((err,i) => <li key={i}>{err}</li>)}
                </ul>
              </div>
            )}
          </div>

          {/* Sélecteurs Pilote / Co-pilote — chacun avec son rôle (PIC/SIC) en sous-étiquette.
              Le message d'état "aucun pilote" est sorti du grid pour ne pas décaler le SIC. */}
          {pilots.length === 0 && (
            <div className="text-xs text-[var(--text-dim)] -mb-1">
              {tx('Aucun pilote au roster. Va dans l\'onglet Pilotes pour en ajouter.','No pilots in the roster. Go to the Pilots tab to add one.')}
            </div>
          )}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label whitespace-nowrap">{tx('Pilote','Pilot')}</div>
              <select className="select" value={f.pilotId} onChange={e=>set('pilotId', e.target.value)}>
                <option value="">{tx('— sélectionner —','— select —')}</option>
                {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
              </select>
              <div className="text-xs text-[var(--accent)] font-semibold mt-1 uppercase tracking-wider">PIC</div>
            </div>
            <div>
              <div className="label whitespace-nowrap">{tx('Co-pilote','Co-pilot')} <span className="normal-case tracking-normal opacity-70">({tx('opt.','opt.')})</span></div>
              <select className="select" value={f.copilotId} onChange={e=>set('copilotId', e.target.value)}>
                <option value="">{tx('— aucun —','— none —')}</option>
                {pilots.filter(p=>p.id !== f.pilotId).map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
              </select>
              <div className="text-xs text-[var(--accent)] font-semibold mt-1 uppercase tracking-wider">SIC</div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">{tx('Type de vol','Flight type')}</div>
              <select className="select" value={f.flightType} onChange={e=>set('flightType', e.target.value)}>
                {FLIGHT_TYPES.map(t => <option key={t.id} value={t.id}>{lang === 'en' && t.labelEn ? t.labelEn : t.label}</option>)}
              </select>
            </div>
            <div>
              <div className="label">{tx('Régime de vol','Flight rules')}</div>
              <select className="select" value={f.rules} onChange={e=>set('rules', e.target.value)}>
                {FLIGHT_RULES.map(x => <option key={x}>{x}</option>)}
              </select>
            </div>
          </div>

          {/* Décollages / Atterrissages — un compteur par pilote pour suivi des currencies.
              Indication orange si le vol est terminé (Landing rempli) mais qu'aucun décollage
              ni atterrissage n'a été comptabilisé pour personne — peut être normal (avion
              resté au sol pour problème) mais c'est un point d'attention pour le pilote. */}
          {(() => {
            const totalTO = (parseInt(f.takeoffsPic,10)||0) + (parseInt(f.takeoffsSic,10)||0);
            const totalLDG = (parseInt(f.landingsPic,10)||0) + (parseInt(f.landingsSic,10)||0);
            const allZero = totalTO === 0 && totalLDG === 0;
            const flightDone = !!f.landing;
            const showWarning = flightDone && allZero;
            return (
              <div className="space-y-2">
                <div className="label">{tx('Décollages / Atterrissages par pilote','Take-offs / Landings per pilot')}</div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <div className="text-xs text-[var(--accent)] font-semibold uppercase tracking-wider mb-1">PIC</div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <div className="label">{tx('Décol.','T/O')}</div>
                        <input type="number" min="0" className="input" value={f.takeoffsPic||0} onChange={e=>set('takeoffsPic', parseInt(e.target.value||'0',10))} />
                      </div>
                      <div>
                        <div className="label">{tx('Atter.','LDG')}</div>
                        <input type="number" min="0" className="input" value={f.landingsPic||0} onChange={e=>set('landingsPic', parseInt(e.target.value||'0',10))} />
                      </div>
                    </div>
                  </div>
                  <div>
                    <div className="text-xs text-[var(--accent)] font-semibold uppercase tracking-wider mb-1">SIC</div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <div className="label">{tx('Décol.','T/O')}</div>
                        <input type="number" min="0" className="input" value={f.takeoffsSic||0} onChange={e=>set('takeoffsSic', parseInt(e.target.value||'0',10))} />
                      </div>
                      <div>
                        <div className="label">{tx('Atter.','LDG')}</div>
                        <input type="number" min="0" className="input" value={f.landingsSic||0} onChange={e=>set('landingsSic', parseInt(e.target.value||'0',10))} />
                      </div>
                    </div>
                  </div>
                </div>
                {showWarning && (
                  <div className="mt-2 text-xs px-2 py-1.5 rounded-md bg-[var(--warn)]/15 text-[var(--warn)] border border-[var(--warn)]/30">
                    ⚠ {tx('Aucun décollage / atterrissage comptabilisé pour ce vol terminé. Si l\'avion est resté au sol (problème, retour au parking sans vol), c\'est OK — sinon pense à saisir au moins 1/1 pour le PIC (suivi currencies).','No take-off / landing recorded for this completed flight. If the aircraft stayed on the ground (issue, returned to parking without flying), that\'s fine — otherwise enter at least 1/1 for the PIC (currency tracking).')}
                  </div>
                )}
              </div>
            );
          })()}

          {/* Approches : affichées uniquement en IFR. En VFR ça n'a pas de sens. */}
          {f.rules === 'IFR' && (
            <div className="card p-3">
              <div className="label">{tx('Approches','Approaches')}</div>
              <div className="flex flex-wrap gap-2">
                {APPROACH_TYPES.map(t => (
                  <button key={t} type="button"
                    onClick={()=>toggleApproach(t)}
                    className={`badge ${f.approaches.includes(t) ? '!bg-[var(--accent)] !text-[#06243a] !border-transparent' : ''}`}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
          )}
          {f.rules === 'VFR' && f.approaches?.length > 0 && (
            <Hint title={tx('Approches (régime VFR)','Approaches (VFR rules)')}>
              {tx('Les approches IFR sont masquées. Les types précédemment cochés sont conservés en mémoire','IFR approaches are hidden. Previously checked types are kept in memory')} ({f.approaches.length}) {tx('et redeviendront éditables si tu repasses en IFR.','and become editable again if you switch back to IFR.')}
            </Hint>
          )}

          {/* Vol de nuit (pliable). Replié par défaut si aucune donnée nuit. */}
          <div className="card p-3 bg-[var(--bg-elev)]">
            <button type="button"
              className="flex items-center justify-between w-full gap-2 text-left"
              onClick={()=>setNightOpen(o=>!o)}
              title={nightOpen ? tx('Replier','Collapse') : tx('Déplier','Expand')}>
              <span className="label !mb-0 inline-flex items-center gap-1.5">
                <span style={{ color: '#a78bfa' }}><LucideIcon name="moon" size={14} strokeWidth={2.5} /></span>
                {tx('Temps de nuit (calculé)','Night time (calculated)')}
              </span>
              <span className="flex items-center gap-2 text-xs text-[var(--text-dim)]">
                {(f.nightTime||0) > 0 && (
                  <span className="font-mono text-[var(--accent)]">{fmtDuration(f.nightTime)}</span>
                )}
                <span className="text-base">{nightOpen ? '▾' : '▸'}</span>
              </span>
            </button>
            {nightOpen && (
              <div className="mt-3 space-y-3">
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <div className="label">{tx('Coucher du soleil (Zulu, optionnel)','Sunset (Zulu, optional)')}</div>
                    <input className="input font-mono" inputMode="numeric" maxLength={5} placeholder="1830"
                      value={f.sunset} onChange={e=>set('sunset', e.target.value.replace(/[^0-9:]/g,''))} />
                  </div>
                  <div>
                    <div className="label">{tx('Lever du soleil (Zulu, optionnel)','Sunrise (Zulu, optional)')}</div>
                    <input className="input font-mono" inputMode="numeric" maxLength={5} placeholder="0615"
                      value={f.sunrise} onChange={e=>set('sunrise', e.target.value.replace(/[^0-9:]/g,''))} />
                  </div>
                </div>
                <div className="flex items-center justify-between gap-2">
                  <div className="text-sm">
                    {tx('Temps de nuit calculé :','Computed night time:')}
                    <span className="font-mono text-[var(--accent)] ml-2">{(f.nightTime||0) > 0 ? fmtDuration(f.nightTime||0) : '—'}</span>
                  </div>
                  <input type="number" min="0" step="1" className="input max-w-32 text-sm"
                    placeholder={tx('ou minutes manuel','or manual minutes')}
                    value={f.nightTime||''}
                    onChange={e=>set('nightTime', parseInt(e.target.value||'0',10))} />
                </div>
                {(!f.sunset || !f.sunrise) && (
                  <Hint title={tx('Calcul du temps de nuit','Night time calculation')}>
                    {tx('Renseigne le coucher et le lever du soleil pour le calcul automatique de l\'intersection avec [Take Off, Landing]. Tu peux aussi saisir le temps de nuit manuellement à droite (en minutes). Si rien n\'est renseigné, aucun temps de nuit n\'est compté pour ce vol.','Enter sunset and sunrise for automatic intersection calculation with [Take Off, Landing]. You can also enter night time manually on the right (in minutes). If nothing is entered, no night time is counted for this flight.')}
                  </Hint>
                )}
              </div>
            )}
          </div>

          {/* Pour un vol en simulateur : carburant, huile, W&B, FPL, OFPL n'ont
              pas de sens. Ces blocs ne s'affichent que pour un avion réel. */}
          {!isSim && (
            <>
              {/* ---- Carburant Avion (multi-pleins, scan facture auto-syncé Dépenses) ---- */}
              <FuelEntriesEditor
                entries={f.fuelEntries||[]}
                onChange={(arr)=>set('fuelEntries', arr)}
                addExpense={addExpense}
                aircraftId={f.aircraftId}
                flightDate={f.date}
                flights={flights}
                currentFlightId={f.id}
                defaultUnit={settings.defaultFuelUnit||'L'}
                defaultCurrency={settings.defaultCurrency||'EUR'}
              />

              {/* ---- Huile moteur (qté + moteur D/G, sans montant ni scan) ---- */}
              <OilEntriesEditor
                entries={f.oilEntries||[]}
                onChange={(arr)=>set('oilEntries', arr)}
                defaultUnit={settings.defaultOilUnit||'qt'}
                isMonomotor={(() => {
                  const ac = aircraft.find(a => a.id === f.aircraftId);
                  // Default = monomoteur si engineCount non renseigné (cas le plus courant)
                  return !ac || !ac.engineCount || ac.engineCount <= 1;
                })()}
              />

              {/* ---- Documents joints au vol (W&B / FPL / OFPL) ---- */}
              <FlightDocumentsEditor docs={f.documents||[]} onChange={(d)=>set('documents', d)} />
            </>
          )}

          {/* Bandeau visuel quand on est en mode simulateur */}
          {isSim && selectedAircraft && (
            <div className="card p-3 bg-[var(--accent)]/10 border-[var(--accent)]/40">
              <div className="text-sm flex items-center gap-2">
                <span className="text-base">🖥️</span>
                <span className="font-semibold text-[var(--accent)]">{tx('Vol en simulateur','Simulator flight')}</span>
              </div>
              <div className="text-xs text-[var(--text-dim)] mt-1">
                {selectedAircraft.registration} · {selectedAircraft.engineCount === 1 ? tx('Monomoteur','Single-engine') : selectedAircraft.engineCount === 2 ? tx('Bimoteur','Twin-engine') : `${selectedAircraft.engineCount}-${tx('moteur','engine')}`}
                {selectedAircraft.engineType && ` · ${
                  selectedAircraft.engineType === 'piston' ? 'Piston'
                  : selectedAircraft.engineType === 'turbine' ? 'Turbine'
                  : selectedAircraft.engineType === 'jet' ? 'Jet'
                  : selectedAircraft.engineType === 'electric' ? (lang === 'en' ? 'Electric' : 'Élec.') : selectedAircraft.engineType
                }`}
                {' '}{tx('— les blocs Carburant, Huile, W&B, FPL et OFPL sont masqués (sans intérêt en simu).','— Fuel, Oil, W&B, FPL and OFPL blocks are hidden (not relevant in sim).')}
              </div>
            </div>
          )}


          <div>
            <div className="label">{tx('Notes','Notes')}</div>
            <textarea className="textarea" rows={2} value={f.notes} onChange={e=>set('notes', e.target.value)} placeholder={tx('Remarques, METAR, passagers, etc.','Remarks, METAR, passengers, etc.')} />
          </div>

          {/* Statut vérification (Ops) — auto-calculé d'après les données du vol.
              🔴 Rouge tant que le Landing n'est pas saisi (vol planifié / en cours)
              🟠 Orange si Landing rempli mais des données manquent
              🟢 Vert UNIQUEMENT si l'utilisateur clique "Marquer Complet" et que tout est rempli.
              Le passage en vert est toujours manuel (responsabilité pilote / dispatch). */}
          {(() => {
            const completeErrors = getCompleteValidationErrors(f);
            const canComplete = completeErrors.length === 0;
            const autoStatus = computeAutoVerificationStatus(f);
            // Statut effectif affiché : si l'utilisateur a déjà cliqué "Complet" et que tout
            // tient encore la route, on garde le vert. Sinon on prend l'auto.
            const effectiveStatus = (f.verificationStatus === 'complete' && canComplete) ? 'complete' : autoStatus;
            const def = VERIFICATION_STATUSES[effectiveStatus];
            return (
              <div className="card p-3">
                <div className="label">{tx('Statut de vérification (Ops)','Verification status (Ops)')}</div>
                <div className="flex items-center gap-3 p-3 rounded-lg" style={{ background: def.color + '22', borderLeft: `5px solid ${def.color}` }}>
                  <span className="text-2xl" style={{ color: def.color }}>●</span>
                  <div className="font-semibold text-base" style={{ color: def.color }}>{lang === 'en' && def.labelEn ? def.labelEn : def.label}</div>
                </div>

                <div className="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">
                  {f.verificationStatus !== 'complete' ? (
                    <button type="button"
                      disabled={!canComplete}
                      onClick={()=>set('verificationStatus', 'complete')}
                      className={`btn !text-white font-semibold ${canComplete ? '' : 'opacity-40 cursor-not-allowed'}`}
                      style={{ background: VERIFICATION_STATUSES.complete.color }}
                      title={canComplete ? tx('Marquer ce vol comme validé Complet','Mark this flight as Complete') : tx('Compléter d\'abord les données manquantes','Fill in the missing data first')}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="check" size={14} strokeWidth={2.75} />{tx('Marquer Complet','Mark Complete')}</span>
                    </button>
                  ) : (
                    <button type="button"
                      onClick={()=>set('verificationStatus', 'pending')}
                      className="btn btn-secondary !py-1.5 !px-3 text-xs sm:text-sm sm:!py-2 sm:!px-4"
                      title={tx('Annuler la validation Complet (revient au statut auto)','Cancel the Complete validation (back to auto status)')}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="refreshCw" size={12} strokeWidth={2.5} />{tx('Annuler la validation','Cancel validation')}</span>
                    </button>
                  )}
                </div>

                {!canComplete && f.landing && (
                  <div className="text-xs text-[var(--warn)] mt-3">
                    <div className="font-semibold mb-1">⚠ {tx('Conditions manquantes pour « Complet » :','Missing conditions for "Complete":')}</div>
                    <ul className="list-disc pl-5 space-y-0.5">
                      {completeErrors.map((err,i) => <li key={i}>{err}</li>)}
                    </ul>
                  </div>
                )}

                <div className="mt-2">
                  <Hint title={tx('Comment marche le statut auto','How auto status works')}>
                    🔴 {tx('Rouge = vol planifié ou en cours (pas encore atterri).','Red = planned or in-progress flight (not yet landed).')}<br/>
                    🟠 {tx('Orange = atterri mais des données manquent (heures, TTSN, W&B, FPL, OFPL…).','Orange = landed but data missing (times, TTSN, W&B, FPL, OFPL…).')}<br/>
                    🟢 {tx('Vert = pilote ou dispatch a explicitement validé la fiche en cliquant « Marquer Complet ». Possible uniquement quand toutes les conditions sont remplies.','Green = pilot or dispatch explicitly validated the form by clicking "Mark Complete". Only possible when all conditions are met.')}
                  </Hint>
                </div>
              </div>
            );
          })()}

          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>{tx('Annuler','Cancel')}</button>
            <button className="btn btn-primary" onClick={handleSave}>{tx('Enregistrer','Save')}</button>
          </div>
        </div>
      );
    }

    function LogbookScreen({ flights, aircraft, pilots=[], addExpense, onAddOrUpdate, onDelete, settings={}, reopenFlightId=null, onConsumeReopen=()=>{} }) {
      const t = useT();
      const tx = useTx();
      const { lang } = React.useContext(I18nContext);
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const [filterAircraft, setFilterAircraft] = useState('all');
      // Si App demande de rouvrir une fiche vol (typiquement après archivage stockage
      // plein), on ouvre la modal d'édition sur ce vol et on consomme l'instruction.
      useEffect(() => {
        if (!reopenFlightId) return;
        const f = flights.find(x => x.id === reopenFlightId);
        if (f) { setEditing(f); setShowForm(true); }
        onConsumeReopen();
      }, [reopenFlightId, flights, onConsumeReopen]);

      const sorted = useMemo(() => {
        const arr = [...flights];
        arr.sort((a,b) => (b.date||'').localeCompare(a.date||'') || (b.id||'').localeCompare(a.id||''));
        return filterAircraft==='all' ? arr : arr.filter(f => f.aircraftId === filterAircraft);
      }, [flights, filterAircraft]);

      function acById(id) { return aircraft.find(a => a.id === id); }
      function pilotById(id) { return pilots.find(p => p.id === id); }
      function fuelSummary(f) {
        const arr = f.fuelEntries || [];
        if (!arr.length && f.fuelUplift) return `${f.fuelUplift} ${f.fuelUnit||'L'}`;
        if (!arr.length) return null;
        const totals = arr.reduce((acc,e)=>{
          const v = parseFloat(e.qty)||0;
          if (e.unit) acc[e.unit] = (acc[e.unit]||0) + v;
          return acc;
        }, {});
        return Object.entries(totals).map(([u,v])=>`${v.toFixed(1)} ${u}`).join(' / ');
      }
      function oilSummary(f) {
        const arr = f.oilEntries || [];
        if (!arr.length && f.oilUplift) return `${f.oilUplift} ${f.oilUnit||'qt'}`;
        if (!arr.length) return null;
        const totals = arr.reduce((acc,e)=>{
          const v = parseFloat(e.qty)||0;
          if (e.unit) acc[e.unit] = (acc[e.unit]||0) + v;
          return acc;
        }, {});
        return Object.entries(totals).map(([u,v])=>`${v.toFixed(2)} ${u}`).join(' / ');
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between gap-2">
            <h2 className="text-xl font-semibold">{t('logbook.title')}</h2>
            <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }}>{t('logbook.newFlight')}</button>
          </div>

          <div className="flex gap-2 overflow-x-auto -mx-1 px-1">
            <button className={`badge ${filterAircraft==='all'?'!bg-[var(--accent)] !text-[#06243a] !border-transparent':''}`} onClick={()=>setFilterAircraft('all')}>{t('logbook.allFlights')} ({flights.length})</button>
            {aircraft.map(a => (
              <button key={a.id} className={`badge whitespace-nowrap ${filterAircraft===a.id?'!bg-[var(--accent)] !text-[#06243a] !border-transparent':''}`} onClick={()=>setFilterAircraft(a.id)}>
                {a.registration}
              </button>
            ))}
          </div>

          {sorted.length === 0 && (
            <div className="card p-6 text-center text-[var(--text-dim)]">
              {t('logbook.empty')}
            </div>
          )}

          <div className="space-y-2">
            {sorted.map(f => {
              const ac = acById(f.aircraftId);
              const pi = pilotById(f.pilotId);
              const co = pilotById(f.copilotId);
              const fs = fuelSummary(f);
              const os = oilSummary(f);
              const fuelInvoices = (f.fuelEntries||[]).filter(e=>e.invoiceDocId).length;
              return (
                <div key={f.id} className="card p-3" onClick={()=>{ setEditing(f); setShowForm(true); }}
                     style={{
                       borderLeftWidth: '5px',
                       borderLeftColor: verifColor(f.verificationStatus||'pending'),
                     }}
                     title={`${tx('Statut Ops','Ops status')} : ${verifLabel(f.verificationStatus||'pending')}`}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="min-w-0">
                      <div className="text-sm text-[var(--text-dim)] flex items-center gap-2">
                        <span>{f.date}</span>
                        {ac?.kind === 'simulator' && (
                          <span className="badge !bg-[var(--accent)]/15 !text-[var(--accent)] !border-[var(--accent)]/40 !py-0.5 !px-1.5 text-[10px]" title={tx('Vol en simulateur','Simulator flight')}>
                            🖥️ SIM
                          </span>
                        )}
                      </div>
                      <div className="text-lg font-semibold tracking-wide">
                        {f.from} <span className="text-[var(--text-dim)]">→</span> {f.to}
                      </div>
                      <div className="text-xs text-[var(--text-dim)] truncate">
                        {ac ? `${ac.registration} · ${ac.type}` : '—'}
                      </div>
                      {/* PIC et SIC chacun sur sa ligne pour meilleure lisibilité */}
                      <div className="text-xs mt-0.5 space-y-0.5">
                        {pi ? (
                          <div className="truncate">
                            <span className="text-[var(--accent)] font-semibold">PIC :</span>{' '}
                            <span>{pilotDisplayName(pi)}</span>
                          </div>
                        ) : (
                          <div className="text-[var(--text-dim)] italic">{tx('Pilote non renseigné','No pilot set')}</div>
                        )}
                        {co && (
                          <div className="truncate">
                            <span className="text-[var(--accent)] font-semibold">SIC :</span>{' '}
                            <span>{pilotDisplayName(co)}</span>
                          </div>
                        )}
                      </div>
                    </div>
                    {/* Bloc FT / AT : 2 colonnes, label centré au-dessus de la valeur */}
                    <div className="flex gap-3 flex-shrink-0">
                      <div className="text-center min-w-[50px]">
                        <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">FT</div>
                        <div className="font-mono tabular-nums text-sm">{fmtDuration(f.flightTime)}</div>
                      </div>
                      <div className="text-center min-w-[50px]">
                        <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">AT</div>
                        <div className="font-mono tabular-nums text-sm">{fmtDuration(f.airTime)}</div>
                      </div>
                    </div>
                  </div>
                  <div className="flex flex-wrap gap-1 mt-2">
                    <span className="badge">{f.rules}</span>
                    {isDuoFlight(f) && <span className="badge">🤝 Duo</span>}
                    {/* Affichage temps de nuit : valeur calculée OU legacy boolean */}
                    {(f.nightTime||0) > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="moon" size={11} strokeWidth={2.5} />{fmtDuration(f.nightTime)}</span>}
                    {(f.nightTime||0) === 0 && f.night && <span className="badge inline-flex items-center gap-1"><LucideIcon name="moon" size={11} strokeWidth={2.5} />{tx('nuit','night')}</span>}
                    {f.rules === 'IFR' && f.approaches?.slice(0,3).map(a => <span key={a} className="badge">{a}</span>)}
                    {f.rules === 'IFR' && f.approaches?.length>3 && <span className="badge">+{f.approaches.length-3}</span>}
                    {(f.ttsnAfter||f.ttsnBefore) && (
                      <span className="badge font-mono" title={tx('TTSN avion (avant → après)','Aircraft TTSN (before → after)')}>
                        ⏲️ {f.ttsnBefore||'?'} → {f.ttsnAfter||'?'}
                      </span>
                    )}
                    {(f.documents||[]).length>0 && <span className="badge">📎 {f.documents.length}</span>}
                    {/* Indication visuelle quand des éléments du vol ont été archivés
                        en ZIP (docs joints, factures fuel, etc.). Le vol reste intact
                        dans l'app, seuls les binaires sont retirés. */}
                    {(((f.documents||[]).some(d => d.archived)) ||
                      ((f.fuelEntries||[]).some(e => e.invoiceArchived)) ||
                      ((f.oilEntries||[]).some(e => e.archived))
                    ) && (
                      <span className="badge"
                        style={{
                          background: 'var(--ok)' + '22',
                          borderColor: 'var(--ok)',
                          color: 'var(--ok)'
                        }}
                        title={tx('Documents archivés en ZIP — le vol reste dans l\'app, les fichiers sont dans la sauvegarde téléchargée','Documents archived to ZIP — the flight stays in the app, files are in the downloaded backup')}>
                        ✓ {tx('OK archivé','Archived OK')}
                      </span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing ? t('logbook.editFlight') : t('logbook.newFlight').replace('+ ','')}
            footer={editing && (
              <button
                onClick={()=>{
                  if (confirm(tx('Supprimer ce vol ? (Préfère un export JSON avant.)','Delete this flight? (Export JSON first as backup.)'))) {
                    onDelete(editing.id); setShowForm(false);
                  }
                }}
                className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
                {t('btn.delete')}
              </button>
            )}
          >
            <FlightForm
              initial={editing}
              aircraft={aircraft}
              pilots={pilots}
              addExpense={addExpense}
              settings={settings}
              flights={flights}
              onCancel={()=>setShowForm(false)}
              onSave={(f)=>{ onAddOrUpdate(f); setShowForm(false); }}
            />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 10) ÉCRAN — AVIONS
    // ------------------------------------------------------------------

    // Catégories moteur — utilisées par les stats pour classer les heures par pilote
    const ENGINE_TYPES = [
      { id: 'piston',  label: 'Piston' },
      { id: 'turbine', label: 'Turbine (turbopropulseur)' },
      { id: 'jet',     label: 'Jet (turboréacteur)' },
      { id: 'electric',label: 'Électrique' },
    ];
    const ENGINE_COUNTS = [
      { id: 1, label: 'Monomoteur (SE)' },
      { id: 2, label: 'Bimoteur (ME)' },
      { id: 3, label: 'Trimoteur' },
      { id: 4, label: 'Quadrimoteur' },
    ];

    function AircraftForm({ initial, flights = [], onSave, onCancel }) {
      const blank = {
        id: null,
        kind: 'real',           // 'real' = avion physique, 'simulator' = simu (FFS, FTD, AATD…)
        registration: '',
        type: '',
        serial: '',
        engineCount: 1,         // 1 = mono, 2 = bi, etc.
        engineType: 'piston',   // 'piston', 'turbine', 'jet', 'electric'
        ttsn: 0,                 // TTSN (Total Time Since New) heure totale — non utilisé pour simu
        // Champs legacy conservés pour compatibilité (non affichés)
        airframeStartHours: 0,
        engineStartHours: 0,
        deadlines: [], // { id, label, date?, hours? }
      };
      // Migration : si l'avion vient d'une ancienne version, on récupère la
      // valeur de airframeStartHours comme TTSN initial.
      const merged = { ...blank, ...(initial||{}) };
      if (merged.ttsn === 0 && (merged.airframeStartHours || 0) > 0) {
        merged.ttsn = merged.airframeStartHours;
      }
      const [a, setA] = useState(merged);
      const [newDeadline, setNewDeadline] = useState({ label:'', date:'', hours:'' });

      function set(k,v){ setA(p=>({...p,[k]:v})); }

      // === TTSN actuel calculé depuis le dernier vol ===
      // On cherche le ttsnAfter le plus récent (par date du vol) parmi les vols
      // qui ont effectivement renseigné cette valeur. Si aucun, on reste sur le
      // TTSN initial saisi à la création de l'avion.
      const lastFlightTtsn = useMemo(() => {
        if (!a.id) return null;
        const candidates = flights
          .filter(f => f.aircraftId === a.id && f.ttsnAfter && !isNaN(parseFloat(f.ttsnAfter)))
          .sort((x, y) => (y.date || '').localeCompare(x.date || ''));
        if (candidates.length === 0) return null;
        const last = candidates[0];
        return { value: parseFloat(last.ttsnAfter), date: last.date, from: last.from, to: last.to };
      }, [flights, a.id]);
      function addDeadline() {
        if (!newDeadline.label) return;
        const d = { ...newDeadline, id: 'dl_'+Date.now() };
        set('deadlines', [...(a.deadlines||[]), d]);
        setNewDeadline({ label:'', date:'', hours:'' });
      }
      function removeDeadline(id) {
        if (!confirm('Retirer cette échéance ?')) return;
        set('deadlines', a.deadlines.filter(d=>d.id!==id));
      }

      const isSim = a.kind === 'simulator';
      return (
        <div className="space-y-3">
          {/* Toggle Avion réel / Simulateur — détermine ce qui est affiché en dessous */}
          <div className="card p-3 bg-[var(--bg-elev)]">
            <div className="label">Type d'appareil</div>
            <div className="grid grid-cols-2 gap-2">
              {[
                ['real',      '✈ Avion réel'],
                ['simulator', '🖥️ Simulateur'],
              ].map(([id, label]) => (
                <button key={id} type="button"
                  onClick={()=>set('kind', id)}
                  className={`btn ${a.kind===id ? 'btn-primary' : 'btn-secondary'}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label whitespace-nowrap">Immatriculation</div>
              <input className="input uppercase" placeholder={isSim ? 'SIM-FFS-A320' : 'F-HABC'} value={a.registration} onChange={e=>set('registration', e.target.value.toUpperCase())} />
            </div>
            <div>
              <div className="label whitespace-nowrap">Type</div>
              <input className="input" placeholder={isSim ? 'FFS Level D A320, FTD…' : 'Cessna 172, PC-12, Phenom 300…'} value={a.type} onChange={e=>set('type', e.target.value)} />
            </div>
          </div>
          {!isSim && (
            <div>
              <div className="label">N° de série</div>
              <input className="input" value={a.serial} onChange={e=>set('serial', e.target.value)} />
            </div>
          )}
          <div className="card p-3 bg-[var(--bg-elev)]">
            <div className="label">Caractéristiques moteur</div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <div className="label whitespace-nowrap">Nombre de moteurs</div>
                <select className="select" value={a.engineCount} onChange={e=>set('engineCount', parseInt(e.target.value,10))}>
                  {ENGINE_COUNTS.map(ec => <option key={ec.id} value={ec.id}>{ec.label}</option>)}
                </select>
              </div>
              <div>
                <div className="label whitespace-nowrap">Type moteur</div>
                <select className="select" value={a.engineType} onChange={e=>set('engineType', e.target.value)}>
                  {ENGINE_TYPES.map(et => <option key={et.id} value={et.id}>{et.label}</option>)}
                </select>
              </div>
            </div>
            <div className="mt-2">
              <Hint title="Pourquoi ces champs ?">
                Ces caractéristiques sont utilisées par l'onglet Stats pour classer automatiquement
                les heures de vol des pilotes en heures mono/multi-moteur et heures piston/turbine/jet.
              </Hint>
            </div>
          </div>
          {/* TTSN — caché pour les simulateurs (un sim n'a pas d'heures cellule). */}
          {!isSim && (
          <div className="card p-3 bg-[var(--bg-elev)]">
            <div className="label whitespace-nowrap">TTSN <span className="normal-case tracking-normal opacity-70">(heure total)</span></div>
            <input type="number" step="0.1" className="input font-mono" placeholder="2542.0"
                   value={a.ttsn} onChange={e=>set('ttsn', parseFloat(e.target.value||'0'))} />
            {lastFlightTtsn && (
              <div className={`text-xs mt-2 px-2 py-1.5 rounded-md ${Math.abs(lastFlightTtsn.value - (parseFloat(a.ttsn)||0)) > 0.05 ? 'bg-[var(--warn)]/15 text-[var(--warn)]' : 'bg-[var(--accent)]/10 text-[var(--accent)]'}`}>
                <div className="inline-flex items-center gap-1.5">
                  <LucideIcon name="clipboard" size={12} strokeWidth={2.5} />
                  <span>TTSN du dernier vol : <span className="font-mono font-semibold">{lastFlightTtsn.value.toFixed(1)} h</span></span>
                </div>
                <div className="text-[var(--text-dim)] mt-0.5">
                  Vol du {lastFlightTtsn.date} {lastFlightTtsn.from}→{lastFlightTtsn.to}
                </div>
                {Math.abs(lastFlightTtsn.value - (parseFloat(a.ttsn)||0)) > 0.05 && (
                  <button type="button"
                    className="mt-1 text-[10px] uppercase tracking-wider font-semibold underline"
                    onClick={()=>set('ttsn', lastFlightTtsn.value)}>
                    → Synchroniser avec le dernier vol
                  </button>
                )}
              </div>
            )}
            <div className="mt-2">
              <Hint title="À propos du TTSN">
                TTSN = Total Time Since New, l'heure totale cumulée de l'avion depuis sa sortie d'usine.
                À la création, saisis la valeur actuelle. Ensuite, le TTSN doit correspondre au TTSN après
                du dernier vol enregistré pour cet avion (un bouton de synchro apparaît si écart).
              </Hint>
            </div>
          </div>
          )}

          {/* Échéances — cachées pour les simulateurs (sans assurance/CDN/visites). */}
          {!isSim && (
          <div className="card p-3">
            <div className="label">Échéances (assurance, CDN, visites…)</div>
            {(a.deadlines||[]).length === 0 && <div className="text-sm text-[var(--text-dim)]">Aucune échéance pour l'instant.</div>}
            <div className="space-y-2">
              {(a.deadlines||[]).map(d => (
                <div key={d.id} className="flex items-center justify-between gap-2 bg-[var(--bg-elev)] p-2 rounded-lg">
                  <div className="text-sm">
                    <div className="font-medium">{d.label}</div>
                    <div className="text-xs text-[var(--text-dim)]">
                      {d.date && <>échéance : {d.date}</>}
                      {d.date && d.hours && ' · '}
                      {d.hours && <>à {d.hours} h cellule</>}
                    </div>
                  </div>
                  <button className="btn btn-danger !py-1 !px-2 text-xs" onClick={()=>removeDeadline(d.id)}><span className="inline-flex items-center gap-1"><LucideIcon name="trash2" size={12} strokeWidth={2.5} />Retirer</span></button>
                </div>
              ))}
            </div>
            <div className="mt-3 grid grid-cols-3 gap-2">
              <input className="input col-span-3 sm:col-span-1" placeholder="Libellé (ex: Visite annuelle)" value={newDeadline.label} onChange={e=>setNewDeadline({...newDeadline,label:e.target.value})} />
              <input type="date" className="input" value={newDeadline.date} onChange={e=>setNewDeadline({...newDeadline,date:e.target.value})} />
              <input type="number" className="input" placeholder="ou heures cellule" value={newDeadline.hours} onChange={e=>setNewDeadline({...newDeadline,hours:e.target.value})} />
            </div>
            <div className="flex justify-end mt-2">
              <button className="btn btn-secondary" onClick={addDeadline}>+ Ajouter échéance</button>
            </div>
          </div>
          )}

          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>Annuler</button>
            <button className="btn btn-primary" onClick={()=>{
              if (!a.registration) return alert('Immatriculation requise.');
              onSave({ ...a, id: a.id || 'ac_'+Date.now() });
            }}>Enregistrer</button>
          </div>
        </div>
      );
    }

    function AircraftScreen({ aircraft, flights, onAddOrUpdate, onDelete }) {
      const t = useT();
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);

      function totalHoursFor(acId) {
        // somme des Flight Time en minutes -> heures décimales
        const sum = flights.filter(f => f.aircraftId === acId).reduce((s,f) => s + (f.flightTime||0), 0);
        return sum / 60;
      }
      // TTSN actuel = ttsnAfter du dernier vol enregistré pour cet avion.
      // Fallback : valeur initiale saisie à la création de l'avion.
      function currentTTSN(ac) {
        const candidates = flights
          .filter(f => f.aircraftId === ac.id && f.ttsnAfter && !isNaN(parseFloat(f.ttsnAfter)))
          .sort((x, y) => (y.date || '').localeCompare(x.date || ''));
        if (candidates.length > 0) return parseFloat(candidates[0].ttsnAfter);
        // Migration : si pas de vol, essaie ttsn (nouveau) puis airframeStartHours (legacy)
        if (ac.ttsn != null && ac.ttsn !== 0) return parseFloat(ac.ttsn) || 0;
        return parseFloat(ac.airframeStartHours) || 0;
      }

      // Séparation avions réels vs simulateurs (par défaut kind='real' si manquant)
      const realAircraft = aircraft.filter(a => (a.kind || 'real') === 'real');
      const simulators   = aircraft.filter(a => a.kind === 'simulator');

      // Card visuel pour 1 avion (factorisé pour réutilisation dans 2 sections)
      function AircraftCard({ a, showTTSN = true }) {
        const ttsn = currentTTSN(a);
        const upcoming = (a.deadlines||[]).filter(d => {
          if (d.date) {
            const days = Math.ceil((new Date(d.date) - new Date()) / 86400000);
            return days <= 60;
          }
          if (d.hours) {
            const remaining = parseFloat(d.hours) - ttsn;
            return remaining <= 25;
          }
          return false;
        });
        const flownH = totalHoursFor(a.id);
        return (
          <div className="card p-3" onClick={()=>{ setEditing(a); setShowForm(true); }}>
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="text-lg font-semibold tracking-wide">{a.registration}</div>
                <div className="text-sm text-[var(--text-dim)] truncate">{a.type} {a.serial && `· s/n ${a.serial}`}</div>
                <div className="flex flex-wrap gap-1 mt-1">
                  {a.engineCount && (
                    <span className="badge">
                      {a.engineCount === 1 ? 'Mono' : a.engineCount === 2 ? 'Bi' : `${a.engineCount}-mot.`}
                    </span>
                  )}
                  {a.engineType && (
                    <span className="badge">
                      {a.engineType === 'piston' ? 'Piston'
                       : a.engineType === 'turbine' ? 'Turbine'
                       : a.engineType === 'jet' ? 'Jet'
                       : a.engineType === 'electric' ? 'Élec.' : a.engineType}
                    </span>
                  )}
                </div>
              </div>
              <div className="text-right text-sm flex-shrink-0">
                {showTTSN ? (
                  <>
                    <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">TTSN</div>
                    <div className="font-mono tabular-nums text-[var(--accent)] text-base">{ttsn.toFixed(1)} h</div>
                  </>
                ) : (
                  <>
                    <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">Heures simu</div>
                    <div className="font-mono tabular-nums text-[var(--accent)] text-base">{flownH.toFixed(1)} h</div>
                  </>
                )}
              </div>
            </div>
            {upcoming.length > 0 && (
              <div className="mt-2 text-xs text-[var(--warn)]">
                ⚠ {upcoming.length} échéance(s) proche(s) : {upcoming.map(u=>u.label).join(', ')}
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-xl font-semibold">{t('aircraft.title')}</h2>
            <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }}>{t('aircraft.new')}</button>
          </div>

          {aircraft.length === 0 && (
            <div className="card p-6 text-center text-[var(--text-dim)]">
              {t('aircraft.empty')}
            </div>
          )}

          {/* Section Avions réels */}
          {realAircraft.length > 0 && (
            <div className="space-y-2">
              <div className="flex items-center gap-2 mt-1">
                <span className="text-base">✈</span>
                <h3 className="text-sm uppercase tracking-wider text-[var(--text-dim)] font-semibold">Avions ({realAircraft.length})</h3>
              </div>
              {realAircraft.map(a => <AircraftCard key={a.id} a={a} showTTSN={true} />)}
            </div>
          )}

          {/* Section Simulateurs */}
          {simulators.length > 0 && (
            <div className="space-y-2">
              <div className="flex items-center gap-2 mt-3">
                <span className="text-base">🖥️</span>
                <h3 className="text-sm uppercase tracking-wider text-[var(--text-dim)] font-semibold">Simulateurs ({simulators.length})</h3>
              </div>
              {simulators.map(a => <AircraftCard key={a.id} a={a} showTTSN={false} />)}
            </div>
          )}

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing ? 'Modifier l\'avion' : 'Nouvel avion'}
            footer={editing && (
              <button onClick={()=>{
                if (confirm('Supprimer cet avion ? Les vols associés ne seront pas effacés.')) {
                  onDelete(editing.id); setShowForm(false);
                }
              }}
                className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
                Supprimer
              </button>
            )}
          >
            <AircraftForm initial={editing} flights={flights} onCancel={()=>setShowForm(false)} onSave={(a)=>{ onAddOrUpdate(a); setShowForm(false); }} />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 11) ÉCRAN — DOCUMENTS / FACTURES
    // ------------------------------------------------------------------

    function DocumentForm({ initial, aircraft, categories, pilots = [], onSave, onCancel }) {
      const blank = {
        id: null,
        date: todayZuluDate(),
        supplier: '',
        amount: '',
        currency: 'EUR',
        categoryId: 'other',
        aircraftId: '',
        pilotId: '',           // pilote rattaché à la dépense (optionnel)
        thumbnail: '',         // dataURL JPEG (ancien champ, conservé pour rétrocompat)
        ocrText: '',           // legacy : ancien OCR (conservé pour anciens docs)
        fileName: '',
        mime: '',              // 'image/jpeg' ou 'application/pdf'
        dataUrl: '',           // image redimensionnée OU PDF complet
        notes: '',
        addedAt: Date.now(),
      };
      const [d, setD] = useState({ ...blank, ...(initial||{}) });
      const cameraRef = useRef(null);
      const filesRef  = useRef(null);
      const [menuOpen, setMenuOpen] = useState(false);
      const [busy, setBusy] = useState(false);
      const [viewing, setViewing] = useState(false);

      function set(k,v){ setD(p=>({...p,[k]:v})); }

      // Ajout / remplacement d'un fichier (image ou PDF) — même pattern que les
      // documents de vol (W&B/FPL/OFPL) ou les factures fuel. Plus d'OCR : la
      // saisie des champs (date, montant, fournisseur, catégorie) est manuelle.
      async function handleFiles(e) {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (!file) return;
        setBusy(true);
        try {
          const stored = await fileToStoredDoc(file, d.categoryId);
          setD(prev => ({
            ...prev,
            thumbnail: stored.mime === 'application/pdf' ? '' : stored.dataUrl,
            fileName: stored.fileName,
            mime: stored.mime,
            dataUrl: stored.dataUrl,
          }));
        } catch (err) {
          alert('Import : ' + err.message);
        } finally {
          setBusy(false);
        }
      }
      function triggerCamera() { setMenuOpen(false); setTimeout(() => cameraRef.current?.click(), 0); }
      function triggerFiles()  { setMenuOpen(false); setTimeout(() => filesRef.current?.click(), 0); }
      function removeFile() {
        if (!confirm('Retirer le fichier joint à cette dépense ?')) return;
        setD(prev => ({ ...prev, thumbnail: '', fileName: '', mime: '', dataUrl: '' }));
      }
      const hasFile = !!(d.dataUrl || d.thumbnail);
      const isPdf = d.mime === 'application/pdf';
      // État archivé : flag posé par archiveAndFreeDocuments. Le binaire est dans le ZIP.
      const isArchived = !!d.archived || (!hasFile && !!d.archivedAt && !!d.fileName);

      return (
        <div className="space-y-3">
          <div className="card p-3">
            <div className="label">Pièce jointe (facture, ticket…)</div>
            {isArchived ? (
              /* Encart vert "OK archivé" : binaire dans le ZIP, métadonnées préservées */
              <div className="flex items-center gap-2 bg-[var(--ok)]/10 border border-[var(--ok)]/40 p-2 rounded-lg">
                <div className="flex-1 min-w-0 text-xs">
                  <div className="truncate font-semibold text-[var(--ok)]">✓ OK archivé</div>
                  <div className="truncate text-[var(--text-dim)]">{d.fileName || 'Pièce jointe'}</div>
                </div>
                <button type="button" className="btn btn-danger !py-1 !px-2 text-xs"
                  onClick={()=>{
                    if (!confirm('Retirer la référence à ce fichier archivé ?')) return;
                    setD(prev => ({ ...prev, thumbnail:'', dataUrl:'', fileName:'', mime:'', archived: false }));
                  }}><span className="inline-flex items-center gap-1"><LucideIcon name="trash2" size={12} strokeWidth={2.5} />Retirer</span></button>
              </div>
            ) : hasFile ? (
              <div className="space-y-2">
                {/* Rangée DocRow style : aperçu + nom + Ouvrir + Retirer */}
                <div className="flex items-center gap-2 bg-[var(--bg-card)] p-2 rounded-lg">
                  {isPdf ? (
                    <div className="w-12 h-12 grid place-items-center bg-[var(--bg-elev)] rounded text-2xl flex-shrink-0">📄</div>
                  ) : (
                    <img src={d.thumbnail || d.dataUrl} alt="" className="w-12 h-12 object-cover rounded flex-shrink-0" />
                  )}
                  <div className="flex-1 min-w-0 text-xs">
                    <div className="truncate font-medium">{d.fileName || 'Pièce jointe'}</div>
                    <div className="truncate text-[var(--text-dim)]">✓ Rattachée</div>
                  </div>
                  <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs"
                    onClick={()=>setViewing(true)}>Ouvrir</button>
                  <button type="button" className="btn btn-danger !py-1 !px-2 text-xs"
                    onClick={removeFile}><span className="inline-flex items-center gap-1"><LucideIcon name="trash2" size={12} strokeWidth={2.5} />Retirer</span></button>
                </div>
                {/* Bouton Remplacer optionnel */}
                <div className="relative inline-block">
                  <button type="button" className="btn btn-secondary !py-1 !px-3 text-xs" disabled={busy}
                    onClick={()=>setMenuOpen(o=>!o)}>
                    {busy ? 'Import…' : '🔁 Remplacer'}
                  </button>
                  {menuOpen && (
                    <>
                      <div className="fixed inset-0 z-20" onClick={()=>setMenuOpen(false)} />
                      <div className="absolute left-0 top-full mt-1 z-30 card p-2 min-w-[230px] anim-pop">
                        <button type="button" className="btn btn-secondary w-full mb-1 justify-start" onClick={triggerCamera}>
                          <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />Scanner avec l'appareil photo</span>
                        </button>

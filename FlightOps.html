    // Bar chart minimaliste 100% SVG (zéro dépendance externe).
    // entries = [[label, valueMin], ...] ; affiche jusqu'à `max` dernières entrées.
    function BarChart({ entries, color = 'var(--accent)', height = 180, max = 12 }) {
      const tx = useTx();
      const data = entries.slice(-max);
      if (data.length === 0) {
        return <div className="text-sm text-[var(--text-dim)] italic py-4 text-center">{tx('Aucune donnée pour cette période.','No data for this period.')}</div>;
      }
      const W = 800, H = height;
      const padTop = 22, padBot = 38, padLeft = 38, padRight = 12;
      const plotW = W - padLeft - padRight;
      const plotH = H - padTop - padBot;
      const maxVal = Math.max(1, ...data.map(d => d[1]));
      const slotW = plotW / data.length;
      const barW  = slotW * 0.65;
      // Lignes horizontales (3 graduations)
      const grids = [0, 0.5, 1].map(p => ({
        y: padTop + plotH * (1 - p),
        label: fmtDuration(maxVal * p),
      }));
      return (
        <svg viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{ overflow: 'visible' }}>
          {/* grille horizontale */}
          {grids.map((g, i) => (
            <g key={i}>
              <line x1={padLeft} x2={W - padRight} y1={g.y} y2={g.y}
                    stroke="var(--border-soft)" strokeDasharray="3,4" strokeWidth="1" />
              <text x={padLeft - 6} y={g.y + 3} fontSize="9"
                    textAnchor="end" fill="var(--text-dim)" fontFamily="ui-monospace, monospace">
                {g.label}
              </text>
            </g>
          ))}
          {/* barres + labels */}
          {data.map(([label, val], i) => {
            const x = padLeft + i * slotW + (slotW - barW) / 2;
            const h = (val / maxVal) * plotH;
            const y = padTop + (plotH - h);
            return (
              <g key={label}>
                <rect x={x} y={y} width={barW} height={h}
                      fill={color} rx="2"
                      style={{ transition: 'all .3s ease' }} />
                {val > 0 && (
                  <text x={x + barW / 2} y={y - 4} fontSize="10" textAnchor="middle"
                        fill="var(--text)" fontFamily="ui-monospace, monospace" fontWeight="600">
                    {fmtDuration(val)}
                  </text>
                )}
                <text x={x + barW / 2} y={H - padBot + 14} fontSize="9.5"
                      textAnchor="middle" fill="var(--text-dim)" fontFamily="ui-monospace, monospace">
                  {label}
                </text>
              </g>
            );
          })}
        </svg>
      );
    }

    function StatsScreen({ flights, aircraft, documents, categories, pilots=[], mechanicVisits=[], onExportJSON, onImportJSON, onClearAll, settings, onUpdateSettings }) {
      const tx = useTx();
      const { lang } = React.useContext(I18nContext);
      // période courante : par défaut année calendaire en cours
      const now = new Date();
      const [year, setYear]   = useState(now.getUTCFullYear());
      const [month, setMonth] = useState(0); // 0 = toute l'année
      const [pilotFilter, setPilotFilter] = useState('all'); // 'all' = global, sinon pilotId
      const [showPilotCompare, setShowPilotCompare] = useState(true);

      const filteredFlights = useMemo(() => {
        return flights.filter(f => {
          if (!f.date) return false;
          const d = new Date(f.date+'T00:00:00Z');
          if (d.getUTCFullYear() !== year) return false;
          if (month !== 0 && d.getUTCMonth()+1 !== month) return false;
          if (pilotFilter !== 'all' && f.pilotId !== pilotFilter && f.copilotId !== pilotFilter) return false;
          return true;
        });
      }, [flights, year, month, pilotFilter]);

      // Séries pour les graphes : on N'APPLIQUE PAS le filtre période
      // (sinon on n'aurait qu'1 mois/semaine visible). Seul le filtre pilote compte.
      const pilotScopedFlights = useMemo(() => {
        return flights.filter(f => {
          if (!f.date) return false;
          if (pilotFilter === 'all') return true;
          return f.pilotId === pilotFilter || f.copilotId === pilotFilter;
        });
      }, [flights, pilotFilter]);

      // Agrégation par semaine ISO et par mois sur tous les vols du pilote sélectionné
      const seriesWeekly = useMemo(() => {
        const map = {};
        for (const f of pilotScopedFlights) {
          const key = isoWeekKey(f.date);
          if (!key) continue;
          map[key] = (map[key] || 0) + (f.flightTime || 0);
        }
        return Object.entries(map).sort((a,b) => a[0].localeCompare(b[0]));
      }, [pilotScopedFlights]);

      const seriesMonthly = useMemo(() => {
        const map = {};
        for (const f of pilotScopedFlights) {
          const key = monthKey(f.date);
          if (!key) continue;
          map[key] = (map[key] || 0) + (f.flightTime || 0);
        }
        return Object.entries(map).sort((a,b) => a[0].localeCompare(b[0]));
      }, [pilotScopedFlights]);

      // === Comparatif AT/FT par pilote (visible quand "Tous (global)") ===
      // Un row par pilote du roster, calculé sur tous ses vols terminés (AT et FT > 0).
      const atFtByPilot = useMemo(() => {
        const rows = [];
        for (const p of pilots) {
          const flown = flights.filter(f =>
            (f.pilotId === p.id || f.copilotId === p.id) &&
            (f.airTime||0) > 0 && (f.flightTime||0) > 0
          );
          if (flown.length === 0) continue;
          const totalAT = flown.reduce((s,f) => s + (f.airTime||0), 0);
          const totalFT = flown.reduce((s,f) => s + (f.flightTime||0), 0);
          rows.push({
            id: p.id,
            name: pilotDisplayName(p),
            count: flown.length,
            avgAT: totalAT / flown.length,
            avgFT: totalFT / flown.length,
            avgTaxi: (totalFT - totalAT) / flown.length,
            totalAT, totalFT,
          });
        }
        rows.sort((a,b) => b.avgFT - a.avgFT);
        // Moyenne compagnie = moyenne pondérée par nb de vols sur tous pilotes
        const allCount = rows.reduce((s,r) => s + r.count, 0);
        const company = allCount > 0 ? {
          name: tx('🏢 Compagnie','🏢 Company'),
          count: allCount,
          avgAT:   rows.reduce((s,r) => s + r.avgAT   * r.count, 0) / allCount,
          avgFT:   rows.reduce((s,r) => s + r.avgFT   * r.count, 0) / allCount,
          avgTaxi: rows.reduce((s,r) => s + r.avgTaxi * r.count, 0) / allCount,
        } : null;
        return { rows, company };
      }, [pilots, flights]);

      // === Comparatif Air Time vs Flight Time ===
      // On ne compte que les vols où AT et FT sont tous deux renseignés (vol effectivement
      // terminé). Le taxi = FT - AT (= temps au sol moteur tournant).
      const atFtStats = useMemo(() => {
        const completed = pilotScopedFlights.filter(f => (f.airTime||0) > 0 && (f.flightTime||0) > 0);
        const totalAT = completed.reduce((s,f) => s + (f.airTime||0), 0);
        const totalFT = completed.reduce((s,f) => s + (f.flightTime||0), 0);
        const totalTaxi = totalFT - totalAT;
        const avgAT   = completed.length > 0 ? totalAT   / completed.length : 0;
        const avgFT   = completed.length > 0 ? totalFT   / completed.length : 0;
        const avgTaxi = completed.length > 0 ? totalTaxi / completed.length : 0;
        const ratioAT = totalFT > 0 ? (totalAT / totalFT) * 100 : 0;
        // Série hebdo : AT et FT cumulés par semaine
        const weeklyMap = {};
        for (const f of completed) {
          const k = isoWeekKey(f.date);
          if (!k) continue;
          if (!weeklyMap[k]) weeklyMap[k] = { at: 0, ft: 0 };
          weeklyMap[k].at += f.airTime || 0;
          weeklyMap[k].ft += f.flightTime || 0;
        }
        const weekly = Object.entries(weeklyMap)
          .sort((a,b) => a[0].localeCompare(b[0]))
          .slice(-12);
        return { count: completed.length, totalAT, totalFT, totalTaxi, avgAT, avgFT, avgTaxi, ratioAT, weekly };
      }, [pilotScopedFlights]);

      // Classification heures par caractéristiques moteur de l'avion
      const engineStats = useMemo(() => {
        const out = {
          mono: 0, multi: 0,
          piston: 0, turbine: 0, jet: 0, electric: 0,
          unknown: 0,  // avion sans engineCount/engineType renseigné
        };
        for (const f of filteredFlights) {
          const ac = aircraft.find(a => a.id === f.aircraftId);
          const ft = f.flightTime || 0;
          if (!ac || (!ac.engineCount && !ac.engineType)) {
            out.unknown += ft;
            continue;
          }
          if (ac.engineCount === 1) out.mono += ft;
          else if (ac.engineCount >= 2) out.multi += ft;
          if (ac.engineType && out[ac.engineType] != null) out[ac.engineType] += ft;
        }
        return out;
      }, [filteredFlights, aircraft]);

      const stats = useMemo(() => {
        const s = {
          flights: filteredFlights.length,
          flightTime: 0, airTime: 0,
          pic: 0, sic: 0, dual: 0, solo: 0, instr: 0,
          ifr: 0, vfr: 0, night: 0,
          navigation: 0, tdp: 0, duo: 0,    // v11 : heures par type de mission
          takeoffs: 0, landings: 0, nightLandings: 0,
          fuelL: 0, fuelKg: 0, fuelUSG: 0,
          byAircraft: {},
        };
        for (const f of filteredFlights) {
          const ft = f.flightTime||0;
          s.flightTime += ft;
          s.airTime += (f.airTime||0);
          // Si filtre pilote actif : on attribue les heures selon le rôle effectif.
          // Règle Duo/Training : le pilote (pilotId) compte en SIC car il est en formation,
          // pas en PIC. Sinon : pilotId = PIC, copilotId = SIC.
          if (pilotFilter !== 'all') {
            if (f.pilotId === pilotFilter) {
              if (isDuoFlight(f)) s.sic += ft;
              else                s.pic += ft;
            } else if (f.copilotId === pilotFilter) {
              s.sic += ft;
            }
          } else {
            // Stats globales : on tient compte du legacy functionType + de la règle Duo→SIC
            if (isDuoFlight(f) && f.pilotId) s.sic += ft;
            else if (f.functionType === 'PIC') s.pic += ft;
            else if (f.functionType === 'SIC') s.sic += ft;
            if (f.functionType === 'Dual') s.dual += ft;
            if (f.functionType === 'Solo') s.solo += ft;
            if (f.functionType === 'Instructor') s.instr += ft;
          }
          if (f.rules==='IFR') s.ifr += ft; else s.vfr += ft;
          // Nuit : priorité au temps calculé (nightTime), sinon legacy boolean = FT entier
          if ((f.nightTime||0) > 0) s.night += f.nightTime;
          else if (f.night) s.night += ft;
          // v8 : Navigation et TDP, v11 : Duo (dérivé du type de vol Duo/Training)
          if (f.isNavigation) s.navigation += ft;
          if (f.isTDP)        s.tdp += ft;
          if (isDuoFlight(f)) s.duo += ft;
          // Si compteurs PIC/SIC présents (v6+) : on les utilise. Sinon legacy.
          s.takeoffs += (f.takeoffsPic != null) ? ((f.takeoffsPic||0) + (f.takeoffsSic||0)) : (f.takeoffs||0);
          s.landings += (f.landingsPic != null) ? ((f.landingsPic||0) + (f.landingsSic||0)) : (f.landings||0);
          s.nightLandings += f.nightLandings||0;
          if (f.fuelUplift) {
            const v = parseFloat(f.fuelUplift)||0;
            if (f.fuelUnit==='L') s.fuelL += v;
            else if (f.fuelUnit==='kg') s.fuelKg += v;
            else if (f.fuelUnit==='USG') s.fuelUSG += v;
          }
          s.byAircraft[f.aircraftId] = (s.byAircraft[f.aircraftId]||0) + ft;
        }
        return s;
      }, [filteredFlights]);

      const filteredDocs = useMemo(() => {
        return documents.filter(d => {
          if (!d.date) return false;
          const dt = new Date(d.date+'T00:00:00Z');
          if (dt.getUTCFullYear() !== year) return false;
          if (month !== 0 && dt.getUTCMonth()+1 !== month) return false;
          return true;
        });
      }, [documents, year, month]);

      // Vols filtrés UNIQUEMENT par période (année/mois), SANS filtre pilote.
      // Sert au coût d'exploitation par avion : on veut TOUS les vols de l'avion
      // peu importe qui pilotait. Idem pour la conso fuel et le tab-to-tab.
      const aircraftScopedFlights = useMemo(() => {
        return flights.filter(f => {
          if (!f.date) return false;
          const d = new Date(f.date+'T00:00:00Z');
          if (d.getUTCFullYear() !== year) return false;
          if (month !== 0 && d.getUTCMonth()+1 !== month) return false;
          return true;
        });
      }, [flights, year, month]);

      // === Conversion FX vers la devise utilisateur (settings.defaultCurrency) ===
      // Pré-fetch en parallèle de toutes les paires (date, devise) nécessaires,
      // utilisé pour convertir factures et visites mécanicien dans les agrégations.
      // Respecte aussi l'override comptable (montant exact prélevé sur la carte).
      const targetCurrencyStats = ((settings?.defaultCurrency || 'CAD')).toUpperCase();
      const [fxRatesStats, setFxRatesStats] = useState(new Map());
      const [fxLoadingStats, setFxLoadingStats] = useState(false);
      useEffect(() => {
        let cancelled = false;
        async function ensureRates() {
          const pairs = new Set();
          for (const d of filteredDocs) {
            const cur = (d.currency || targetCurrencyStats).toUpperCase();
            if (cur === targetCurrencyStats) continue;
            const date = d.date || todayZuluDate();
            pairs.add(`${date}|${cur}`);
          }
          for (const v of (mechanicVisits || [])) {
            if (v.includeInOpex === false) continue;
            if (!v.date) continue;
            const dt = new Date(v.date+'T00:00:00Z');
            if (isNaN(dt.getTime())) continue;
            if (dt.getUTCFullYear() !== year) continue;
            if (month !== 0 && dt.getUTCMonth()+1 !== month) continue;
            const cur = (v.currency || targetCurrencyStats).toUpperCase();
            if (cur === targetCurrencyStats) continue;
            pairs.add(`${v.date}|${cur}`);
          }
          if (pairs.size === 0) {
            if (!cancelled) { setFxRatesStats(new Map()); setFxLoadingStats(false); }
            return;
          }
          setFxLoadingStats(true);
          const map = new Map();
          await Promise.all([...pairs].map(async (key) => {
            const [date, cur] = key.split('|');
            const r = await getFxRate(date, cur, targetCurrencyStats);
            if (r != null) map.set(key, r);
          }));
          if (!cancelled) {
            setFxRatesStats(map);
            setFxLoadingStats(false);
          }
        }
        ensureRates();
        return () => { cancelled = true; };
      }, [filteredDocs, mechanicVisits, year, month, targetCurrencyStats]);

      // Convertit le montant d'une facture en devise utilisateur.
      // Priorité : override comptable (montant exact débité de la carte) >
      // devise identique > taux pré-fetché > montant brut (fallback safe).
      function convertedDocAmount(d) {
        const overrideAmt = parseFloat(d.convertedAmountOverride);
        const overrideCur = (d.convertedCurrencyAtOverride || '').toUpperCase();
        if (!isNaN(overrideAmt) && overrideAmt > 0 && overrideCur === targetCurrencyStats) {
          return overrideAmt;
        }
        const amt = parseFloat(d.amount) || 0;
        const cur = (d.currency || targetCurrencyStats).toUpperCase();
        if (cur === targetCurrencyStats) return amt;
        const date = d.date || todayZuluDate();
        const rate = fxRatesStats.get(`${date}|${cur}`);
        return rate != null ? amt * rate : amt;
      }
      // Convertit le montant d'une visite mécanicien (pas d'override pour celles-ci).
      function convertedVisitAmount(v) {
        const amt = parseFloat(v.amount) || 0;
        const cur = (v.currency || targetCurrencyStats).toUpperCase();
        if (cur === targetCurrencyStats) return amt;
        const date = v.date || todayZuluDate();
        const rate = fxRatesStats.get(`${date}|${cur}`);
        return rate != null ? amt * rate : amt;
      }

      // Coût d'exploitation par avion (sur la période filtrée).
      // - cost  : somme des dépenses dont aircraftId = avion (toutes catégories),
      //           converties en devise utilisateur (settings.defaultCurrency).
      //           Respecte l'override comptable de chaque facture si présent.
      // - hours : somme du Flight Time (minutes → heures décimales)
      // - fuelL : somme des quantités fuelEntries (kg→L densité avgas 0.72, USG→L 3.785)
      // - airH  : somme Air Time (pour conso L/h plus représentative que FT)
      // costPerHour = cost / hours, lPerHour = fuelL / airH
      const costByAircraft = useMemo(() => {
        const byId = {};
        const ensure = (id) => {
          if (!byId[id]) byId[id] = { cost: 0, ftMin: 0, atMin: 0, fuelL: 0 };
          return byId[id];
        };
        const toL = (q, u) => {
          const v = parseFloat(q) || 0;
          if (u === 'L') return v;
          if (u === 'kg') return v / 0.72;
          if (u === 'USG') return v * 3.785;
          return v;
        };
        // Dépenses : toutes catégories liées à un avion (converties en devise utilisateur)
        for (const d of filteredDocs) {
          if (!d.aircraftId) continue;
          ensure(d.aircraftId).cost += convertedDocAmount(d);
        }
        // Visites mécanicien : on filtre par période, on exclut celles avec includeInOpex=false,
        // puis on répartit le montant total sur le nombre d'avions concernés (devise convertie).
        for (const v of (mechanicVisits || [])) {
          if (v.includeInOpex === false) continue;
          if (!v.date) continue;
          const dt = new Date(v.date+'T00:00:00Z');
          if (isNaN(dt.getTime())) continue;
          if (dt.getUTCFullYear() !== year) continue;
          if (month !== 0 && dt.getUTCMonth()+1 !== month) continue;
          const acIds = Array.isArray(v.aircraftIds) ? v.aircraftIds.filter(Boolean) : [];
          if (acIds.length === 0) continue;
          const total = convertedVisitAmount(v);
          if (total <= 0) continue;
          const split = total / acIds.length;
          for (const acId of acIds) ensure(acId).cost += split;
        }
        // Heures et fuel : on passe par les vols de la période SANS filtre pilote
        // (un avion peut être piloté par plusieurs pilotes — on veut le vrai coût total).
        for (const f of aircraftScopedFlights) {
          if (!f.aircraftId) continue;
          const slot = ensure(f.aircraftId);
          slot.ftMin += (f.flightTime || 0);
          slot.atMin += (f.airTime || 0);
          for (const e of (f.fuelEntries || [])) {
            slot.fuelL += toL(e.qty, e.unit);
          }
        }
        // Méthode tab-to-tab : si l'avion a ≥ 2 entrées "full" sur la période,
        // on calcule la conso REELLE entre full et full (plus précise) sur l'intervalle.
        // On somme l'AT entre les vols dans l'intervalle, et le fuel des entrées entre full
        // (exclusif du premier full, inclusif du second).
        const tabToTab = {};
        for (const a of aircraft.filter(x => (x.kind||'real')==='real')) {
          const acFlights = aircraftScopedFlights
            .filter(f => f.aircraftId === a.id)
            .sort((x, y) => (x.date || '').localeCompare(y.date || ''));
          // Pool d'entrées (entry, flight) trié chrono
          const entries = [];
          for (const f of acFlights) {
            for (const e of (f.fuelEntries || [])) {
              entries.push({ e, f });
            }
          }
          entries.sort((a, b) => (a.f.date || '').localeCompare(b.f.date || ''));
          const fullIdxs = entries.map((x, i) => x.e.full && (parseFloat(x.e.qty)||0) > 0 ? i : -1).filter(i => i >= 0);
          if (fullIdxs.length >= 2) {
            const firstFullIdx = fullIdxs[0];
            const lastFullIdx  = fullIdxs[fullIdxs.length - 1];
            // Somme fuel L entre firstFullIdx (exclusif) et lastFullIdx (inclusif)
            let burnedL = 0;
            for (let i = firstFullIdx + 1; i <= lastFullIdx; i++) {
              burnedL += toL(entries[i].e.qty, entries[i].e.unit);
            }
            // AT cumulé sur les vols dont la date est strictement après celle du firstFull
            // et inférieure ou égale à celle du lastFull
            const dStart = entries[firstFullIdx].f.date;
            const dEnd   = entries[lastFullIdx].f.date;
            let atMinBetween = 0;
            for (const f of acFlights) {
              if (!f.date) continue;
              if (f.date > dStart && f.date <= dEnd) atMinBetween += (f.airTime || 0);
            }
            const atH = atMinBetween / 60;
            if (atH > 0 && burnedL > 0) {
              tabToTab[a.id] = { burnedL, atH, lPerHour: burnedL / atH, fullCount: fullIdxs.length };
            }
          }
        }
        return aircraft.filter(a => (a.kind||'real') === 'real').map(a => {
          const s = byId[a.id] || { cost: 0, ftMin: 0, atMin: 0, fuelL: 0 };
          const ftH = s.ftMin / 60;
          const atH = s.atMin / 60;
          const tt = tabToTab[a.id] || null;
          return {
            aircraft: a,
            cost: s.cost,
            ftHours: ftH,
            atHours: atH,
            fuelL: s.fuelL,
            costPerHour: ftH > 0 ? s.cost / ftH : null,
            // Si tab-to-tab dispo : on l'utilise (plus précis). Sinon : approximation
            // brute = somme totale fuel / Air Time.
            lPerHour: tt ? tt.lPerHour : (atH > 0 ? s.fuelL / atH : null),
            lPerHourMethod: tt ? `tab-to-tab (${tt.fullCount} fulls)` : (atH > 0 ? 'approximation' : null),
          };
        }).sort((a, b) => b.cost - a.cost);
      }, [filteredDocs, aircraftScopedFlights, aircraft, mechanicVisits, year, month, fxRatesStats, targetCurrencyStats]);

      // Top fournisseurs sur la période filtrée (somme dépenses, convertie en devise utilisateur)
      const topSuppliers = useMemo(() => {
        const map = {};
        for (const d of filteredDocs) {
          const name = (d.supplier || '').trim();
          if (!name) continue;
          if (!map[name]) map[name] = { total: 0, count: 0, currencies: {} };
          const converted = convertedDocAmount(d);
          map[name].total += converted;
          map[name].count++;
          // Conserve aussi le détail par devise d'origine pour info (montants bruts)
          const cur = d.currency || 'EUR';
          const rawAmt = parseFloat(d.amount) || 0;
          map[name].currencies[cur] = (map[name].currencies[cur] || 0) + rawAmt;
        }
        return Object.entries(map)
          .map(([name, v]) => ({ name, ...v }))
          .sort((a, b) => b.total - a.total)
          .slice(0, 5);
      }, [filteredDocs, fxRatesStats, targetCurrencyStats]);

      const mainCurrencyStats = useMemo(() => {
        const counts = {};
        for (const d of filteredDocs) {
          const c = d.currency || 'EUR';
          counts[c] = (counts[c] || 0) + 1;
        }
        return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'EUR';
      }, [filteredDocs]);

      const docTotals = useMemo(() => {
        const m = {};
        for (const d of filteredDocs) {
          m[d.categoryId] = (m[d.categoryId]||0) + convertedDocAmount(d);
        }
        // Visites mécanicien (includeInOpex !== false) sur la période sélectionnée :
        // ajoutées sous catégorie 'mechanic_visit' avec montant total converti
        // (le split par avion ne change pas la somme globale).
        for (const v of (mechanicVisits || [])) {
          if (v.includeInOpex === false) continue;
          if (!v.date) continue;
          const dt = new Date(v.date+'T00:00:00Z');
          if (isNaN(dt.getTime())) continue;
          if (dt.getUTCFullYear() !== year) continue;
          if (month !== 0 && dt.getUTCMonth()+1 !== month) continue;
          const total = convertedVisitAmount(v);
          if (total <= 0) continue;
          m['mechanic_visit'] = (m['mechanic_visit']||0) + total;
        }
        return m;
      }, [filteredDocs, mechanicVisits, year, month, fxRatesStats, targetCurrencyStats]);

      function exportFlightsCSV() {
        const headers = ['date','from','to','registration','type','functionType','rules','night','blockOut','takeOff','landing','blockIn','flightTime_min','airTime_min','takeoffs','landings','nightLandings','approaches','fuel','fuelUnit','notes'];
        const rows = filteredFlights.map(f => {
          const ac = aircraft.find(a => a.id === f.aircraftId);
          return [
            f.date, f.from, f.to,
            ac?.registration||'', ac?.type||'',
            f.functionType, f.rules, f.night ? 'oui':'non',
            f.blockOut, f.takeOff, f.landing, f.blockIn,
            f.flightTime||0, f.airTime||0,
            f.takeoffs||0, f.landings||0, f.nightLandings||0,
            (f.approaches||[]).join('|'),
            f.fuelUplift||'', f.fuelUnit||'',
            (f.notes||'').replace(/[\n\r]+/g,' ')
          ];
        });
        downloadCSV(`carnet_${year}${month?('-'+String(month).padStart(2,'0')):''}.csv`, headers, rows);
      }
      function exportDocsCSV() {
        const headers = ['date','supplier','category','amount','currency','aircraft','fileName','notes'];
        const rows = filteredDocs.map(d => {
          const cat = categories.find(c=>c.id===d.categoryId);
          const ac = aircraft.find(a => a.id === d.aircraftId);
          return [
            d.date, d.supplier||'', cat?.name||d.categoryId, d.amount||'', d.currency||'',
            ac?.registration||'', d.fileName||'', (d.notes||'').replace(/[\n\r]+/g,' ')
          ];
        });
        downloadCSV(`factures_${year}${month?('-'+String(month).padStart(2,'0')):''}.csv`, headers, rows);
      }
      function downloadCSV(name, headers, rows) {
        const esc = (v) => {
          const s = String(v??'');
          if (/[",;\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
          return s;
        };
        const out = [headers.join(';'), ...rows.map(r => r.map(esc).join(';'))].join('\n');
        const blob = new Blob([out], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = name; a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
      }
      function exportPDF() {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ unit:'pt', format:'a4' });
          const periodLabel = month ? `${String(month).padStart(2,'0')}/${year}` : `${tx('Année','Year')} ${year}`;
          doc.setFontSize(16); doc.text(`AeroDeck — ${tx('Récapitulatif','Summary')} ${periodLabel}`, 40, 50);
          doc.setFontSize(10); doc.setTextColor(120);
          doc.text(`${tx('Généré le','Generated on')} ${new Date().toISOString().slice(0,10)} ${tx('(heures en Zulu)','(times in Zulu)')}`, 40, 66);
          doc.setTextColor(0);

          // résumé
          const summary = [
            [tx('Vols','Flights'), String(stats.flights)],
            [tx('Flight Time total','Total Flight Time'), fmtDuration(stats.flightTime)],
            [tx('Air Time total','Total Air Time'), fmtDuration(stats.airTime)],
            ['PIC', fmtDuration(stats.pic)],
            ['SIC', fmtDuration(stats.sic)],
            ['Dual', fmtDuration(stats.dual)],
            ['Solo', fmtDuration(stats.solo)],
            ['IFR', fmtDuration(stats.ifr)],
            ['VFR', fmtDuration(stats.vfr)],
            [tx('Nuit (FT)','Night (FT)'), fmtDuration(stats.night)],
            [tx('Décollages','Take-offs'), String(stats.takeoffs)],
            [tx('Atterrissages','Landings'), String(stats.landings)],
            [tx('Atterrissages de nuit','Night landings'), String(stats.nightLandings)],
            [tx('Carburant L','Fuel L'), stats.fuelL.toFixed(1)],
            [tx('Carburant kg','Fuel kg'), stats.fuelKg.toFixed(1)],
            [tx('Carburant USG','Fuel USG'), stats.fuelUSG.toFixed(1)],
          ];
          doc.autoTable({ startY: 80, head: [[tx('Indicateur','Indicator'),tx('Valeur','Value')]], body: summary, styles:{fontSize:9} });

          // par avion
          const byAcRows = Object.entries(stats.byAircraft).map(([id, min]) => {
            const ac = aircraft.find(a => a.id === id);
            return [ac?.registration||'?', ac?.type||'', fmtDuration(min)];
          });
          if (byAcRows.length) {
            doc.autoTable({ startY: doc.lastAutoTable.finalY + 14, head: [[tx('Immat','Reg'),tx('Type','Type'),tx('FT total','Total FT')]], body: byAcRows, styles:{fontSize:9} });
          }

          // dépenses par catégorie
          const docRows = Object.entries(docTotals).map(([id, total]) => {
            const c = categories.find(c=>c.id===id);
            return [categoryDisplayName(c, lang) || id, total.toFixed(2)];
          });
          if (docRows.length) {
            doc.autoTable({ startY: doc.lastAutoTable.finalY + 14, head: [[tx('Catégorie','Category'),tx('Montant cumulé','Cumulative amount')]], body: docRows, styles:{fontSize:9} });
          }

          // détail vols
          if (filteredFlights.length) {
            const flRows = filteredFlights.map(f => {
              const ac = aircraft.find(a=>a.id===f.aircraftId);
              return [f.date, f.from+'→'+f.to, ac?.registration||'', f.functionType, f.rules, fmtDuration(f.flightTime), fmtDuration(f.airTime)];
            });
            doc.autoTable({
              startY: doc.lastAutoTable.finalY + 14,
              head: [[tx('Date','Date'),tx('Trajet','Route'),tx('Avion','Aircraft'),tx('Fonc.','Func.'),tx('Règles','Rules'),'FT','AT']],
              body: flRows,
              styles:{fontSize:8}
            });
          }
          doc.save(`aerodeck_${tx('recap','summary')}_${year}${month?('-'+String(month).padStart(2,'0')):''}.pdf`);
        } catch (e) {
          alert(tx('Export PDF échoué : ','PDF export failed: ') + e.message);
        }
      }

      const usage = storageUsageMB();
      const tt = useT();

      return (
        <div className="space-y-3">
          <h2 className="text-xl font-semibold">{tt('stats.title')}</h2>

          <div className="card p-3 grid grid-cols-2 sm:grid-cols-3 gap-3">
            <div>
              <div className="label">{tx('Année','Year')}</div>
              <FancySelect
                value={year}
                onChange={v=>setYear(parseInt(v,10))}
                options={Array.from({length:10}, (_,i) => now.getUTCFullYear()-i).map(y => ({ value: y, label: String(y), icon: 'calendar' }))}
              />
            </div>
            <div>
              <div className="label">{tx('Mois','Month')}</div>
              <FancySelect
                value={month}
                onChange={v=>setMonth(parseInt(v,10))}
                options={[
                  { value: 0, label: tx("Toute l'année",'Whole year'), icon: 'globe', color: 'var(--accent)' },
                  ...(lang === 'en'
                      ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
                      : ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc']
                    ).map((m,i)=> ({ value: i+1, label: m, icon: 'calendar' })),
                ]}
              />
            </div>
            <div className="col-span-2 sm:col-span-1">
              <div className="label">{tx('Pilote','Pilot')}</div>
              <FancySelect
                value={pilotFilter}
                onChange={setPilotFilter}
                options={[
                  { value: 'all', label: tx('Tous (global)','All (global)'), icon: 'globe', color: 'var(--accent)' },
                  ...pilots.map(p => ({ value: p.id, label: pilotDisplayName(p), icon: 'user' })),
                ]}
              />
            </div>
          </div>

          {/* === MOBILE : tuiles 2×n (inchangé) === */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 md:hidden">
            {[
              [tx('Vols','Flights'), stats.flights],
              ['Flight Time', fmtDuration(stats.flightTime)],
              ['Air Time', fmtDuration(stats.airTime)],
              [tx('Décol./Atter.','T/O / LDG'), `${stats.takeoffs} / ${stats.landings}`],
              ['PIC', fmtDuration(stats.pic)],
              ['SIC', fmtDuration(stats.sic)],
              ['IFR', fmtDuration(stats.ifr)],
              [tx('Nuit','Night'), fmtDuration(stats.night)],
              ['Navigation', fmtDuration(stats.navigation)],
              ['Duo', fmtDuration(stats.duo)],
            ].map(([k,v]) => (
              <div key={k} className="card p-3 text-center">
                <div className="label">{k}</div>
                <div className="text-xl font-mono tabular-nums">{v}</div>
              </div>
            ))}
          </div>

          {/* === DESKTOP : lignes pleine largeur (2 colonnes pour densifier l'espace) === */}
          <div className="hidden md:grid md:grid-cols-2 md:gap-x-3 md:gap-y-1.5">
            {[
              [tx('Vols','Flights'), stats.flights],
              ['Flight Time', fmtDuration(stats.flightTime)],
              ['Air Time', fmtDuration(stats.airTime)],
              [tx('Décol./Atter.','T/O / LDG'), `${stats.takeoffs} / ${stats.landings}`],
              ['PIC', fmtDuration(stats.pic)],
              ['SIC', fmtDuration(stats.sic)],
              ['IFR', fmtDuration(stats.ifr)],
              [tx('Nuit','Night'), fmtDuration(stats.night)],
              ['Navigation', fmtDuration(stats.navigation)],
              ['Duo', fmtDuration(stats.duo)],
            ].map(([k,v]) => (
              <div key={k} className="card flex items-center justify-between px-4 py-2.5">
                <div className="text-sm font-semibold text-[var(--text-dim)] uppercase tracking-wider">{k}</div>
                <div className="text-2xl font-mono tabular-nums font-bold">{v}</div>
              </div>
            ))}
          </div>

          {/* Graphes hebdo / mensuel — indépendants du filtre période, suivent le filtre pilote */}
          <div className="card p-3">
            <div className="flex items-center justify-between flex-wrap gap-2">
              <div className="label !mb-0 inline-flex items-center gap-1.5">
                <span style={{ color: 'var(--accent)' }}><LucideIcon name="barChart3" size={14} strokeWidth={2.5} /></span>
                {tx('Heures par semaine — 12 dernières semaines','Hours per week — last 12 weeks')}{pilotFilter !== 'all' && pilots.find(p=>p.id===pilotFilter) ? ` · ${pilotDisplayName(pilots.find(p=>p.id===pilotFilter))}` : ` · ${tx('global','global')}`}
              </div>
              <div className="text-xs text-[var(--text-dim)]">{seriesWeekly.length} {tx('semaine(s) au total','week(s) total')}</div>
            </div>
            <div className="mt-2 -mx-1">
              <BarChart entries={seriesWeekly} color="var(--accent)" max={12} />
            </div>
          </div>

          <div className="card p-3">
            <div className="flex items-center justify-between flex-wrap gap-2">
              <div className="label !mb-0 inline-flex items-center gap-1.5">
                <span style={{ color: 'var(--accent)' }}><LucideIcon name="calendar" size={14} strokeWidth={2.5} /></span>
                {tx('Heures par mois — 12 derniers mois','Hours per month — last 12 months')}{pilotFilter !== 'all' && pilots.find(p=>p.id===pilotFilter) ? ` · ${pilotDisplayName(pilots.find(p=>p.id===pilotFilter))}` : ` · ${tx('global','global')}`}
              </div>
              <div className="text-xs text-[var(--text-dim)]">{seriesMonthly.length} {tx('mois au total','month(s) total')}</div>
            </div>
            <div className="mt-2 -mx-1">
              <BarChart entries={seriesMonthly} color="var(--accent-2)" max={12} />
            </div>
          </div>

          {/* === Comparatif Air Time vs Flight Time === */}
          <div className="card p-3">
            <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
              <div className="label !mb-0 inline-flex items-center gap-1.5">
                <span style={{ color: 'var(--accent)' }}><LucideIcon name="cog" size={14} strokeWidth={2.5} /></span>
                Air Time vs Flight Time{pilotFilter !== 'all' && pilots.find(p=>p.id===pilotFilter) ? ` · ${pilotDisplayName(pilots.find(p=>p.id===pilotFilter))}` : ` · ${tx('global','global')}`}
              </div>
              <div className="text-xs text-[var(--text-dim)]">{atFtStats.count} {tx('vol(s) terminé(s)','completed flight(s)')}</div>
            </div>

            {atFtStats.count === 0 ? (
              <div className="text-sm text-[var(--text-dim)] italic py-4 text-center">{tx('Aucun vol avec AT et FT renseignés.','No flights with AT and FT recorded.')}</div>
            ) : (
              <>
                {/* 3 cartes résumé : moyenne AT, moyenne FT, moyenne Taxi (1 décimale max) */}
                <div className="grid grid-cols-3 gap-2 mb-3">
                  <div className="card p-2 text-center bg-[var(--bg-elev)]">
                    <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">{tx('Moy. Air Time','Avg Air Time')}</div>
                    <div className="text-lg font-mono tabular-nums" style={{ color: '#22d3ee' }}>{fmtHoursDecimal(atFtStats.avgAT)}</div>
                  </div>
                  <div className="card p-2 text-center bg-[var(--bg-elev)]">
                    <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">{tx('Moy. Flight Time','Avg Flight Time')}</div>
                    <div className="text-lg font-mono tabular-nums" style={{ color: 'var(--accent)' }}>{fmtHoursDecimal(atFtStats.avgFT)}</div>
                  </div>
                  <div className="card p-2 text-center bg-[var(--bg-elev)]">
                    <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">{tx('Moy. Taxi','Avg Taxi')}</div>
                    <div className="text-lg font-mono tabular-nums" style={{ color: '#fbbf24' }}>{fmtHoursDecimal(atFtStats.avgTaxi)}</div>
                  </div>
                </div>

                {/* Barre proportionnelle AT vs Taxi */}
                <div>
                  <div className="flex justify-between text-xs text-[var(--text-dim)] mb-1">
                    <span>{tx('Répartition globale','Global breakdown')} ({atFtStats.count} {tx('vols','flights')})</span>
                    <span className="font-mono">AT {atFtStats.ratioAT.toFixed(0)}% · Taxi {(100-atFtStats.ratioAT).toFixed(0)}%</span>
                  </div>
                  <div className="h-3 rounded-full overflow-hidden flex" style={{ background: 'var(--bg-elev)' }}>
                    <div style={{ width: atFtStats.ratioAT + '%', background: '#22d3ee', transition: 'width .35s ease' }} title={`Air Time : ${fmtDuration(atFtStats.totalAT)}`} />
                    <div style={{ width: (100-atFtStats.ratioAT) + '%', background: '#fbbf24', transition: 'width .35s ease' }} title={`Taxi : ${fmtDuration(atFtStats.totalTaxi)}`} />
                  </div>
                  <div className="flex justify-between text-[10px] text-[var(--text-dim)] mt-1 font-mono">
                    <span>{tx('AT total','Total AT')} {fmtDuration(atFtStats.totalAT)}</span>
                    <span>{tx('FT total','Total FT')} {fmtDuration(atFtStats.totalFT)}</span>
                  </div>
                </div>

                {/* Mini-graphe : barres AT (cyan) et FT (bleu) côte à côte par semaine */}
                {atFtStats.weekly.length > 0 && (
                  <div className="mt-3">
                    <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold mb-1">
                      {tx('Comparaison hebdo (12 dernières semaines)','Weekly comparison (last 12 weeks)')}
                    </div>
                    <svg viewBox="0 0 800 160" width="100%" preserveAspectRatio="xMidYMid meet">
                      {(() => {
                        const W = 800, H = 160;
                        const padTop = 20, padBot = 32, padLeft = 28, padRight = 8;
                        const plotW = W - padLeft - padRight;
                        const plotH = H - padTop - padBot;
                        const data = atFtStats.weekly;
                        const maxVal = Math.max(1, ...data.map(([,v]) => Math.max(v.at, v.ft)));
                        const slotW = plotW / data.length;
                        const barW = (slotW * 0.7) / 2;  // 2 barres côte à côte
                        const grids = [0, 0.5, 1].map(p => ({
                          y: padTop + plotH * (1 - p),
                          label: fmtDuration(maxVal * p),
                        }));
                        return (
                          <>
                            {grids.map((g, i) => (
                              <g key={i}>
                                <line x1={padLeft} x2={W - padRight} y1={g.y} y2={g.y}
                                      stroke="var(--border-soft)" strokeDasharray="3,4" strokeWidth="1" />
                                <text x={padLeft - 4} y={g.y + 3} fontSize="9"
                                      textAnchor="end" fill="var(--text-dim)" fontFamily="ui-monospace, monospace">
                                  {g.label}
                                </text>
                              </g>
                            ))}
                            {data.map(([label, v], i) => {
                              const x0 = padLeft + i * slotW + (slotW - barW * 2 - 2) / 2;
                              const hAT = (v.at / maxVal) * plotH;
                              const hFT = (v.ft / maxVal) * plotH;
                              const yAT = padTop + (plotH - hAT);
                              const yFT = padTop + (plotH - hFT);
                              return (
                                <g key={label}>
                                  <rect x={x0}             y={yAT} width={barW} height={hAT} fill="#22d3ee" rx="1.5" />
                                  <rect x={x0 + barW + 2}  y={yFT} width={barW} height={hFT} fill="var(--accent)" rx="1.5" />
                                  <text x={x0 + barW + 1} y={H - padBot + 12} fontSize="8.5"
                                        textAnchor="middle" fill="var(--text-dim)" fontFamily="ui-monospace, monospace">
                                    {label.replace(/^\d{4}-/, '')}
                                  </text>
                                </g>
                              );
                            })}
                            {/* Légende */}
                            <g transform={`translate(${padLeft}, ${H - 6})`}>
                              <rect x="0" y="-8" width="10" height="8" fill="#22d3ee" rx="1" />
                              <text x="14" y="-1" fontSize="9" fill="var(--text-dim)">Air Time</text>
                              <rect x="80" y="-8" width="10" height="8" fill="var(--accent)" rx="1" />
                              <text x="94" y="-1" fontSize="9" fill="var(--text-dim)">Flight Time</text>
                            </g>
                          </>
                        );
                      })()}
                    </svg>
                  </div>
                )}

                {/* Comparatif par pilote — visible UNIQUEMENT quand "Tous (global)" est sélectionné.
                    Une ligne par pilote (avg AT cyan + avg FT bleu) puis une ligne compagnie. */}
                {pilotFilter === 'all' && atFtByPilot.rows.length > 0 && (
                  <div className="mt-4 pt-3 border-t border-[var(--border-soft)]">
                    <button type="button"
                      onClick={()=>setShowPilotCompare(s=>!s)}
                      className="w-full flex items-center justify-between gap-2 text-left mb-2 hover:opacity-80 transition-opacity">
                      <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold inline-flex items-center gap-1.5">
                        👥 Comparatif moyennes par pilote
                      </div>
                      <span className="inline-flex transition-transform" style={{ transform: showPilotCompare ? 'rotate(90deg)' : 'rotate(0deg)' }}>
                        <LucideIcon name="chevronRight" size={16} strokeWidth={2.5} />
                      </span>
                    </button>
                    {showPilotCompare && (() => {
                      const allRows = [...atFtByPilot.rows];
                      if (atFtByPilot.company) allRows.push({ ...atFtByPilot.company, isCompany: true });
                      const maxVal = Math.max(1, ...allRows.map(r => Math.max(r.avgAT, r.avgFT)));
                      return (
                        <div className="space-y-2">
                          {allRows.map(r => {
                            const wAT = (r.avgAT / maxVal) * 100;
                            const wFT = (r.avgFT / maxVal) * 100;
                            return (
                              <div key={r.id || 'company'}
                                   className={`p-2 rounded-md ${r.isCompany ? 'bg-[var(--accent)]/10 border border-[var(--accent)]/30' : 'bg-[var(--bg-elev)]'}`}>
                                <div className="flex items-center justify-between text-xs mb-1.5 flex-wrap gap-1">
                                  <span className={`font-semibold truncate ${r.isCompany ? 'text-[var(--accent)]' : 'text-[var(--text)]'}`}>
                                    {r.name}
                                  </span>
                                  <span className="text-[var(--text-dim)] font-mono text-[10px]">
                                    {r.count} {tx(r.count>1?'vols':'vol',r.count>1?'flights':'flight')}
                                  </span>
                                </div>
                                {/* Barre Air Time */}
                                <div className="flex items-center gap-2 mb-1">
                                  <span className="text-[9px] text-[var(--text-dim)] w-6 flex-shrink-0">AT</span>
                                  <div className="flex-1 h-3 rounded-full overflow-hidden" style={{ background: 'var(--bg-card-2)' }}>
                                    <div style={{ width: wAT + '%', height: '100%', background: '#22d3ee', transition: 'width .35s ease' }} />
                                  </div>
                                  <span className="text-[10px] font-mono tabular-nums text-[var(--text-dim)] w-12 text-right flex-shrink-0">{fmtHoursDecimal(r.avgAT)}</span>
                                </div>
                                {/* Barre Flight Time */}
                                <div className="flex items-center gap-2">
                                  <span className="text-[9px] text-[var(--text-dim)] w-6 flex-shrink-0">FT</span>
                                  <div className="flex-1 h-3 rounded-full overflow-hidden" style={{ background: 'var(--bg-card-2)' }}>
                                    <div style={{ width: wFT + '%', height: '100%', background: 'var(--accent)', transition: 'width .35s ease' }} />
                                  </div>
                                  <span className="text-[10px] font-mono tabular-nums text-[var(--text-dim)] w-12 text-right flex-shrink-0">{fmtHoursDecimal(r.avgFT)}</span>
                                </div>
                                {/* Taxi en petit en bas */}
                                <div className="text-[9px] text-[var(--text-dim)] mt-1 text-right font-mono">
                                  {tx('Taxi moyen','Avg Taxi')} : <span style={{ color: '#fbbf24' }}>{fmtHoursDecimal(r.avgTaxi)}</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })()}
                    {showPilotCompare && (
                      <div className="mt-2 text-[10px] text-[var(--text-dim)] italic">
                        {tx('Trié par moyenne Flight Time décroissante. Sélectionne un pilote dans le filtre en haut pour zoomer sur ses statistiques.','Sorted by descending average Flight Time. Select a pilot in the filter above to zoom in on their stats.')}
                      </div>
                    )}
                  </div>
                )}

                <div className="mt-2">
                  <Hint title={tx('À quoi sert ce comparatif','What is this comparison for')}>
                    {tx(
                      "Air Time = temps en vol effectif (TO → LDG). Flight Time = temps total moteur tournant (BO → BI). La différence (Taxi) représente le temps de roulage au sol. Une moyenne de taxi élevée indique des aéroports encombrés ou des temps d'attente importants — utile pour le coût en carburant et la planification.",
                      'Air Time = effective flight time (TO → LDG). Flight Time = total time engine running (BO → BI). The difference (Taxi) is the time taxiing on the ground. High average taxi indicates busy airports or long waits — useful for fuel cost and planning.'
                    )}
                  </Hint>
                </div>
              </>
            )}
          </div>

          <div className="card p-3">
            <div className="label">{tx('Heures par avion','Hours per aircraft')}</div>
            {Object.keys(stats.byAircraft).length === 0 && <div className="text-sm text-[var(--text-dim)]">—</div>}
            <div className="space-y-1">
              {Object.entries(stats.byAircraft).map(([id, min]) => {
                const ac = aircraft.find(a => a.id === id);
                const totalMin = stats.flightTime || 1;
                const pct = (min/totalMin)*100;
                return (
                  <div key={id}>
                    <div className="flex justify-between text-sm"><span>{ac?.registration||'?'}</span><span className="font-mono">{fmtDuration(min)}</span></div>
                    <div className="h-2 bg-[var(--bg-elev)] rounded">
                      <div className="h-2 rounded" style={{ width:`${pct}%`, background:'var(--accent)' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="card p-3">
            <div className="label">{tx('Classification heures par moteur','Hours classification by engine')} {pilotFilter !== 'all' && pilots.find(p=>p.id===pilotFilter) ? `· ${tx('pilote','pilot')} ${pilotDisplayName(pilots.find(p=>p.id===pilotFilter))}` : `· ${tx('global','global')}`}</div>
            <div className="grid grid-cols-2 gap-3 mt-2">
              <div>
                <div className="text-xs text-[var(--text-dim)] mb-1">{tx('Mono / Multi-moteur','Single / Multi-engine')}</div>
                <div className="space-y-1">
                  {[['mono',tx('Mono (SE)','Single (SE)')],['multi',tx('Multi (ME)','Multi (ME)')]].map(([k,label]) => {
                    const v = engineStats[k];
                    const max = Math.max(engineStats.mono, engineStats.multi, 1);
                    const pct = (v/max)*100;
                    return (
                      <div key={k}>
                        <div className="flex justify-between text-sm"><span>{label}</span><span className="font-mono">{fmtDuration(v)}</span></div>
                        <div className="h-2 bg-[var(--bg-elev)] rounded">
                          <div className="h-2 rounded" style={{ width:`${pct}%`, background:'var(--accent)' }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div>
                <div className="text-xs text-[var(--text-dim)] mb-1">{tx('Type moteur','Engine type')}</div>
                <div className="space-y-1">
                  {[['piston','Piston','#f59e0b'],['turbine','Turbine','#22d3ee'],['jet','Jet','#a78bfa'],['electric',tx('Élec.','Elec.'),'#34d399']].map(([k,label,color]) => {
                    const v = engineStats[k];
                    const max = Math.max(engineStats.piston, engineStats.turbine, engineStats.jet, engineStats.electric, 1);
                    const pct = (v/max)*100;
                    if (v === 0) return null;
                    return (
                      <div key={k}>
                        <div className="flex justify-between text-sm"><span>{label}</span><span className="font-mono">{fmtDuration(v)}</span></div>
                        <div className="h-2 bg-[var(--bg-elev)] rounded">
                          <div className="h-2 rounded" style={{ width:`${pct}%`, background:color }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
            {engineStats.unknown > 0 && (
              <div className="text-xs text-[var(--warn)] mt-2">
                ⚠ {fmtDuration(engineStats.unknown)} {tx("non classés (avion(s) sans caractéristiques moteur — ouvre l'avion concerné pour les renseigner).",'unclassified (aircraft without engine specs — open the aircraft to fill them in).')}
              </div>
            )}
          </div>

          {/* Coût d'exploitation par avion (sur la période filtrée).
              Affiche pour chaque avion réel : coût total, coût/heure de vol,

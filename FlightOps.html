  <style>
    /* === Palette mode nuit (cockpit) === */
    :root {
      --bg-app:        #08101e;
      --bg-card:       #0f1a2f;

      --bg-elev:       #18243f;
      --border:        #233456;
      --border-soft:   #1c2a48;
      --text:          #e9eef7;
      --text-dim:      #93a2bd;
      --accent:        #38bdf8;     /* cyan instruments */
      --accent-2:      #f59e0b;     /* amber piste */
      --accent-glow:   rgba(56, 189, 248, .35);
      --ok:            #34d399;
      --warn:          #fbbf24;
      --err:           #f87171;
      --shadow-1: 0 1px 2px rgba(0,0,0,.35), 0 4px 12px rgba(0,0,0,.18);

    /* === Palette mode jour === */
    .theme-light {
      --bg-app:       #f4f7fc;
      --bg-card:      #ffffff;
      --bg-card-2:    #f7faff;
      --bg-elev:      #eef3fb;
      --border:       #cdd7e6;
      --border-soft:  #e1e8f2;
      --text:         #1a2235;
      --text-dim:     #5b6779;
      --accent:       #0284c7;

      --warn:         #b45309;
      --err:          #dc2626;
      --shadow-1: 0 1px 2px rgba(15,30,55,.06), 0 6px 16px rgba(15,30,55,.08);
      --shadow-2: 0 10px 28px rgba(15,30,55,.10);
    }
    .theme-light body {
      background:
        radial-gradient(1200px 600px at 70% -10%, #dbeafe 0%, transparent 60%),
        radial-gradient(900px  500px at -10% 110%, #e0f2fe 0%, transparent 55%),
        var(--bg-app) !important;
    }

    html, body, #root { height: 100%; }
    /* Empêche le "rubber-band" iOS : la page entière ne flotte plus.
       Le scroll se fait à l'intérieur de #root. Le pinch-to-zoom reste actif. */
    html {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background:
        radial-gradient(1200px 600px at 70% -10%, #1b2a4e 0%, transparent 60%),
        radial-gradient(900px  500px at -10% 110%, #0e2235 0%, transparent 55%),
        var(--bg-app);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter",
                   "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-feature-settings: "ss01", "ss02", "cv11";
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.005em;
    }
    #root {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: none;
    }

    /* === Conteneurs glass / card === */
    .glass {
      background: linear-gradient(180deg, rgba(15,26,47,.85) 0%, rgba(15,26,47,.62) 100%);
      backdrop-filter: saturate(160%) blur(18px);
      -webkit-backdrop-filter: saturate(160%) blur(18px);
      border-bottom: 1px solid var(--border-soft);
    }
    .theme-light .glass {
      background: linear-gradient(180deg, rgba(255,255,255,.88) 0%, rgba(255,255,255,.7) 100%);
    }
    .card {
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-card-2) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-1);
      transition: border-color .18s ease, transform .18s ease, box-shadow .18s ease;
    }
    .card:hover { border-color: color-mix(in oklab, var(--border) 70%, var(--accent) 30%); }

    /* === Inputs === */
    .input, .select, .textarea {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      font-size: 16px;          /* >= 16px évite le zoom auto iOS */
      transition: border-color .15s ease, box-shadow .15s ease, background-color .15s ease;
    }
    /* Sur iOS Safari, <input type="date"> a une largeur intrinsèque (calendrier
       natif) qui peut dépasser son conteneur dans une grille. On force le
       confinement : box-sizing + max-width évite tout débordement de la fiche. */
    input[type="date"].input,
    input[type="time"].input,
    input[type="datetime-local"].input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      -webkit-appearance: none;  /* aligne le rendu iOS sur le style standard */
    }
    /* Cache les flèches des inputs number (Chrome / Safari / Firefox) */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }
    .input:hover, .select:hover, .textarea:hover { border-color: color-mix(in oklab, var(--border) 60%, var(--accent) 40%); }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--ring);
    }
    /* === Modernisation des menus déroulants <select> ===
       Cache la flèche native (peu lisible et différente sur chaque OS),
       ajoute une icône Lucide chevron-down en SVG inline + un padding-right
       qui laisse la place. Hover : léger fond cyan. Focus : chevron passe
       en cyan accent. Animation douce sur les transitions. */
    .select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 16px 16px;
      padding-right: 38px;
      cursor: pointer;
      font-weight: 500;
    }
    .select:hover {
      background-color: color-mix(in oklab, var(--bg-elev) 88%, var(--accent) 12%);
    }
    .select:focus {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2.75' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    }
    /* Style des <option> dans le dropdown ouvert (Firefox/Chrome desktop) */
    .select option {
      background: var(--bg-card);
      color: var(--text);
      padding: 8px;
    }

    .label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      margin-bottom: 6px;
    }

    /* === Boutons en relief 3D (effet bouton physique) ===
       Combinaison de :
       - 1 highlight inset en haut (lumière qui frappe le sommet)
       - 1 dark inset en bas (ombre interne sous le bord)
       - 1 hard shadow nette en bas (l'épaisseur / "edge" du bouton)
       - 1 soft drop shadow plus loin (l'ombre projetée sur la surface)
       Sur :active, on translateY(2px) et on réduit l'edge → simule la pression. */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 16px; border-radius: 10px; font-weight: 600;
      letter-spacing: 0.005em; font-size: 14px;
      position: relative;
      transform: translateY(0);
      transition:
        transform .12s cubic-bezier(.2,.7,.2,1),
        box-shadow .18s ease,
        background-color .18s ease,
        border-color .18s ease,
        opacity .15s ease;
      will-change: transform, box-shadow;
    }
    .btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(56,189,248,.35); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* === PRIMARY (cyan accent) — design flat moderne avec glow doux === */
    .btn-primary {
      background: var(--accent);
      color: #06243a;
      border: 1px solid color-mix(in oklab, var(--accent) 70%, black);
      box-shadow:
        0 1px 0 rgba(255,255,255,.20) inset,
        0 1px 2px rgba(6,36,58,.10),
        0 4px 14px -4px rgba(56,189,248,.45);
    }
    .btn-primary:hover:not(:disabled) {
      background: color-mix(in oklab, var(--accent) 92%, white);
      box-shadow:
        0 1px 0 rgba(255,255,255,.25) inset,
        0 2px 4px rgba(6,36,58,.12),
        0 8px 24px -4px rgba(56,189,248,.6);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
      background: color-mix(in oklab, var(--accent) 88%, black);
      box-shadow:
        0 1px 0 rgba(255,255,255,.15) inset,
        0 1px 2px rgba(6,36,58,.18),
        0 2px 6px -2px rgba(56,189,248,.35);
    }

    /* === SECONDARY (ghost/outline neutre) === */
    .btn-secondary {
      background: color-mix(in oklab, var(--bg-elev) 95%, transparent);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow:
        0 1px 0 rgba(255,255,255,.04) inset,
        0 1px 3px rgba(0,0,0,.18);
    }
    .btn-secondary:hover:not(:disabled) {
      background: color-mix(in oklab, var(--bg-elev) 80%, var(--accent) 8%);
      border-color: color-mix(in oklab, var(--border) 30%, var(--accent) 70%);
      color: color-mix(in oklab, var(--text) 88%, var(--accent));
      box-shadow:
        0 1px 0 rgba(255,255,255,.06) inset,
        0 4px 12px -2px rgba(56,189,248,.18);
      transform: translateY(-1px);
    }
    .btn-secondary:active:not(:disabled) {
      transform: translateY(0);
      background: var(--bg-elev);
      box-shadow: 0 1px 2px rgba(0,0,0,.22);
    }

    /* === DANGER (rouge moderne) === */
    .btn-danger {
      background: var(--err);
      color: #fff;
      border: 1px solid color-mix(in oklab, var(--err) 70%, black);
      box-shadow:
        0 1px 0 rgba(255,255,255,.18) inset,
        0 1px 2px rgba(0,0,0,.18),
        0 4px 14px -4px rgba(239,68,68,.5);
    }
    .btn-danger:hover:not(:disabled) {
      background: color-mix(in oklab, var(--err) 92%, white);
      box-shadow:
        0 1px 0 rgba(255,255,255,.22) inset,
        0 2px 4px rgba(0,0,0,.22),
        0 8px 24px -4px rgba(239,68,68,.65);
      transform: translateY(-1px);
    }
    .btn-danger:active:not(:disabled) {
      transform: translateY(0);
      background: color-mix(in oklab, var(--err) 88%, black);
      box-shadow:
        0 1px 0 rgba(255,255,255,.12) inset,
        0 1px 2px rgba(0,0,0,.25),
        0 2px 6px -2px rgba(239,68,68,.4);
    }

    /* Boutons compacts (utilisés dans les rangées DocRow / facture / etc.) :

       Le hover/active restent les mêmes. */
    .btn.\!py-1, .btn.\!py-0\.5, .btn.\!py-1\.5 {
      box-shadow: 0 1px 2px rgba(0,0,0,.18);
      font-weight: 600;
    }
    .btn.\!py-1:hover:not(:disabled), .btn.\!py-0\.5:hover:not(:disabled), .btn.\!py-1\.5:hover:not(:disabled) {
      transform: translateY(0); /* pas de lift sur les très petits boutons */
    }
    .btn.\!py-1:active:not(:disabled), .btn.\!py-0\.5:active:not(:disabled) {
      transform: translateY(1px);
    }

    /* === Mode jour : boutons primary en bleu ciel plus clair (sky-300/400/500) ===
       Plus lumineux que le sky-700 trop saturé du défaut. Texte navy maintenu pour contraste. */
    .theme-light .btn-primary {
      background:
        linear-gradient(180deg, #7dd3fc 0%, #38bdf8 55%, #0ea5e9 100%);
      color: #053449;
      border: 1px solid #38bdf8;
      box-shadow:
        0 1px 0 rgba(255,255,255,.65) inset,
        0 -2px 0 rgba(2,132,199,.18)  inset,
        0 3px 0 #0284c7,
        0 6px 14px rgba(56,189,248,.40);
    }
    .theme-light .btn-primary:hover:not(:disabled) {
      filter: brightness(1.04);
      box-shadow:
        0 1px 0 rgba(255,255,255,.7) inset,
        0 -2px 0 rgba(2,132,199,.18) inset,
        0 3px 0 #0284c7,
        0 8px 20px rgba(56,189,248,.50);
    }
    .theme-light .btn-primary:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow:
        0 1px 0 rgba(255,255,255,.5) inset,
        0 -1px 0 rgba(2,132,199,.18) inset,
        0 1px 0 #0284c7,
        0 2px 6px rgba(56,189,248,.35);
    }

    /* === Badges raffinés === */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      background: var(--bg-elev);
      color: var(--text-dim);
      border: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255,255,255,.04) inset;
    }

    /* === Tab bar === */
    .tabbtn {
      color: var(--text-dim);
      transition: color .15s ease, background-color .15s ease;
    }
    .tabbtn:hover:not(.active) {
      color: color-mix(in oklab, var(--text-dim) 50%, var(--accent) 50%);
    }
    .tabbtn.active { color: var(--accent); }

    /* === Header logo (version simple) === */
    .brand-logo {
      width: 38px; height: 38px;
      border-radius: 11px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #0f1d36 0%, #14233f 100%);
      border: 1px solid var(--border);
      box-shadow: 0 0 14px -4px rgba(56,189,248,.30), 0 1px 0 rgba(255,255,255,.05) inset;
    }
    .theme-light .brand-logo {
      background: linear-gradient(135deg, #ffffff 0%, #eef6ff 100%);
      border-color: #cdd7e6;
      box-shadow: 0 0 10px -4px rgba(2,132,199,.20), 0 1px 0 rgba(255,255,255,.6) inset;
    }
    .brand-title {
      font-weight: 700; letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 120%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* === Barre d'onglets desktop : underline accent === */
    nav.tabnav-desktop button {
      position: relative;
    }
    nav.tabnav-desktop button.tabbtn-active::after {
      content: ""; position: absolute; left: 12px; right: 12px; bottom: -10px; height: 2px;
      background: var(--accent); border-radius: 2px;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* === Scrollbar discrète === */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: color-mix(in oklab, var(--border) 50%, var(--accent) 50%); }

    /* === Safe area iOS === */
    /* En PWA standalone status-bar 'default', iOS réserve déjà l'espace sous
       l'encoche → on rajoute juste 10px de respiration pour le titre.
       En PWA 'black-translucent' (anciennes installs), env() retourne la hauteur
       de l'encoche → on l'ajoute pour ne pas chevaucher.
       !important pour gagner face à py-* de Tailwind sur le header. */
    .safe-top    { padding-top: calc(env(safe-area-inset-top) + 10px) !important; }
    .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 8px) !important; }

    /* === Animations === */
    @keyframes pop  { from { opacity:0; transform: translateY(8px) scale(0.98);} to {opacity:1; transform:none;} }
    @keyframes fade { from { opacity:0;} to {opacity:1;} }
    /* Clignotement lent rouge pour indiquer un état d'erreur persistant (sync KO). */
    @keyframes slowBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .anim-pop  { animation: pop  .22s cubic-bezier(.2,.7,.2,1); }
    .anim-slow-blink { animation: slowBlink 1.6s ease-in-out infinite; }
    .anim-fade { animation: fade .25s ease-out; }

    /* === Tabular numbers global pour stats / horloges === */
    .tabular-nums { font-variant-numeric: tabular-nums; }
  </style>
</head>

    function migrateCategoryId(oldId) {
      if (oldId === 'fuel') return 'fuel_aircraft';

    }
    // Si on charge un état contenant l'ancienne liste de catégories, on le remappe.
    function migrateState(state) {
      if (!state) return state;
      // Migrer les documents : remplace fuel → fuel_aircraft
      if (Array.isArray(state.documents)) {
        state.documents = state.documents.map(d => ({ ...d, categoryId: migrateCategoryId(d.categoryId) }));
      }
      // Si la liste des catégories sauvegardées est l'ancienne (présence de 'fuel' tout court
      // sans 'fuel_aircraft'), on la remplace par DEFAULT_CATEGORIES tout en gardant les
      // éventuelles catégories personnalisées que l'utilisateur aurait pu ajouter.
      if (Array.isArray(state.categories)) {
        const hasOld = state.categories.some(c => c.id === 'fuel');
        const hasNew = state.categories.some(c => c.id === 'fuel_aircraft');
        if (hasOld && !hasNew) {
          // On part de la nouvelle liste, en préservant d'éventuels custom (id non standard)
          const standardIds = new Set(DEFAULT_CATEGORIES.map(c=>c.id));
          const customs = state.categories.filter(c => !standardIds.has(c.id) && c.id !== 'fuel');
          state.categories = [...DEFAULT_CATEGORIES, ...customs];
        }
        // Auto-ajout des catégories par défaut manquantes (ex: mechanic_visit ajoutée
        // après une release). On insère à la fin, l'ordre des catégories existantes
        // est préservé pour ne pas surprendre l'utilisateur.
        const existingIds = new Set(state.categories.map(c => c.id));
        const missing = DEFAULT_CATEGORIES.filter(c => !existingIds.has(c.id));
        if (missing.length > 0) {
          state.categories = [...state.categories, ...missing];
        }
      }
      // Migrer les vols : convertir fuelUplift / oilUplift (champs simples v2) en
      // fuelEntries[] / oilEntries[] (format multi-entrées v3). Les champs legacy
      // sont préservés pour rétrocompatibilité (rien n'est supprimé).
      if (Array.isArray(state.flights)) {
        state.flights = state.flights.map(f => {
          const out = { ...f };
          if (!Array.isArray(out.fuelEntries)) out.fuelEntries = [];
          if (!Array.isArray(out.oilEntries))  out.oilEntries  = [];
          // v5 : initialise les offsets jour pour chaque champ horaire si absents.
          // Auto-détection passage minuit pour les anciens vols : si la séquence HHMM
          // (sans offset) n'est pas croissante, on ajoute +1 jour aux étapes suivantes.
          const offsetsAlreadySet = (out.blockOutDateOffset||out.takeOffDateOffset||out.landingDateOffset||out.blockInDateOffset);
          if (!offsetsAlreadySet) {
            out.blockOutDateOffset = 0;
            const refDate = out.date;
            const t1 = timeToAbsMinutes(refDate, 0, out.blockOut);

          if (out.landingsPic == null && out.landings != null) out.landingsPic = out.landings;

          if (out.landingsSic == null) out.landingsSic = 0;
          if (out.flightType == null) out.flightType = 'production';

    // nouveau vol soit visible comme à vérifier tant que l'équipe Ops ne l'a pas validé.
    const VERIFICATION_STATUSES = {
      pending:    { label: 'À vérifier', labelEn: 'To verify', color: '#ef4444' }, // rouge
      incomplete: { label: 'Incomplet',  labelEn: 'Incomplete', color: '#f97316' }, // orange
      complete:   { label: 'Complet',    labelEn: 'Complete',   color: '#22c55e' }, // vert

    // Règles métier pour valider un vol en statut "Complet" (vert).
    // Renvoie un tableau de chaînes décrivant ce qui manque ; si vide → vol validable.
    // L'argument `aircraftList` est optionnel : s'il est fourni, on détecte les
    // simulateurs (kind === 'simulator') et on simplifie les règles (pas de
    // W&B/FPL/OFPL/TTSN/Block Out/Block In demandés en simu).
    function getCompleteValidationErrors(f, aircraftList = []) {
      const errors = [];
      if (!f) return ['Vol vide'];
      const ac = (aircraftList || []).find(a => a.id === f.aircraftId);
      const isSim = ac?.kind === 'simulator';
      // SIC requis pour Multiéquipage et Duo/Training (les deux nécessitent 2 pilotes à bord)
      if ((f.flightType === 'equipage' || f.flightType === 'duo_training') && !f.copilotId) {
        const label = f.flightType === 'equipage' ? 'Multiéquipage' : 'Duo/Training';
        errors.push(`SIC (co-pilote) manquant — requis pour ${label}`);
      }
      // Heures Zulu — en simu seulement TO + LDG ; en réel les 4 horaires.
      const missingTimes = [];
      if (isSim) {
        if (!f.takeOff) missingTimes.push('Take Off');
        if (!f.landing) missingTimes.push('Landing');
      } else {
        if (!f.blockOut) missingTimes.push('Block Out');
        if (!f.takeOff)  missingTimes.push('Take Off');
        if (!f.landing)  missingTimes.push('Landing');
        if (!f.blockIn)  missingTimes.push('Block In');
      }
      if (missingTimes.length) errors.push('Heure(s) manquante(s) : ' + missingTimes.join(', '));
      // TTSN et documents : exigés UNIQUEMENT pour vol réel (pas pour simu)
      if (!isSim) {
        const ttsnB = String(f.ttsnBefore||'').trim();
        const ttsnA = String(f.ttsnAfter||'').trim();
        if (!ttsnB) errors.push('TTSN avant manquant');
        if (!ttsnA) errors.push('TTSN après manquant');
        const docs = f.documents || [];
        if (!docs.some(d => d.type === 'wb'))   errors.push('Weight & Balance non joint');
        if (!docs.some(d => d.type === 'fpl'))  errors.push('FPL non joint');
        if (!docs.some(d => d.type === 'ofpl')) errors.push('OFPL non joint');
      }
      return errors;
    }

    // Logique pour un vol non-validé manuellement :
    //   - Pas de Landing → 🔴 'pending' (vol planifié ou en cours)
    //   - Landing rempli mais erreurs → 🟠 'incomplete'
    //   - Tout est OK + l'utilisateur a cliqué "Complet" → 🟢 'complete'
    // Le passage en 🟢 vert est TOUJOURS manuel (clic explicite du pilote / dispatch).
    function computeAutoVerificationStatus(f, aircraftList = []) {
      if (!f) return 'pending';
      if (!f.landing) return 'pending';
      const errs = getCompleteValidationErrors(f, aircraftList);
      if (errs.length === 0) {
        return f.verificationStatus === 'complete' ? 'complete' : 'incomplete';
      }
      return 'incomplete';
    }

    function resolveAirportCoords(icao) {
      if (!icao) return null;
      const code = icao.toUpperCase().trim();
      if (AIRPORT_COORDS.has(code)) return AIRPORT_COORDS.get(code);
      const custom = getCustomAirports();

    function rememberAirportCoords(icao, lat, lon) {
      if (!icao) return;
      const code = icao.toUpperCase().trim();

      setCustomAirports(custom);

    // Distance grand cercle (Haversine) entre 2 points en milles nautiques (NM).
    function distanceNM(lat1, lon1, lat2, lon2) {
      const R = 3440.065; // rayon Terre en NM
      const toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }
    // Wrapper pratique : distance entre 2 OACI (renvoie null si l'un des deux inconnu).
    function distanceBetweenICAO(icaoFrom, icaoTo) {
      const a = resolveAirportCoords(icaoFrom);
      const b = resolveAirportCoords(icaoTo);
      if (!a || !b) return null;
      return distanceNM(a.lat, a.lon, b.lat, b.lon);
    }

    // Renvoie l'heure actuelle UTC formatée HH:MM:SSZ
    function nowZulu() {
      const d = new Date();
      const hh = String(d.getUTCHours()).padStart(2,'0');
      const mm = String(d.getUTCMinutes()).padStart(2,'0');
      const ss = String(d.getUTCSeconds()).padStart(2,'0');
      return `${hh}:${mm}:${ss}Z`;
    }
    function todayZuluDate() {
      const d = new Date();
      const y = d.getUTCFullYear();
      const m = String(d.getUTCMonth()+1).padStart(2,'0');
      const dd = String(d.getUTCDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }

    // === Taux de change FX (Frankfurter, ECB, gratuit sans clé) ===
    // Récupère le taux historique pour une date donnée (YYYY-MM-DD).
    // Cache localStorage permanent : les taux historiques ne changent jamais.
    // Renvoie TOUJOURS un nombre > 0 grâce à 3 niveaux de fallback :
    //   1) cache local pour cette date
    //   2) appel Frankfurter avec date historique
    //   3) appel Frankfurter "latest" (taux du jour) si la date historique échoue
    //   4) table statique de secours (utile si offline complet, taux indicatifs 2024-2025)
    const FX_FALLBACK_TO_CAD = {
      USD: 1.36, EUR: 1.50, GBP: 1.74, CHF: 1.55,
      CAD: 1.00, AUD: 0.91, JPY: 0.0091, CNY: 0.19,
      MXN: 0.078, BRL: 0.27, NZD: 0.83, SEK: 0.13,
      NOK: 0.13, DKK: 0.20, ZAR: 0.075,
    };
    // Cache "dernier taux connu" par paire (from→to), indépendamment de la date.
    // Mis à jour à chaque fetch Frankfurter réussi. Sert de filet de sécurité quand
    // on saisit une facture offline : on prend le dernier taux mémorisé, et la
    // prochaine sync corrigera (si la date de la facture est postérieure et qu'un
    // taux historique réel devient disponible). Stocké en localStorage.
    const FX_LAST_KNOWN_KEY = 'aerodeck.fxLastKnown.v1';
    function fxReadLastKnownMap() {
      try {
        const raw = localStorage.getItem(FX_LAST_KNOWN_KEY);
        if (!raw) return {};
        const map = JSON.parse(raw);
        return (map && typeof map === 'object') ? map : {};
      } catch (_) { return {}; }
    }
    function fxWriteLastKnown(from, to, rate, sourceDate) {
      try {
        const map = fxReadLastKnownMap();
        map[`${from}|${to}`] = { rate, fetchedAt: Date.now(), sourceDate: sourceDate || null };
        localStorage.setItem(FX_LAST_KNOWN_KEY, JSON.stringify(map));
      } catch (_) {}
    }
    function fxGetLastKnown(from, to) {
      const map = fxReadLastKnownMap();
      const e = map[`${from}|${to}`];
      if (e && typeof e.rate === 'number' && e.rate > 0) return e;
      return null;
    }
    // Lit le cache historique. Format moderne : JSON `{rate, sourceDate}` (la
    // date que Frankfurter a réellement renvoyée — ex: 2026-05-03 demandé →
    // 2026-05-01 vendredi retourné car samedi). Format ancien : nombre brut
    // (rétrocompat avec les caches d'avant cette refonte).
    function fxReadHistoricCache(date, fromCurrency, toCurrency) {
      try {
        const raw = localStorage.getItem(`fx_${date}_${fromCurrency}_${toCurrency}`);
        if (!raw) return null;
        // Tente le format JSON moderne en premier
        if (raw.startsWith('{')) {
          const o = JSON.parse(raw);
          if (o && typeof o.rate === 'number' && o.rate > 0) {
            return { rate: o.rate, sourceDate: o.sourceDate || date };
          }
        }
        // Fallback format ancien : juste un nombre
        const v = parseFloat(raw);
        if (!isNaN(v) && v > 0) return { rate: v, sourceDate: date };
      } catch (_) {}
      return null;
    }
    function fxWriteHistoricCache(date, fromCurrency, toCurrency, rate, sourceDate) {
      try {
        localStorage.setItem(
          `fx_${date}_${fromCurrency}_${toCurrency}`,
          JSON.stringify({ rate, sourceDate: sourceDate || date })
        );
      } catch (_) {}
    }
    // Helper : tente un fetch direct, puis via 2 proxies CORS publics si échec.
    // Certains environnements (Safari ITP strict, certains ISP, extensions
    // privacy) bloquent les requêtes cross-origin vers Frankfurter — les
    // proxies réémettent la requête depuis leur serveur et renvoient le
    // résultat avec les bons en-têtes CORS pour github.io et autres.
    async function fxFetchWithFallback(frankfurterPath) {
      const directUrl = `https://api.frankfurter.app/${frankfurterPath}`;
      const candidates = [
        directUrl,
        `https://corsproxy.io/?${encodeURIComponent(directUrl)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(directUrl)}`,
      ];
      for (const url of candidates) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) continue;
          const j = await res.json();
          if (j && j.rates) return j;
        } catch (_) {}
      }
      return null;
    }
    // Variante détaillée : retourne {rate, sourceDate, source} ou null.
    // - source ∈ 'historic-cache' | 'historic-live' | 'latest-live' | 'last-known' | 'static-fallback'
    // - sourceDate = date que Frankfurter a réellement utilisée pour le taux retourné
    //   (peut différer de la date demandée si week-end / jour férié)
    async function getFxRateDetailed(date, fromCurrency, toCurrency = 'CAD') {
      if (!date || !fromCurrency || fromCurrency === toCurrency) {
        return { rate: 1, sourceDate: date, source: 'identity' };
      }
      // Cache historique pour cette date
      const cachedHist = fxReadHistoricCache(date, fromCurrency, toCurrency);
      if (cachedHist) {
        return { rate: cachedHist.rate, sourceDate: cachedHist.sourceDate, source: 'historic-cache' };
      }
      // Tentative 1 : taux historique pour cette date (avec fallback proxies CORS).
      // Frankfurter peut renvoyer un autre jour ouvré si la date est un
      // week-end/férié — on capture ça via j.date.
      const j1 = await fxFetchWithFallback(`${date}?from=${fromCurrency}&to=${toCurrency}`);
      if (j1) {
        const rate = j1.rates && j1.rates[toCurrency];
        const actualDate = j1.date || date;
        if (rate && rate > 0) {
          fxWriteHistoricCache(date, fromCurrency, toCurrency, rate, actualDate);
          fxWriteLastKnown(fromCurrency, toCurrency, rate, actualDate);
          return { rate, sourceDate: actualDate, source: 'historic-live' };
        }
      }
      // Tentative 2 : taux "latest" (utile si la date demandée est dans le futur)
      const j2 = await fxFetchWithFallback(`latest?from=${fromCurrency}&to=${toCurrency}`);
      if (j2) {
        const rate = j2.rates && j2.rates[toCurrency];
        const actualDate = j2.date || null;
        if (rate && rate > 0) {
          fxWriteHistoricCache(date, fromCurrency, toCurrency, rate, actualDate);
          fxWriteLastKnown(fromCurrency, toCurrency, rate, actualDate);
          return { rate, sourceDate: actualDate, source: 'latest-live' };
        }
      }
      // Tentative 3 : dernier taux connu (offline complet)
      const lastKnown = fxGetLastKnown(fromCurrency, toCurrency);
      if (lastKnown && lastKnown.rate > 0) {
        return { rate: lastKnown.rate, sourceDate: lastKnown.sourceDate || null, source: 'last-known' };
      }
      // Tentative 4 : table statique de secours
      if (toCurrency === 'CAD' && FX_FALLBACK_TO_CAD[fromCurrency]) {
        return { rate: FX_FALLBACK_TO_CAD[fromCurrency], sourceDate: null, source: 'static-fallback' };
      }
      return null;
    }
    // Wrapper rétrocompat : retourne juste le nombre. Utilisé partout où la date
    // du taux n'est pas nécessaire (sumWithRates, agrégations Stats, etc.).
    async function getFxRate(date, fromCurrency, toCurrency = 'CAD') {
      const r = await getFxRateDetailed(date, fromCurrency, toCurrency);
      return r ? r.rate : null;
    }
    // Variante synchrone — lit uniquement les caches locaux (cache par date OU
    // dernier taux connu). Utile pour offrir un taux instantané quand on ouvre
    // un formulaire offline, sans attendre l'aller-retour réseau.
    function getFxRateCached(date, fromCurrency, toCurrency = 'CAD') {
      if (!date || !fromCurrency || fromCurrency === toCurrency) return { rate: 1, source: 'identity', sourceDate: date };
      const cachedHist = fxReadHistoricCache(date, fromCurrency, toCurrency);
      if (cachedHist) {
        return { rate: cachedHist.rate, source: 'historic-cache', sourceDate: cachedHist.sourceDate };
      }
      const lk = fxGetLastKnown(fromCurrency, toCurrency);
      if (lk && lk.rate > 0) return { rate: lk.rate, source: 'last-known', sourceDate: lk.sourceDate, fetchedAt: lk.fetchedAt };
      if (toCurrency === 'CAD' && FX_FALLBACK_TO_CAD[fromCurrency]) {
        return { rate: FX_FALLBACK_TO_CAD[fromCurrency], source: 'static-fallback', sourceDate: null };
      }
      return null;
    }
    function nowZuluHHMM() {
      const d = new Date();
      return `${String(d.getUTCHours()).padStart(2,'0')}${String(d.getUTCMinutes()).padStart(2,'0')}`;
    }

    // Réglages par défaut (étendus en v16)
    const DEFAULT_SETTINGS = {
      language:        'fr',
      askBeforeDelete: true,
      theme:           'dark',     // 'dark' | 'light' | 'auto-system' | 'auto-time'
      timeDisplay:     'zulu',     // 'zulu' | 'local' | 'both'
      defaultFuelUnit: 'L',        // 'L' | 'kg' | 'USG'
      defaultOilUnit:  'qt',       // 'qt' | 'L'
      defaultCurrency: 'EUR',
      dateFormat:      'iso',      // 'iso' (YYYY-MM-DD) | 'fr' (DD/MM/YYYY) | 'us' (MM/DD/YYYY)
      backupReminder:  20,         // notifier toutes les N modifs (0 = désactivé)
    };
    // Détermine le thème effectif selon le réglage et l'heure UTC locale
    function effectiveTheme(themeSetting) {
      if (themeSetting === 'light') return 'light';
      if (themeSetting === 'dark')  return 'dark';
      if (themeSetting === 'auto-system') {
        if (typeof window !== 'undefined' && window.matchMedia) {
          return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        return 'dark';
      }
      if (themeSetting === 'auto-time') {
        const h = new Date().getHours();
        return (h >= 7 && h < 20) ? 'light' : 'dark';
      }
      return 'dark';
    }
    // Convertit HHMM Zulu + date en heure locale (à partir du fuseau du navigateur)
    function zuluToLocalHHMM(dateISO, hhmm) {
      const m = parseHHMM(hhmm);
      if (m == null || !dateISO) return '';
      const d = new Date(dateISO + 'T' + String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0') + ':00Z');
      if (isNaN(d.getTime())) return '';
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    // Format heure d'après réglage (ZULU / LOCAL / BOTH)
    function fmtTimeBySetting(dateISO, hhmm, mode) {
      const z = fmtHHMMZ(hhmm);
      if (!z) return '';
      if (mode === 'local') {
        const local = zuluToLocalHHMM(dateISO, hhmm);
        return local ? `${local}` : z;
      }
      if (mode === 'both') {
        const local = zuluToLocalHHMM(dateISO, hhmm);
        return local ? `${z} (${local} local)` : z;
      }
      return z; // 'zulu' par défaut
    }
    // Format date d'après réglage
    // === Ref globale aux settings courants ===
    // Permet aux helpers fmt*/confirmDelete d'accéder aux préférences utilisateur
    // sans avoir à propager `settings` via les props de chaque composant.
    // Mise à jour par App à chaque changement de settings via useEffect.
    let __currentSettings = null;
    function getSettings() {
      return __currentSettings || (typeof DEFAULT_SETTINGS !== 'undefined' ? DEFAULT_SETTINGS : {});
    }
    // Helpers thématisés qui consomment getSettings()
    function fmtDate(dateISO) {
      const s = getSettings();
      return fmtDateBySetting(dateISO, s.dateFormat || 'iso');
    }
    function fmtTime(dateISO, hhmm) {
      const s = getSettings();
      return fmtTimeBySetting(dateISO, hhmm, s.timeDisplay || 'zulu');
    }
    // Confirmation de suppression — bypass si askBeforeDelete=false
    function confirmDelete(msg) {
      const s = getSettings();
      if (s.askBeforeDelete === false) return true;
      return confirm(msg);
    }
    // Compteur de modifs pour le rappel d'export. Incrémenté à chaque mutation
    // utilisateur. Stocké en localStorage pour survivre aux reloads.
    function bumpModCounter() {
      try {
        const n = (parseInt(localStorage.getItem('aerodeck.modCount.v1'), 10) || 0) + 1;
        localStorage.setItem('aerodeck.modCount.v1', String(n));
        return n;
      } catch { return 0; }
    }
    function getModCounter() {
      try { return parseInt(localStorage.getItem('aerodeck.modCount.v1'), 10) || 0; } catch { return 0; }
    }
    function resetModCounter() {
      try { localStorage.setItem('aerodeck.modCount.v1', '0'); } catch {}
    }

    function fmtDateBySetting(dateISO, fmt) {
      if (!dateISO) return '';
      const m = dateISO.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return dateISO;
      const [_, y, mo, d] = m;
      if (fmt === 'fr') return `${d}/${mo}/${y}`;
      if (fmt === 'us') return `${mo}/${d}/${y}`;
      return dateISO; // 'iso' par défaut
    }
    // Convertit "HHMM" ou "HH:MM" en minutes depuis 0Z. Renvoie null si invalide.
    function parseHHMM(v) {
      if (!v) return null;
      const s = String(v).replace(':','').trim();
      if (!/^\d{3,4}$/.test(s)) return null;
      const padded = s.padStart(4,'0');
      const h = parseInt(padded.slice(0,2),10);
      const m = parseInt(padded.slice(2,4),10);
      if (h>23 || m>59) return null;
      return h*60 + m;
    }
    // Différence en minutes, gère le passage de minuit (si end < start, on ajoute 24h)
    function diffMinutes(startHHMM, endHHMM) {
      const s = parseHHMM(startHHMM);
      const e = parseHHMM(endHHMM);
      if (s==null || e==null) return null;
      let diff = e - s;
      if (diff < 0) diff += 24*60; // passage minuit
      return diff;
    }
    function fmtDuration(min) {
      if (min == null || isNaN(min)) return '—';
      const h = Math.floor(min/60);
      const m = min % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }
    // Format décimal pour moyennes / KPIs : "2.3 h" max 1 décimale.
    function fmtHoursDecimal(min) {
      if (min == null || isNaN(min)) return '—';
      const h = min / 60;
      // Pas de décimale parasite : 2.0 → "2 h", 2.3 → "2.3 h"
      const rounded = Math.round(h * 10) / 10;
      return `${rounded.toFixed(1).replace(/\.0$/, '')} h`;
    }
    // Formatte HHMM -> "HH:MMZ" (Zulu) / "HH:MM" (local) / "HH:MMZ (HH:MM L)" (both)
    // Respecte le réglage settings.timeDisplay via la ref globale __currentSettings.
    // Si pas de date passée, on utilise aujourd'hui Zulu pour le calcul du décalage local.
    function fmtHHMMZ(v, dateISO) {
      const m = parseHHMM(v);
      if (m==null) return '';
      const h = Math.floor(m/60); const mm = m%60;
      const zuluStr = `${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
      const mode = (getSettings().timeDisplay || 'zulu');
      if (mode === 'zulu') return `${zuluStr}Z`;
      const baseDate = dateISO || todayZuluDate();
      if (mode === 'local') {
        return zuluToLocalHHMM(baseDate, zuluStr) || `${zuluStr}Z`;
      }
      // both
      const local = zuluToLocalHHMM(baseDate, zuluStr);
      return `${zuluStr}Z${local ? ` (${local} L)` : ''}`;
    }

    // ------- CARs 702 (Canada) — Limites Duty / Flight Time -------
    // Référence : Transport Canada, CARs Subpart 702 (Aerial Work).
    // Valeurs en minutes. Pour single-pilot ; certaines opérations multi-pilote
    // ont des limites étendues (non couvert ici — version simplifiée).
    const CARS_702_LIMITS = {
      dailyDuty:        14 * 60,    // max 14h de duty consécutives — CAR 700.16
      dailyFlight:       8 * 60,    // max 8h de vol par jour (single-pilot) — CAR 700.21
      window7Flight:    60 * 60,    // max 60h sur 7 jours glissants — CAR 700.21
      window30Flight:  120 * 60,    // max 120h sur 30 jours — CAR 700.21
      window90Flight:  300 * 60,    // max 300h sur 90 jours — CAR 700.21
      window365Flight:1200 * 60,    // max 1200h sur 365 jours — CAR 700.21
      minRestAfterDuty: 8 * 60,     // 8h de sommeil consécutif minimum à la base — CAR 700.15
      // CAR 700.15 — Hors base, l'opérateur doit fournir hébergement convenable +
      // transport + temps repas/hygiène. En pratique → ~10 h de période de repos
      // entre fin de duty et début de la suivante (8h sommeil + ~2h transport/hygiène/repas).
      minRestAfterDutyAwayFromBase: 10 * 60,
      // CAR 702.91-702.98 — Time-free from duty (jours de repos)
      // Règles :
      //   - 14h max de duty consécutif sur 24h (déjà couvert par dailyDuty plus haut)
      //   - 24h consécutives off : 13 fois sur toute fenêtre de 90 jours
      //   - 24h consécutives off : 3 fois sur toute fenêtre de 30 jours
      //   - On-call : 36h consécutives off dans 7 jours, OU 3 jours consécutifs dans 17 jours
      timeFree24hIn90Days: 13,       // 13 × 24h consécutives off dans 90 jours
      timeFree24hIn30Days:  3,       // 3  × 24h consécutives off dans 30 jours
      onCall36hIn7Days:    36 * 60,  // 36h consécutives off dans 7 jours (mode on-call)
      onCall3DaysIn17Days:  3,       // OU 3 jours consécutifs off dans 17 jours
    };

    // Calcule une duty AUTO pour un pilote donné un jour donné, à partir des vols.
    // Règle : duty = (premier Block Out - 1h) → (dernier Block In + 1h)
    // Renvoie {startTime, endTime, timezone} en HHMM Zulu, ou null si pas de vol exploitable.
    function computeAutoDuty(flights, pilotId, dateISO) {
      if (!pilotId || !dateISO) return null;
      const dayFlights = flights.filter(f =>
        f.date === dateISO &&
        (f.pilotId === pilotId || f.copilotId === pilotId) &&
        f.blockOut && f.blockIn
      );
      if (dayFlights.length === 0) return null;
      const bos = [], bis = [];
      for (const f of dayFlights) {
        const bo = parseHHMM(f.blockOut);
        const bi = parseHHMM(f.blockIn);
        if (bo == null || bi == null) continue;
        bos.push(bo);
        // Si le vol traverse minuit (blockInDateOffset > 0), on ramène BI sur >= 24h
        const biAdj = (f.blockInDateOffset > 0) ? bi + 24*60 : (bi < bo ? bi + 24*60 : bi);
        bis.push(biAdj);
      }
      if (!bos.length) return null;
      const minBo = Math.min(...bos);
      const maxBi = Math.max(...bis);
      // Duty start = BO - 60 min, peut être négatif (la veille)
      let startMin = minBo - 60;
      if (startMin < 0) startMin += 24*60;
      // Duty end = BI + 60 min, peut dépasser 24h (le lendemain) → modulo
      const endMin = (maxBi + 60) % (24*60);
      const fmt = m => `${String(Math.floor(m/60)).padStart(2,'0')}${String(m%60).padStart(2,'0')}`;
      return { startTime: fmt(startMin), endTime: fmt(endMin), timezone: 'zulu' };
    }

    // Construit la liste consolidée des duty effectives pour un pilote (ou tous).
    // Pour chaque (pilote, date) :
    //   - Si une duty manuelle existe (dans dutyPeriods) → on l'utilise (source: 'manual')
    //   - Sinon, si vols ce jour-là → duty auto (source: 'auto', id préfixé "auto_")
    function getEffectiveDuties(flights, dutyPeriods, pilotFilter) {
      const manualMap = {};
      for (const dp of dutyPeriods) {
        if (pilotFilter !== 'all' && dp.pilotId !== pilotFilter) continue;
        manualMap[`${dp.pilotId}|${dp.date}`] = dp;
      }
      const datesByPilot = new Set();
      for (const f of flights) {
        if (!f.date) continue;
        if (f.pilotId && (pilotFilter === 'all' || f.pilotId === pilotFilter)) {
          datesByPilot.add(`${f.pilotId}|${f.date}`);
        }
        if (f.copilotId && (pilotFilter === 'all' || f.copilotId === pilotFilter)) {
          datesByPilot.add(`${f.copilotId}|${f.date}`);
        }
      }
      const result = [];
      // 1) Duty manuelles (override)
      for (const dp of Object.values(manualMap)) {
        result.push({ ...dp, source: 'manual' });
      }
      // 2) Duty auto pour les (pilote, date) qui n'ont PAS d'override manuel
      for (const key of datesByPilot) {
        if (manualMap[key]) continue;
        const [pid, date] = key.split('|');
        const auto = computeAutoDuty(flights, pid, date);
        if (auto) {
          result.push({
            id: `auto_${pid}_${date}`,
            pilotId: pid, date,
            ...auto,
            notes: '',
            source: 'auto',
          });
        }
      }
      result.sort((a, b) => (b.date||'').localeCompare(a.date||'') ||
                            (a.startTime||'').localeCompare(b.startTime||''));
      return result;
    }

    // Calcule la durée d'une période duty en minutes (gère passage minuit)
    function dutyMinutes(period) {
      if (!period) return 0;
      const s = parseHHMM(period.startTime);
      const e = parseHHMM(period.endTime);
      if (s == null || e == null) return 0;
      let diff = e - s;
      if (diff < 0) diff += 24 * 60;
      return diff;
    }

    // Somme des flight times d'un pilote (PIC ou SIC) dans une fenêtre glissante
    // se terminant à `refDateISO` (inclus) et de `daysWindow` jours.
    function flightTimeWindow(flights, pilotId, refDateISO, daysWindow) {
      if (!refDateISO) return 0;
      const ref = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(ref.getTime())) return 0;
      const startMs = ref.getTime() - (daysWindow - 1) * 86400000;
      let total = 0;
      for (const f of flights) {
        if (!f.date) continue;
        if (pilotId && pilotId !== 'all' && f.pilotId !== pilotId && f.copilotId !== pilotId) continue;
        const d = new Date(f.date + 'T00:00:00Z');
        if (isNaN(d.getTime())) continue;
        const t = d.getTime();
        if (t >= startMs && t <= ref.getTime()) {
          total += (f.flightTime || 0);
        }
      }
      return total;
    }

    // Somme des duty times effectifs (auto + manuel) d'un pilote dans une fenêtre
    // glissante de `daysWindow` jours se terminant à `refDateISO`.
    function dutyTimeWindow(effectiveDuties, refDateISO, daysWindow) {
      if (!refDateISO) return 0;
      const ref = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(ref.getTime())) return 0;
      const startMs = ref.getTime() - (daysWindow - 1) * 86400000;
      let total = 0;
      for (const p of effectiveDuties) {
        if (!p.date) continue;
        const d = new Date(p.date + 'T00:00:00Z');
        if (isNaN(d.getTime())) continue;
        const t = d.getTime();
        if (t >= startMs && t <= ref.getTime()) {
          total += dutyMinutes(p);
        }
      }
      return total;
    }

    // Compte le nombre de jours SANS duty (jours OFF) dans une fenêtre glissante.
    // Utile pour CAR 700.19 : « 13 jours off dans toute fenêtre de 30 jours ».
    function offDaysWindow(effectiveDuties, refDateISO, daysWindow) {
      if (!refDateISO) return daysWindow;
      const ref = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(ref.getTime())) return daysWindow;
      const startMs = ref.getTime() - (daysWindow - 1) * 86400000;
      const dutiedDays = new Set();
      for (const p of effectiveDuties) {
        if (!p.date) continue;
        const d = new Date(p.date + 'T00:00:00Z');
        if (isNaN(d.getTime())) continue;
        const t = d.getTime();
        if (t >= startMs && t <= ref.getTime()) {
          dutiedDays.add(p.date);
        }
      }
      return daysWindow - dutiedDays.size;
    }

    // CAR 702 : compte les occurrences de "24h consécutives off" (sans duty)
    // dans une fenêtre glissante. On scanne par tranches de 30 minutes et on
    // compte les périodes contigües de ≥48 slots libres (= 24h). Approche
    // équivalente à longestFreeStretch mais avec comptage multiple.
    function count24hOffInWindow(effectiveDuties, refDateISO, daysWindow) {
      if (!refDateISO) return 0;
      const ref = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(ref.getTime())) return 0;
      const SLOT = 30; // minutes
      const totalSlots = (daysWindow * 24 * 60) / SLOT;
      const busy = new Array(totalSlots).fill(false);
      const windowStartMs = ref.getTime() - (daysWindow * 86400000) + 86400000;
      for (const p of effectiveDuties) {
        if (!p.date) continue;
        const sMin = parseHHMM(p.startTime);
        const eMin = parseHHMM(p.endTime);
        if (sMin == null || eMin == null) continue;
        const baseMs = new Date(p.date + 'T00:00:00Z').getTime();
        if (isNaN(baseMs)) continue;
        let dutyStart = baseMs + sMin * 60 * 1000;
        let dutyEnd   = baseMs + eMin * 60 * 1000;
        if (dutyEnd <= dutyStart) dutyEnd += 24 * 60 * 60 * 1000;
        for (let t = dutyStart; t < dutyEnd; t += SLOT * 60 * 1000) {
          if (t < windowStartMs) continue;
          if (t > ref.getTime() + 86400000) break;
          const idx = Math.floor((t - windowStartMs) / (SLOT * 60 * 1000));
          if (idx >= 0 && idx < totalSlots) busy[idx] = true;
        }
      }
      // Comptage : à chaque série continue de free slots, on compte combien de
      // périodes 24h non-chevauchantes elle contient (consommation = 48 slots).
      const SLOTS_PER_24H = 24 * 60 / SLOT; // 48
      let count = 0;
      let current = 0;
      for (let i = 0; i < totalSlots; i++) {
        if (!busy[i]) {
          current++;
        } else {
          count += Math.floor(current / SLOTS_PER_24H);
          current = 0;
        }
      }
      count += Math.floor(current / SLOTS_PER_24H);
      return count;
    }

    // CAR 702 on-call : compte la plus longue série de jours CALENDAIRES
    // consécutifs sans aucune duty dans une fenêtre glissante. Sert à vérifier
    // « 3 jours consécutifs off dans 17 jours ».
    function longestConsecutiveOffDays(effectiveDuties, refDateISO, daysWindow) {
      if (!refDateISO) return daysWindow;
      const ref = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(ref.getTime())) return 0;
      const dutiedDays = new Set();
      const startMs = ref.getTime() - (daysWindow - 1) * 86400000;
      for (const p of effectiveDuties) {
        if (!p.date) continue;
        const d = new Date(p.date + 'T00:00:00Z');
        if (isNaN(d.getTime())) continue;
        const t = d.getTime();
        if (t >= startMs && t <= ref.getTime()) dutiedDays.add(p.date);
      }
      let longest = 0, current = 0;
      const oneDay = 86400000;
      for (let t = startMs; t <= ref.getTime(); t += oneDay) {
        const iso = new Date(t).toISOString().slice(0,10);
        if (dutiedDays.has(iso)) { current = 0; }
        else { current++; if (current > longest) longest = current; }
      }
      return longest;
    }

    // Calcule la plus longue période continue SANS duty (en minutes) sur une
    // fenêtre glissante. Sert à vérifier la règle « 36h consécutives free dans 7 jours »
    // (CAR 700.19). Approche : scanne les minutes par tranche d'1h.
    function longestFreeStretch(effectiveDuties, refDateISO, daysWindow) {
      if (!refDateISO) return daysWindow * 24 * 60;
      const ref = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(ref.getTime())) return 0;
      // Construit un set des "minutes" busy (granularité 30 min pour rester rapide)
      const SLOT = 30; // minutes
      const totalSlots = (daysWindow * 24 * 60) / SLOT;
      const busy = new Array(totalSlots).fill(false);
      const windowStartMs = ref.getTime() - (daysWindow * 86400000) + 86400000; // début = ref - daysWindow + 1 jour
      for (const p of effectiveDuties) {
        if (!p.date) continue;
        const sMin = parseHHMM(p.startTime);
        const eMin = parseHHMM(p.endTime);
        if (sMin == null || eMin == null) continue;
        const baseMs = new Date(p.date + 'T00:00:00Z').getTime();
        if (isNaN(baseMs)) continue;
        let dutyStart = baseMs + sMin * 60 * 1000;
        let dutyEnd   = baseMs + eMin * 60 * 1000;
        if (dutyEnd <= dutyStart) dutyEnd += 24 * 60 * 60 * 1000; // duty traverse minuit
        // Marque les slots busy
        for (let t = dutyStart; t < dutyEnd; t += SLOT * 60 * 1000) {
          if (t < windowStartMs) continue;
          if (t > ref.getTime() + 86400000) break;
          const idx = Math.floor((t - windowStartMs) / (SLOT * 60 * 1000));
          if (idx >= 0 && idx < totalSlots) busy[idx] = true;
        }
      }
      // Trouve la plus longue série de slots libres
      let longest = 0, current = 0;
      for (let i = 0; i < totalSlots; i++) {
        if (!busy[i]) { current++; if (current > longest) longest = current; }
        else current = 0;
      }
      return longest * SLOT;
    }

    // Repos minimum entre la dernière duty terminée et la prochaine duty (en minutes).
    // Renvoie un objet { restMin, awayFromBase, lastDutyDate } ou null si pas d'historique.
    // awayFromBase est déterminé en regardant le DERNIER vol de cette duty :
    // si l'arrivée (f.to) ≠ baseAirport du pilote → hors base, sinon à la base.
    function minRestSinceLastDuty(effectiveDuties, refDateISO, flights, pilot) {
      if (!refDateISO) return null;
      const ref = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(ref.getTime())) return null;
      const refMs = ref.getTime();
      // Trouve la duty terminée la plus récente avant la fin de la journée ref
      let latestEnd = -Infinity;
      let latestDuty = null;
      for (const p of effectiveDuties) {
        if (!p.date) continue;
        const sMin = parseHHMM(p.startTime);
        const eMin = parseHHMM(p.endTime);
        if (sMin == null || eMin == null) continue;
        const baseMs = new Date(p.date + 'T00:00:00Z').getTime();
        let dutyEnd = baseMs + eMin * 60 * 1000;
        if (eMin <= sMin) dutyEnd += 24 * 60 * 60 * 1000;
        if (dutyEnd <= refMs + 24 * 60 * 60 * 1000 && dutyEnd > latestEnd) {
          latestEnd = dutyEnd;
          latestDuty = p;
        }
      }
      if (latestEnd === -Infinity) return null;
      const nowMs = refMs + 24 * 60 * 60 * 1000;
      const restMin = Math.max(0, Math.floor((nowMs - latestEnd) / (60 * 1000)));
      // Détection hors base : on regarde le DERNIER vol du jour de la duty pour ce pilote
      let awayFromBase = false;
      const baseAp = (pilot?.baseAirport || '').trim().toUpperCase();
      if (baseAp && pilot?.id && latestDuty?.date && Array.isArray(flights)) {
        const dayFlights = flights
          .filter(f => f.date === latestDuty.date &&
                       (f.pilotId === pilot.id || f.copilotId === pilot.id) &&
                       f.to)
          .sort((a, b) => (b.blockIn || '').localeCompare(a.blockIn || ''));
        if (dayFlights.length > 0) {
          const lastTo = (dayFlights[0].to || '').trim().toUpperCase();
          awayFromBase = !!lastTo && lastTo !== baseAp;
        }
      }
      return {
        restMin,
        awayFromBase,
        lastDutyDate: latestDuty?.date || null,
        lastDutyEndMs: latestEnd,        // timestamp ms (UTC) de la fin de la dernière duty
        nowMs,                            // référence "maintenant" utilisée
      };
    }

    // Calcule la prochaine prise de service possible (date + heure UTC)
    // = fin de la dernière duty + repos minimum requis (8h base / 10h hors base).
    // Renvoie un Date object UTC, ou null si pas d'historique.
    function nextDutyStartAt(effectiveDuties, refDateISO, flights, pilot) {
      const r = minRestSinceLastDuty(effectiveDuties, refDateISO, flights, pilot);
      if (!r || !r.lastDutyEndMs || r.lastDutyEndMs === -Infinity) return null;
      const restMs = (r.awayFromBase ? CARS_702_LIMITS.minRestAfterDutyAwayFromBase
                                     : CARS_702_LIMITS.minRestAfterDuty) * 60 * 1000;
      return {
        date: new Date(r.lastDutyEndMs + restMs),
        awayFromBase: r.awayFromBase,
      };
    }

    // Calcule la clé semaine ISO d'une date YYYY-MM-DD (format YYYY-Wnn)
    function isoWeekKey(dateISO) {
      if (!dateISO) return null;
      const d = new Date(dateISO + 'T00:00:00Z');
      if (isNaN(d.getTime())) return null;
      // Algorithme ISO 8601 : la semaine contient le jeudi
      const tmp = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
      const dow = (tmp.getUTCDay() + 6) % 7; // 0 = lundi
      tmp.setUTCDate(tmp.getUTCDate() - dow + 3);
      const firstThu = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 4));
      const week = 1 + Math.round(
        ((tmp.getTime() - firstThu.getTime()) / 86400000 - 3 + ((firstThu.getUTCDay() + 6) % 7)) / 7
      );
      return `${tmp.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
    }
    // Mois ISO : YYYY-MM
    function monthKey(dateISO) {
      if (!dateISO) return null;
      return dateISO.slice(0, 7);
    }

    // Décale une date ISO de n jours
    function addDaysISO(dateISO, n) {
      if (!dateISO) return null;
      const d = new Date(dateISO + 'T00:00:00Z');
      if (isNaN(d.getTime())) return null;
      d.setUTCDate(d.getUTCDate() + (n||0));
      return d.toISOString().slice(0, 10);
    }
    // Convertit (date ISO de référence + offset jour + HHMM) en minutes absolues
    // depuis l'epoch UTC (résolution minute). Permet de comparer/soustraire des
    // horaires qui peuvent être sur des jours différents.
    function timeToAbsMinutes(refDateISO, dateOffset, hhmm) {
      if (!refDateISO) return null;
      const min = parseHHMM(hhmm);
      if (min == null) return null;
      const d = new Date(refDateISO + 'T00:00:00Z');
      if (isNaN(d.getTime())) return null;
      const dayMs = 86400000;
      const dayIndex = Math.round(d.getTime() / dayMs);
      return (dayIndex + (dateOffset||0)) * 1440 + min;
    }
    // Calcule un offset jour automatique si une heure est inférieure à la précédente
    // (cas typique vol passant minuit). Sert à la migration douce des données v3.
    function autoDayOffset(prevAbs, currentDateOffset, refDateISO, hhmm) {
      const m = parseHHMM(hhmm);
      if (m == null || prevAbs == null) return currentDateOffset || 0;
      const candidate = timeToAbsMinutes(refDateISO, currentDateOffset||0, hhmm);
      if (candidate >= prevAbs) return currentDateOffset||0;
      // Sinon on incrémente l'offset pour passer au lendemain
      return (currentDateOffset||0) + Math.ceil((prevAbs - candidate) / 1440);
    }

    // Calcule le temps de nuit en minutes : intersection de [Take Off, Landing] (en
     // minutes absolues, gère les offsets jour) avec la fenêtre nocturne [coucher, lever].
     // Si lever < coucher (cas standard), la fenêtre traverse minuit. Renvoie 0 si une
     // donnée manque ou si le calcul ne peut pas être effectué.
    function computeNightTime(refDate, takeOff, takeOffOff, landing, landingOff, sunset, sunrise) {
      const toAbs = timeToAbsMinutes(refDate, takeOffOff||0, takeOff);
      const ldAbs = timeToAbsMinutes(refDate, landingOff||0, landing);
      const ssM = parseHHMM(sunset);
      const srM = parseHHMM(sunrise);
      if (toAbs == null || ldAbs == null || ssM == null || srM == null) return 0;
      if (ldAbs <= toAbs) return 0;
      let total = 0;
      const dayStart = Math.floor(toAbs / 1440) - 1;
      const dayEnd   = Math.floor(ldAbs / 1440) + 1;
      for (let d = dayStart; d <= dayEnd; d++) {
        const winStart = d * 1440 + ssM;
        const winEnd   = srM > ssM ? d * 1440 + srM : (d + 1) * 1440 + srM;
        const interStart = Math.max(winStart, toAbs);
        const interEnd   = Math.min(winEnd,   ldAbs);
        if (interEnd > interStart) total += (interEnd - interStart);
      }
      return total;
    }

    // Valide la séquence Block Out → Take Off → Landing → Block In.
    // Renvoie { errors:[], allFilled:bool } — si errors est non vide, le vol ne peut pas
    // être enregistré tel quel. La logique gère le passage de minuit en se basant sur
    // diffMinutes (qui ajoute 24h si end < start). Les seuils :
    //   - Taxi out (BO→TO) ou taxi in (LD→BI) > 4h = incohérent (probablement saisie inversée)
    //   - Air time (TO→LD) > Flight time (BO→BI) = ordre invraisemblable
    //   - Flight time > 20h = vol unique invraisemblable
    function validateFlightTimes(blockOut, takeOff, landing, blockIn) {
      const bo = parseHHMM(blockOut);
      const to = parseHHMM(takeOff);
      const ld = parseHHMM(landing);
      const bi = parseHHMM(blockIn);
      const errors = [];
      const allFilled = [bo,to,ld,bi].every(v => v != null);
      if (!allFilled) return { errors, allFilled };

      const taxiOut = diffMinutes(blockOut, takeOff);
      const taxiIn  = diffMinutes(landing, blockIn);
      const ftMin   = diffMinutes(blockOut, blockIn);
      const atMin   = diffMinutes(takeOff, landing);

      if (taxiOut != null && taxiOut > 4*60) {
        errors.push(_i18n(
          `Taxi out ${fmtDuration(taxiOut)} > 4h. Vérifie l'ordre Block Out / Take Off.`,
          `Taxi out ${fmtDuration(taxiOut)} > 4h. Check Block Out / Take Off order.`
        ));
      }
      if (taxiIn != null && taxiIn > 4*60) {
        errors.push(_i18n(
          `Taxi in ${fmtDuration(taxiIn)} > 4h. Vérifie l'ordre Landing / Block In.`,
          `Taxi in ${fmtDuration(taxiIn)} > 4h. Check Landing / Block In order.`
        ));
      }
      if (ftMin != null && atMin != null && atMin > ftMin) {
        errors.push(_i18n(
          `Air Time (${fmtDuration(atMin)}) > Flight Time (${fmtDuration(ftMin)}). L'ordre BO → TO → LD → BI n'est pas respecté.`,
          `Air Time (${fmtDuration(atMin)}) > Flight Time (${fmtDuration(ftMin)}). The BO → TO → LD → BI order is incorrect.`
        ));
      }
      if (ftMin != null && ftMin > 20*60) {
        errors.push(_i18n(
          `Flight Time ${fmtDuration(ftMin)} > 20h. Heures probablement incohérentes.`,
          `Flight Time ${fmtDuration(ftMin)} > 20h. Times likely inconsistent.`
        ));
      }
      return { errors, allFilled };
    }

    // Validation des heures avec dates absolues (date du vol + offsets jour par champ).
    // Plus robuste que validateFlightTimes pour les vols passant minuit.
    function validateFlightTimesAbs(flightDate, blockOut, takeOff, landing, blockIn,
                                     boOff, toOff, ldOff, biOff) {
      const t1 = timeToAbsMinutes(flightDate, boOff, blockOut);
      const t2 = timeToAbsMinutes(flightDate, toOff, takeOff);
      const t3 = timeToAbsMinutes(flightDate, ldOff, landing);
      const t4 = timeToAbsMinutes(flightDate, biOff, blockIn);
      const errors = [];
      const allFilled = [t1,t2,t3,t4].every(v => v != null);
      if (!allFilled) return { errors, allFilled, ftMin: null, atMin: null };

      if (t2 < t1) errors.push(_i18n(
        `Take Off (${addDaysISO(flightDate,toOff)} ${blockOut?fmtHHMMZ(takeOff):''}) avant Block Out — utilise les flèches J+1 si le vol passe minuit.`,
        `Take Off (${addDaysISO(flightDate,toOff)} ${blockOut?fmtHHMMZ(takeOff):''}) before Block Out — use D+1 arrows if the flight crosses midnight.`
      ));
      if (t3 < t2) errors.push(_i18n(
        `Landing avant Take Off — vérifie l'ordre / les dates J vs J+1.`,
        `Landing before Take Off — check the order / D vs D+1 dates.`
      ));
      if (t4 < t3) errors.push(_i18n(
        `Block In avant Landing — vérifie l'ordre / les dates J vs J+1.`,
        `Block In before Landing — check the order / D vs D+1 dates.`
      ));
      const ft = t4 - t1, at = t3 - t2, taxiOut = t2 - t1, taxiIn = t4 - t3;
      if (ft > 24*60) errors.push(_i18n(
        `Durée totale ${fmtDuration(ft)} > 24h. Vérifie les dates.`,
        `Total duration ${fmtDuration(ft)} > 24h. Check the dates.`
      ));
      if (taxiOut > 4*60) errors.push(`Taxi out ${fmtDuration(taxiOut)} > 4h.`);
      if (taxiIn > 4*60) errors.push(`Taxi in ${fmtDuration(taxiIn)} > 4h.`);
      if (ft > 20*60) errors.push(_i18n(
        `Flight Time ${fmtDuration(ft)} > 20h. Heures probablement incohérentes.`,
        `Flight Time ${fmtDuration(ft)} > 20h. Times likely inconsistent.`
      ));
      return { errors, allFilled, ftMin: ft, atMin: at, taxiOutMin: taxiOut, taxiInMin: taxiIn };
    }

    // ------------------------------------------------------------------
    // 3) STOCKAGE LOCAL
    // ------------------------------------------------------------------

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        console.warn('Lecture localStorage échouée', e);
        return null;
      }
    }
    function saveState(state) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        return true;
      } catch (e) {
        console.warn('Écriture localStorage échouée (quota ?)', e);
        return false;
      }
    }
    function storageUsageMB() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || '';
        return (raw.length * 2) / (1024*1024); // approx UTF-16
      } catch { return 0; }
    }

    // ------------------------------------------------------------------
    // 4) RECONNAISSANCE DE CATÉGORIE
    // ------------------------------------------------------------------

    function detectCategory(text, categories=DEFAULT_CATEGORIES) {
      if (!text) return 'other';
      const t = text.toLowerCase();
      // On scanne dans l'ordre, et on score
      let best = { id: 'other', score: 0 };
      for (const cat of categories) {
        let score = 0;
        for (const kw of (cat.keywords||[])) {
          if (!kw) continue;
          // mot complet ou inclus
          if (t.includes(kw.toLowerCase())) score += kw.length; // mots plus longs = plus discriminants
        }
        if (score > best.score) best = { id: cat.id, score };
      }
      return best.id;
    }
    // Normalise un nombre en gérant les deux conventions :
    //   FR "1.234,56" (point=milliers, virgule=décimal)
    //   US "1,234.56" (virgule=milliers, point=décimal)
    //   simple "432.50" ou "432,50"
    // Règle : le dernier séparateur ('.' ou ',') est le séparateur décimal.
    function normalizeAmountStr(raw) {
      const s = String(raw).replace(/\s/g, '');
      const lastDot   = s.lastIndexOf('.');
      const lastComma = s.lastIndexOf(',');
      const lastSep   = Math.max(lastDot, lastComma);
      if (lastSep === -1) return parseFloat(s);
      const intPart = s.slice(0, lastSep).replace(/[.,]/g, '');
      const decPart = s.slice(lastSep + 1);
      return parseFloat(intPart + '.' + decPart);
    }
    // extrait un montant approximatif type "1234,56" ou "1234.56" ou "1.234,56"
    function extractAmount(text) {
      if (!text) return null;
      const lines = text.split(/\n/);
      const cand = [];
      for (const line of lines) {
        const isPrio = /total|ttc|montant|amount|due|à payer|a payer/i.test(line);
        const matches = line.match(/(\d{1,3}(?:[ .,]\d{3})*[.,]\d{2}|\d+[.,]\d{2})/g);
        if (matches) {
          for (const m of matches) {
            const num = normalizeAmountStr(m);
            if (!isNaN(num) && num > 0 && num < 1e7) cand.push({ num, prio: isPrio });
          }
        }
      }
      if (!cand.length) return null;
      const prioMax = cand.filter(c=>c.prio).reduce((a,b)=> a==null||b.num>a.num?b:a, null);
      if (prioMax) return prioMax.num;
      return cand.reduce((a,b)=> b.num>a.num?b:a).num;
    }
    // extrait une date type 12/03/2026 ou 2026-03-12
    function extractDate(text) {
      if (!text) return null;
      const m1 = text.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
      if (m1) {
        let [_, d, mo, y] = m1;
        if (y.length === 2) y = '20'+y;
        const dd = String(d).padStart(2,'0');
        const mm = String(mo).padStart(2,'0');
        if (parseInt(mm)>=1 && parseInt(mm)<=12 && parseInt(dd)>=1 && parseInt(dd)<=31) {
          return `${y}-${mm}-${dd}`;
        }
      }
      const m2 = text.match(/(20\d{2})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})/);
      if (m2) {
        const [_, y, mo, d] = m2;
        return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      }
      return null;
    }
    // tente d'extraire un fournisseur : la première ligne non vide, en majuscules ou capitalisée
    function extractSupplier(text) {
      if (!text) return null;
      const lines = text.split(/\n/).map(l=>l.trim()).filter(Boolean);
      for (const line of lines.slice(0, 6)) {
        if (line.length >= 3 && line.length <= 60 && /[A-Za-zÀ-ÿ]/.test(line)) return line;
      }
      return null;
    }

    // ------------------------------------------------------------------
    // 5) IMAGES — REDIMENSIONNEMENT POUR ÉCONOMISER LE STOCKAGE
    // ------------------------------------------------------------------

    function fileToResizedDataURL(file, maxEdge=1100, quality=0.78) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const w = img.width, h = img.height;
            const scale = Math.min(1, maxEdge / Math.max(w, h));
            const cw = Math.round(w*scale), ch = Math.round(h*scale);
            const canvas = document.createElement('canvas');
            canvas.width = cw; canvas.height = ch;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, cw, ch);
            try {
              resolve(canvas.toDataURL('image/jpeg', quality));
            } catch (e) { reject(e); }
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ------------------------------------------------------------------
    // 6) OCR (Tesseract.js, chargé à la demande)
    // ------------------------------------------------------------------

    let tesseractLoading = null;
    function loadTesseract() {
      if (window.Tesseract) return Promise.resolve(window.Tesseract);
      if (tesseractLoading) return tesseractLoading;
      tesseractLoading = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload = () => resolve(window.Tesseract);
        s.onerror = () => reject(new Error('Tesseract non chargé (vérifie ta connexion).'));
        document.head.appendChild(s);
      });
      return tesseractLoading;
    }
    async function ocrImage(dataUrl, lang='fra+eng', onProgress) {
      const T = await loadTesseract();
      const result = await T.recognize(dataUrl, lang, {
        logger: (m) => { if (onProgress && m.status) onProgress(m); }
      });
      return result.data.text || '';
    }

    // ------------------------------------------------------------------
    // 7) HORLOGE ZULU GLOBALE
    // ------------------------------------------------------------------

    // Horloge du header.
    // - Affichage par défaut : heure Zulu (UTC) en HH:MM:SSZ.
    // - Au clic : bascule en heure locale (HH:MM:SS) pendant 4 secondes,
    //   puis revient automatiquement en Zulu. Label "LOCAL" affiché aussi.
    // L'heure locale vient du device — aucune connexion réseau requise.
    function ZuluClock({ onModeChange }) {
      const [showLocal, setShowLocal] = useState(false);
      const [t, setT] = useState(nowZulu());
      // Tick chaque seconde dans le mode courant
      useEffect(() => {
        function tick() {
          if (showLocal) {
            const d = new Date();
            const hh = String(d.getHours()).padStart(2,'0');
            const mm = String(d.getMinutes()).padStart(2,'0');
            const ss = String(d.getSeconds()).padStart(2,'0');
            setT(`${hh}:${mm}:${ss}`);
          } else {
            setT(nowZulu());
          }
        }
        tick(); // immédiat (sinon transition affiche la valeur d'avant 1s)
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [showLocal]);
      // Notifie le parent du mode pour qu'il puisse changer le label "ZULU"/"LOCAL"
      useEffect(() => { if (onModeChange) onModeChange(showLocal ? 'local' : 'zulu'); }, [showLocal, onModeChange]);
      // Au clic : repasser en local 4 secondes puis revert
      function flashLocal() {
        setShowLocal(true);
        setTimeout(() => setShowLocal(false), 4000);
      }
      return (
        <button type="button" onClick={flashLocal}
          title={showLocal ? 'Heure locale (revient à Zulu dans quelques secondes)' : 'Cliquer pour afficher l\'heure locale 4s'}
          className="font-mono tabular-nums leading-none cursor-pointer transition-colors"
          style={{ color: showLocal ? 'var(--accent)' : 'inherit' }}>
          {t}
        </button>
      );
    }
    // Wrapper qui gère le label dynamique "ZULU" / "LOCAL"
    function ClockBlock({ zuluLabel }) {
      const [clockMode, setClockMode] = useState('zulu');
      return (
        <div className="text-right">
          <div className="text-xs" style={{ color: clockMode === 'local' ? 'var(--accent)' : 'var(--text-dim)' }}>
            {clockMode === 'local' ? 'LOCAL' : zuluLabel}
          </div>
          <div className="text-base"><ZuluClock onModeChange={setClockMode} /></div>
        </div>
      );
    }

    function LucideIcon({ name, size = 20, strokeWidth = 2 }) {
      const path = LUCIDE_ICONS[name];
      if (!path) return null;
      // Chaque "M..." démarre un sous-chemin, on les rend dans des <path> séparés
      const subs = path.split(' M').map((p, i) => i === 0 ? p : 'M' + p);
      return (
        <svg width={size} height={size} viewBox="0 0 24 24"
             fill="none" stroke="currentColor" strokeWidth={strokeWidth}
             strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          {subs.map((d, i) => <path key={i} d={d} />)}
        </svg>
      );
    }
    // ------------------------------------------------------------------
    // FlagIcon : drapeau rond (FR ou EN/UK), rendu en SVG inline.
    // Utilisé dans le sélecteur de langue du header pour identifier
    // visuellement la langue active. Aucun emoji (rendu inégal selon OS).
    // ------------------------------------------------------------------
    function FlagIcon({ code, size = 22 }) {
      const id = 'flag-clip-' + code + '-' + size;
      if (code === 'fr') {
        return (
          <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
            <defs><clipPath id={id}><circle cx="12" cy="12" r="11"/></clipPath></defs>
            <g clipPath={`url(#${id})`}>
              <rect x="0"  y="0" width="8"  height="24" fill="#0055A4"/>
              <rect x="8"  y="0" width="8"  height="24" fill="#FFFFFF"/>
              <rect x="16" y="0" width="8"  height="24" fill="#EF4135"/>
            </g>
            <circle cx="12" cy="12" r="11" fill="none" stroke="rgba(255,255,255,0.45)" strokeWidth="1"/>
          </svg>
        );
      }
      // EN → drapeau américain (US flag) : 7 bandes rouges + 6 blanches + canton bleu étoilé.
      return (
        <svg viewBox="0 0 24 24" width={size} height={size} aria-hidden="true">
          <defs><clipPath id={id}><circle cx="12" cy="12" r="11"/></clipPath></defs>
          <g clipPath={`url(#${id})`}>
            {/* fond rouge (les 7 bandes rouges sont obtenues en peignant rouge puis blanc dessus) */}
            <rect x="0" y="0" width="24" height="24" fill="#B22234"/>
            {/* 6 bandes blanches */}
            <rect x="0" y="2.77"  width="24" height="1.85" fill="#FFFFFF"/>
            <rect x="0" y="6.46"  width="24" height="1.85" fill="#FFFFFF"/>
            <rect x="0" y="10.15" width="24" height="1.85" fill="#FFFFFF"/>
            <rect x="0" y="13.84" width="24" height="1.85" fill="#FFFFFF"/>
            <rect x="0" y="17.54" width="24" height="1.85" fill="#FFFFFF"/>
            <rect x="0" y="21.23" width="24" height="1.85" fill="#FFFFFF"/>
            {/* canton bleu (recouvre les 7 premières bandes) */}
            <rect x="0" y="0" width="10" height="12.92" fill="#3C3B6E"/>
            {/* étoiles simplifiées en grille (points blancs) */}
            <g fill="#FFFFFF">
              <circle cx="1.7" cy="2"    r="0.45"/>
              <circle cx="3.7" cy="2"    r="0.45"/>
              <circle cx="5.7" cy="2"    r="0.45"/>

              <circle cx="5.7" cy="6"    r="0.45"/>
              <circle cx="7.7" cy="6"    r="0.45"/>
              <circle cx="2.7" cy="8"    r="0.45"/>
              <circle cx="4.7" cy="8"    r="0.45"/>
              <circle cx="6.7" cy="8"    r="0.45"/>
              <circle cx="1.7" cy="10"   r="0.45"/>

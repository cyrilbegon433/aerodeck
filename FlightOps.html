    function DocumentForm({ initial, aircraft, categories, pilots = [], onSave, onCancel }) {
      const { lang } = React.useContext(I18nContext);
      const tx = useTx();
      const blank = {
        id: null,
        date: todayZuluDate(),
        supplier: '',
        amount: '',            // TTC (toujours présent — anciennes dépenses : amount = TTC)
        amountHT: '',          // HT (optionnel ; vide pour les dépenses legacy)
        amountTax: '',         // Taxe(s) (optionnel ; vide pour les dépenses legacy)
        currency: 'EUR',
        // Override comptable du montant converti dans la devise utilisateur.
        // Permet de saisir le montant exact prélevé sur la carte (incluant les
        // frais bancaires, la marge change), au lieu du taux de marché Frankfurter.
        // Si null/vide → calcul automatique au taux du jour.
        convertedAmountOverride: '',
        // Devise figée au moment de l'override (cohérence comptable si l'utilisateur
        // change settings.defaultCurrency plus tard, l'override reste rattaché à
        // la devise d'origine pour ne pas être mal interprété).
        convertedCurrencyAtOverride: '',
        categoryId: 'other',
        aircraftId: '',
        pilotId: '',           // pilote rattaché à la dépense (optionnel)
        thumbnail: '',         // dataURL JPEG (ancien champ, conservé pour rétrocompat)
        ocrText: '',           // legacy : ancien OCR (conservé pour anciens docs)
        fileName: '',
        mime: '',              // 'image/jpeg' ou 'application/pdf'
        dataUrl: '',           // image redimensionnée OU PDF complet
        notes: '',
        addedAt: Date.now(),
      };
      const [d, setD] = useState({ ...blank, ...(initial||{}) });
      const cameraRef = useRef(null);
      const filesRef  = useRef(null);
      const [menuOpen, setMenuOpen] = useState(false);
      const [busy, setBusy] = useState(false);
      const [viewing, setViewing] = useState(false);

      // Devise cible utilisateur (depuis settings) — utilisée pour afficher le
      // taux de change appliqué quand la devise de la facture diffère.
      // Le montant saisi en devise d'origine est conservé tel quel ;
      // la conversion sert au total et peut être ajustée manuellement
      // (override comptable pour coller au prélèvement bancaire réel).
      const targetCurrency = ((getSettings().defaultCurrency || 'CAD')).toUpperCase();
      const [fxInfo, setFxInfo] = useState(null); // { rate, date, from, to, source } | null
      const [fxBusy, setFxBusy] = useState(false);
      const [showOverrideEditor, setShowOverrideEditor] = useState(false);

      useEffect(() => {
        let cancelled = false;
        const cur = (d.currency || '').toUpperCase();
        if (!cur || cur === targetCurrency) {
          setFxInfo(null);
          setFxBusy(false);
          return;
        }
        const date = d.date || todayZuluDate();
        // 1) Affichage instantané depuis le cache local (taux historique pour
        //    cette date OU dernier taux connu pour la paire).
        //    `sourceDate` = la VRAIE date du taux retourné par Frankfurter
        //    (peut être un jour ouvré antérieur si la date demandée est un
        //    week-end ou jour férié).
        const cachedHit = getFxRateCached(date, cur, targetCurrency);
        if (cachedHit) {
          setFxInfo({ rate: cachedHit.rate, requestedDate: date, from: cur, to: targetCurrency,
                      source: cachedHit.source, sourceDate: cachedHit.sourceDate || null });
        }
        // 2) Fetch détaillé en arrière-plan : on récupère AUSSI la date que
        //    Frankfurter a réellement utilisée pour le taux. Si la date
        //    demandée est un week-end, Frankfurter renvoie le vendredi
        //    précédent — on l'affiche tel quel pour transparence comptable.
        setFxBusy(true);
        (async () => {
          try {
            const r = await getFxRateDetailed(date, cur, targetCurrency);
            if (cancelled) return;
            if (r != null && r.rate > 0) {
              setFxInfo({ rate: r.rate, requestedDate: date, from: cur, to: targetCurrency,
                          source: r.source, sourceDate: r.sourceDate || date });
            } else if (!cachedHit) {
              setFxInfo({ rate: null, requestedDate: date, from: cur, to: targetCurrency, source: 'none', sourceDate: null });
            }
          } catch {
            if (!cancelled && !cachedHit) setFxInfo({ rate: null, requestedDate: date, from: cur, to: targetCurrency, source: 'none', sourceDate: null });
          } finally {
            if (!cancelled) setFxBusy(false);
          }
        })();
        return () => { cancelled = true; };
      }, [d.currency, d.date, targetCurrency]);

      // Helpers pour l'override comptable du montant converti.
      const hasOverride = d.convertedAmountOverride !== '' && d.convertedAmountOverride != null
                          && parseFloat(d.convertedAmountOverride) > 0
                          && (d.convertedCurrencyAtOverride || targetCurrency) === targetCurrency;
      const autoConvertedAmount = (fxInfo && fxInfo.rate != null && parseFloat(d.amount) > 0)
                                    ? parseFloat(d.amount) * fxInfo.rate : null;
      function applyOverride(value) {
        const num = parseFloat(value);
        if (isNaN(num) || num <= 0) {
          setD(p => ({ ...p, convertedAmountOverride: '', convertedCurrencyAtOverride: '' }));
        } else {
          setD(p => ({ ...p, convertedAmountOverride: String(num), convertedCurrencyAtOverride: targetCurrency }));
        }
      }
      function resetOverride() {
        setD(p => ({ ...p, convertedAmountOverride: '', convertedCurrencyAtOverride: '' }));
        setShowOverrideEditor(false);
      }

      function set(k,v){ setD(p=>({...p,[k]:v})); }

      // Ajout / remplacement d'un fichier (image ou PDF) — même pattern que les
      // documents de vol (W&B/FPL/OFPL) ou les factures fuel. Plus d'OCR : la
      // saisie des champs (date, montant, fournisseur, catégorie) est manuelle.
      async function handleFiles(e) {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (!file) return;
        setBusy(true);
        try {
          const stored = await fileToStoredDoc(file, d.categoryId);
          setD(prev => ({
            ...prev,
            thumbnail: stored.mime === 'application/pdf' ? '' : stored.dataUrl,
            fileName: stored.fileName,
            mime: stored.mime,
            dataUrl: stored.dataUrl,
          }));
        } catch (err) {
          alert(tx('Import : ','Import: ') + err.message);
        } finally {
          setBusy(false);
        }
      }
      function triggerCamera() { setMenuOpen(false); setTimeout(() => cameraRef.current?.click(), 0); }
      function triggerFiles()  { setMenuOpen(false); setTimeout(() => filesRef.current?.click(), 0); }
      function removeFile() {
        if (!confirmDelete(tx('Retirer le fichier joint à cette dépense ?','Remove the file attached to this expense?'))) return;
        setD(prev => ({ ...prev, thumbnail: '', fileName: '', mime: '', dataUrl: '' }));
      }
      const hasFile = !!(d.dataUrl || d.thumbnail);
      const isPdf = d.mime === 'application/pdf';
      // État archivé : flag posé par archiveAndFreeDocuments. Le binaire est dans le ZIP.
      const isArchived = !!d.archived || (!hasFile && !!d.archivedAt && !!d.fileName);

      return (
        <div className="space-y-3">
          <div className="card p-3">
            <div className="label">{tx('Pièce jointe (facture, ticket…)','Attachment (invoice, receipt…)')}</div>
            {isArchived ? (
              /* Encart vert "OK archivé" : binaire dans le ZIP, métadonnées préservées */
              <div className="flex items-center gap-2 bg-[var(--ok)]/10 border border-[var(--ok)]/40 p-2 rounded-lg">
                <div className="flex-1 min-w-0 text-xs">
                  <div className="truncate font-semibold text-[var(--ok)]">✓ OK archivé</div>
                  <div className="truncate text-[var(--text-dim)]">{d.fileName || 'Pièce jointe'}</div>
                </div>
                <button type="button" className="btn btn-danger !py-1 !px-2 text-xs"
                  onClick={()=>{
                    if (!confirmDelete(tx('Retirer la référence à ce fichier archivé ?','Remove the reference to this archived file?'))) return;
                    setD(prev => ({ ...prev, thumbnail:'', dataUrl:'', fileName:'', mime:'', archived: false }));
                  }}><span className="inline-flex items-center gap-1"><LucideIcon name="trash2" size={12} strokeWidth={2.5} />Retirer</span></button>
              </div>
            ) : hasFile ? (
              <div className="space-y-2">
                {/* Rangée DocRow style : aperçu + nom + Ouvrir + Retirer */}
                <div className="flex items-center gap-2 bg-[var(--bg-card)] p-2 rounded-lg">
                  {isPdf ? (
                    <div className="w-12 h-12 grid place-items-center bg-[var(--bg-elev)] rounded text-2xl flex-shrink-0">📄</div>
                  ) : (
                    <img src={d.thumbnail || d.dataUrl} alt="" className="w-12 h-12 object-cover rounded flex-shrink-0" />
                  )}
                  <div className="flex-1 min-w-0 text-xs">
                    <div className="truncate font-medium">{d.fileName || 'Pièce jointe'}</div>
                    <div className="truncate text-[var(--text-dim)]">✓ Rattachée</div>
                  </div>
                  <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs"
                    onClick={()=>setViewing(true)}>Ouvrir</button>
                  <button type="button" className="btn btn-danger !py-1 !px-2 text-xs"
                    onClick={removeFile}><span className="inline-flex items-center gap-1"><LucideIcon name="trash2" size={12} strokeWidth={2.5} />{tx('Retirer','Remove')}</span></button>
                </div>
                {/* Bouton Remplacer optionnel */}
                <div className="relative inline-block">
                  <button type="button" className="btn btn-secondary !py-1 !px-3 text-xs" disabled={busy}
                    onClick={()=>setMenuOpen(o=>!o)}>
                    {busy ? tx('Import…','Import…') : tx('🔁 Remplacer','🔁 Replace')}
                  </button>
                  {menuOpen && (
                    <>
                      <div className="fixed inset-0 z-20" onClick={()=>setMenuOpen(false)} />
                      <div className="absolute left-0 top-full mt-1 z-30 card p-2 min-w-[230px] anim-pop">
                        <button type="button" className="btn btn-secondary w-full mb-1 justify-start" onClick={triggerCamera}>
                          <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />{tx("Scanner avec l'appareil photo",'Scan with camera')}</span>
                        </button>
                        <button type="button" className="btn btn-secondary w-full justify-start" onClick={triggerFiles}>
                          <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />{tx('Importer un fichier (image ou PDF)','Import a file (image or PDF)')}</span>
                        </button>
                      </div>
                    </>
                  )}
                </div>
              </div>
            ) : (
              <div className="relative inline-block">
                <button type="button" className="btn btn-primary" disabled={busy}
                  onClick={()=>setMenuOpen(o=>!o)}>
                  {busy ? 'Import…' : '🧾 + Ajouter une facture'}
                </button>
                {menuOpen && (
                  <>
                    <div className="fixed inset-0 z-20" onClick={()=>setMenuOpen(false)} />
                    <div className="absolute left-0 top-full mt-1 z-30 card p-2 min-w-[230px] anim-pop">
                      <button type="button" className="btn btn-secondary w-full mb-1 justify-start" onClick={triggerCamera}>
                        <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />{tx("Scanner avec l'appareil photo",'Scan with camera')}</span>
                      </button>
                      <button type="button" className="btn btn-secondary w-full justify-start" onClick={triggerFiles}>
                        <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />{tx('Importer un fichier (image ou PDF)','Import a file (image or PDF)')}</span>
                      </button>
                    </div>
                  </>
                )}
                <div className="text-xs text-[var(--text-dim)] mt-2">Optionnel — tu peux enregistrer la dépense sans facture.</div>
              </div>
            )}
            {/* Note : on retire `capture="environment"` pour permettre à iOS d'afficher
                le sélecteur natif avec "Scan Documents" + caméra + galerie. Sur Android,

            <input ref={cameraRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={handleFiles} />
            <input ref={filesRef}  type="file" accept="image/*,application/pdf" className="hidden" onChange={handleFiles} />
          </div>

          {/* Visionneuse plein écran pour ouvrir le fichier */}
          {viewing && hasFile && (
            <DocViewer
              doc={{
                dataUrl: d.dataUrl || d.thumbnail,
                fileName: d.fileName || 'Facture',

            />

          {/* Mobile : Fournisseur passe sous la Date (le picker date natif iOS est large
              et rognait le champ Fournisseur). Desktop : 2 colonnes côte à côte. */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <div className="label whitespace-nowrap">{tx('Date','Date')}</div>
              <input type="date" className="input" value={d.date} onChange={e=>{ if (e.target.value) set('date', e.target.value); }} />

            <div>
              <div className="label whitespace-nowrap">{tx('Fournisseur','Supplier')}</div>

            </div>
          </div>
          {/* HT + Taxe + TTC : si HT ou Taxe est saisi, TTC se calcule automatiquement

              les anciennes dépenses qui n'avaient qu'un seul champ Montant). */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div>
              <div className="label">{tx('HT','Excl. tax')}</div>
              <input type="number" step="0.01" className="input" placeholder="0.00" value={d.amountHT}
                onChange={e=>{
                  const ht = e.target.value;
                  setD(p => {
                    const tax = parseFloat(p.amountTax) || 0;
                    const htNum = parseFloat(ht) || 0;
                    const ttc = ht === '' && !p.amountTax ? p.amount : (htNum + tax).toFixed(2);

            <div>
              <div className="label">{tx('Taxe(s)','Tax')}</div>
              <input type="number" step="0.01" className="input" placeholder="0.00" value={d.amountTax}
                onChange={e=>{
                  const tax = e.target.value;
                  setD(p => {
                    const ht = parseFloat(p.amountHT) || 0;
                    const taxNum = parseFloat(tax) || 0;
                    const ttc = tax === '' && !p.amountHT ? p.amount : (ht + taxNum).toFixed(2);
                    return { ...p, amountTax: tax, amount: ttc };

            </div>
            <div>
              <div className="label">TTC</div>
              <input type="number" step="0.01" className="input font-semibold" placeholder="0.00"
                value={d.amount}
                onChange={e=>set('amount', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Devise','Currency')}</div>
              <select className="select" value={d.currency} onChange={e=>set('currency', e.target.value)}>
                <option>EUR</option><option>USD</option><option>GBP</option><option>CHF</option><option>CAD</option>
              </select>
              {/* === Bloc taux de change + ajustement manuel ===
                  Affiché uniquement si la devise de la facture diffère de la
                  devise utilisateur (settings.defaultCurrency).
                  - Affiche le taux source (live, cache, last-known, fallback)
                  - Calcule un montant converti automatique
                  - Permet un override pour saisir le montant exact prélevé sur
                    la carte (frais bancaires, marge change incluses)
                  Design moderne : capsule discrète, pencil-icon Ajuster. */}
              {(d.currency || '').toUpperCase() !== targetCurrency && (
                <div className="mt-2 rounded-lg border border-[var(--border)] bg-[var(--bg-card-2)] px-2.5 py-2 space-y-1">
                  {/* Ligne 1 : date du taux (mise en avant) + taux + source */}
                  <div className="flex items-center justify-between gap-2 text-[10px]">
                    {fxInfo && fxInfo.rate != null ? (
                      <span className="text-[var(--text-dim)] truncate">
                        <span className="font-semibold">{tx('Taux du','Rate of')} {fxInfo.sourceDate || fxInfo.requestedDate}</span>
                        <span className="mx-1">·</span>
                        <span className="font-mono text-[var(--accent)]">1 {fxInfo.from} = {fxInfo.rate.toFixed(4)} {fxInfo.to}</span>
                        {/* Indication discrète de la source / fiabilité */}
                        <span className="ml-1.5 opacity-70">
                          {fxInfo.source === 'historic-live' && tx('· officiel','· official')}
                          {fxInfo.source === 'historic-cache' && tx('· en cache','· cached')}
                          {fxInfo.source === 'latest-live' && tx('· dernier dispo','· latest avail.')}
                          {fxInfo.source === 'last-known' && tx('· offline','· offline')}
                          {fxInfo.source === 'static-fallback' && tx('· secours','· fallback')}
                        </span>
                        {/* Si la date du taux ≠ la date de la facture (week-end / fallback),
                            on l'indique explicitement pour la transparence comptable */}
                        {fxInfo.sourceDate && fxInfo.requestedDate && fxInfo.sourceDate !== fxInfo.requestedDate && (
                          <span className="block text-[9px] text-[var(--warn)] mt-0.5">
                            ⚠ {tx(`Facture du ${fxInfo.requestedDate} (week-end / férié) : taux du jour ouvré le plus proche utilisé.`,`Invoice dated ${fxInfo.requestedDate} (weekend/holiday): nearest business-day rate used.`)}
                          </span>
                        )}
                      </span>
                    ) : fxBusy ? (
                      <span className="text-[var(--text-dim)] italic">{tx('Récupération du taux…','Fetching rate…')}</span>
                    ) : (
                      <span className="text-[var(--warn)]">⚠ {tx('Taux indisponible','Rate unavailable')}</span>
                    )}
                    {fxBusy && fxInfo && (
                      <span className="text-[8px] uppercase tracking-wider text-[var(--text-dim)] opacity-60 flex-shrink-0">{tx('maj…','sync…')}</span>
                    )}
                  </div>
                  {/* Ligne 2 : montant converti (auto OU override) + bouton ajuster */}
                  {parseFloat(d.amount) > 0 && (
                    <div className="flex items-center justify-between gap-2">
                      <div className="flex items-baseline gap-1.5 min-w-0">
                        {hasOverride ? (
                          <>
                            <span className="text-[10px] text-[var(--text-dim)]">{tx('Montant comptable','Booked amount')} :</span>
                            <span className="font-mono tabular-nums text-sm font-semibold" style={{ color: 'var(--ok)' }}>
                              {parseFloat(d.convertedAmountOverride).toFixed(2)} {targetCurrency}
                            </span>
                            {autoConvertedAmount != null && (
                              <span className="text-[9px] text-[var(--text-dim)] italic truncate">
                                ({tx('auto','auto')} ≈ {autoConvertedAmount.toFixed(2)})
                              </span>
                            )}
                          </>
                        ) : autoConvertedAmount != null ? (
                          <>
                            <span className="text-[10px] text-[var(--text-dim)]">≈</span>
                            <span className="font-mono tabular-nums text-sm font-semibold text-[var(--accent)]">
                              {autoConvertedAmount.toFixed(2)} {targetCurrency}
                            </span>
                          </>
                        ) : (
                          <span className="text-[10px] text-[var(--text-dim)] italic">{tx('— pas de taux —','— no rate —')}</span>
                        )}
                      </div>
                      {!showOverrideEditor && (
                        <button type="button"
                          onClick={()=>setShowOverrideEditor(true)}
                          className="text-[10px] px-2 py-0.5 rounded-md border border-[var(--border)] hover:border-[var(--accent)] hover:text-[var(--accent)] transition-colors flex items-center gap-1 flex-shrink-0"
                          title={tx('Saisir le montant exact prélevé (frais bancaires inclus)','Enter the exact amount charged (bank fees included)')}>
                          <LucideIcon name="edit3" size={10} strokeWidth={2.25} />
                          {hasOverride ? tx('Modifier','Edit') : tx('Ajuster','Adjust')}
                        </button>
                      )}
                    </div>
                  )}
                  {/* Ligne 3 (déployée) : input pour saisir le montant comptable */}
                  {showOverrideEditor && parseFloat(d.amount) > 0 && (
                    <div className="pt-1.5 mt-1 border-t border-[var(--border)] space-y-1.5 anim-pop">
                      <div className="text-[9px] uppercase tracking-wider text-[var(--text-dim)] font-semibold">
                        {tx('Montant réel prélevé','Actual amount charged')} ({targetCurrency})
                      </div>
                      <div className="flex items-center gap-1.5">
                        <input type="number" step="0.01" min="0"
                          className="input !py-1 !px-2 text-sm font-mono flex-1"
                          placeholder={autoConvertedAmount != null ? autoConvertedAmount.toFixed(2) : '0.00'}
                          value={d.convertedAmountOverride}
                          onChange={e=>setD(p=>({ ...p, convertedAmountOverride: e.target.value, convertedCurrencyAtOverride: e.target.value ? targetCurrency : '' }))}
                          autoFocus
                        />
                        <button type="button"
                          onClick={()=>setShowOverrideEditor(false)}
                          className="btn btn-secondary !py-1 !px-2 text-xs">
                          {tx('OK','OK')}
                        </button>
                        {hasOverride && (
                          <button type="button"
                            onClick={resetOverride}
                            className="btn !py-1 !px-2 text-xs border border-[var(--border)] hover:border-[var(--warn)] hover:text-[var(--warn)]"
                            title={tx('Revenir au taux automatique','Revert to automatic rate')}>
                            <LucideIcon name="rotateCcw" size={10} strokeWidth={2.25} />
                          </button>
                        )}
                      </div>
                      <div className="text-[9px] text-[var(--text-dim)] leading-tight">
                        {tx('Saisissez le montant exact débité de la carte (frais bancaires + marge change inclus). Utilisé pour les totaux comptables.','Enter the exact amount debited from the card (bank fees + FX margin included). Used for accounting totals.')}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label whitespace-nowrap">{tx('Catégorie','Category')}</div>
              <select className="select" value={d.categoryId} onChange={e=>set('categoryId', e.target.value)}>
                {categories.map(c => <option key={c.id} value={c.id}>{c.icon} {categoryDisplayName(c, lang)}</option>)}
              </select>
            </div>
            <div>
              <div className="label whitespace-nowrap">{tx('Avion','Aircraft')} <span className="normal-case tracking-normal opacity-70">{tx('(opt.)','(opt.)')}</span></div>
              <select className="select" value={d.aircraftId} onChange={e=>set('aircraftId', e.target.value)}>
                <option value="">{tx('— aucun —','— none —')}</option>
                {aircraft.map(a => <option key={a.id} value={a.id}>{a.kind==='simulator'?'🕹️ ':''}{a.registration}</option>)}
              </select>
            </div>
          </div>
          <div>
            <div className="label whitespace-nowrap">{tx('Pilote','Pilot')} <span className="normal-case tracking-normal opacity-70">{tx('(opt.)','(opt.)')}</span></div>
            <select className="select" value={d.pilotId||''} onChange={e=>set('pilotId', e.target.value)}>
              <option value="">{tx('— aucun —','— none —')}</option>
              {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
            </select>
          </div>
          <div>
            <div className="label">{tx('Notes','Notes')}</div>
            <textarea className="textarea" rows={2} value={d.notes} onChange={e=>set('notes', e.target.value)} />
          </div>

          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>{tx('Annuler','Cancel')}</button>
            <button className="btn btn-primary" onClick={()=>{
              onSave({ ...d, id: d.id || 'doc_'+Date.now() });
            }}>{tx('Enregistrer','Save')}</button>
          </div>
        </div>
      );
    }

    function DocumentsScreen({ documents, aircraft, categories, pilots = [], flights = [], mechanicVisits = [], onAddOrUpdate, onDelete, onOpenMaintenanceTab }) {
      const t = useT();
      const tx = useTx();
      const { lang } = React.useContext(I18nContext);
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const [filterCat, setFilterCat] = useState('all');
      const [filterSupplier, setFilterSupplier] = useState('');
      const [sort, setSort] = useState('date_desc'); // date_desc | date_asc | amount_desc | supplier
      // Mobile-only : repli des filtres date + grille factures pour focus sur breakdown
      const [showCardsAndDates, setShowCardsAndDates] = useState(true);
      // Menu déroulant pour l'export (ZIP / CSV / etc.)
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      const [exportMenuPos, setExportMenuPos] = useState(null); // {top, left} fixed coords
      const exportMenuRef = useRef(null);
      const exportButtonRef = useRef(null);
      // Calcule la position du menu en fixed coords, bornée à l'écran.
      function openExportMenu() {
        if (exportButtonRef.current) {
          const r = exportButtonRef.current.getBoundingClientRect();
          const menuW = 288;     // 18rem cap
          const margin = 8;
          const screenW = window.innerWidth;
          // Anchor right edge to button right by default
          let left = r.right - menuW;
          // Clamp à gauche
          if (left < margin) left = margin;
          // Clamp à droite (rare)
          if (left + menuW > screenW - margin) left = screenW - menuW - margin;
          setExportMenuPos({ top: r.bottom + 8, left });
        }
        setExportMenuOpen(true);
      }
      useEffect(() => {
        if (!exportMenuOpen) return;
        function handler(e) {
          if (exportMenuRef.current && !exportMenuRef.current.contains(e.target) &&
              exportButtonRef.current && !exportButtonRef.current.contains(e.target)) {
            setExportMenuOpen(false);
          }
        }
        function onScrollOrResize() { setExportMenuOpen(false); }
        document.addEventListener('mousedown', handler);
        window.addEventListener('scroll', onScrollOrResize, true);
        window.addEventListener('resize', onScrollOrResize);
        return () => {
          document.removeEventListener('mousedown', handler);
          window.removeEventListener('scroll', onScrollOrResize, true);
          window.removeEventListener('resize', onScrollOrResize);
        };
      }, [exportMenuOpen]);
      // Date de la dernière export (stockée en localStorage). Sert à n'inclure que
      // les nouveaux documents lors d'une export incrémentale.
      function getLastExportDate() {
        try { return localStorage.getItem('expenseExportLastDate') || ''; } catch { return ''; }
      }
      function setLastExportDate(iso) {
        try { localStorage.setItem('expenseExportLastDate', iso); } catch {}
      }
      const lastExportDate = getLastExportDate();
      // Filtres avancés (apparaissent quand une catégorie est sélectionnée)
      const now = new Date();
      const [filterYear, setFilterYear] = useState(0);   // 0 = toutes années
      const [filterMonth, setFilterMonth] = useState(0); // 0 = tous mois
      const [filterDate, setFilterDate] = useState('');  // date précise (ISO YYYY-MM-DD)
      const [filterAircraft, setFilterAircraft] = useState('all');
      const [filterPilot, setFilterPilot] = useState('all');

      // La catégorie sélectionnée détermine si le filtre avion a du sens
      const selectedCat = filterCat !== 'all' ? categories.find(c => c.id === filterCat) : null;
      const isAircraftCategory = selectedCat?.group === 'Aéronef';

      // Visites mécanicien → docs virtuels en catégorie 'mechanic_visit'.
      // Une visite avec N avions cochés génère N docs virtuels (montant réparti).
      // includeInOpex = false → on EXCLUT du flux Dépenses (totaux + listes).
      const mechanicVirtualDocs = useMemo(() => {
        const out = [];
        for (const v of (mechanicVisits || [])) {
          if (v.includeInOpex === false) continue;
          const acIds = Array.isArray(v.aircraftIds) ? v.aircraftIds.filter(Boolean) : [];
          if (acIds.length === 0) continue;
          const total = parseFloat(v.amount) || 0;
          if (total <= 0) continue;
          const split = total / acIds.length;
          for (const acId of acIds) {
            out.push({
              id: 'mvdoc_' + v.id + '_' + acId,
              date: v.date || '',
              supplier: v.mechanic || tx('Mécanicien','Mechanic'),
              amount: split,
              currency: v.currency || 'EUR',
              categoryId: 'mechanic_visit',
              aircraftId: acId,
              notes: v.notes || '',
              isMechanicVisit: true,        // flag pour reconnaître à l'édition
              sourceMechanicVisitId: v.id,
              addedAt: v.addedAt || 0,
            });
          }
        }
        return out;
      }, [mechanicVisits]);

      // Pool de documents global (réels + virtuels mécanicien) pour totaux/filtrage
      const documentsAll = useMemo(() => [...documents, ...mechanicVirtualDocs], [documents, mechanicVirtualDocs]);

      const filtered = useMemo(() => {
        let arr = [...documentsAll];
        if (filterCat !== 'all') arr = arr.filter(d => d.categoryId === filterCat);
        if (filterSupplier.trim()) {
          const q = filterSupplier.toLowerCase();
          arr = arr.filter(d => (d.supplier||'').toLowerCase().includes(q));
        }
        // Date précise (a la priorité sur année/mois)
        if (filterDate) {
          arr = arr.filter(d => d.date === filterDate);
        } else {
          if (filterYear > 0) {
            arr = arr.filter(d => (d.date||'').startsWith(String(filterYear)));
          }
          if (filterMonth > 0) {
            const mm = String(filterMonth).padStart(2,'0');
            arr = arr.filter(d => {
              const m = (d.date||'').split('-')[1];
              return m === mm;
            });
          }
        }
        if (filterAircraft !== 'all') {
          arr = arr.filter(d => (d.aircraftId||'') === (filterAircraft === 'none' ? '' : filterAircraft));
        }
        if (filterPilot !== 'all') {
          arr = arr.filter(d => (d.pilotId||'') === (filterPilot === 'none' ? '' : filterPilot));
        }
        arr.sort((a,b) => {
          if (sort === 'date_desc') return (b.date||'').localeCompare(a.date||'');
          if (sort === 'date_asc')  return (a.date||'').localeCompare(b.date||'');
          if (sort === 'amount_desc') return (parseFloat(b.amount||0) - parseFloat(a.amount||0));
          if (sort === 'supplier') return (a.supplier||'').localeCompare(b.supplier||'');
          return 0;
        });
        return arr;
      }, [documentsAll, filterCat, filterSupplier, sort, filterYear, filterMonth, filterDate, filterAircraft, filterPilot]);

      // Total filtré (pour le panneau récap)
      const filteredTotal = useMemo(() => filtered.reduce((s,d) => s + (parseFloat(d.amount)||0), 0), [filtered]);

      // === Conversion vers la devise utilisateur (settings.defaultCurrency) ===
      // Convertit chaque facture/visite à la date qui lui est propre.
      // Cache local pour éviter de re-fetch les mêmes paires (date, devise).
      // Affiche pendant le chargement, met à jour quand tous les taux sont prêts.
      // Si un taux est introuvable (offline + pas en cache), on additionne le montant brut
      // et on incrémente missingCount pour le signaler.
      // Conserve les noms cadFiltered/cadGrand pour compatibilité interne, mais
      // la cible n'est plus forcément CAD : c'est settings.defaultCurrency.
      const targetCurrency = ((getSettings().defaultCurrency || 'CAD')).toUpperCase();
      const [cadFiltered, setCadFiltered] = useState(null);
      const [cadGrand,    setCadGrand]    = useState(null);
      const [fxLoading,   setFxLoading]   = useState(false);
      const [fxMissing,   setFxMissing]   = useState(0);

      useEffect(() => {
        let cancelled = false;
        // 1) Récupère TOUTES les paires (date, devise) uniques nécessaires en une passe.
        //    Évite N appels séquentiels : on dédoublonne et on fetch en parallèle.
        async function ensureRates(lists) {
          const pairs = new Set();
          for (const list of lists) {
            for (const d of list) {
              const cur = (d.currency || targetCurrency).toUpperCase();
              if (cur === targetCurrency) continue;
              const date = d.date || todayZuluDate();
              pairs.add(`${date}|${cur}`);
            }
          }
          const map = new Map();
          await Promise.all([...pairs].map(async (key) => {
            const [date, cur] = key.split('|');
            const r = await getFxRate(date, cur, targetCurrency);
            if (r != null) map.set(key, r);
          }));
          return map;
        }
        // 2) Calcule un total à partir d'une liste, en utilisant la map de taux pré-fetched.
        //    Priorité : override comptable (montant réel prélevé sur la carte) >
        //    devise cible identique > taux pré-fetched > montant brut + missing++.
        function sumWithRates(list, rates) {
          let total = 0, missing = 0;
          for (const d of list) {
            const amt = parseFloat(d.amount) || 0;
            if (!amt) continue;
            // Override comptable : si l'utilisateur a saisi le montant réel
            // débité (incluant frais bancaires), on l'utilise directement —
            // mais uniquement s'il a été figé pour la devise cible courante.
            const overrideAmt = parseFloat(d.convertedAmountOverride);
            const overrideCur = (d.convertedCurrencyAtOverride || '').toUpperCase();
            if (!isNaN(overrideAmt) && overrideAmt > 0 && overrideCur === targetCurrency) {
              total += overrideAmt;
              continue;
            }
            const cur = (d.currency || targetCurrency).toUpperCase();
            if (cur === targetCurrency) { total += amt; continue; }
            const date = d.date || todayZuluDate();
            const rate = rates.get(`${date}|${cur}`);
            if (rate != null) total += amt * rate;
            else { missing++; total += amt; }
          }
          return { total, missing };
        }
        async function run() {
          setFxLoading(true);
          const rates = await ensureRates([filtered, documentsAll]);
          if (cancelled) return;
          const filteredRes = sumWithRates(filtered, rates);
          const grandRes    = sumWithRates(documentsAll, rates);
          setCadFiltered(filteredRes);
          setCadGrand(grandRes);
          setFxMissing(filteredRes.missing + grandRes.missing);
          setFxLoading(false);
        }
        run();
        return () => { cancelled = true; };
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [filtered, documentsAll, targetCurrency]);
      const filteredCurrency = useMemo(() => {
        const m = {};
        for (const d of filtered) {
          const c = d.currency || 'EUR';
          m[c] = (m[c]||0) + 1;
        }
        return Object.entries(m).sort((a,b) => b[1]-a[1])[0]?.[0] || 'EUR';
      }, [filtered]);

      const totalsByCat = useMemo(() => {
        const m = {};
        for (const d of documentsAll) {
          const k = d.categoryId || 'other';
          m[k] = (m[k]||0) + (parseFloat(d.amount)||0);
        }
        return m;
      }, [documentsAll]);

      // Totaux par catégorie ET par devise — chaque facture/dépense garde sa devise
      // d'origine (EUR, USD, CAD, etc.). Sert à afficher la tuile catégorie dans la
      // devise effective de ses factures (au lieu de "mainCurrency" globale qui
      // mélangeait tout).
      const totalsByCatByCurrency = useMemo(() => {
        const m = {}; // { catId: { EUR: 100, USD: 50 } }
        for (const d of documentsAll) {
          const k = d.categoryId || 'other';
          const c = (d.currency || 'EUR').toUpperCase();
          if (!m[k]) m[k] = {};
          m[k][c] = (m[k][c] || 0) + (parseFloat(d.amount)||0);
        }
        return m;
      }, [documentsAll]);

      // Format : "150 EUR" si 1 devise, "100 EUR · 50 USD" si plusieurs.
      // `decimals` = 0 pour tuiles compactes, 2 pour panneaux détaillés.
      function fmtCatTotal(catId, decimals = 2) {
        const map = totalsByCatByCurrency[catId];
        if (!map) return `0`;
        const entries = Object.entries(map).filter(([, v]) => Math.abs(v) > 0.005).sort((a, b) => b[1] - a[1]);
        if (entries.length === 0) return `0`;
        return entries.map(([curr, v]) => `${v.toFixed(decimals)} ${curr}`).join(' · ');
      }

      // Totaux HT et Taxe par catégorie. Si la dépense n'a pas d'amountHT/amountTax
      // saisis (legacy), on incrémente juste le TTC sans gonfler HT ou Taxe — la
      // colonne reste vide pour ces dépenses. Les visites mécanicien virtuelles
      // n'ont pas de breakdown : on les exclut de HT/Tax (TTC seul).
      const htTaxByCat = useMemo(() => {
        const m = {};
        for (const d of documents) {
          const k = d.categoryId || 'other';
          if (!m[k]) m[k] = { ht: 0, tax: 0, anyHT: false };
          const ht = parseFloat(d.amountHT);
          const tax = parseFloat(d.amountTax);
          if (!isNaN(ht)) { m[k].ht += ht; m[k].anyHT = true; }
          if (!isNaN(tax)) { m[k].tax += tax; }
        }
        return m;
      }, [documents]);

      // Carburant avion supplémentaire saisi dans les fiches vol mais sans
      // facture rattachée (les pleins avec invoiceDocId sont déjà comptés dans
      // documents). Évite le double comptage.
      const extraFlightFuel = useMemo(() => {
        let total = 0;
        for (const f of flights) {
          for (const e of (f.fuelEntries||[])) {
            if (!e.invoiceDocId) {
              total += parseFloat(e.amount)||0;
            }
          }
        }
        return total;
      }, [flights]);

      // Totaux par catégorie INCLUANT le carburant non scanné des vols
      const totalsByCatComplete = useMemo(() => {
        const m = { ...totalsByCat };
        if (extraFlightFuel > 0) {
          m['fuel_aircraft'] = (m['fuel_aircraft']||0) + extraFlightFuel;
        }
        return m;
      }, [totalsByCat, extraFlightFuel]);

      // Total global complet (documents + carburant vols sans facture)
      const grandTotal = useMemo(() => {
        return Object.values(totalsByCatComplete).reduce((s,v) => s+v, 0);
      }, [totalsByCatComplete]);

      const [showBreakdown, setShowBreakdown] = useState(true);

      function catObj(id) { return categories.find(c => c.id === id) || categories[categories.length-1]; }

      // Compte des factures par catégorie
      const countsByCat = useMemo(() => {
        const m = {};
        for (const d of documents) {
          const k = d.categoryId || 'other';
          m[k] = (m[k]||0) + 1;
        }
        return m;
      }, [documents]);

      // Total global et nb factures
      // Total global = TOUTES les dépenses (réelles + visites mécanicien virtuelles).
      // Sert à afficher le hero "💰 Total dépenses" + la tuile "Toutes".
      const totalAmount = useMemo(
        () => documentsAll.reduce((s,d) => s + (parseFloat(d.amount)||0), 0),
        [documentsAll]
      );
      const totalCount = documentsAll.length;
      // Devise principale (la plus utilisée) pour l'affichage du total
      const mainCurrency = useMemo(() => {
        const m = {};
        for (const d of documents) {
          const c = d.currency || 'EUR';
          m[c] = (m[c]||0) + 1;
        }
        return Object.entries(m).sort((a,b) => b[1]-a[1])[0]?.[0] || 'EUR';
      }, [documents]);

      // Catégories triées : celles avec dépenses d'abord, par montant décroissant.
      // Ajout des breakdowns HT et Tax (somme des dépenses de la catégorie).
      const sortedCats = useMemo(() => {
        return [...categories]
          .map(c => ({
            ...c,
            total: totalsByCat[c.id]||0,
            count: countsByCat[c.id]||0,
            ht: htTaxByCat[c.id]?.ht || 0,
            tax: htTaxByCat[c.id]?.tax || 0,
            hasHT: !!htTaxByCat[c.id]?.anyHT,
          }))
          .sort((a,b) => b.total - a.total);
      }, [categories, totalsByCat, countsByCat, htTaxByCat]);
      const usedCats = sortedCats.filter(c => c.total > 0 || c.count > 0);
      // Si aucune dépense saisie, on affiche par défaut les catégories des groupes
      // Aéronef + Transport sol pour montrer la structure (sinon l'écran serait vide).
      const initialCatsIfEmpty = sortedCats.filter(c => c.group === 'Aéronef' || c.group === 'Transport sol');
      // Par défaut : toutes les catégories visibles (mobile + desktop).
      const [showAllCats, setShowAllCats] = useState(true);
      const visibleCats = showAllCats
        ? sortedCats
        : (usedCats.length > 0 ? usedCats : initialCatsIfEmpty);

      // ---- Helpers d'export ----
      function safeName(s) { return String(s||'').replace(/[\/\\?%*:|"<>]/g, '-').slice(0, 60); }
      function extFor(mime, fallback) {
        if (mime === 'application/pdf') return 'pdf';
        if (mime?.startsWith('image/')) return mime.split('/')[1].replace('jpeg','jpg');
        return fallback || 'bin';
      }
      function dataUrlToBytes(dataUrl) {
        const base64 = (dataUrl||'').split(',')[1] || '';
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }
      // Filtre les documents selon la stratégie : 'incremental' (depuis dernière
      // export) ou 'all' (tout). Retourne un tableau filtré.
      function filterDocsForExport(strategy) {
        const lastTs = (strategy === 'incremental' && lastExportDate) ? Date.parse(lastExportDate) : 0;
        return documents.filter(d => {
          if (lastTs && (d.addedAt || 0) <= lastTs) return false;
          return true;
        });
      }
      // Export ZIP : un dossier "Dépenses_<date>" avec un sous-dossier par catégorie
      // qui CONTIENT au moins une facture. Les catégories vides ne créent aucun dossier.
      async function exportZipExpenses(strategy) {
        if (typeof JSZip === 'undefined') { alert(tx('JSZip non disponible.','JSZip not available.')); return; }
        const docs = filterDocsForExport(strategy).filter(d => d.dataUrl); // uniquement avec facture
        if (docs.length === 0) {
          alert(strategy === 'incremental'
            ? tx('Aucune nouvelle facture depuis la dernière export.','No new invoice since last export.')
            : tx('Aucune facture à exporter.','No invoice to export.'));
          return;
        }
        // Regroupement par catégorie (uniquement celles avec au moins 1 facture)
        const byCat = {};
        for (const d of docs) {
          const k = d.categoryId || 'other';
          if (!byCat[k]) byCat[k] = [];
          byCat[k].push(d);
        }
        const today = new Date().toISOString().slice(0,10);
        const root = `Dépenses_${today}`;
        const zip = new JSZip();
        for (const [catId, list] of Object.entries(byCat)) {
          const cat = categories.find(c => c.id === catId);
          const catName = safeName(cat?.name || catId);
          for (const d of list) {
            const ext = extFor(d.mime, (d.fileName||'').split('.').pop() || 'bin');
            const supplier = safeName(d.supplier || 'sans-fournisseur');
            const dateStr = d.date || 'sans-date';
            const amt = d.amount ? `_${parseFloat(d.amount).toFixed(2)}${d.currency||'EUR'}` : '';
            const fname = `${dateStr}_${supplier}${amt}.${ext}`;
            try {
              zip.file(`${root}/${catName}/${fname}`, dataUrlToBytes(d.dataUrl));
            } catch (e) {
              console.error('Failed to add file', d.id, e);
            }
          }
        }
        const blob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${root}.zip`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setLastExportDate(new Date().toISOString());
        setExportMenuOpen(false);
        alert(tx(`Export terminé : ${docs.length} facture(s) dans ${Object.keys(byCat).length} catégorie(s).`,
                 `Export complete: ${docs.length} invoice(s) in ${Object.keys(byCat).length} categor${Object.keys(byCat).length>1?'ies':'y'}.`));
      }
      // Export CSV : récap des dépenses (avec ou sans facture) — métadonnées seules
      function exportCsvExpenses(strategy) {
        const docs = filterDocsForExport(strategy);
        if (docs.length === 0) {
          alert(strategy === 'incremental'
            ? tx('Aucune nouvelle dépense depuis la dernière export.','No new expense since last export.')
            : tx('Aucune dépense à exporter.','No expense to export.'));
          return;
        }
        const headers = ['date','fournisseur','categorie','HT','taxe','TTC','devise','avion','pilote','fichier','notes'];
        const rows = docs.map(d => {
          const cat = categories.find(c => c.id === d.categoryId);
          const ac = aircraft.find(a => a.id === d.aircraftId);
          const pic = pilots.find(p => p.id === d.pilotId);
          return [
            d.date || '',
            d.supplier || '',
            cat?.name || d.categoryId || '',
            d.amountHT || '',
            d.amountTax || '',
            d.amount || '',
            d.currency || 'EUR',
            ac?.registration || '',
            pic ? pilotDisplayName(pic) : '',
            d.fileName || '',
            (d.notes||'').replace(/[\n\r]+/g, ' '),
          ];
        });
        const esc = (v) => {
          const s = String(v??'');
          if (/[",;\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
          return s;
        };
        const out = [headers.join(';'), ...rows.map(r => r.map(esc).join(';'))].join('\n');
        const blob = new Blob(['\ufeff' + out], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const today = new Date().toISOString().slice(0,10);
        a.href = url;
        a.download = `Dépenses_${today}.csv`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setLastExportDate(new Date().toISOString());
        setExportMenuOpen(false);
      }
      // Export JSON : dump complet des dépenses (incluant tous les champs)
      function exportJsonExpenses(strategy) {
        const docs = filterDocsForExport(strategy);
        if (docs.length === 0) {
          alert(strategy === 'incremental'
            ? tx('Aucune nouvelle dépense depuis la dernière export.','No new expense since last export.')
            : tx('Aucune dépense à exporter.','No expense to export.'));
          return;
        }
        // On retire les dataUrl (binaires) pour rester léger
        const lite = docs.map(({ dataUrl, thumbnail, ocrText, ...rest }) => rest);
        const out = JSON.stringify({ exportedAt: new Date().toISOString(), count: lite.length, expenses: lite }, null, 2);
        const blob = new Blob([out], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const today = new Date().toISOString().slice(0,10);
        a.href = url;
        a.download = `Dépenses_${today}.json`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setLastExportDate(new Date().toISOString());
        setExportMenuOpen(false);
      }
      function resetLastExport() {
        if (confirm(tx('Réinitialiser la date de dernière export ? La prochaine export incrémentale inclura toutes les dépenses.','Reset last export date? Next incremental export will include all expenses.'))) {
          setLastExportDate('');
          setExportMenuOpen(false);
          // Force re-render
          setShowAllCats(s => s);
        }
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-xl font-semibold">{t('exp.title')}</h2>
            {/* Bouton "Nouvelle facture" caché quand une catégorie est sélectionnée :
                il y a un bouton dédié dans le panneau de détail qui pré-remplit
                la catégorie automatiquement (workflow plus naturel). */}
            {filterCat === 'all' && (
              <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }}>{t('exp.new')}</button>
            )}
          </div>

          {/* === HERO : Total + nb factures, design type "carte bancaire" ===
              Pas de overflow-hidden sur le conteneur : le menu déroulant
              "Exporter" doit pouvoir s'étendre sous l'encadré. */}
          <div className="card p-4 relative"
               style={{
                 background: 'linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-2) 60%, rgba(56,189,248,0.08) 100%)',
                 borderColor: 'rgba(56,189,248,0.25)',
               }}>
            <div className="flex items-end justify-between gap-3 flex-wrap">
              <div>
                <div className="text-[10px] uppercase tracking-[0.15em] text-[var(--text-dim)] font-semibold">
                  {tx('Total dépenses','Total expenses')}
                </div>
                <div className="text-3xl sm:text-4xl font-mono tabular-nums font-bold text-[var(--accent)] leading-tight mt-1">
                  {totalAmount.toFixed(2)} <span className="text-lg text-[var(--text-dim)]">{mainCurrency}</span>
                </div>
                {cadGrand && cadGrand.total > 0 && mainCurrency !== targetCurrency && (
                  <div className="text-base font-mono tabular-nums font-semibold mt-0.5" style={{ color: 'var(--accent)' }}>
                    ≈ {cadGrand.total.toFixed(2)} <span className="text-xs text-[var(--text-dim)]">{targetCurrency}</span>
                    {cadGrand.missing > 0 && (
                      <span className="ml-2 text-[10px] text-[var(--warn)]" title={tx('Taux non trouvé pour certaines factures (offline ou date trop ancienne)','FX rate not found for some invoices (offline or date too old)')}>
                        ⚠ {cadGrand.missing} {tx('taux manquant','rate missing')}{cadGrand.missing>1?'s':''}
                      </span>
                    )}
                  </div>
                )}
                {fxLoading && !cadGrand && (
                  <div className="text-xs text-[var(--text-dim)] italic mt-0.5">{tx(`Conversion ${targetCurrency} en cours…`,`${targetCurrency} conversion in progress…`)}</div>
                )}
                <div className="text-xs text-[var(--text-dim)] mt-1">
                  {totalCount} {tx(totalCount>1?'factures':'facture',totalCount>1?'invoices':'invoice')} · {usedCats.length} {tx(usedCats.length>1?'catégories':'catégorie',usedCats.length>1?'categories':'category')} {tx(usedCats.length>1?'actives':'active',usedCats.length>1?'active':'active')}
                </div>
              </div>
              {/* Bouton export avec menu déroulant : ZIP (factures organisées par catégorie) /
                  CSV (récap métadonnées) / JSON (dump complet). Incrémental par défaut
                  (depuis la dernière export) ou tout. */}
              <div>
                <button ref={exportButtonRef} className="btn btn-secondary"
                  onClick={()=>{ if (exportMenuOpen) setExportMenuOpen(false); else openExportMenu(); }}
                  title={tx('Exporter les dépenses','Upload expenses')}>
                  <span className="inline-flex items-center gap-1.5">
                    <LucideIcon name="upload" size={14} strokeWidth={2.25} />
                    {tx('Exporter','Upload')}
                  </span>
                </button>
                {exportMenuOpen && exportMenuPos && (
                  <div ref={exportMenuRef}
                    className="z-50 rounded-xl shadow-2xl border border-[var(--border)] overflow-hidden"
                    style={{
                      position: 'fixed',
                      top: exportMenuPos.top,
                      left: exportMenuPos.left,
                      background: 'var(--bg-card)',
                      width: 'min(18rem, calc(100vw - 16px))',
                      maxHeight: '70vh',
                      overflowY: 'auto',
                    }}>
                    <div className="px-3 py-2 border-b border-[var(--border)] bg-[var(--bg-elev)]">
                      <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-bold">
                        {tx('Format d\'export','Upload format')}
                      </div>
                      <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                        {lastExportDate
                          ? tx('Dernière export :','Last upload:')+' '+new Date(lastExportDate).toLocaleString(t('lang.code')==='en'?'en-US':'fr-FR')
                          : tx('Aucune export précédente','No previous upload')}
                      </div>
                    </div>
                    {/* ZIP — incrémental */}
                    <button type="button"
                      onClick={()=>exportZipExpenses('incremental')}
                      className="w-full text-left px-3 py-2.5 hover:bg-[var(--bg-elev)] flex items-start gap-2.5 border-b border-[var(--border)]/50">
                      <LucideIcon name="folder" size={18} strokeWidth={2.25} />
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold">{tx('ZIP — depuis dernière export','ZIP — since last upload')}</div>
                        <div className="text-[10px] text-[var(--text-dim)]">{tx('Dossier par catégorie · factures uniquement','Folder per category · invoices only')}</div>
                      </div>
                    </button>
                    {/* ZIP — tout */}
                    <button type="button"
                      onClick={()=>exportZipExpenses('all')}
                      className="w-full text-left px-3 py-2.5 hover:bg-[var(--bg-elev)] flex items-start gap-2.5 border-b border-[var(--border)]/50">
                      <LucideIcon name="folder" size={18} strokeWidth={2.25} />
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold">{tx('ZIP — toutes les factures','ZIP — all invoices')}</div>
                        <div className="text-[10px] text-[var(--text-dim)]">{tx('Export complet, ignore l\'historique','Full upload, ignores history')}</div>
                      </div>
                    </button>
                    {/* CSV */}
                    <button type="button"
                      onClick={()=>exportCsvExpenses('incremental')}
                      className="w-full text-left px-3 py-2.5 hover:bg-[var(--bg-elev)] flex items-start gap-2.5 border-b border-[var(--border)]/50">
                      <LucideIcon name="file" size={18} strokeWidth={2.25} />
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold">{tx('CSV — récap métadonnées','CSV — metadata summary')}</div>
                        <div className="text-[10px] text-[var(--text-dim)]">{tx('Tableur (Excel, Numbers, Sheets)','Spreadsheet (Excel, Numbers, Sheets)')}</div>
                      </div>
                    </button>
                    {/* JSON */}
                    <button type="button"
                      onClick={()=>exportJsonExpenses('incremental')}
                      className="w-full text-left px-3 py-2.5 hover:bg-[var(--bg-elev)] flex items-start gap-2.5 border-b border-[var(--border)]/50">
                      <LucideIcon name="database" size={18} strokeWidth={2.25} />
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold">JSON</div>
                        <div className="text-[10px] text-[var(--text-dim)]">{tx('Dump structuré (sans les fichiers)','Structured dump (no files)')}</div>
                      </div>
                    </button>
                    {/* Reset */}
                    {lastExportDate && (
                      <button type="button"
                        onClick={resetLastExport}
                        className="w-full text-left px-3 py-2 hover:bg-[var(--err)]/10 text-[var(--err)] text-xs flex items-center gap-2">
                        <LucideIcon name="trash2" size={14} strokeWidth={2.25} />
                        {tx('Réinitialiser l\'historique d\'export','Reset upload history')}
                      </button>
                    )}
                  </div>
                )}
              </div>
            </div>
            {/* Mini barre stacked des catégories proportionnelles */}
            {totalAmount > 0 && (
              <div className="mt-3 h-2 rounded-full overflow-hidden flex" style={{ background: 'var(--bg-elev)' }}>
                {usedCats.slice(0, 8).map(c => (
                  <div key={c.id}
                       title={`${categoryDisplayName(c, lang)} : ${fmtCatTotal(c.id, 2)} (${((c.total/totalAmount)*100).toFixed(0)}%)`}
                       style={{ width: `${(c.total/totalAmount)*100}%`, background: c.color, transition: 'width .35s ease' }} />
                ))}
              </div>
            )}
          </div>

          {/* === TUILES CATÉGORIES (cliquables pour filtrer) ===
              Visibles uniquement quand aucune catégorie n'est sélectionnée :
              vue d'ensemble. Quand une catégorie est cliquée, les tuiles
              disparaissent au profit du panneau de détails (ci-dessous). */}
          {filterCat === 'all' && visibleCats.length > 0 && (
            <div>
              <div className="flex items-center justify-between mb-2">
                <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-semibold inline-flex items-center gap-1.5">
                  <span style={{ color: 'var(--accent)' }}><LucideIcon name="barChart3" size={12} strokeWidth={2.5} /></span>
                  {tx('Catégories','Categories')}
                </div>
                <button type="button"
                  className="text-xs text-[var(--accent)] hover:underline"
                  onClick={()=>setShowAllCats(s=>!s)}>
                  {showAllCats ? tx('Masquer les vides','Hide empty') : `+ ${tx('Voir toutes','View all')} (${categories.length})`}
                </button>
              </div>
              {/* === MOBILE : grille de tuiles (inchangé, conservé pour les petits écrans) === */}
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 md:hidden">
                {/* Tuile "Toutes" */}
                <button type="button"
                  onClick={()=>setFilterCat('all')}
                  className={`card p-3 text-left transition-all hover:scale-[1.02] ${filterCat==='all' ? 'ring-2 ring-[var(--accent)] scale-[1.02]' : ''}`}
                  style={filterCat==='all' ? { background: 'rgba(56,189,248,0.15)', borderColor: 'var(--accent)' } : {}}>
                  <div className="grid place-items-center mx-auto mb-1 w-9 h-9 rounded-xl"
                       style={{ background: 'rgba(56,189,248,0.18)', color: 'var(--accent)' }}>
                    <LucideIcon name="globe" size={20} strokeWidth={2.25} />
                  </div>
                  <div className="text-xs font-semibold">{tx('Toutes','All')}</div>
                  <div className="text-base font-mono tabular-nums font-bold text-[var(--accent)] mt-0.5">{totalAmount.toFixed(0)} <span className="text-[10px]">{mainCurrency}</span></div>
                  <div className="text-[10px] text-[var(--text-dim)]">{totalCount} {tx(totalCount>1?'factures':'facture', totalCount>1?'invoices':'invoice')}</div>
                </button>
                {visibleCats.map(c => {
                  const isActive = filterCat === c.id;
                  const pct = totalAmount > 0 ? (c.total/totalAmount)*100 : 0;
                  const lucideName = CATEGORY_LUCIDE[c.id];
                  return (
                    <button key={c.id} type="button"
                      onClick={()=>setFilterCat(isActive ? 'all' : c.id)}
                      className={`card p-3 text-left transition-all hover:scale-[1.02] ${isActive ? 'ring-2 scale-[1.02]' : ''}`}
                      style={{
                        background: isActive ? c.color + '22' : c.color + '10',
                        borderColor: isActive ? c.color : c.color + '55',
                        ...(isActive ? { '--tw-ring-color': c.color } : {}),
                      }}>
                      <div className="flex items-start justify-between mb-2">
                        {lucideName
                          ? <CategoryIconChip name={lucideName} color={c.color} size={44} iconSize={22} />
                          : <div className="grid place-items-center w-11 h-11 rounded-2xl text-2xl" style={{ background: c.color + '22' }}>{c.icon}</div>}
                        {pct > 0 && pct < 100 && (
                          <div className="text-[9px] font-mono font-bold px-1.5 py-0.5 rounded" style={{ background: c.color + '33', color: c.color }}>
                            {pct.toFixed(0)}%
                          </div>
                        )}
                      </div>
                      <div className="text-xs font-semibold truncate" title={categoryDisplayName(c, lang)}>{categoryDisplayName(c, lang)}</div>
                      <div className="text-base font-mono tabular-nums font-bold mt-0.5" style={{ color: c.color }}>
                        {fmtCatTotal(c.id, 0)}
                      </div>
                      <div className="text-[10px] text-[var(--text-dim)]">{c.count} {tx(c.count>1?'factures':'facture',c.count>1?'invoices':'invoice')}</div>
                    </button>
                  );

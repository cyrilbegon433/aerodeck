    // Bloc huile simplifié (v4) : pas de montant, pas de scan facture (déportés vers
    // l'onglet Dépenses). On garde quantité, unité, et cases à cocher Moteur Gauche /
    // Moteur Droit pour avions multi-moteurs.
    function OilEntryRow({ entry, index, onChange, onRemove, isMonomotor=false }) {
      const tx = useTx();
      function set(k,v){ onChange({...entry, [k]: v}); }
      // Pour un monomoteur, on n'expose qu'une seule case "Moteur" qui pilote
      // engineLeft (le champ engineRight reste à false). On garde engineLeft comme
      // unique champ pour cohérence avec les vols multi-moteurs et l'historique.
      return (
        <div className="bg-[var(--bg-elev)] p-3 rounded-lg space-y-2">
          <div className="flex items-center justify-between">
            <div className="text-sm font-medium inline-flex items-center gap-1.5">
              <LucideIcon name="droplet" size={13} strokeWidth={2.5} />
              {tx('Ajout d\'huile','Oil entry')} #{index+1}
            </div>
            <button type="button"
              onClick={onRemove}
              className="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg border border-[var(--err)] text-[var(--err)] text-xs font-semibold hover:bg-[var(--err)]/10 transition-colors"
              style={{ background: 'transparent' }}>
              <LucideIcon name="trash2" size={12} strokeWidth={2.5} />
              {tx('Retirer','Remove')}
            </button>
          </div>
          <div className="grid grid-cols-3 gap-2">
            <div className="col-span-2">
              <div className="label">{tx('Quantité','Quantity')}</div>
              <input type="number" min="0" step="0.25" className="input" value={entry.qty} onChange={e=>set('qty', e.target.value)} placeholder="0" />
            </div>
            <div>
              <div className="label">{tx('Unité','Unit')}</div>
              <select className="select" value={entry.unit} onChange={e=>set('unit', e.target.value)}>
                <option value="qt">{tx('pintes (qt)','quarts (qt)')}</option>
                <option value="L">L</option>
              </select>
            </div>
          </div>
          {isMonomotor ? (
            <div className="flex flex-wrap gap-3">
              <label className="flex items-center gap-2 select-none cursor-pointer">
                <input type="checkbox" className="w-5 h-5 accent-[#38bdf8]"
                  checked={!!entry.engineLeft}
                  onChange={e=>{
                    const v = e.target.checked;
                    onChange({ ...entry, engineLeft: v, engineRight: false });
                  }} />
                <span>{tx('Moteur','Engine')}</span>
              </label>
            </div>
          ) : (
            <div className="flex flex-wrap gap-3">
              <label className="flex items-center gap-2 select-none cursor-pointer">
                <input type="checkbox" className="w-5 h-5 accent-[#38bdf8]"
                  checked={!!entry.engineLeft}
                  onChange={e=>set('engineLeft', e.target.checked)} />
                <span>{tx('Moteur gauche','Left engine')}</span>
              </label>
              <label className="flex items-center gap-2 select-none cursor-pointer">
                <input type="checkbox" className="w-5 h-5 accent-[#38bdf8]"
                  checked={!!entry.engineRight}
                  onChange={e=>set('engineRight', e.target.checked)} />
                <span>{tx('Moteur droit','Right engine')}</span>
              </label>
            </div>
          )}
          {entry.notes && <div className="text-xs text-[var(--text-dim)] italic">{entry.notes}</div>}
        </div>
      );
    }

    function OilEntriesEditor({ entries, onChange, defaultUnit='qt', isMonomotor=false }) {
      const tx = useTx();
      function addEntry() {
        const next = [...(entries||[]), {
          id: 'oe_'+Date.now(),
          qty: '', unit: defaultUnit,
          engineLeft: false, engineRight: false,
          notes: '',
        }];
        onChange(next);
      }
      function updateEntry(i, e) {
        const next = [...entries]; next[i] = e; onChange(next);
      }
      function removeEntry(i) {
        if (!confirm(tx('Retirer cet ajout d\'huile ? (Aucune facture liée — ajoute la facture séparément dans Dépenses si besoin.)','Remove this oil entry? (No linked invoice — add the invoice separately in Expenses if needed.)'))) return;
        const next = [...entries]; next.splice(i,1); onChange(next);
      }
      const totals = (entries||[]).reduce((acc, e) => {
        const v = parseFloat(e.qty)||0;
        if (e.unit==='qt') acc.qt += v;
        else if (e.unit==='L') acc.L += v;
        return acc;
      }, { qt:0, L:0 });
      return (
        <div className="card p-3">
          <div className="flex items-center justify-between pr-3">
            <div className="label !mb-0 inline-flex items-center gap-1.5">
              <span style={{ color: '#a16207' }}><LucideIcon name="droplet" size={14} strokeWidth={2.5} /></span>
              {tx('Huile moteur','Engine oil')}
            </div>
            <button type="button" className="btn btn-primary !py-1 !px-3 text-sm" onClick={addEntry}>{tx('+ Ajouter','+ Add')}</button>
          </div>
          {(entries||[]).length === 0 && (
            <div className="text-xs text-[var(--text-dim)] mt-2">
              {tx('Aucun ajout d\'huile pour ce vol. Saisis ici uniquement la quantité et le(s) moteur(s) concerné(s) ; les factures d\'huile se gèrent dans l\'onglet Dépenses → Huile Moteur.','No oil entry for this flight. Enter only the quantity and engine(s) involved here; oil invoices are handled in the Expenses → Engine Oil tab.')}
            </div>
          )}
          <div className="space-y-2 mt-2">
            {(entries||[]).map((e, i) => (
              <OilEntryRow key={e.id||i} entry={e} index={i}
                onChange={(ne)=>updateEntry(i, ne)} onRemove={()=>removeEntry(i)}
                isMonomotor={isMonomotor} />
            ))}
          </div>
          {(entries||[]).length > 0 && (
            <div className="text-xs text-[var(--text-dim)] mt-2">
              Total : {totals.qt>0 && `${totals.qt.toFixed(1)} qt `} {totals.L>0 && `${totals.L.toFixed(2)} L`}
            </div>
          )}
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12h) ÉCRAN — STAFF (logbook tableau par pilote, vue tableau pure)
    // ------------------------------------------------------------------
    function aircraftDescriptor(ac) {
      if (!ac) return '—';
      const parts = [];
      if (ac.type) parts.push(ac.type);
      const enginePart = [];
      if (ac.engineCount) {
        enginePart.push(ac.engineCount === 1 ? 'Mono' : ac.engineCount === 2 ? 'Bi' : `${ac.engineCount}-mot.`);
      }
      if (ac.engineType) {
        const t = ac.engineType === 'piston' ? 'Piston'
                : ac.engineType === 'turbine' ? 'Turbine'
                : ac.engineType === 'jet' ? 'Jet'
                : ac.engineType === 'electric' ? 'Élec.' : ac.engineType;
        enginePart.push(t);
      }
      if (enginePart.length) parts.push(enginePart.join(' '));
      return parts.join(' · ');
    }
    // Classe d'avion seule : Mono / Bi / N-mot.
    function aircraftClass(ac) {
      if (!ac || !ac.engineCount) return '—';
      if (ac.engineCount === 1) return 'Mono';
      if (ac.engineCount === 2) return 'Bi';
      return ac.engineCount + '-mot.';
    }

    function StaffScreen({ flights, aircraft, pilots=[], addExpense, onUpsertFlight, onDeleteFlight }) {
      const tx = useTx();
      const { lang } = React.useContext(I18nContext);
      const [pilotFilter, setPilotFilter] = useState('all');
      const [showAll, setShowAll] = useState(false);
      const [editing, setEditing] = useState(null);
      const [showForm, setShowForm] = useState(false);

      const sorted = useMemo(() => {
        let arr = flights.filter(f => {
          if (pilotFilter === 'all') return true;
          return f.pilotId === pilotFilter || f.copilotId === pilotFilter;
        });
        arr.sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.id||'').localeCompare(b.id||''));
        return arr;
      }, [flights, pilotFilter]);

      // Génère un PDF du logbook via window.print() sur une fenêtre dédiée :
      // l'utilisateur clique "Save as PDF" dans le dialog d'impression du navigateur.
      // Aucune lib externe — fonctionne offline.
      function exportTablePDF() {
        const pilName = pilotFilter==='all'
          ? tx('Tous les pilotes','All pilots')
          : pilotDisplayName(pilots.find(p=>p.id===pilotFilter)) || pilotFilter;
        const today = new Date().toISOString().slice(0,10);
        // En-têtes localisés
        const H = {
          date:    tx('Date','Date'),
          ac:      tx('Avion','Aircraft'),
          pic:     'PIC',
          sic:     'SIC',
          type:    tx('Type','Type'),
          rules:   tx('Régime','Rules'),
          se:      tx('Mono','SE'),
          me:      tx('Multi','ME'),
          ir:      tx('Heures IR','IR Hours'),
          tldg:    'T/LDG',
          nav:     'Nav',
          from:    tx('Départ','Dep'),
          to:      tx('Arrivée','Arr'),
        };
        // Lignes
        const rows = sorted.map(f => {
          const ac  = aircraft.find(a => a.id === f.aircraftId);
          const pic = pilots.find(p => p.id === f.pilotId);
          const sic = pilots.find(p => p.id === f.copilotId);
          const ft  = f.flightTime || 0;
          const ec  = ac?.engineCount || 1;
          const seTime = ec <= 1 ? ft : 0;
          const meTime = ec >= 2 ? ft : 0;
          const ifrTime = f.rules === 'IFR' ? ft : 0;
          const navTime = f.isNavigation ? ft : 0;
          const totalTO  = ((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0);
          const totalLDG = ((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0);
          const dur = (m) => m > 0 ? fmtDuration(m) : '';
          return {
            date: f.date || '',
            ac: (ac?.registration||'?') + (ac?.type ? ' · ' + ac.type : ''),
            pic: pic ? pilotDisplayName(pic) : '',
            sic: sic ? pilotDisplayName(sic) : '',
            type: flightTypeLabel(f.flightType, lang),
            rules: f.rules || '',
            se: dur(seTime),
            me: dur(meTime),
            ir: dur(ifrTime),
            tldg: (totalTO || totalLDG) ? `${totalTO}/${totalLDG}` : '',
            nav: dur(navTime),
            from: f.from || '',
            to: f.to || '',
          };
        });
        const escHtml = s => String(s||'').replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
        const headerRow = `<tr>${['date','ac','pic','sic','type','rules','se','me','ir','tldg','nav','from','to']
          .map(k => `<th>${escHtml(H[k])}</th>`).join('')}</tr>`;
        const bodyRows = rows.map(r => `<tr>${
          ['date','ac','pic','sic','type','rules','se','me','ir','tldg','nav','from','to']
            .map(k => `<td>${escHtml(r[k])}</td>`).join('')
        }</tr>`).join('');
        const html = `<!DOCTYPE html>
<html lang="${lang}">
<head>
<meta charset="utf-8">
<title>Logbook — ${escHtml(pilName)} — ${today}</title>
<style>
  @page { size: A4 landscape; margin: 12mm; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #111; margin: 0; padding: 0; font-size: 10pt; }
  h1 { font-size: 16pt; margin: 0 0 4pt; }
  .meta { color: #555; font-size: 9pt; margin-bottom: 12pt; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #999; padding: 4px 6px; text-align: left; vertical-align: top; }
  th { background: #f0f0f0; font-size: 8.5pt; text-transform: uppercase; letter-spacing: 0.02em; }
  td { font-size: 9pt; }
  td.num, th.num { text-align: center; font-variant-numeric: tabular-nums; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  tr:nth-child(even) td { background: #fafafa; }
  .footer { margin-top: 12pt; font-size: 8pt; color: #777; }
  @media print { .no-print { display: none; } }
</style>
</head>
<body>
  <h1>Logbook — ${escHtml(pilName)}</h1>
  <div class="meta">${escHtml(tx('Généré le','Generated on'))} ${today} · ${escHtml(tx('Total vols','Total flights'))} : ${rows.length}</div>
  <table>
    <thead>${headerRow}</thead>
    <tbody>${bodyRows}</tbody>
  </table>
  <div class="footer">${escHtml(tx('Exporté depuis AeroDeck','Exported from AeroDeck'))}</div>
  <button class="no-print" onclick="window.print()" style="position:fixed;top:8mm;right:8mm;padding:8px 14px;background:#0284c7;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;">
    ${escHtml(tx('Imprimer / Sauver en PDF','Print / Save as PDF'))}
  </button>
  <script>
    // Auto-déclenche le dialog d'impression au chargement (l'utilisateur peut choisir "Save as PDF").
    window.addEventListener('load', () => setTimeout(() => window.print(), 300));
  <\/script>
</body>
</html>`;
        const w = window.open('', '_blank');
        if (!w) {
          alert(tx('Le navigateur a bloqué la fenêtre d\'impression. Autorise les popups pour ce site.','Browser blocked the print window. Allow popups for this site.'));
          return;
        }
        w.document.open();
        w.document.write(html);
        w.document.close();
      }

      function exportTableCSV() {
        const headers = ['date','from','to','registration','aircraft_name','class','flight_time_min',
                         'ifr_min','nav_min','duo_min','night_min','PIC','SIC','to','ldg','flight_type','notes'];
        const rows = sorted.map(f => {
          const ac = aircraft.find(a => a.id === f.aircraftId);
          const pic = pilots.find(p => p.id === f.pilotId);
          const sic = pilots.find(p => p.id === f.copilotId);
          const ft = f.flightTime || 0;
          return [
            f.date, f.from, f.to,
            ac?.registration||'', ac?.type||'',
            aircraftClass(ac),
            ft,
            f.rules === 'IFR' ? ft : 0,
            f.isNavigation ? ft : 0,
            isDuoFlight(f) ? ft : 0,
            f.nightTime||0,
            pic ? pilotDisplayName(pic) : '',
            sic ? pilotDisplayName(sic) : '',
            (f.takeoffsPic||0) + (f.takeoffsSic||0),
            (f.landingsPic||0) + (f.landingsSic||0),
            flightTypeLabel(f.flightType, lang),
            (f.notes||'').replace(/[\n\r]+/g,' '),
          ];
        });
        const esc = (v) => {
          const s = String(v??'');
          if (/[",;\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
          return s;
        };
        const out = [headers.join(';'), ...rows.map(r => r.map(esc).join(';'))].join('\n');
        const blob = new Blob([out], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const pilName = pilotFilter==='all' ? 'tous_pilotes' : (pilots.find(p=>p.id===pilotFilter)?.lastName||pilotFilter);
        a.href = url; a.download = `logbook_${pilName}.csv`;
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
      }

      const limit = showAll ? sorted.length : Math.min(sorted.length, 200);
      const visible = sorted.slice(0, limit);

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between gap-2 flex-wrap">
            <h2 className="text-xl font-semibold">Staff — Logbook</h2>
            <div className="flex items-center gap-2 flex-wrap">
              <button className="btn btn-secondary" onClick={exportTableCSV}
                title={tx('Télécharger un fichier CSV (Excel, Numbers, Sheets)','Download a CSV file (Excel, Numbers, Sheets)')}>
                <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />Export CSV</span>
              </button>
              <button className="btn btn-secondary" onClick={exportTablePDF}
                title={tx('Imprimer ou sauvegarder en PDF (paysage A4)','Print or save as PDF (A4 landscape)')}>
                <span className="inline-flex items-center gap-1.5"><LucideIcon name="fileText" size={14} strokeWidth={2.25} />Export PDF</span>
              </button>
            </div>
          </div>

          <div className="card p-3">
            <div className="label">Pilote</div>
            <select className="select" value={pilotFilter} onChange={e=>setPilotFilter(e.target.value)}>
              <option value="all">Tous les pilotes</option>
              {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
            </select>
          </div>

          {visible.length === 0 && (
            <div className="card p-6 text-center text-[var(--text-dim)]">
              {pilotFilter==='all' ? 'Aucun vol enregistré.' : 'Aucun vol pour ce pilote.'}
            </div>
          )}

          {/* === DESKTOP : tableau compact qui tient à l'écran (≥ sm = 640px) ===
              On a fusionné Immat + Nom avion en 1 colonne (immat en haut, type en
              petit dessous). Les colonnes IFR / Nav / Duo / Nuit utilisent des
              icônes en en-tête pour gagner de la place. Le padding est réduit. */}
          {visible.length > 0 && (
            <div className="hidden sm:block card p-0 overflow-x-auto">
              <table className="w-full text-[11px]">
                <thead className="text-[var(--text-dim)] sticky top-0 bg-[var(--bg-card)] z-10">
                  <tr className="text-left uppercase tracking-wide">
                    <th className="px-1.5 py-2">Date</th>
                    <th className="px-1.5 py-2">{tx('Avion','Aircraft')}</th>
                    <th className="px-1.5 py-2">PIC</th>
                    <th className="px-1.5 py-2">SIC</th>
                    <th className="px-1.5 py-2" title={tx('Type de vol','Flight type')}>{tx('Type','Type')}</th>
                    <th className="px-1.5 py-2 text-center" title={tx('Régime de vol','Flight rules')}>{tx('Régime','Rules')}</th>
                    <th className="px-1.5 py-2 text-center" title={tx('Monomoteur','Single-engine')}>{tx('Monomoteur','SE')}</th>
                    <th className="px-1.5 py-2 text-center" title={tx('Multimoteur','Multi-engine')}>{tx('Multimoteur','ME')}</th>
                    <th className="px-1.5 py-2 text-center" title={tx('Heures aux instruments (IR/IFR)','Instrument hours (IR/IFR)')}>{tx('Heures IR','IR Hours')}</th>
                    <th className="px-1.5 py-2 text-center" title={tx('Décollages / Atterrissages','Take-offs / Landings')}>T/LDG</th>
                    <th className="px-1.5 py-2 text-center" title="Navigation">Nav</th>
                    <th className="px-1.5 py-2">{tx('Départ','Dep')}</th>
                    <th className="px-1.5 py-2">{tx('Arrivée','Arr')}</th>
                    <th className="px-1.5 py-2 text-center"></th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map(f => {
                    const ac = aircraft.find(a => a.id === f.aircraftId);
                    const pic = pilots.find(p => p.id === f.pilotId);
                    const sic = pilots.find(p => p.id === f.copilotId);
                    const ft = f.flightTime || 0;
                    const ifrTime = f.rules === 'IFR' ? ft : 0;
                    const navTime = f.isNavigation ? ft : 0;
                    // Heure cellule = mono ou multi selon nombre de moteurs de l'avion
                    const ec = ac?.engineCount || 1;
                    const seTime = ec <= 1 ? ft : 0;
                    const meTime = ec >= 2 ? ft : 0;
                    const totalTO  = ((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0);
                    const totalLDG = ((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0);
                    return (
                      <tr key={f.id} className="border-t border-[var(--border)] hover:bg-[var(--bg-elev)] cursor-pointer"
                          onClick={()=>{ setEditing(f); setShowForm(true); }}>
                        <td className="px-1.5 py-1.5 font-mono whitespace-nowrap">{f.date}</td>
                        <td className="px-1.5 py-1.5 leading-tight">
                          <div className="font-mono whitespace-nowrap">{ac?.registration||'?'}</div>
                          <div className="text-[10px] text-[var(--text-dim)] truncate max-w-[100px]">{ac?.type || '—'}</div>
                        </td>
                        <td className="px-1.5 py-1.5 truncate max-w-[110px]">{pic ? pilotDisplayName(pic) : '—'}</td>
                        <td className="px-1.5 py-1.5 truncate max-w-[110px]">{sic ? pilotDisplayName(sic) : '—'}</td>
                        <td className="px-1.5 py-1.5 whitespace-nowrap text-[10px]">{flightTypeLabel(f.flightType, lang)}</td>
                        <td className="px-1.5 py-1.5 text-center whitespace-nowrap">{f.rules || '—'}</td>
                        <td className="px-1.5 py-1.5 text-center font-mono">{seTime > 0 ? fmtDuration(seTime) : '—'}</td>
                        <td className="px-1.5 py-1.5 text-center font-mono">{meTime > 0 ? fmtDuration(meTime) : '—'}</td>
                        <td className="px-1.5 py-1.5 text-center font-mono">{ifrTime > 0 ? fmtDuration(ifrTime) : '—'}</td>
                        <td className="px-1.5 py-1.5 text-center font-mono whitespace-nowrap">
                          {totalTO}/{totalLDG}
                        </td>
                        <td className="px-1.5 py-1.5 text-center font-mono">{navTime > 0 ? fmtDuration(navTime) : '—'}</td>
                        <td className="px-1.5 py-1.5 font-mono whitespace-nowrap">{f.from || '—'}</td>
                        <td className="px-1.5 py-1.5 font-mono whitespace-nowrap">{f.to || '—'}</td>
                        <td className="px-1.5 py-1.5 text-center">
                          <button type="button"
                            className="text-[var(--err)] hover:opacity-80"
                            title={tx('Supprimer ce vol','Delete this flight')}
                            onClick={(e)=>{
                              e.stopPropagation();
                              if (confirm(tx(`Supprimer définitivement le vol du ${f.date} (${f.from}→${f.to}) ? Pense à exporter en JSON avant.`,`Permanently delete the flight on ${f.date} (${f.from}→${f.to})? Export JSON first as backup.`))) {
                                onDeleteFlight && onDeleteFlight(f.id);
                              }
                            }}><LucideIcon name="trash2" size={16} strokeWidth={2.25} /></button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* === MOBILE : cards verticales (1 vol = 1 card), aucun scroll horizontal === */}
          {visible.length > 0 && (
            <div className="sm:hidden space-y-2">
              {visible.map(f => {
                const ac = aircraft.find(a => a.id === f.aircraftId);
                const pic = pilots.find(p => p.id === f.pilotId);
                const sic = pilots.find(p => p.id === f.copilotId);
                const ft = f.flightTime || 0;
                const ifrTime = f.rules === 'IFR' ? ft : 0;
                const navTime = f.isNavigation ? ft : 0;
                const duoTime = isDuoFlight(f) ? ft : 0;
                const totalTO = ((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0);
                const totalLDG = ((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0);
                return (
                  <div key={f.id} className="card p-3 cursor-pointer"
                       onClick={()=>{ setEditing(f); setShowForm(true); }}>
                    <div className="flex items-start justify-between gap-2">
                      <div className="min-w-0 flex-1">
                        <div className="text-xs text-[var(--text-dim)] font-mono">{f.date}</div>
                        <div className="font-semibold tracking-wide font-mono">{f.from}→{f.to}</div>
                        <div className="text-xs text-[var(--text-dim)] truncate">
                          <span className="font-mono">{ac?.registration||'?'}</span> · {ac?.type||'—'} · {aircraftClass(ac)}
                        </div>
                      </div>
                      <div className="text-right flex-shrink-0">
                        <div className="text-[10px] uppercase text-[var(--text-dim)] font-semibold">FT</div>
                        <div className="font-mono tabular-nums text-base text-[var(--accent)]">{fmtDuration(f.flightTime)}</div>
                      </div>
                    </div>
                    <div className="text-xs mt-1 space-y-0.5">
                      {pic && <div><span className="text-[var(--accent)] font-semibold">PIC :</span> {pilotDisplayName(pic)}</div>}
                      {sic && <div><span className="text-[var(--accent)] font-semibold">SIC :</span> {pilotDisplayName(sic)}</div>}
                    </div>
                    <div className="flex flex-wrap gap-1 mt-2 text-[10px]">
                      {ifrTime > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="radio" size={11} strokeWidth={2.5} />IFR {fmtDuration(ifrTime)}</span>}
                      {navTime > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="compass" size={11} strokeWidth={2.5} />Nav {fmtDuration(navTime)}</span>}
                      {duoTime > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="users" size={11} strokeWidth={2.5} />Duo {fmtDuration(duoTime)}</span>}
                      {(f.nightTime||0) > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="moon" size={11} strokeWidth={2.5} />{fmtDuration(f.nightTime)}</span>}
                      {(totalTO + totalLDG) > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="planeLanding" size={11} strokeWidth={2.5} />{totalTO}/{totalLDG}</span>}
                      <span className="badge">{flightTypeLabel(f.flightType, lang)}</span>
                    </div>
                    {/* Bouton corbeille — même style que la colonne supprimer du tableau Staff desktop. */}
                    <div className="flex justify-end mt-2">
                      <button type="button"
                        className="text-[var(--err)] hover:opacity-80 p-1"
                        title="Supprimer ce vol"
                        onClick={(e)=>{
                          e.stopPropagation();
                          if (confirm(`Supprimer définitivement le vol du ${f.date} (${f.from}→${f.to}) ? Pense à exporter en JSON avant.`)) {
                            onDeleteFlight && onDeleteFlight(f.id);
                          }
                        }}>
                        <LucideIcon name="trash2" size={18} strokeWidth={2.25} />
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {sorted.length > limit && (
            <div className="text-center">
              <button className="btn btn-secondary" onClick={()=>setShowAll(true)}>
                Afficher les {sorted.length - limit} vols suivants
              </button>
            </div>
          )}

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing ? `Vol ${editing.date} ${editing.from}→${editing.to}` : 'Vol'}
            footer={editing && (
              <button onClick={()=>{
                if (confirm('Supprimer définitivement ce vol ? (Préfère un export JSON avant.)')) {
                  onDeleteFlight && onDeleteFlight(editing.id);
                  setShowForm(false);
                }
              }}
                className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
                Supprimer
              </button>
            )}
          >
            <FlightForm
              initial={editing}
              aircraft={aircraft}
              pilots={pilots}
              addExpense={addExpense}
              flights={flights}
              onCancel={()=>setShowForm(false)}
              onSave={(f)=>{ onUpsertFlight && onUpsertFlight(f); setShowForm(false); }}
            />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12j) ÉCRAN — DUTY (CARs 702 Canada)
    // ------------------------------------------------------------------
    function DutyForm({ initial, pilots, onSave, onCancel }) {
      const blank = {
        id: null,
        pilotId: pilots[0]?.id || '',
        date: todayZuluDate(),
        startTime: '',
        endTime: '',
        timezone: 'local',
        notes: '',
      };
      const [d, setD] = useState({ ...blank, ...(initial || {}) });
      function set(k, v) { setD(p => ({...p, [k]: v})); }
      const duration = dutyMinutes(d);
      const overLimit = duration > CARS_702_LIMITS.dailyDuty;

      return (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">Pilote</div>
              <select className="select" value={d.pilotId} onChange={e=>set('pilotId', e.target.value)}>
                {pilots.length === 0 && <option value="">— roster vide —</option>}
                {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
              </select>
            </div>
            <div>
              <div className="label">Date</div>
              <input type="date" className="input" value={d.date} onChange={e=>set('date', e.target.value)} />
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">Début duty (HHMM)</div>
              <input className="input font-mono" inputMode="numeric" maxLength={5}
                placeholder="0600"
                value={d.startTime} onChange={e=>set('startTime', e.target.value.replace(/[^0-9:]/g,''))} />
            </div>
            <div>
              <div className="label">Fin duty (HHMM)</div>
              <input className="input font-mono" inputMode="numeric" maxLength={5}
                placeholder="2000"
                value={d.endTime} onChange={e=>set('endTime', e.target.value.replace(/[^0-9:]/g,''))} />
            </div>
          </div>

          <div>
            <div className="label">Fuseau horaire</div>
            <div className="flex gap-2">
              {[['local','Heure locale'], ['zulu','Zulu (UTC)']].map(([id, label]) => (
                <button key={id} type="button"
                  onClick={()=>set('timezone', id)}
                  className={`btn ${d.timezone===id?'btn-primary':'btn-secondary'}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div className={`card p-3 text-center ${overLimit ? 'border-[var(--err)]' : ''}`}>
            <div className="label">Durée duty calculée</div>
            <div className={`text-3xl font-mono tabular-nums ${overLimit ? 'text-[var(--err)]' : 'text-[var(--accent)]'}`}>
              {fmtDuration(duration)}
            </div>
            {overLimit && (
              <div className="text-xs text-[var(--err)] mt-1">
                ⚠ Dépasse la limite CARs 702 de 14h ({fmtDuration(CARS_702_LIMITS.dailyDuty)})
              </div>
            )}
          </div>

          <div>
            <div className="label">Notes</div>
            <textarea className="textarea" rows={2} value={d.notes} onChange={e=>set('notes', e.target.value)} placeholder="Ex : déplacement avant vol, briefing client, attente passager…" />
          </div>

          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>Annuler</button>
            <button className="btn btn-primary" onClick={()=>{
              if (!d.pilotId) return alert('Sélectionne un pilote.');
              if (!d.startTime || !d.endTime) return alert('Heures de début et fin requises.');
              onSave({ ...d, id: d.id || 'dp_'+Date.now() });
            }}>Enregistrer</button>
          </div>
        </div>
      );
    }

    function DutyScreen({ flights, pilots = [], dutyPeriods = [], onAddOrUpdate, onDelete }) {
      const [pilotFilter, setPilotFilter] = useState(pilots[0]?.id || 'all');
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const today = todayZuluDate();

      // Cumuls flight time fenêtres glissantes pour le pilote sélectionné
      const cumuls = useMemo(() => ({
        d1:   flightTimeWindow(flights, pilotFilter, today, 1),
        d7:   flightTimeWindow(flights, pilotFilter, today, 7),
        d30:  flightTimeWindow(flights, pilotFilter, today, 30),
        d90:  flightTimeWindow(flights, pilotFilter, today, 90),
        d365: flightTimeWindow(flights, pilotFilter, today, 365),
      }), [flights, pilotFilter, today]);

      // Liste consolidée des duty effectives (auto depuis vols + override manuels)
      const effectiveDuties = useMemo(
        () => getEffectiveDuties(flights, dutyPeriods, pilotFilter),
        [flights, dutyPeriods, pilotFilter]
      );

      // Duty time aujourd'hui pour le pilote (somme des effectives sur today)
      const todayDutyMin = useMemo(() => {
        return effectiveDuties
          .filter(p => p.date === today)
          .reduce((sum, p) => sum + dutyMinutes(p), 0);
      }, [effectiveDuties, today]);

      // Cumuls duty time fenêtres glissantes (pour CAR 700.16 charge globale)
      const dutyCumuls = useMemo(() => ({
        d7:  dutyTimeWindow(effectiveDuties, today, 7),
        d30: dutyTimeWindow(effectiveDuties, today, 30),
      }), [effectiveDuties, today]);

      // Repos minimum depuis dernière duty (CAR 700.15) — inclut détection hors base
      const lastRest = useMemo(() => {
        const pilot = pilotFilter !== 'all' ? pilots.find(p => p.id === pilotFilter) : null;
        return minRestSinceLastDuty(effectiveDuties, today, flights, pilot);
      }, [effectiveDuties, today, flights, pilots, pilotFilter]);

      // Plus longue plage libre dans les 7 derniers jours (CAR 700.19)
      const longestFree7 = useMemo(
        () => longestFreeStretch(effectiveDuties, today, 7),
        [effectiveDuties, today]
      );

      // Jours OFF dans les 30 derniers jours (CAR 700.19)
      const offDays30 = useMemo(
        () => offDaysWindow(effectiveDuties, today, 30),
        [effectiveDuties, today]
      );

      const sortedPeriods = effectiveDuties; // déjà triées par getEffectiveDuties

      // Quand on save : si l'entry était une auto (id commence par "auto_"), on génère
      // un nouvel id manuel et on l'ajoute aux dutyPeriods. Sinon update direct.
      function handleSave(p) {
        const isAuto = (editing?.source === 'auto') || /^auto_/.test(p.id || '');
        const final = isAuto
          ? { ...p, id: 'dp_' + Date.now() }   // nouvelle entrée manuelle
          : p;
        // On n'envoie pas le champ 'source' dans dutyPeriods (recalculé à l'affichage)
        const { source, ...clean } = final;
        onAddOrUpdate(clean);
      }
      function handleDelete(id) {
        if (/^auto_/.test(id)) {
          alert("Cette duty est calculée automatiquement depuis les vols — on ne peut pas la supprimer (elle disparaîtra automatiquement si tu retires les vols correspondants).");
          return;
        }
        onDelete(id);
      }

      // Render barre de progression colorée vs limite
      function LimitBar({ label, value, limit }) {
        const pct = Math.min(100, (value / limit) * 100);
        const color = pct >= 90 ? 'var(--err)' : pct >= 70 ? 'var(--warn)' : 'var(--ok)';
        return (
          <div>
            <div className="flex justify-between text-sm mb-1">
              <span>{label}</span>
              <span className="font-mono tabular-nums">
                <span style={{ color }}>{fmtDuration(value)}</span>
                <span className="text-[var(--text-dim)]"> / {fmtDuration(limit)}</span>
              </span>
            </div>
            <div className="h-2 bg-[var(--bg-elev)] rounded">
              <div className="h-2 rounded" style={{ width: `${pct}%`, background: color, transition: 'width .3s ease' }} />
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div>
              <h2 className="text-xl font-semibold">⏱️ Duty — CARs 702</h2>
              <div className="text-xs text-[var(--text-dim)]">Travail aérien Canada — limites de service et de vol</div>
            </div>
            <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }} disabled={pilots.length===0}>
              + Nouvelle duty
            </button>
          </div>

          <div className="card p-3">
            <div className="label">Pilote suivi</div>
            <select className="select" value={pilotFilter} onChange={e=>setPilotFilter(e.target.value)}>
              <option value="all">Tous (cumulé)</option>
              {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
            </select>
          </div>

          {/* Cumuls flight time vs limites CARs 702 */}
          <div className="card p-3 space-y-3">
            <div className="label">Cumuls flight time vs limites CARs 702 — CAR 700.21</div>
            <LimitBar label="Aujourd'hui (vol)" value={cumuls.d1}   limit={CARS_702_LIMITS.dailyFlight} />
            <LimitBar label="7 jours glissants"  value={cumuls.d7}   limit={CARS_702_LIMITS.window7Flight} />
            <LimitBar label="30 jours glissants" value={cumuls.d30}  limit={CARS_702_LIMITS.window30Flight} />
            <LimitBar label="90 jours glissants" value={cumuls.d90}  limit={CARS_702_LIMITS.window90Flight} />
            <LimitBar label="365 jours glissants" value={cumuls.d365} limit={CARS_702_LIMITS.window365Flight} />
            <div className="mt-2">
              <Hint title="Légende des couleurs">
                Vert = &lt;70%, Jaune = 70-90%, Rouge = ≥90%. Calcul basé sur le Flight Time des vols où ce pilote est PIC ou SIC.
              </Hint>
            </div>
          </div>

          {/* Duty time : aujourd'hui + cumuls 7/30 jours */}
          <div className="card p-3 space-y-3">
            <div className="label">Duty time — CAR 700.16</div>
            <LimitBar label={`Aujourd'hui (${today})`} value={todayDutyMin} limit={CARS_702_LIMITS.dailyDuty} />
            <LimitBar label="Duty cumulé 7 jours"  value={dutyCumuls.d7}  limit={7  * CARS_702_LIMITS.dailyDuty} />
            <LimitBar label="Duty cumulé 30 jours" value={dutyCumuls.d30} limit={30 * CARS_702_LIMITS.dailyDuty} />
            <div className="mt-2">
              <Hint title="Limite quotidienne CARs 702">
                Limite quotidienne : 14h de duty consécutive. Le cumul 7/30 jours sert à
                visualiser la charge globale ; les seuils affichés sont les maxima théoriques (14h × n jours).
              </Hint>
            </div>
          </div>

          {/* Repos & jours OFF — CAR 700.15 et 700.19 */}
          <div className="card p-3 space-y-3">
            <div className="label">Repos & jours OFF — CAR 700.15 / 700.19</div>
            {/* Repos depuis la fin de la dernière duty — règle ajustée si hors base */}
            {lastRest ? (() => {
              const requiredRest = lastRest.awayFromBase
                ? CARS_702_LIMITS.minRestAfterDutyAwayFromBase
                : CARS_702_LIMITS.minRestAfterDuty;
              const ok = lastRest.restMin >= requiredRest;
              return (
                <div>
                  <div className="flex justify-between text-sm mb-1">
                    <span>
                      Repos depuis la dernière duty
                      {lastRest.awayFromBase
                        ? <span className="ml-1 text-[var(--warn)] text-xs">(hors base)</span>
                        : <span className="ml-1 text-[var(--text-dim)] text-xs">(à la base)</span>}
                    </span>
                    <span className="font-mono tabular-nums">
                      <span style={{ color: ok ? 'var(--ok)' : 'var(--err)' }}>{fmtDuration(lastRest.restMin)}</span>
                      <span className="text-[var(--text-dim)]"> / min {fmtDuration(requiredRest)}</span>
                    </span>
                  </div>
                  {!ok && (
                    <div className="text-xs text-[var(--err)]">
                      ⚠ {lastRest.awayFromBase
                        ? 'Repos minimum 10h hors base (8h sommeil + transport/repas/hygiène) non respecté.'
                        : 'Repos minimum 8h après duty non respecté.'}
                    </div>
                  )}
                  {pilotFilter === 'all' && (
                    <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                      Sélectionne un pilote pour la détection hors base (basée sur baseAirport du pilote).
                    </div>
                  )}
                </div>
              );
            })() : (
              <div className="text-xs text-[var(--text-dim)] italic">Pas encore de duty terminée — repos non calculable.</div>
            )}
            {/* Plus longue période free 7 jours (≥ 36h obligatoire) */}
            <div>
              <div className="flex justify-between text-sm mb-1">
                <span>Plus longue période libre (7 derniers jours)</span>
                <span className="font-mono tabular-nums">
                  <span style={{ color: longestFree7 >= CARS_702_LIMITS.timeFree36hIn7Days ? 'var(--ok)' : 'var(--err)' }}>
                    {fmtDuration(longestFree7)}
                  </span>
                  <span className="text-[var(--text-dim)]"> / min {fmtDuration(CARS_702_LIMITS.timeFree36hIn7Days)}</span>
                </span>
              </div>
              {longestFree7 < CARS_702_LIMITS.timeFree36hIn7Days && (
                <div className="text-xs text-[var(--err)]">⚠ 36h consécutives libres requis dans toute fenêtre 7 jours.</div>
              )}
            </div>
            {/* Jours OFF dans les 30 derniers jours (≥ 13 obligatoire) */}
            <div>
              <div className="flex justify-between text-sm mb-1">
                <span>Jours OFF dans les 30 derniers jours</span>
                <span className="font-mono tabular-nums">
                  <span style={{ color: offDays30 >= CARS_702_LIMITS.timeFreeDaysIn30 ? 'var(--ok)' : 'var(--err)' }}>
                    {offDays30} j
                  </span>
                  <span className="text-[var(--text-dim)]"> / min {CARS_702_LIMITS.timeFreeDaysIn30} j</span>
                </span>
              </div>
              {offDays30 < CARS_702_LIMITS.timeFreeDaysIn30 && (
                <div className="text-xs text-[var(--err)]">⚠ Au moins 13 jours OFF (sans duty) requis sur toute fenêtre 30 jours.</div>
              )}
            </div>
            <div className="mt-1">
              <Hint title="Règles 700.15 / 700.19">
                700.15 — Période de repos = au moins 8 h de sommeil consécutif en hébergement
                convenable + transport + temps repas/hygiène. À la base (pilote rentre chez lui),
                on retient 8 h. Hors base, on compte 10 h car l'opérateur doit fournir
                hébergement et transport. Détection hors base : dernière arrivée du jour ≠ baseAirport
                du pilote.
                {' '}700.19 — 36 h consécutives libres dans toute fenêtre de 7 jours +
                13 jours OFF dans toute fenêtre de 30 jours.
              </Hint>
            </div>
          </div>

          {/* Historique des périodes duty (auto + manuelles consolidées) */}
          <div className="card p-3">
            <div className="flex items-center justify-between gap-2 flex-wrap">
              <div className="label !mb-0">Périodes duty (auto depuis vols + overrides manuels)</div>
              <div className="text-xs text-[var(--text-dim)]">
                {sortedPeriods.filter(p=>p.source==='auto').length} auto · {sortedPeriods.filter(p=>p.source==='manual').length} manuelles
              </div>
            </div>
            {sortedPeriods.length === 0 && (
              <div className="text-sm text-[var(--text-dim)] italic mt-2">
                Aucune duty. Les duty se calculent automatiquement dès qu'un vol est saisi
                (Block Out − 1h → Block In + 1h). Bouton « + Nouvelle duty » pour ajouter une duty
                manuelle (jour sans vol, briefing, déplacement, etc.).
              </div>
            )}
            <div className="space-y-1 mt-2">
              {sortedPeriods.slice(0, 100).map(p => {
                const pi = pilots.find(x => x.id === p.pilotId);
                const dur = dutyMinutes(p);
                const over = dur > CARS_702_LIMITS.dailyDuty;
                const isAuto = p.source === 'auto';
                return (
                  <button key={p.id} type="button"
                    className="w-full text-left p-2 rounded hover:bg-[var(--bg-elev)] flex items-center justify-between gap-2"
                    onClick={()=>{ setEditing(p); setShowForm(true); }}>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm flex items-center gap-2 flex-wrap">
                        <span className="font-mono">{p.date}</span>
                        <span className="text-[var(--text-dim)]">·</span>
                        <span className="font-mono">{p.startTime} → {p.endTime}</span>
                        <span className="text-[var(--text-dim)]">·</span>
                        <span className="text-[var(--text-dim)]">{p.timezone === 'zulu' ? 'Z' : 'local'}</span>
                        <span className="badge"
                          style={{
                            background: isAuto ? 'rgba(56,189,248,.15)' : 'rgba(251,191,36,.15)',
                            color: isAuto ? 'var(--accent)' : 'var(--warn)',
                            borderColor: isAuto ? 'var(--accent)' : 'var(--warn)',
                          }}>
                          {isAuto ? '⚙ Auto' : '✎ Manuel'}
                        </span>
                      </div>
                      <div className="text-xs text-[var(--text-dim)] truncate">
                        {pi ? pilotDisplayName(pi) : '— pilote —'}{p.notes && ` · ${p.notes}`}
                      </div>
                    </div>
                    <span className={`badge font-mono ${over ? '!text-[var(--err)] !border-[var(--err)]' : ''}`}>
                      {fmtDuration(dur)}{over && ' ⚠'}
                    </span>
                  </button>
                );
              })}
              {sortedPeriods.length > 100 && (
                <div className="text-xs text-[var(--text-dim)] text-center pt-2">
                  +{sortedPeriods.length - 100} entrées plus anciennes.
                </div>
              )}
            </div>
            <div className="mt-3 border-t border-[var(--border-soft)] pt-2">
              <Hint title="Règle de calcul auto">
                Chaque jour avec un ou plusieurs vols génère une duty = (1<sup>er</sup> Block Out − 1h) → (dernier Block In + 1h).
                Cliquer sur une duty <em>auto</em> permet de la modifier manuellement — elle devient alors une duty
                <em> manuelle</em> qui prend le pas sur l'auto.
              </Hint>
            </div>
          </div>

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing
              ? (editing.source === 'auto' ? 'Modifier la duty (depuis auto)' : 'Modifier la duty manuelle')
              : 'Nouvelle duty manuelle'}
            footer={editing && (
              <button onClick={()=>{
                if (editing.source === 'auto') {
                  alert("Cette duty est calculée automatiquement depuis les vols. Pour la retirer, supprime les vols correspondants dans le carnet.");
                  return;
                }
                if (confirm('Supprimer cette période duty manuelle ? La duty auto reprendra si des vols existent ce jour-là.')) {
                  handleDelete(editing.id); setShowForm(false);
                }
              }}

    // ------------------------------------------------------------------
    // ------------------------------------------------------------------
    // 12k) SYNCHRO CLOUD via GITHUB GIST (privé)
    // ------------------------------------------------------------------
    // Stratégie : un gist privé contient un fichier `aerodeck.json` avec tout
    // l'état persisté de l'app. Chaque appareil :
    //   - pull le gist au démarrage (si plus récent que local → applique)
    //   - push (debounced 5 sec) à chaque modification locale
    //   - polle le gist toutes les 30 sec pour détecter les changements distants
    // Conflit résolu en "last write wins" basé sur __sync.lastWrittenAt local.

    async function ghCreateGist(token, data) {
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          description: 'AeroDeck — données synchronisées',
          public: false,
          files: { 'aerodeck.json': { content: JSON.stringify(data, null, 2) } }
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} : ${(await res.text()).slice(0,200)}`);
      const j = await res.json();
      return j.id;
    }
    async function ghReadGist(token, gistId) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
        cache: 'no-store',
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} : ${(await res.text()).slice(0,200)}`);
      const j = await res.json();
      const file = j.files && j.files['aerodeck.json'];
      if (!file) throw new Error('Le gist ne contient pas aerodeck.json');
      // GitHub tronque le champ "content" pour les fichiers > ~1MB et expose
      // un raw_url permettant de récupérer le contenu complet. Sans ce fallback
      // on aurait un JSON.parse "Unterminated string" sur les gros gists.
      let content = file.content;
      if (file.truncated && file.raw_url) {
        const rawRes = await fetch(file.raw_url, { cache: 'no-store' });
        if (!rawRes.ok) throw new Error(`Lecture raw_url : HTTP ${rawRes.status}`);
        content = await rawRes.text();
      }
      let parsed;
      try { parsed = JSON.parse(content); }
      catch(e) { throw new Error('aerodeck.json malformé : ' + e.message); }
      return { data: parsed, updatedAt: j.updated_at };
    }
    async function ghWriteGist(token, gistId, data) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          files: { 'aerodeck.json': { content: JSON.stringify(data, null, 2) } }
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} : ${(await res.text()).slice(0,200)}`);
      return await res.json();
    }

                <img src={m.photo} alt="" className="rounded-lg max-h-48 mx-auto" />
                <div className="flex justify-center gap-2">
                  <button type="button" className="btn btn-secondary" onClick={()=>fileRef.current?.click()}>Remplacer</button>
                  <button type="button" className="btn btn-danger" onClick={()=>{ if (confirm('Retirer la photo ?')) set('photo',''); }}><span className="inline-flex items-center gap-1"><LucideIcon name="trash2" size={12} strokeWidth={2.5} />Retirer</span></button>

        </div>
      );
    }

    function MaintenanceScreen({ maintenance, aircraft, flights, onAddOrUpdate, onDelete, onAircraftUpdate, mechanicVisits=[], onMechanicVisitUpsert, onMechanicVisitDelete }) {
      const t = useT();
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const [filterAc, setFilterAc] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all');
      const [showMechVisitForm, setShowMechVisitForm] = useState(false);
      const [editingMechVisit, setEditingMechVisit] = useState(null);

      // TTSN actuel d'un avion = ttsnAfter du dernier vol enregistré pour cet avion,
      // sinon valeur initiale ttsn / airframeStartHours. Sert au calcul Hours left.
      function currentTtsnFor(ac) {
        const candidates = (flights || [])
          .filter(f => f.aircraftId === ac.id && f.ttsnAfter && !isNaN(parseFloat(f.ttsnAfter)))
          .sort((x, y) => (y.date || '').localeCompare(x.date || ''));
        if (candidates.length > 0) return parseFloat(candidates[0].ttsnAfter);
        if (ac.ttsn != null && ac.ttsn !== '') return parseFloat(ac.ttsn) || 0;
        return parseFloat(ac.airframeStartHours) || 0;
      }
      // Met à jour les champs maint100hLast / maint100hNext sur l'avion via le setter racine.
      function updateMaint100h(ac, key, value) {
        if (!onAircraftUpdate) return;
        onAircraftUpdate({ ...ac, [key]: value });
      }

      const filtered = useMemo(() => {
        let arr = [...maintenance];
        if (filterAc !== 'all') arr = arr.filter(m => m.aircraftId === filterAc);
        if (filterStatus !== 'all') arr = arr.filter(m => m.status === filterStatus);
        arr.sort((a,b) => (b.openedAt||'').localeCompare(a.openedAt||''));
        return arr;
      }, [maintenance, filterAc, filterStatus]);

      function sevObj(id){ return MX_SEVERITY.find(s=>s.id===id) || MX_SEVERITY[0]; }
      function statusObj(id){ return MX_STATUS.find(s=>s.id===id) || MX_STATUS[0]; }

      const openCount = maintenance.filter(m => m.status !== 'resolved').length;

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-xl font-semibold">{t('mx.title')}</h2>
              {openCount > 0 && <div className="text-xs text-[var(--warn)]">⚠ {openCount} défaillance(s) non résolue(s)</div>}
            </div>
            <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }}>{t('mx.new')}</button>
          </div>

          {/* Suivi 100h — un bloc par avion réel.
              - Last update (flight hours) : heures auxquelles la dernière 100h a été faite (saisie manuelle)
              - Next due (flight hours)    : heures auxquelles la prochaine 100h est due (saisie manuelle, par défaut Last + 100)
              - Hours left                 : heures restantes = Next due - TTSN actuel (auto). Code couleur :
                                              rouge si ≤ 0, orange si ≤ 10, vert sinon.
              Les valeurs sont stockées sur l'avion (maint100hLast / maint100hNext). */}
          {aircraft.filter(a => (a.kind||'real')==='real').length > 0 && (
            <div className="card p-3 space-y-3">
              <div className="flex items-center gap-2">
                <LucideIcon name="wrench" size={18} strokeWidth={2.25} />
                <div className="font-semibold">Suivi 100h</div>
              </div>
              {aircraft.filter(a => (a.kind||'real')==='real').map(ac => {
                const ttsnNow = currentTtsnFor(ac);
                const last = ac.maint100hLast != null && ac.maint100hLast !== '' ? parseFloat(ac.maint100hLast) : null;
                const next = ac.maint100hNext != null && ac.maint100hNext !== '' ? parseFloat(ac.maint100hNext) : null;
                const hoursLeft = (next != null && !isNaN(next)) ? (next - ttsnNow) : null;
                const leftColor = hoursLeft == null ? 'var(--text-dim)'
                  : hoursLeft <= 0 ? 'var(--err)'
                  : hoursLeft <= 10 ? 'var(--warn)'
                  : 'var(--ok)';
                const leftLabel = hoursLeft == null ? '—'
                  : hoursLeft <= 0 ? `${Math.abs(hoursLeft).toFixed(1)} h en dépassement`
                  : `${hoursLeft.toFixed(1)} h restantes`;
                return (
                  <div key={ac.id} className="bg-[var(--bg-elev)] p-3 rounded-lg space-y-2">
                    <div className="flex items-center gap-2 text-sm font-medium">
                      <span className="font-mono text-[var(--accent)]">{ac.registration}</span>
                      <span className="text-[var(--text-dim)]">·</span>
                      <span className="text-[var(--text-dim)]">{ac.type}</span>
                      <span className="ml-auto text-xs font-mono text-[var(--text-dim)]">TTSN actuel : {ttsnNow.toFixed(1)} h</span>
                    </div>
                    <div className="space-y-2">
                      <div>
                        <div className="label whitespace-nowrap">Last update (flight hours)</div>
                        <input type="number" step="0.1" className="input font-mono"
                          placeholder="ex: 4500"
                          value={ac.maint100hLast || ''}
                          onChange={e=>{
                            const v = e.target.value;
                            updateMaint100h(ac, 'maint100hLast', v);
                            // Si Next vide, pré-remplir = Last + 100
                            if (v && (ac.maint100hNext == null || ac.maint100hNext === '')) {
                              const n = parseFloat(v);
                              if (!isNaN(n)) updateMaint100h({ ...ac, maint100hLast: v }, 'maint100hNext', String(n + 100));
                            }
                          }} />
                      </div>
                      <div>
                        <div className="label whitespace-nowrap">Next due (flight hours)</div>
                        <input type="number" step="0.1" className="input font-mono"
                          placeholder={last != null ? `ex: ${(last+100).toFixed(1)}` : 'ex: 4600'}
                          value={ac.maint100hNext || ''}
                          onChange={e=>updateMaint100h(ac, 'maint100hNext', e.target.value)} />
                      </div>
                      <div>
                        <div className="label whitespace-nowrap">Hours left (auto)</div>
                        <div className="input font-mono tabular-nums flex items-center" style={{ color: leftColor, borderColor: leftColor }}>
                          {leftLabel}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Visites mécanicien — déplacements + frais (billet avion, hôtel, voiture, taxi, etc.).
              Si une visite concerne plusieurs avions, le total est divisé par le nombre d'avions
              pour le coût d'exploitation. La case "Compter dans le coût d'exploitation" permet
              d'exclure les visites qui ne devraient pas peser sur les stats (ex. déplacement raté). */}
          <div className="card p-3">
            <div className="flex items-center justify-between mb-2">
              <div className="label !mb-0 inline-flex items-center gap-2">
                <LucideIcon name="briefcase" size={16} strokeWidth={2.25} />

                <div key={m.id} className="card p-3" onClick={()=>{ setEditing(m); setShowForm(true); }}>

                      <div className="flex items-center gap-2">
                        <span className="badge" style={{ borderColor: sev.color, color: sev.color }}>{sev.label}</span>
                        <span className="badge">{st.label}</span>
                        <span className="text-xs text-[var(--text-dim)]">{m.openedAt}</span>

    // Formulaire visite mécanicien : déplacement + frais répartis sur N avions
    // ------------------------------------------------------------------
    function MechanicVisitForm({ initial, aircraft, onSave, onCancel }) {
      const blank = {
        id: null,
        date: todayZuluDate(),
        mechanic: '',
        amount: '',
        currency: 'EUR',
        aircraftIds: [],
        includeInOpex: true,
        notes: '',
      };
      const [v, setV] = useState({ ...blank, ...(initial||{}), aircraftIds: (initial?.aircraftIds || blank.aircraftIds) });

      function toggleAircraft(id) {
        setV(p => {
          const arr = Array.isArray(p.aircraftIds) ? p.aircraftIds : [];
          return { ...p, aircraftIds: arr.includes(id) ? arr.filter(x => x !== id) : [...arr, id] };
        });

      const split = (v.aircraftIds||[]).length > 0 ? total / v.aircraftIds.length : total;

      return (

          <div className="grid grid-cols-2 gap-3">

              <div className="label whitespace-nowrap">Date</div>
              <input type="date" className="input" value={v.date} onChange={e=>set('date', e.target.value)} />
            </div>
            <div>
              <div className="label whitespace-nowrap">Mécanicien <span className="normal-case tracking-normal opacity-70">(opt.)</span></div>
              <input className="input" placeholder="ex: Jean Dupont" value={v.mechanic} onChange={e=>set('mechanic', e.target.value)} />

          </div>
          <div className="grid grid-cols-3 gap-3">
            <div className="col-span-2">
              <div className="label whitespace-nowrap">Montant total déplacement & frais</div>
              <input type="number" step="0.01" className="input font-mono text-lg" placeholder="0.00" value={v.amount} onChange={e=>set('amount', e.target.value)} />
            </div>
            <div>
              <div className="label whitespace-nowrap">Devise</div>
              <select className="select" value={v.currency} onChange={e=>set('currency', e.target.value)}>

              </select>
            </div>
          </div>
          <div className="card p-3">
            <div className="label">Avions concernés (cocher tous ceux sur lesquels le mécanicien intervient)</div>

              <div className="text-xs text-[var(--text-dim)]">Aucun avion enregistré.</div>
            ) : (
              <div className="space-y-1">
                {aircraft.filter(a => (a.kind||'real')==='real').map(a => {
                  const checked = (v.aircraftIds||[]).includes(a.id);
                  return (
                    <label key={a.id} className="flex items-center gap-2 select-none cursor-pointer p-2 rounded hover:bg-[var(--bg-elev)]">

              <div className="text-xs text-[var(--accent)] mt-2 font-mono">
                Coût réparti = {total.toFixed(2)} {v.currency} / {v.aircraftIds.length} avions = <strong>{split.toFixed(2)} {v.currency} par avion</strong>
              </div>

          <label className="flex items-center gap-2 select-none cursor-pointer bg-[var(--bg-card)] p-2 rounded">

              checked={!!v.includeInOpex}

            <span className="text-sm font-medium">Compter dans le coût d'exploitation</span>
            <span className="text-xs text-[var(--text-dim)]">— décoche pour exclure cette visite des stats</span>
          </label>
          <div>
            <div className="label">Notes <span className="normal-case tracking-normal opacity-70">(billet d'avion, hôtel, voiture, taxi…)</span></div>
            <textarea className="textarea" rows={3} placeholder="ex : Vol AC123 Montréal-Bromont 350 CAD, hôtel 2 nuits 280 CAD, location 80 CAD"
              value={v.notes} onChange={e=>set('notes', e.target.value)} />

          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>Annuler</button>
            <button className="btn btn-primary" onClick={()=>{
              if (!v.amount || parseFloat(v.amount) <= 0) return alert('Renseigne un montant.');
              if ((v.aircraftIds||[]).length === 0) return alert('Sélectionne au moins un avion concerné.');

        </div>

    function CompanyDocForm({ initial, aircraft, onSave, onCancel }) {
      const blank = {
        id: null,
        type: 'ops_a',
        title: '',
        version: '',
        effectiveDate: todayZuluDate(),
        aircraftId: '',
        fileName: '',
        mime: '',
        dataUrl: '',
        notes: '',
        addedAt: Date.now(),
      };
      const [d, setD] = useState({ ...blank, ...(initial||{}) });
      const [busy, setBusy] = useState(false);
      const fileRef = useRef(null);
      function set(k,v){ setD(p=>({...p,[k]:v})); }

      async function handleFile(e) {
        const f = e.target.files?.[0]; if (!f) return;
        setBusy(true);
        try {
          const stored = await fileToStoredDoc(f, d.type);
          set('fileName', stored.fileName);
          set('mime', stored.mime);
          set('dataUrl', stored.dataUrl);
          if (!d.title) set('title', f.name.replace(/\.[^.]+$/,''));
        } catch(err){ alert(err.message); }
        finally { setBusy(false); e.target.value=''; }
      }

      return (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label whitespace-nowrap">Type</div>
              <select className="select" value={d.type} onChange={e=>set('type', e.target.value)}>
                {COMPANY_DOC_TYPES.map(t => <option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}
              </select>

            <div>
              <div className="label whitespace-nowrap">Avion lié <span className="normal-case tracking-normal opacity-70">(opt.)</span></div>

          </div>
          <div>
            <div className="label">Titre</div>
            <input className="input" placeholder="ex: OPS A — Édition 4 Rév. 12" value={d.title} onChange={e=>set('title', e.target.value)} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">Version / Révision</div>
              <input className="input" placeholder="Rév 12" value={d.version} onChange={e=>set('version', e.target.value)} />
            </div>
            <div>
              <div className="label">Date d'application</div>
              <input type="date" className="input" value={d.effectiveDate} onChange={e=>set('effectiveDate', e.target.value)} />
            </div>
          </div>
          <div className="card p-3">
            <div className="label">Fichier (PDF ou image)</div>
            {d.dataUrl ? (
              <div className="flex items-center gap-3">
                <div className="text-2xl">{d.mime==='application/pdf'?'📄':'🖼️'}</div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm truncate">{d.fileName}</div>
                  <div className="text-xs text-[var(--text-dim)]">{d.mime}</div>
                </div>
                <button type="button" className="btn btn-secondary" onClick={()=>fileRef.current?.click()} disabled={busy}>Remplacer</button>
              </div>
            ) : (
              <button type="button" className="btn btn-primary" disabled={busy} onClick={()=>fileRef.current?.click()}>
                {busy ? 'Import…' : (
                  <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />Choisir un fichier</span>
                )}

          </div>
          <div>
            <div className="label">Notes</div>
            <textarea className="textarea" rows={2} value={d.notes} onChange={e=>set('notes', e.target.value)} />
          </div>
          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>Annuler</button>
            <button className="btn btn-primary" onClick={()=>{
              if (!d.title) return alert('Titre requis.');
              onSave({ ...d, id: d.id || 'cdoc_'+Date.now() });
            }}>Enregistrer</button>
          </div>
        </div>
      );
    }

    function CompanyDocsScreen({ companyDocs, aircraft, onAddOrUpdate, onDelete }) {
      const t = useT();
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);

        if (filterAc !== 'all') arr = arr.filter(d => (d.aircraftId||'') === (filterAc==='global'?'':filterAc));
        arr.sort((a,b) => (b.effectiveDate||'').localeCompare(a.effectiveDate||''));
        return arr;

                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />

    // ------------------------------------------------------------------
    // 12e) ÉCRAN — PILOTES (roster équipage)
    // ------------------------------------------------------------------

    const LICENSE_TYPES = ['PPL','CPL','ATPL','LAPL','MPL','IR','CRI','FI','TRI'];
    const MEDICAL_CLASSES = ['Class 1','Class 2','LAPL','BasicMed','Autre'];
    // Autorités aviation : pour pilotes ayant des licences de plusieurs pays
    // (FAA, Transport Canada, EASA, etc.). Affichées dans le sélecteur de licence
    // avec emoji drapeau pour identification visuelle rapide.
    const LICENSE_AUTHORITIES = [
      { id: 'faa',  label: 'FAA',  flag: '🇺🇸' },
      { id: 'easa', label: 'EASA', flag: '🇪🇺' },
      { id: 'tc',   label: 'TC',   flag: '🇨🇦' },
    ];
    function authorityLabel(id) {
      const found = LICENSE_AUTHORITIES.find(a => a.id === id);
      return found ? `${found.flag} ${found.label}` : (id || '—');
    }

    // ------- Helpers dates pour règle médicale -------
    // Ajoute n mois à une date ISO (YYYY-MM-DD). Si le jour cible n'existe pas dans
    // le mois cible (ex : 31 août + 6 mois → 28/29 février), on prend le dernier jour.
    function addMonths(dateISO, months) {
      if (!dateISO) return null;
      const d = new Date(dateISO + 'T00:00:00Z');
      if (isNaN(d.getTime())) return null;
      const y = d.getUTCFullYear();
      const m = d.getUTCMonth();
      const day = d.getUTCDate();
      const targetY = y + Math.floor((m + months) / 12);
      const targetM = ((m + months) % 12 + 12) % 12;
      const lastDay = new Date(Date.UTC(targetY, targetM + 1, 0)).getUTCDate();
      const finalDay = Math.min(day, lastDay);
      return new Date(Date.UTC(targetY, targetM, finalDay)).toISOString().slice(0, 10);
    }

    // Âge actuel à partir d'une date de naissance ISO
    function computeAge(dobISO, refDate) {
      if (!dobISO) return null;
      const dob = new Date(dobISO + 'T00:00:00Z');
      const ref = refDate ? new Date(refDate + 'T00:00:00Z') : new Date();
      if (isNaN(dob.getTime()) || isNaN(ref.getTime())) return null;
      let age = ref.getUTCFullYear() - dob.getUTCFullYear();
      const m = ref.getUTCMonth() - dob.getUTCMonth();
      if (m < 0 || (m === 0 && ref.getUTCDate() < dob.getUTCDate())) age--;
      return age;
    }

    // Calcule la date de renouvellement du médical en fonction de l'âge au moment
    // de l'examen : avant 40 ans → +12 mois, à partir de 40 ans → +6 mois.
    // Renvoie null si une donnée manque.
    function computeMedicalExpiry(medicalDateISO, dobISO) {
      if (!medicalDateISO || !dobISO) return null;
      const ageAtExam = computeAge(dobISO, medicalDateISO);
      if (ageAtExam == null) return null;
      const months = ageAtExam >= 40 ? 6 : 12;
      return addMonths(medicalDateISO, months);
    }

    function pilotDisplayName(p) {
      if (!p) return '';
      const full = [p.firstName, p.lastName].filter(Boolean).join(' ').trim();
      if (p.callsign) return full ? `${full} (${p.callsign})` : p.callsign;
      return full || '— sans nom —';
    }

    // Construit une licence vide. Un pilote peut en avoir plusieurs (FAA, Transport Canada, EASA…)
    function blankLicense() {
      return {
        id: 'lic_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        authority: 'easa',          // id dans LICENSE_AUTHORITIES
        type: 'CPL',                // PPL, CPL, ATPL…
        number: '',                 // N° de licence
        expiry: '',                 // YYYY-MM-DD
        ratings: '',                // ex: "ME, IR, B737"
        // Médical attaché à CETTE licence (chaque pays a son propre médical)
        medicalClass: 'Class 1',
        medicalDate: '',
        medicalExpiry: '',
      };
    }
    // Migration : convertit les anciens champs licence/medical isolés en 1 entrée licenses[]
    function migratePilotLicenses(p) {
      if (Array.isArray(p?.licenses) && p.licenses.length > 0) return p;
      // Si un ancien pilote a au moins un champ legacy → on construit 1 licence à partir de ça
      const hasLegacy = p && (p.licenseType || p.licenseNumber || p.licenseExpiry || p.medicalClass || p.medicalDate || p.medicalExpiry || p.ratings);
      if (!hasLegacy) {
        return { ...p, licenses: [blankLicense()] };
      }
      const lic = {
        ...blankLicense(),
        authority: 'easa',  // valeur par défaut — l'utilisateur peut éditer
        type: p.licenseType || 'CPL',
        number: p.licenseNumber || '',
        expiry: p.licenseExpiry || '',
        ratings: p.ratings || '',
        medicalClass: p.medicalClass || 'Class 1',
        medicalDate: p.medicalDate || '',
        medicalExpiry: p.medicalExpiry || '',
      };
      return { ...p, licenses: [lic] };
    }

          const next = { ...prev };

          // Auto-calcul medicalExpiry quand medicalDate change ou dateOfBirth (au niveau pilote)

          list[idx] = lic;
          next.licenses = list;

                    <div className="mt-2 pt-2 border-t border-[var(--border-soft)]">

                        <div>
                          <div className="label whitespace-nowrap">{tx('Date d\'examen','Exam date')}</div>

    function PilotsScreen({ pilots, flights, onAddOrUpdate, onDelete }) {
      const t = useT();
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);

      function flightsCountFor(pilotId) {
        return flights.filter(f => f.pilotId === pilotId || f.copilotId === pilotId).length;
      }
      function isExpiringSoon(dateStr, days=60) {
        if (!dateStr) return false;
        const diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
        return diff <= days;
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <h2 className="text-xl font-semibold">{t('pilot.title')}</h2>
            <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }}>{t('pilot.new')}</button>
          </div>

          {pilots.length === 0 && (
            <div className="card p-6 text-center text-[var(--text-dim)]">
              {t('pilot.empty')}
            </div>
          )}

          <div className="space-y-2">
            {pilots.map(p => {
              const count = flightsCountFor(p.id);
              const medicalSoon = isExpiringSoon(p.medicalExpiry);
              const licenseSoon = isExpiringSoon(p.licenseExpiry);
              return (
                <div key={p.id} className="card p-3" onClick={()=>{ setEditing(p); setShowForm(true); }}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="min-w-0">
                      <div className="text-lg font-semibold tracking-wide truncate">{pilotDisplayName(p)}</div>
                      <div className="text-sm text-[var(--text-dim)] truncate">
                        {p.licenseType} {p.licenseNumber && `· ${p.licenseNumber}`}
                        {p.baseAirport && ` · base ${p.baseAirport}`}
                        {p.dateOfBirth && computeAge(p.dateOfBirth) != null && ` · ${computeAge(p.dateOfBirth)} ans`}
                      </div>
                      {/* Drapeaux des autorités émettrices si plusieurs licences */}
                      {Array.isArray(p.licenses) && p.licenses.length > 0 && (
                        <div className="flex flex-wrap gap-1 mt-1">
                          {p.licenses.map((lic, i) => {
                            const auth = LICENSE_AUTHORITIES.find(a => a.id === lic.authority);
                            return (
                              <span key={lic.id || i} className="badge text-[10px]" title={auth ? auth.label : lic.authority}>
                                {auth ? auth.flag : '🌐'} {lic.type || '—'}{lic.number ? ` ${lic.number}` : ''}
                              </span>
                            );
                          })}
                        </div>
                      )}
                      {p.ratings && <div className="text-xs text-[var(--text-dim)] truncate">QT : {p.ratings}</div>}
                      {p.medicalExpiry && (
                        <div className="text-xs text-[var(--text-dim)] truncate">
                          Renouvellement médical : {p.medicalExpiry}
                          {p.dateOfBirth && p.medicalDate && computeAge(p.dateOfBirth, p.medicalDate) != null && (
                            <> ({computeAge(p.dateOfBirth, p.medicalDate) >= 40 ? '6 mois' : '12 mois'})</>
                          )}

                      )}
                    </div>
                    <div className="text-right text-xs text-[var(--text-dim)]">
                      <div>{count} vol(s)</div>
                    </div>
                  </div>
                  {(medicalSoon || licenseSoon) && (
                    <div className="mt-2 text-xs text-[var(--warn)]">
                      ⚠ {medicalSoon && `Médical exp. ${p.medicalExpiry}`} {medicalSoon && licenseSoon && ' · '}

                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing ? 'Modifier le pilote' : 'Nouveau pilote'}
            footer={editing && (
              <button onClick={()=>{
                if (confirm('Supprimer ce pilote du roster ? Les vols existants gardent leur référence (id non résolu).')) {
                  onDelete(editing.id); setShowForm(false);

                className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
                Supprimer
              </button>
            )}
          >
            <PilotForm initial={editing} onCancel={()=>setShowForm(false)} onSave={(p)=>{ onAddOrUpdate(p); setShowForm(false); }} />

      );

    // ------------------------------------------------------------------
    // 12f) FUEL & OIL ENTRIES EDITORS (multi-entrées avec scan facture)
    // ------------------------------------------------------------------
    // Ces deux éditeurs sont presque identiques mais traitent des unités et
    // des catégories de dépense différentes. La logique commune (scan + création
    // automatique d'une dépense) est factorisée dans useScanToExpense.

    function useScanToExpense({ categoryId, addExpense, aircraftId, flightDate, getEntry, setEntry }) {
      // Renvoie deux callbacks : triggerCamera, triggerFiles. Quand un fichier est sélectionné,
      // on l'enregistre comme image / PDF, on crée une dépense automatiquement, et on stocke
      // l'id de la dépense dans l'entrée concernée pour permettre un suivi.
      const cameraRef = useRef(null);
      const filesRef  = useRef(null);
      const [busy, setBusy] = useState(false);

      const handleFiles = useCallback(async (e) => {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (!file) return;
        setBusy(true);
        try {
          const stored = await fileToStoredDoc(file, categoryId);
          // On crée une dépense
          const entry = getEntry();
          const expenseId = 'doc_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
          const invNote = entry?.invoiceNumber ? `N° facture : ${entry.invoiceNumber}` : '';
          const expense = {
            id: expenseId,
            date: entry?.date || flightDate || todayZuluDate(),
            supplier: entry?.supplier || '',
            amount: entry?.amount || '',
            currency: entry?.currency || 'EUR',
            categoryId,                    // 'fuel_aircraft' ou 'oil'
            aircraftId: aircraftId || '',
            thumbnail: stored.mime === 'application/pdf' ? '' : stored.dataUrl,
            ocrText: '',
            fileName: stored.fileName,
            mime: stored.mime,
            dataUrl: stored.dataUrl,       // on garde le PDF/image dans la dépense aussi
            invoiceNumber: entry?.invoiceNumber || '',
            notes: ['Créé automatiquement depuis le carnet (vol).', invNote].filter(Boolean).join('\n'),
            sourceFlightEntryId: entry?.id || '',
            addedAt: Date.now(),
          };
          addExpense(expense);
          // Met à jour l'entrée pour la lier
          setEntry({
            ...entry,
            invoiceDocId: expenseId,
            invoiceDataUrl: stored.mime === 'application/pdf' ? '' : stored.dataUrl,
            invoiceFileName: stored.fileName,
            invoiceMime: stored.mime,
          });
        } catch (err) {
          alert('Import facture : ' + err.message);
        } finally { setBusy(false); }
      }, [categoryId, addExpense, aircraftId, flightDate, getEntry, setEntry]);

      function triggerCamera() { setTimeout(()=>cameraRef.current?.click(), 0); }
      function triggerFiles()  { setTimeout(()=>filesRef.current?.click(),  0); }

      const inputs = (
        <>
          <input ref={cameraRef} type="file" accept="image/*" capture="environment"
                 className="hidden" onChange={handleFiles} />
          <input ref={filesRef}  type="file" accept="image/*,application/pdf"
                 className="hidden" onChange={handleFiles} />
        </>
      );

      return { triggerCamera, triggerFiles, busy, inputs };
    }

    // Composant rangée d'aperçu de facture rattachée.
    // Trois états visuels :
    //  - Aucune facture (invoiceDocId vide) : ne rien afficher.
    //  - Facture présente avec aperçu (dataUrl ou nom de fichier) : aperçu + ✓.
    //  - Facture archivée (invoiceDocId existe mais dataUrl ET fileName vides,
    //    ce qui arrive quand l'utilisateur a archivé en ZIP et purgé le cache) :
    //    mention "Facture sauvegardée (archivée hors app)".
    function InvoicePreview({ entry }) {
      if (!entry?.invoiceDocId) return null;
      const isPdf = entry.invoiceMime === 'application/pdf';
      const hasPreview = !!(entry.invoiceDataUrl || entry.invoiceFileName);
      // Cas archivé : la dépense existe toujours mais le binaire a été purgé
      if (!hasPreview) {
        return (
          <div className="flex items-center gap-2 mt-2 text-xs bg-[var(--bg-card)] p-2 rounded border border-[var(--border-soft)]">
            <span style={{ color: 'var(--accent)' }}><LucideIcon name="save" size={18} strokeWidth={2.25} /></span>
            <div className="flex-1 min-w-0">
              <div className="text-[var(--accent)] font-medium">Facture sauvegardée (archivée)</div>
              <div className="text-[var(--text-dim)]">Le fichier original a été archivé en ZIP. La dépense reste dans l'onglet Dépenses · Carburant Avion.</div>
            </div>
          </div>
        );
      }
      return (
        <div className="flex items-center gap-2 mt-2 text-xs bg-[var(--bg-card)] p-2 rounded">
          {isPdf ? <span className="text-xl">📄</span> : (entry.invoiceDataUrl ? <img src={entry.invoiceDataUrl} alt="" className="w-8 h-8 object-cover rounded" /> : <span className="text-xl">🧾</span>)}
          <div className="flex-1 min-w-0 truncate">
            <div className="text-[var(--ok)]">✓ Facture rattachée</div>
            <div className="text-[var(--text-dim)] truncate">{entry.invoiceFileName || '(facture)'}  → onglet Dépenses · Carburant Avion / Huile</div>
          </div>
        </div>
      );
    }

    function FuelOrOilRow({ entry, index, onChange, onRemove, kind, addExpense, aircraftId, flightDate, flights=[], currentFlightId=null }) {
      // kind = 'fuel' (note : on n'utilise plus FuelOrOilRow pour 'oil' depuis v4 — l'huile a son
      // propre composant simplifié OilEntryRow. On garde le paramètre kind pour rétrocompat.)
      const isFuel = kind === 'fuel';
      const categoryId = isFuel ? 'fuel_aircraft' : 'oil';
      const units = isFuel ? ['L','kg','USG'] : ['qt','L'];
      const labelQty = 'Quantité';
      const [menuOpen, setMenuOpen] = useState(false);
      const [viewingInvoice, setViewingInvoice] = useState(false);

      // Critère "rempli" : qty > 0 ET montant > 0 (les deux infos minimales utiles).
      // Le repli n'est jamais automatique pendant la frappe (sinon dès que l'utilisateur
      // tape "5" pour amorcer "500", la ligne se replie). On replie uniquement :
      //   - au montage si la ligne est déjà remplie (rouverture d'un vol existant),
      //   - via le bouton "Replier" explicite.
      const qtyN = parseFloat(entry.qty) || 0;
      const amtN = parseFloat(entry.amount) || 0;
      const isFilled = qtyN > 0 && amtN > 0;
      const [collapsed, setCollapsed] = useState(isFilled);

      const { triggerCamera, triggerFiles, busy, inputs } = useScanToExpense({
        categoryId, addExpense, aircraftId, flightDate,
        getEntry: () => entry,
        setEntry: (e) => onChange(e),
      });

      function set(k,v){ onChange({...entry, [k]: v}); }

      // Mode replié : pastille verte récapitulative + bouton Modifier + Retirer.
      // L'utilisateur ne peut pas perdre les données : seules les actions explicites
      // (Modifier puis modifier les champs, ou Retirer) modifient l'entrée.
      if (collapsed && isFilled) {
        const summary = [
          `${qtyN} ${entry.unit || 'L'}`,
          `${amtN.toFixed(2)} ${entry.currency || 'EUR'}`,
          entry.supplier && entry.supplier.trim(),
          entry.invoiceNumber && `N° ${entry.invoiceNumber}`,
        ].filter(Boolean).join(' · ');
        return (
          <div
            className="bg-[var(--ok)]/10 p-3 rounded-lg border border-[var(--ok)]/40 flex items-center gap-3 transition-colors hover:bg-[var(--ok)]/15">
            <div className="grid place-items-center w-9 h-9 rounded-full bg-[var(--ok)]/25 text-[var(--ok)] font-bold text-base flex-shrink-0">
              ✓
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-sm font-semibold text-[var(--ok)]">OK</div>
              <div className="text-xs text-[var(--text-dim)] truncate">{summary}</div>
              {entry.invoiceDocId && (
                <div className="text-[10px] text-[var(--ok)]/80 mt-0.5">
                  {entry.invoiceDataUrl || entry.invoiceFileName ? '📄 Facture rattachée' : '✓ Facture archivée'}
                </div>
              )}
            </div>
            <button type="button"
              className="btn btn-secondary !py-1 !px-2 text-xs flex-shrink-0"
              onClick={()=>setCollapsed(false)}>
              ✏️ Modifier
            </button>
            <button type="button"
              className="btn btn-danger !py-1 !px-2 text-xs flex-shrink-0"
              onClick={onRemove}>
              <LucideIcon name="trash2" size={14} strokeWidth={2.25} />
            </button>
          </div>
        );
      }

      return (
        <div className="bg-[var(--bg-elev)] p-3 rounded-lg space-y-2">
          <div className="flex items-center justify-between">
            <div className="text-sm font-medium">
              <span className="inline-flex items-center gap-1.5">
                <LucideIcon name={isFuel ? 'fuel' : 'droplet'} size={13} strokeWidth={2.5} />
                {isFuel ? 'Plein' : 'Ajout d\'huile'} #{index+1}
              </span>
              {isFilled && (
                <span className="ml-2 text-xs text-[var(--ok)] font-normal">— rempli, sera replié auto</span>
              )}
            </div>
            <div className="flex items-center gap-1">
              {isFilled && (
                <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs" onClick={()=>setCollapsed(true)}>
                  ⬆ Replier
                </button>
              )}
              <button type="button"
                onClick={onRemove}
                className="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg border border-[var(--err)] text-[var(--err)] text-xs font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={12} strokeWidth={2.5} />
                Retirer
              </button>
            </div>
          </div>
          {/* Date du plein puis N° facture en dessous (évite l'empiètement quand
              le numéro est long ou sur écran étroit). */}
          <div>
            <div className="label whitespace-nowrap">Date du plein</div>
            <input type="date" className="input" value={entry.date || flightDate || ''} onChange={e=>set('date', e.target.value)} />
          </div>
          {/* Localisation du plein : avant ou après le vol — utile pour suivi conso. */}
          {isFuel && (
            <div>
              <div className="label whitespace-nowrap">Localisation du plein</div>
              <div className="grid grid-cols-2 gap-2">
                <button type="button"
                  onClick={()=>set('location','departure')}
                  className={`p-2 rounded-lg border text-sm font-medium inline-flex items-center justify-center gap-2 transition-colors ${
                    (entry.location||'departure')==='departure'
                      ? 'bg-[var(--accent)]/15 border-[var(--accent)] text-[var(--accent)]'
                      : 'bg-[var(--bg-elev)] border-[var(--border-soft)] text-[var(--text-dim)] hover:border-[var(--border)]'
                  }`}>
                  <LucideIcon name="planeTakeoff" size={18} strokeWidth={2.25} />
                  Départ
                </button>
                <button type="button"
                  onClick={()=>set('location','arrival')}
                  className={`p-2 rounded-lg border text-sm font-medium inline-flex items-center justify-center gap-2 transition-colors ${
                    entry.location==='arrival'
                      ? 'bg-[var(--accent)]/15 border-[var(--accent)] text-[var(--accent)]'
                      : 'bg-[var(--bg-elev)] border-[var(--border-soft)] text-[var(--text-dim)] hover:border-[var(--border)]'
                  }`}>
                  <LucideIcon name="planeLanding" size={18} strokeWidth={2.25} />
                  Arrivée
                </button>
              </div>
            </div>
          )}
          <div>
            <div className="label whitespace-nowrap">N° de facture</div>
            <input className="input" placeholder="ex: 2026-04-001234" value={entry.invoiceNumber||''} onChange={e=>set('invoiceNumber', e.target.value)} />
          </div>
          <div className="grid grid-cols-3 gap-2">
            <div className="col-span-2">
              <div className="label">{labelQty}</div>
              <input type="number" min="0" step={isFuel?'0.1':'0.25'} className="input" value={entry.qty} onChange={e=>set('qty', e.target.value)} placeholder="0" />
            </div>
            <div>
              <div className="label">Unité</div>
              <select className="select" value={entry.unit} onChange={e=>set('unit', e.target.value)}>
                {units.map(u => <option key={u} value={u}>{u==='qt'?'pintes (qt)':u}</option>)}
              </select>
            </div>
          </div>
          {/* Case Full : indique que les réservoirs sont au maximum après ce plein.
              Permet de calculer la conso réelle entre deux pleins "Full" (méthode tab-to-tab). */}
          {isFuel && (
            <label className="flex items-center gap-2 select-none cursor-pointer text-sm bg-[var(--bg-card)] p-2 rounded">
              <input type="checkbox" className="w-5 h-5 accent-[#22d3ee]"
                checked={!!entry.full}
                onChange={e=>set('full', e.target.checked)} />
              <span className="font-medium">Full</span>
              <span className="text-xs text-[var(--text-dim)]">— réservoirs au max après ce plein</span>
            </label>
          )}
          {/* Fournisseur en pleine largeur, Montant en dessous (gros chiffre),
              Devise sous le Montant — pas de tassement, tout est lisible. */}
          <div>
            <div className="label whitespace-nowrap">Fournisseur</div>
            <input className="input" placeholder={isFuel?'ex: Total Energies Aviation':'ex: AeroShell W100'} value={entry.supplier||''} onChange={e=>set(isFuel?'supplier':'brand', e.target.value)} />
          </div>
          <div>
            <div className="label whitespace-nowrap">Montant</div>
            <input type="number" step="0.01"
                   className="input font-mono text-lg"
                   placeholder="0.00"
                   value={entry.amount} onChange={e=>set('amount', e.target.value)} />
          </div>
          <div>
            <div className="label whitespace-nowrap">Devise</div>
            <select className="select" value={entry.currency||'EUR'} onChange={e=>set('currency', e.target.value)}>
              <option>EUR</option><option>USD</option><option>GBP</option><option>CHF</option><option>CAD</option>
            </select>
          </div>
          {/* Conso depuis le dernier plein FULL (méthode tab-to-tab).
              On rassemble TOUS les fuelEntries de cet avion à travers tous les vols,
              on les trie chronologiquement (date + id ms), puis pour l'entrée courante
              (si elle est full) on cherche le dernier full précédent et on somme tous
              les qty (convertis en L) entre les deux (exclusif de l'ancien, inclusif du courant). */}
          {isFuel && entry.full && (() => {
            const toL = (q, u) => {
              const v = parseFloat(q) || 0;
              if (u === 'L') return v;
              if (u === 'kg') return v / 0.72;
              if (u === 'USG') return v * 3.785;
              return v;
            };
            const idMs = (id) => {
              const m = String(id||'').match(/_(\d{10,})/);
              return m ? parseInt(m[1], 10) : 0;
            };
            // Pool global de fuel entries pour cet avion (vols sauvés + vol courant en mémoire)
            const others = (flights || [])
              .filter(f => f.aircraftId === aircraftId && f.id !== currentFlightId)
              .flatMap(f => (f.fuelEntries || []).map(fe => ({ ...fe, _flightDate: f.date })));
            // L'entrée courante est dans le state local du form, pas encore dans flights.
            // On l'ajoute au pool en utilisant flightDate comme date fallback.
            const pool = [...others, { ...entry, _flightDate: entry.date || flightDate }];
            // Tri chronologique strict
            pool.sort((a, b) => {
              const da = (a._flightDate || a.date || '');
              const db = (b._flightDate || b.date || '');
              if (da !== db) return da.localeCompare(db);
              return idMs(a.id) - idMs(b.id);
            });
            const idx = pool.findIndex(x => x.id === entry.id);
            // Cherche le dernier full STRICTEMENT avant
            let prevFullIdx = -1;
            for (let i = idx - 1; i >= 0; i--) {
              if (pool[i].full && (parseFloat(pool[i].qty) || 0) > 0) { prevFullIdx = i; break; }
            }
            if (prevFullIdx === -1) {
              return (
                <div className="text-xs text-[var(--text-dim)] italic bg-[var(--bg-card)] p-2 rounded">
                  Pas encore d'autre plein « Full » enregistré pour {aircraftId ? 'cet avion' : 'l\'avion'} — la conso depuis dernier full sera calculée dès qu'un autre plein Full existera.
                </div>
              );
            }
            const prev = pool[prevFullIdx];
            // Somme des qty entre prev (exclusif) et current (inclusif)
            let burnedL = 0;
            for (let i = prevFullIdx + 1; i <= idx; i++) {
              burnedL += toL(pool[i].qty, pool[i].unit);
            }
            return (
              <div className="bg-[var(--ok)]/10 border border-[var(--ok)]/30 p-2 rounded text-sm">
                <div className="flex items-center justify-between gap-2">
                  <span className="text-[var(--ok)] font-semibold inline-flex items-center gap-1.5">
                    <LucideIcon name="fuel" size={13} strokeWidth={2.5} />
                    Brûlé depuis le dernier Full
                  </span>
                  <span className="font-mono tabular-nums font-bold text-[var(--ok)]">{burnedL.toFixed(1)} L</span>
                </div>
                <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                  Dernier Full : {prev._flightDate || prev.date || '?'} ({(parseFloat(prev.qty)||0).toFixed(1)} {prev.unit}). Méthode tab-to-tab.
                </div>
              </div>
            );
          })()}

          {/* Zone facture : si une facture est rattachée, on l'affiche en rangée
              compacte style DocRow (thumb + nom + Ouvrir + Retirer), comme sur les
              W&B/FPL/OFPL. Sinon, on propose le bouton + Ajouter une facture. */}
          {entry.invoiceDocId ? (
            (() => {
              const isPdf = entry.invoiceMime === 'application/pdf';
              const hasBinary = !!(entry.invoiceDataUrl);
              // Détection d'archive : on se fie d'abord au flag invoiceArchived posé
              // par archiveAndFreeDocuments. Fallback : pas de binaire dispo = archivé.
              const archived = !!entry.invoiceArchived || (!hasBinary && !!entry.invoiceDocId);
              if (archived) {
                return (
                  <div className="flex items-center gap-2 bg-[var(--ok)]/10 border border-[var(--ok)]/40 p-2 rounded-lg">
                    <div className="flex-1 min-w-0 text-xs">
                      <div className="truncate font-semibold text-[var(--ok)]">✓ OK archivé</div>
                      <div className="truncate text-[var(--text-dim)]">Facture{entry.invoiceFileName ? ` · ${entry.invoiceFileName}` : ''}</div>
                    </div>
                    <button type="button" className="btn btn-danger !py-1 !px-2 text-xs"
                      onClick={()=>{
                        if (!confirm('Retirer la facture rattachée à ce plein ? La dépense correspondante restera dans l\'onglet Dépenses (non supprimée).')) return;
                        onChange({
                          ...entry,
                          invoiceDocId: '',
                          invoiceDataUrl: '',
                          invoiceFileName: '',
                          invoiceMime: '',
                          invoiceArchived: false,
                        });
                      }}>
                      Retirer
                    </button>
                  </div>
                );
              }
              return (
                <div className="flex items-center gap-2 bg-[var(--bg-card)] p-2 rounded-lg">
                  {isPdf ? (
                    <div className="w-10 h-10 grid place-items-center bg-[var(--bg-elev)] rounded text-xl flex-shrink-0">📄</div>
                  ) : hasBinary ? (
                    <img src={entry.invoiceDataUrl} alt="" className="w-10 h-10 object-cover rounded flex-shrink-0" />
                  ) : (
                    <div className="w-10 h-10 grid place-items-center bg-[var(--bg-elev)] rounded text-xl flex-shrink-0">🧾</div>
                  )}
                  <div className="flex-1 min-w-0 text-xs">
                    <div className="truncate font-medium">{entry.invoiceFileName || 'Facture'}</div>
                    <div className="truncate text-[var(--text-dim)]">✓ Facture rattachée</div>
                  </div>
                  {hasBinary && (
                    <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs"
                      onClick={()=>setViewingInvoice(true)}>
                      Ouvrir
                    </button>
                  )}
                  <button type="button" className="btn btn-danger !py-1 !px-2 text-xs"
                    onClick={()=>{
                      if (!confirm('Retirer la facture rattachée à ce plein ? La dépense correspondante restera dans l\'onglet Dépenses (non supprimée).')) return;
                      onChange({
                        ...entry,
                        invoiceDocId: '',
                        invoiceDataUrl: '',
                        invoiceFileName: '',
                        invoiceMime: '',
                      });
                    }}>
                    Retirer
                  </button>
                </div>
              );
            })()
          ) : (
            <div className="relative">
              <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs" disabled={busy}
                onClick={()=>setMenuOpen(o=>!o)}>
                {busy ? 'Import…' : '🧾 + Ajouter une facture'}
              </button>
              {menuOpen && (
                <>
                  <div className="fixed inset-0 z-20" onClick={()=>setMenuOpen(false)} />
                  <div className="absolute left-0 top-full mt-1 z-30 card p-2 min-w-[230px] anim-pop">
                    <button type="button" className="btn btn-secondary w-full mb-1 justify-start"
                      onClick={()=>{ setMenuOpen(false); triggerCamera(); }}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />Scanner avec l'appareil photo</span>
                    </button>
                    <button type="button" className="btn btn-secondary w-full justify-start"
                      onClick={()=>{ setMenuOpen(false); triggerFiles(); }}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />Importer depuis Téléchargements</span>
                    </button>
                  </div>
                </>
              )}
            </div>
          )}
          {/* Bouton "Remplacer" séparé quand une facture est déjà attachée — utile
              si le scan initial est flou ou le mauvais fichier */}
          {entry.invoiceDocId && entry.invoiceDataUrl && (
            <div className="relative">
              <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs" disabled={busy}
                onClick={()=>setMenuOpen(o=>!o)}>
                {busy ? 'Import…' : '🔁 Remplacer la facture'}
              </button>
              {menuOpen && (
                <>
                  <div className="fixed inset-0 z-20" onClick={()=>setMenuOpen(false)} />
                  <div className="absolute left-0 top-full mt-1 z-30 card p-2 min-w-[230px] anim-pop">
                    <button type="button" className="btn btn-secondary w-full mb-1 justify-start"
                      onClick={()=>{ setMenuOpen(false); triggerCamera(); }}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />Scanner avec l'appareil photo</span>
                    </button>
                    <button type="button" className="btn btn-secondary w-full justify-start"
                      onClick={()=>{ setMenuOpen(false); triggerFiles(); }}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />Importer depuis Téléchargements</span>
                    </button>
                  </div>
                </>
              )}
            </div>
          )}
          {inputs}
          {/* Visionneuse interne pour la facture (même UX que les W&B/FPL/OFPL) */}
          {viewingInvoice && entry.invoiceDocId && (
            <DocViewer
              doc={{
                dataUrl: entry.invoiceDataUrl,
                fileName: entry.invoiceFileName || 'Facture',
                mime: entry.invoiceMime,
              }}
              onClose={()=>setViewingInvoice(false)}
            />
          )}
          {entry.notes && <div className="text-xs text-[var(--text-dim)] italic">{entry.notes}</div>}
        </div>
      );
    }

    function FuelEntriesEditor({ entries, onChange, addExpense, aircraftId, flightDate, flights=[], currentFlightId=null, defaultUnit='L', defaultCurrency='EUR' }) {
      const tx = useTx();
      function addEntry() {
        const next = [...(entries||[]), {
          id: 'fe_'+Date.now(),
          date: flightDate || todayZuluDate(),  // pré-rempli avec la date du vol, modifiable
          invoiceNumber: '',
          qty: '', unit: defaultUnit, supplier: '', amount: '', currency: defaultCurrency,
          invoiceDocId: '', invoiceDataUrl: '', invoiceFileName: '', invoiceMime: '',
          location: 'departure', // 'departure' = plein avant le vol, 'arrival' = plein à l'arrivée
          full: false,           // true = réservoirs au max après ce plein
          notes: '',
        }];
        onChange(next);
      }
      function updateEntry(i, e) {
        const next = [...entries]; next[i] = e; onChange(next);
      }
      function removeEntry(i) {
        const e = entries[i];
        const hasLinkedExpense = !!(e && e.invoiceDocId);
        const msg = hasLinkedExpense
          ? tx('Retirer ce plein ? La dépense Carburant Avion liée sera également supprimée à l\'enregistrement du vol.','Remove this fuel uplift? The linked Aircraft Fuel expense will also be deleted when the flight is saved.')
          : tx('Retirer ce plein ?','Remove this fuel uplift?');
        if (!confirm(msg)) return;
        const next = [...entries]; next.splice(i,1); onChange(next);
      }

      const totals = (entries||[]).reduce((acc, e) => {
        const v = parseFloat(e.qty)||0;
        if (e.unit==='L') acc.L += v;
        else if (e.unit==='kg') acc.kg += v;
        else if (e.unit==='USG') acc.USG += v;
        return acc;
      }, { L:0, kg:0, USG:0 });

      return (
        <div className="card p-3">
          <div className="flex items-center justify-between pr-3">
            <div className="label !mb-0 inline-flex items-center gap-1.5">
              <span style={{ color: 'var(--accent-2)' }}><LucideIcon name="fuel" size={14} strokeWidth={2.5} /></span>
              {tx('Carburant Avion','Aircraft Fuel')}
            </div>
            <button type="button" className="btn btn-primary !py-1 !px-3 text-sm" onClick={addEntry}>{tx('+ Ajouter un plein','+ Add fuel uplift')}</button>
          </div>
          {(entries||[]).length === 0 && (
            <div className="text-xs text-[var(--text-dim)] mt-2">Aucun plein enregistré pour ce vol. Tu peux en ajouter plusieurs si tu fais escale.</div>

          <div className="space-y-2 mt-2">
            {(entries||[]).map((e, i) => (
              <FuelOrOilRow key={e.id||i} entry={e} index={i} kind="fuel"
                onChange={(ne)=>updateEntry(i, ne)} onRemove={()=>removeEntry(i)}

                flights={flights} currentFlightId={currentFlightId} />

            </div>
          )}

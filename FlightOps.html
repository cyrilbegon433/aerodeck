              <option value="all">Tous les pilotes</option>
              {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
            </select>
          </div>

          {visible.length === 0 && (
            <div className="card p-6 text-center text-[var(--text-dim)]">
              {pilotFilter==='all' ? 'Aucun vol enregistré.' : 'Aucun vol pour ce pilote.'}
            </div>
          )}

          {visible.length > 0 && (
            <div className="card p-0 overflow-x-auto">
              <table className="w-full text-xs">
                <thead className="text-[var(--text-dim)] sticky top-0 bg-[var(--bg-card)] z-10">
                  <tr className="text-left">
                    <th className="px-2 py-2">Date</th>
                    <th className="px-2 py-2">Trajet</th>
                    <th className="px-2 py-2">Immat</th>
                    <th className="px-2 py-2">Nom avion</th>
                    <th className="px-2 py-2 text-center">Classe</th>
                    <th className="px-2 py-2 text-center">FT</th>
                    <th className="px-2 py-2 text-center">IFR</th>
                    <th className="px-2 py-2 text-center">Nav</th>
                    <th className="px-2 py-2 text-center">Duo</th>
                    <th className="px-2 py-2 text-center">Nuit</th>
                    <th className="px-2 py-2">PIC</th>
                    <th className="px-2 py-2">SIC</th>
                    <th className="px-2 py-2 text-center">TO/LDG</th>
                    <th className="px-2 py-2">Type vol</th>
                    <th className="px-2 py-2 text-center">Action</th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map(f => {
                    const ac = aircraft.find(a => a.id === f.aircraftId);
                    const pic = pilots.find(p => p.id === f.pilotId);
                    const sic = pilots.find(p => p.id === f.copilotId);
                    const ft = f.flightTime || 0;
                    const ifrTime = f.rules === 'IFR' ? ft : 0;
                    const navTime = f.isNavigation ? ft : 0;
                    const duoTime = isDuoFlight(f) ? ft : 0;
                    return (
                      <tr key={f.id} className="border-t border-[var(--border)] hover:bg-[var(--bg-elev)] cursor-pointer"
                          onClick={()=>{ setEditing(f); setShowForm(true); }}>
                        <td className="px-2 py-2 font-mono whitespace-nowrap">{f.date}</td>
                        <td className="px-2 py-2 font-mono whitespace-nowrap">{f.from}→{f.to}</td>
                        <td className="px-2 py-2 whitespace-nowrap">{ac?.registration||'?'}</td>
                        <td className="px-2 py-2 whitespace-nowrap">{ac?.type || '—'}</td>
                        <td className="px-2 py-2 text-center whitespace-nowrap">{aircraftClass(ac)}</td>
                        <td className="px-2 py-2 text-center font-mono">{fmtDuration(f.flightTime)}</td>
                        <td className="px-2 py-2 text-center font-mono">{ifrTime > 0 ? fmtDuration(ifrTime) : '—'}</td>
                        <td className="px-2 py-2 text-center font-mono">{navTime > 0 ? fmtDuration(navTime) : '—'}</td>
                        <td className="px-2 py-2 text-center font-mono">{duoTime > 0 ? fmtDuration(duoTime) : '—'}</td>
                        <td className="px-2 py-2 text-center font-mono">{(f.nightTime||0)>0 ? fmtDuration(f.nightTime) : '—'}</td>
                        <td className="px-2 py-2 truncate max-w-[140px]">{pic ? pilotDisplayName(pic) : '—'}</td>
                        <td className="px-2 py-2 truncate max-w-[140px]">{sic ? pilotDisplayName(sic) : '—'}</td>
                        <td className="px-2 py-2 text-center font-mono whitespace-nowrap">
                          {((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0)}/{((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0)}
                        </td>
                        <td className="px-2 py-2 whitespace-nowrap">{flightTypeLabel(f.flightType)}</td>
                        <td className="px-2 py-2 text-center">
                          <button type="button"
                            className="text-[var(--err)] hover:opacity-80 text-base"
                            title="Supprimer ce vol"
                            onClick={(e)=>{
                              e.stopPropagation();
                              if (confirm(`Supprimer définitivement le vol du ${f.date} (${f.from}→${f.to}) ? Pense à exporter en JSON avant.`)) {
                                onDeleteFlight && onDeleteFlight(f.id);
                              }
                            }}>🗑️</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
          {sorted.length > limit && (
            <div className="text-center">
              <button className="btn btn-secondary" onClick={()=>setShowAll(true)}>
                Afficher les {sorted.length - limit} vols suivants
              </button>
            </div>
          )}

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing ? `Vol ${editing.date} ${editing.from}→${editing.to}` : 'Vol'}
            footer={editing && (
              <button className="btn btn-danger" onClick={()=>{
                if (confirm('Supprimer définitivement ce vol ? (Préfère un export JSON avant.)')) {
                  onDeleteFlight && onDeleteFlight(editing.id);
                  setShowForm(false);
                }
              }}>Supprimer</button>
            )}
          >
            <FlightForm
              initial={editing}
              aircraft={aircraft}
              pilots={pilots}
              addExpense={addExpense}
              onCancel={()=>setShowForm(false)}
              onSave={(f)=>{ onUpsertFlight && onUpsertFlight(f); setShowForm(false); }}
            />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12j) ÉCRAN — DUTY (CARs 702 Canada)
    // ------------------------------------------------------------------
    function DutyForm({ initial, pilots, onSave, onCancel }) {
      const blank = {
        id: null,
        pilotId: pilots[0]?.id || '',
        date: todayZuluDate(),
        startTime: '',
        endTime: '',
        timezone: 'local',
        notes: '',
      };
      const [d, setD] = useState({ ...blank, ...(initial || {}) });
      function set(k, v) { setD(p => ({...p, [k]: v})); }
      const duration = dutyMinutes(d);
      const overLimit = duration > CARS_702_LIMITS.dailyDuty;

      return (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">Pilote</div>
              <select className="select" value={d.pilotId} onChange={e=>set('pilotId', e.target.value)}>
                {pilots.length === 0 && <option value="">— roster vide —</option>}
                {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
              </select>
            </div>
            <div>
              <div className="label">Date</div>
              <input type="date" className="input" value={d.date} onChange={e=>set('date', e.target.value)} />
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">Début duty (HHMM)</div>
              <input className="input font-mono" inputMode="numeric" maxLength={5}
                placeholder="0600"
                value={d.startTime} onChange={e=>set('startTime', e.target.value.replace(/[^0-9:]/g,''))} />
            </div>
            <div>
              <div className="label">Fin duty (HHMM)</div>
              <input className="input font-mono" inputMode="numeric" maxLength={5}
                placeholder="2000"
                value={d.endTime} onChange={e=>set('endTime', e.target.value.replace(/[^0-9:]/g,''))} />
            </div>
          </div>

          <div>
            <div className="label">Fuseau horaire</div>
            <div className="flex gap-2">
              {[['local','Heure locale'], ['zulu','Zulu (UTC)']].map(([id, label]) => (
                <button key={id} type="button"
                  onClick={()=>set('timezone', id)}
                  className={`btn ${d.timezone===id?'btn-primary':'btn-secondary'}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div className={`card p-3 text-center ${overLimit ? 'border-[var(--err)]' : ''}`}>
            <div className="label">Durée duty calculée</div>
            <div className={`text-3xl font-mono tabular-nums ${overLimit ? 'text-[var(--err)]' : 'text-[var(--accent)]'}`}>
              {fmtDuration(duration)}
            </div>
            {overLimit && (
              <div className="text-xs text-[var(--err)] mt-1">
                ⚠ Dépasse la limite CARs 702 de 14h ({fmtDuration(CARS_702_LIMITS.dailyDuty)})
              </div>
            )}
          </div>

          <div>
            <div className="label">Notes</div>
            <textarea className="textarea" rows={2} value={d.notes} onChange={e=>set('notes', e.target.value)} placeholder="Ex : déplacement avant vol, briefing client, attente passager…" />
          </div>

          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>Annuler</button>
            <button className="btn btn-primary" onClick={()=>{
              if (!d.pilotId) return alert('Sélectionne un pilote.');
              if (!d.startTime || !d.endTime) return alert('Heures de début et fin requises.');
              onSave({ ...d, id: d.id || 'dp_'+Date.now() });
            }}>Enregistrer</button>
          </div>
        </div>
      );
    }

    function DutyScreen({ flights, pilots = [], dutyPeriods = [], onAddOrUpdate, onDelete }) {
      const [pilotFilter, setPilotFilter] = useState(pilots[0]?.id || 'all');
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const today = todayZuluDate();

      // Cumuls flight time fenêtres glissantes pour le pilote sélectionné
      const cumuls = useMemo(() => ({
        d1:   flightTimeWindow(flights, pilotFilter, today, 1),
        d7:   flightTimeWindow(flights, pilotFilter, today, 7),
        d30:  flightTimeWindow(flights, pilotFilter, today, 30),
        d90:  flightTimeWindow(flights, pilotFilter, today, 90),
        d365: flightTimeWindow(flights, pilotFilter, today, 365),
      }), [flights, pilotFilter, today]);

      // Liste consolidée des duty effectives (auto depuis vols + override manuels)
      const effectiveDuties = useMemo(
        () => getEffectiveDuties(flights, dutyPeriods, pilotFilter),
        [flights, dutyPeriods, pilotFilter]
      );

      // Duty time aujourd'hui pour le pilote (somme des effectives sur today)
      const todayDutyMin = useMemo(() => {
        return effectiveDuties
          .filter(p => p.date === today)
          .reduce((sum, p) => sum + dutyMinutes(p), 0);
      }, [effectiveDuties, today]);

      const sortedPeriods = effectiveDuties; // déjà triées par getEffectiveDuties

      // Quand on save : si l'entry était une auto (id commence par "auto_"), on génère
      // un nouvel id manuel et on l'ajoute aux dutyPeriods. Sinon update direct.
      function handleSave(p) {
        const isAuto = (editing?.source === 'auto') || /^auto_/.test(p.id || '');
        const final = isAuto
          ? { ...p, id: 'dp_' + Date.now() }   // nouvelle entrée manuelle
          : p;
        // On n'envoie pas le champ 'source' dans dutyPeriods (recalculé à l'affichage)
        const { source, ...clean } = final;
        onAddOrUpdate(clean);
      }
      function handleDelete(id) {
        if (/^auto_/.test(id)) {
          alert("Cette duty est calculée automatiquement depuis les vols — on ne peut pas la supprimer (elle disparaîtra automatiquement si tu retires les vols correspondants).");
          return;
        }
        onDelete(id);
      }

      // Render barre de progression colorée vs limite
      function LimitBar({ label, value, limit }) {
        const pct = Math.min(100, (value / limit) * 100);
        const color = pct >= 90 ? 'var(--err)' : pct >= 70 ? 'var(--warn)' : 'var(--ok)';
        return (
          <div>
            <div className="flex justify-between text-sm mb-1">
              <span>{label}</span>
              <span className="font-mono tabular-nums">
                <span style={{ color }}>{fmtDuration(value)}</span>
                <span className="text-[var(--text-dim)]"> / {fmtDuration(limit)}</span>
              </span>
            </div>
            <div className="h-2 bg-[var(--bg-elev)] rounded">
              <div className="h-2 rounded" style={{ width: `${pct}%`, background: color, transition: 'width .3s ease' }} />
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div>
              <h2 className="text-xl font-semibold">⏱️ Duty — CARs 702</h2>
              <div className="text-xs text-[var(--text-dim)]">Travail aérien Canada — limites de service et de vol</div>
            </div>
            <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }} disabled={pilots.length===0}>
              + Nouvelle duty
            </button>
          </div>

          <div className="card p-3">
            <div className="label">Pilote suivi</div>
            <select className="select" value={pilotFilter} onChange={e=>setPilotFilter(e.target.value)}>
              <option value="all">Tous (cumulé)</option>
              {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
            </select>
          </div>

          {/* Cumuls flight time vs limites CARs 702 */}
          <div className="card p-3 space-y-3">
            <div className="label">Cumuls flight time vs limites CARs 702</div>
            <LimitBar label="Aujourd'hui (vol)" value={cumuls.d1}   limit={CARS_702_LIMITS.dailyFlight} />
            <LimitBar label="7 jours glissants"  value={cumuls.d7}   limit={CARS_702_LIMITS.window7Flight} />
            <LimitBar label="30 jours glissants" value={cumuls.d30}  limit={CARS_702_LIMITS.window30Flight} />
            <LimitBar label="90 jours glissants" value={cumuls.d90}  limit={CARS_702_LIMITS.window90Flight} />
            <LimitBar label="365 jours glissants" value={cumuls.d365} limit={CARS_702_LIMITS.window365Flight} />
            <div className="mt-2">
              <Hint title="Légende des couleurs">
                Vert = &lt;70%, Jaune = 70-90%, Rouge = ≥90%. Calcul basé sur le Flight Time des vols où ce pilote est PIC ou SIC.
              </Hint>
            </div>
          </div>

          {/* Duty time aujourd'hui */}
          <div className="card p-3">
            <div className="label">Duty time aujourd'hui ({today})</div>
            <LimitBar label="Total duty" value={todayDutyMin} limit={CARS_702_LIMITS.dailyDuty} />
            <div className="mt-2">
              <Hint title="Limite quotidienne CARs 702">
                Limite quotidienne : 14h de duty consécutive. Repos minimum après duty : 8h.
              </Hint>
            </div>
          </div>

          {/* Historique des périodes duty (auto + manuelles consolidées) */}
          <div className="card p-3">
            <div className="flex items-center justify-between gap-2 flex-wrap">
              <div className="label !mb-0">Périodes duty (auto depuis vols + overrides manuels)</div>
              <div className="text-xs text-[var(--text-dim)]">
                {sortedPeriods.filter(p=>p.source==='auto').length} auto · {sortedPeriods.filter(p=>p.source==='manual').length} manuelles
              </div>
            </div>
            {sortedPeriods.length === 0 && (
              <div className="text-sm text-[var(--text-dim)] italic mt-2">
                Aucune duty. Les duty se calculent automatiquement dès qu'un vol est saisi
                (Block Out − 1h → Block In + 1h). Bouton « + Nouvelle duty » pour ajouter une duty
                manuelle (jour sans vol, briefing, déplacement, etc.).
              </div>
            )}
            <div className="space-y-1 mt-2">
              {sortedPeriods.slice(0, 100).map(p => {
                const pi = pilots.find(x => x.id === p.pilotId);
                const dur = dutyMinutes(p);
                const over = dur > CARS_702_LIMITS.dailyDuty;
                const isAuto = p.source === 'auto';
                return (
                  <button key={p.id} type="button"
                    className="w-full text-left p-2 rounded hover:bg-[var(--bg-elev)] flex items-center justify-between gap-2"
                    onClick={()=>{ setEditing(p); setShowForm(true); }}>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm flex items-center gap-2 flex-wrap">
                        <span className="font-mono">{p.date}</span>
                        <span className="text-[var(--text-dim)]">·</span>
                        <span className="font-mono">{p.startTime} → {p.endTime}</span>
                        <span className="text-[var(--text-dim)]">·</span>
                        <span className="text-[var(--text-dim)]">{p.timezone === 'zulu' ? 'Z' : 'local'}</span>
                        <span className="badge"
                          style={{
                            background: isAuto ? 'rgba(56,189,248,.15)' : 'rgba(251,191,36,.15)',
                            color: isAuto ? 'var(--accent)' : 'var(--warn)',
                            borderColor: isAuto ? 'var(--accent)' : 'var(--warn)',
                          }}>
                          {isAuto ? '⚙ Auto' : '✎ Manuel'}
                        </span>
                      </div>
                      <div className="text-xs text-[var(--text-dim)] truncate">
                        {pi ? pilotDisplayName(pi) : '— pilote —'}{p.notes && ` · ${p.notes}`}
                      </div>
                    </div>
                    <span className={`badge font-mono ${over ? '!text-[var(--err)] !border-[var(--err)]' : ''}`}>
                      {fmtDuration(dur)}{over && ' ⚠'}
                    </span>
                  </button>
                );
              })}
              {sortedPeriods.length > 100 && (
                <div className="text-xs text-[var(--text-dim)] text-center pt-2">
                  +{sortedPeriods.length - 100} entrées plus anciennes.
                </div>
              )}
            </div>
            <div className="mt-3 border-t border-[var(--border-soft)] pt-2">
              <Hint title="Règle de calcul auto">
                Chaque jour avec un ou plusieurs vols génère une duty = (1<sup>er</sup> Block Out − 1h) → (dernier Block In + 1h).
                Cliquer sur une duty <em>auto</em> permet de la modifier manuellement — elle devient alors une duty
                <em> manuelle</em> qui prend le pas sur l'auto.
              </Hint>
            </div>
          </div>

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing
              ? (editing.source === 'auto' ? 'Modifier la duty (depuis auto)' : 'Modifier la duty manuelle')
              : 'Nouvelle duty manuelle'}
            footer={editing && (
              <button className="btn btn-danger" onClick={()=>{
                if (editing.source === 'auto') {
                  alert("Cette duty est calculée automatiquement depuis les vols. Pour la retirer, supprime les vols correspondants dans le carnet.");
                  return;
                }
                if (confirm('Supprimer cette période duty manuelle ? La duty auto reprendra si des vols existent ce jour-là.')) {
                  handleDelete(editing.id); setShowForm(false);
                }
              }}>Supprimer</button>
            )}
          >
            <DutyForm
              initial={editing}
              pilots={pilots}
              onCancel={()=>setShowForm(false)}
              onSave={(p)=>{ handleSave(p); setShowForm(false); }}
            />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12i) ÉCRAN — RÉGLAGES (langue, thème, heure, unités, formats)
    // ------------------------------------------------------------------
    function SettingsScreen({ settings, onUpdateSettings, onExportJSON, onImportJSON, onClearAll, syncStatus = {}, onSyncPull, onSyncPush }) {
      const { lang, setLang } = React.useContext(I18nContext);
      const t = useT();
      function update(k, v) { onUpdateSettings({ ...settings, [k]: v }); }

      const usage = storageUsageMB();
      const themeApplied = effectiveTheme(settings.theme || 'dark');

      const gh = settings.gh || { enabled: false, token: '', gistId: '', lastWrittenAt: 0 };
      // État local : montrer/masquer le token (par défaut masqué pour la sécurité)
      const [showToken, setShowToken] = useState(false);
      const [testResult, setTestResult] = useState('');
      function updateGh(patch) {
        onUpdateSettings({ ...settings, gh: { ...gh, ...patch } });
      }
      // Test simple : GET /user → si le token marche, on récupère le login.
      async function testToken() {
        if (!gh.token) { setTestResult('❌ Token vide.'); return; }
        setTestResult('⏳ Test en cours…');
        try {
          // On essaie d'abord avec "Bearer" puis avec "token" si ça échoue
          let r = await fetch('https://api.github.com/user', {
            headers: {
              'Authorization': `Bearer ${gh.token}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
            },
          });
          if (r.status === 401) {
            // Réessaie avec "token" (ancien format, parfois plus tolérant)
            r = await fetch('https://api.github.com/user', {
              headers: {
                'Authorization': `token ${gh.token}`,
                'Accept': 'application/vnd.github+json',
              },
            });
          }
          if (r.ok) {
            const j = await r.json();
            setTestResult(`✅ Token OK — connecté en tant que "${j.login}". Tu peux maintenant cliquer "Pousser maintenant".`);
          } else {
            const text = await r.text();
            setTestResult(`❌ HTTP ${r.status} — ${text.slice(0, 200)}`);
          }
        } catch (e) {
          setTestResult('❌ Erreur réseau : ' + e.message);
        }
      }
      const syncBg = syncStatus.status === 'syncing' ? 'bg-[var(--warn)]/15 text-[var(--warn)] border-[var(--warn)]/30'
                  : syncStatus.status === 'synced'  ? 'bg-[var(--ok)]/15 text-[var(--ok)] border-[var(--ok)]/30'
                  : syncStatus.status === 'error'   ? 'bg-[var(--err)]/15 text-[var(--err)] border-[var(--err)]/30'
                  : 'bg-[var(--bg-elev)] text-[var(--text-dim)] border-[var(--border-soft)]';
      const syncIcon = syncStatus.status === 'syncing' ? '⏳' : syncStatus.status === 'synced' ? '✓' : syncStatus.status === 'error' ? '⚠' : '·';

      return (
        <div className="space-y-3">
          <h2 className="text-xl font-semibold">⚙️ Réglages</h2>

          {/* === Synchronisation cloud GitHub Gist === */}
          <div className="card p-3 space-y-3">
            <div className="flex items-center justify-between gap-2 flex-wrap">
              <div className="label !mb-0">☁️ Synchronisation Mac ↔ iPhone</div>
              {gh.enabled && (
                <div className={`text-xs px-2 py-1 rounded-md border font-mono ${syncBg}`}>
                  {syncIcon} {syncStatus.message || 'inactive'}
                </div>
              )}
            </div>
            <Hint title="Comment activer la synchro (~3 min)">
              1. Va sur <a href="https://github.com/settings/tokens?type=beta" target="_blank" className="underline text-[var(--accent)]">github.com/settings/tokens</a> (token fine-grained).<br/>
              2. <strong>Generate new token</strong> → nom : "AeroDeck sync" → expiration au choix.<br/>
              3. Dans <strong>Permissions</strong> → <strong>Account permissions</strong> → <strong>Gists</strong> = <strong>Read and write</strong>.<br/>
              4. Crée le token et copie-le. Colle-le ci-dessous, active la sync, puis clique <strong>Activer</strong>.<br/>
              <br/>
              Le token reste sur ton appareil (localStorage). Le gist créé est privé.
              Sur ton autre appareil, colle le même token + le même Gist ID (visible ici après création) pour synchroniser.
            </Hint>
            <div className="flex items-center gap-2">
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={!!gh.enabled} onChange={e=>updateGh({ enabled: e.target.checked })} />
                <span>Activer la synchro</span>
              </label>
            </div>
            <div>
              <div className="label whitespace-nowrap">Personal Access Token (gist scope)</div>
              <div className="flex gap-2">
                <input
                  type={showToken ? 'text' : 'password'}
                  className="input font-mono text-xs"
                  placeholder="github_pat_..."
                  value={gh.token || ''}
                  onChange={e=>updateGh({ token: e.target.value.trim() })}
                  autoComplete="off"
                  spellCheck="false"
                />
                <button type="button"
                  className="btn btn-secondary !py-1.5 !px-3 text-sm"
                  onClick={()=>setShowToken(s => !s)}
                  title={showToken ? 'Masquer' : 'Afficher'}>
                  {showToken ? '🙈' : '👁'}
                </button>
              </div>
              {gh.token && (
                <div className="text-[10px] text-[var(--text-dim)] mt-1 font-mono">
                  Longueur : {gh.token.length} caractères
                  {!gh.token.startsWith('github_pat_') && gh.token.length > 0 && (
                    <span className="text-[var(--warn)]"> · ⚠ devrait commencer par "github_pat_"</span>
                  )}
                </div>
              )}
            </div>
            <div>
              <div className="label whitespace-nowrap">Gist ID</div>
              <input
                className="input font-mono text-xs"
                placeholder="(créé automatiquement à la 1re sync)"
                value={gh.gistId || ''}
                onChange={e=>updateGh({ gistId: e.target.value.trim() })}
                autoComplete="off"
              />
              <div className="text-xs text-[var(--text-dim)] mt-1">
                Sur ton 2e appareil, copie cet ID après la 1re sync sur le 1er appareil.
              </div>
            </div>
            <div className="flex flex-wrap gap-2">
              <button
                className="btn btn-secondary !py-1.5 !px-3 text-sm"
                disabled={!gh.token}
                onClick={testToken}>
                🧪 Tester le token
              </button>
              <button
                className="btn btn-primary !py-1.5 !px-3 text-sm"
                disabled={!gh.enabled || !gh.token}
                onClick={()=>onSyncPush?.()}>
                {gh.gistId ? '↑ Pousser maintenant' : '↑ Activer (créer le gist)'}
              </button>
              <button
                className="btn btn-secondary !py-1.5 !px-3 text-sm"
                disabled={!gh.enabled || !gh.token || !gh.gistId}
                onClick={()=>onSyncPull?.()}>
                ↓ Récupérer maintenant
              </button>
            </div>
            {testResult && (
              <div className={`text-xs px-2 py-2 rounded-md font-mono break-all ${
                testResult.startsWith('✅') ? 'bg-[var(--ok)]/15 text-[var(--ok)]' :
                testResult.startsWith('❌') ? 'bg-[var(--err)]/15 text-[var(--err)]' :
                'bg-[var(--bg-elev)] text-[var(--text-dim)]'
              }`}>
                {testResult}
              </div>
            )}

    // ------------------------------------------------------------------
    // ------------------------------------------------------------------
    // 12k) SYNCHRO CLOUD via GITHUB GIST (privé)
    // ------------------------------------------------------------------
    // Stratégie : un gist privé contient un fichier `aerodeck.json` avec tout
    // l'état persisté de l'app. Chaque appareil :
    //   - pull le gist au démarrage (si plus récent que local → applique)
    //   - push (debounced 5 sec) à chaque modification locale
    //   - polle le gist toutes les 30 sec pour détecter les changements distants
    // Conflit résolu en "last write wins" basé sur __sync.lastWrittenAt local.

    async function ghCreateGist(token, data) {
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          description: 'AeroDeck — données synchronisées',
          public: false,
          files: { 'aerodeck.json': { content: JSON.stringify(data, null, 2) } }
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} : ${(await res.text()).slice(0,200)}`);
      const j = await res.json();
      return j.id;
    }
    async function ghReadGist(token, gistId) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
        cache: 'no-store',
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} : ${(await res.text()).slice(0,200)}`);
      const j = await res.json();
      const file = j.files && j.files['aerodeck.json'];
      if (!file) throw new Error('Le gist ne contient pas aerodeck.json');
      let parsed;
      try { parsed = JSON.parse(file.content); }
      catch(e) { throw new Error('aerodeck.json malformé : ' + e.message); }
      return { data: parsed, updatedAt: j.updated_at };
    }
    async function ghWriteGist(token, gistId, data) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          files: { 'aerodeck.json': { content: JSON.stringify(data, null, 2) } }
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} : ${(await res.text()).slice(0,200)}`);
      return await res.json();
    }

    function App() {
      const initial = migrateState(loadState());
      const [tab, setTab] = useState('logbook');
      const [flights, setFlights]     = useState(initial?.flights     || []);
      const [aircraft, setAircraft]   = useState(initial?.aircraft    || []);
      const [documents, setDocuments] = useState(initial?.documents   || []);
      const [categories, setCategories] = useState(initial?.categories || DEFAULT_CATEGORIES);
      const [settings, setSettings]   = useState(initial?.settings    || { askBeforeDelete: true });
      const [maintenance, setMaintenance] = useState(initial?.maintenance || []);
      const [companyDocs, setCompanyDocs] = useState(initial?.companyDocs || []);
      const [pilots,      setPilots]      = useState(initial?.pilots      || []);
      const [pilotStatuses, setPilotStatuses] = useState(initial?.pilotStatuses || []);
      const [dutyPeriods, setDutyPeriods] = useState(initial?.dutyPeriods || []);
      const [lang,        setLang]        = useState(initial?.settings?.language || 'fr');

      // persistance auto
      useEffect(() => {
        const ok = saveState({ flights, aircraft, documents, categories, settings: { ...settings, language: lang }, maintenance, companyDocs, pilots, pilotStatuses, dutyPeriods });
        if (!ok) console.warn('Sauvegarde locale impossible — exporte le JSON manuellement.');
      }, [flights, aircraft, documents, categories, settings, maintenance, companyDocs, pilots, pilotStatuses, dutyPeriods, lang]);

      // === Synchronisation cloud (GitHub Gist) ============================
      // État local non-persisté (juste UI)
      const [syncStatus, setSyncStatus] = useState({ status: 'idle', message: '', lastSyncAt: 0 });
      // Empêche de pousser pendant l'hydratation initiale (sinon écrase le distant)
      const hydratedRef = useRef(false);
      // Marqueur du dernier `updated_at` distant qu'on a vu (pour polling)
      const lastSeenUpdatedAtRef = useRef('');

      // Construit le snapshot complet à synchroniser
      function buildSnapshot() {
        return {
          __sync: { lastWrittenAt: Date.now(), version: 1 },
          flights, aircraft, documents, categories,
          settings: { ...settings, language: lang },
          maintenance, companyDocs, pilots, pilotStatuses, dutyPeriods,
        };
      }
      // Applique un snapshot reçu (remplace l'état local)
      function applySnapshot(snap) {
        if (!snap) return;
        const m = migrateState({ ...snap });
        setFlights(m.flights || []);
        setAircraft(m.aircraft || []);
        setDocuments(m.documents || []);
        setCategories(m.categories || DEFAULT_CATEGORIES);
        setSettings(prev => ({ ...(m.settings || prev), gh: prev.gh })); // garde la config gh locale
        setMaintenance(m.maintenance || []);
        setCompanyDocs(m.companyDocs || []);
        setPilots(m.pilots || []);
        setPilotStatuses(m.pilotStatuses || []);
        setDutyPeriods(m.dutyPeriods || []);
        if (m.settings?.language) setLang(m.settings.language);
      }

      // Pull manuel (utilisé au démarrage et par le bouton "Sync now")
      async function syncPull() {
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token || !gh.gistId) return;
        setSyncStatus(prev => ({ status: 'syncing', message: 'Téléchargement…', lastSyncAt: prev.lastSyncAt }));
        try {
          const { data, updatedAt } = await ghReadGist(gh.token, gh.gistId);
          lastSeenUpdatedAtRef.current = updatedAt;
          const remoteTs = data?.__sync?.lastWrittenAt || 0;
          const localTs  = (settings.gh?.lastWrittenAt) || 0;
          if (remoteTs > localTs) {
            // Distant plus récent : applique
            applySnapshot(data);
            setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), lastWrittenAt: remoteTs }}));
            setSyncStatus({ status: 'synced', message: 'Reçu du cloud ✓', lastSyncAt: Date.now() });
          } else if (remoteTs < localTs) {
            // Local plus récent : pousse
            await syncPush();
          } else {
            setSyncStatus({ status: 'synced', message: 'À jour', lastSyncAt: Date.now() });
          }
        } catch (e) {
          setSyncStatus(prev => ({ status: 'error', message: 'Pull : ' + e.message, lastSyncAt: prev.lastSyncAt }));
        }
      }
      // Push manuel ou debouncé
      async function syncPush() {
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token) return;
        const snap = buildSnapshot();
        setSyncStatus(prev => ({ status: 'syncing', message: 'Envoi…', lastSyncAt: prev.lastSyncAt }));
        try {
          let gistId = gh.gistId;
          if (!gistId) {
            // Première sync : crée le gist
            gistId = await ghCreateGist(gh.token, snap);
            setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), gistId, lastWrittenAt: snap.__sync.lastWrittenAt } }));
          } else {
            const r = await ghWriteGist(gh.token, gistId, snap);
            lastSeenUpdatedAtRef.current = r.updated_at;
            setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), lastWrittenAt: snap.__sync.lastWrittenAt } }));
          }
          setSyncStatus({ status: 'synced', message: 'Envoyé ✓', lastSyncAt: Date.now() });
        } catch (e) {
          setSyncStatus(prev => ({ status: 'error', message: 'Push : ' + e.message, lastSyncAt: prev.lastSyncAt }));
        }
      }

      // Pull au démarrage si la sync est activée
      useEffect(() => {
        const gh = settings.gh || {};
        if (gh.enabled && gh.token && gh.gistId && !hydratedRef.current) {
          syncPull().finally(() => { hydratedRef.current = true; });
        } else {
          hydratedRef.current = true;
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // Push debouncé : 5 sec après la dernière modification
      useEffect(() => {
        if (!hydratedRef.current) return;
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token) return;
        const t = setTimeout(() => { syncPush(); }, 5000);
        return () => clearTimeout(t);
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [flights, aircraft, documents, categories, maintenance, companyDocs, pilots, pilotStatuses, dutyPeriods]);

      // Polling : check toutes les 30 sec si le distant a changé
      useEffect(() => {
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token || !gh.gistId) return;
        const id = setInterval(async () => {
          try {
            const { data, updatedAt } = await ghReadGist(gh.token, gh.gistId);
            if (updatedAt && updatedAt !== lastSeenUpdatedAtRef.current) {
              lastSeenUpdatedAtRef.current = updatedAt;
              const remoteTs = data?.__sync?.lastWrittenAt || 0;
              const localTs = settings.gh?.lastWrittenAt || 0;
              if (remoteTs > localTs) {
                applySnapshot(data);
                setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), lastWrittenAt: remoteTs } }));
                setSyncStatus({ status: 'synced', message: 'Reçu du cloud ✓', lastSyncAt: Date.now() });
              }
            }
          } catch (e) { /* silence le polling */ }
        }, 30000);
        return () => clearInterval(id);
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [settings.gh?.enabled, settings.gh?.token, settings.gh?.gistId]);

      // -- handlers --
      function upsert(arrSetter) {
        return (item) => arrSetter(prev => {
          const i = prev.findIndex(x => x.id === item.id);
          if (i === -1) return [...prev, item];
          const copy = [...prev]; copy[i] = item; return copy;
        });
      }
      function remove(arrSetter) {
        return (id) => arrSetter(prev => prev.filter(x => x.id !== id));
      }

      // Helper : ajout d'une dépense (utilisé par le scan facture depuis le carnet)
      const addExpense = useCallback((doc) => {
        setDocuments(prev => [...prev, doc]);
      }, []);

      function exportJSON() {
        const data = { exportedAt: new Date().toISOString(), flights, aircraft, documents, categories, settings, maintenance, companyDocs, pilots, pilotStatuses, dutyPeriods };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `flightops_backup_${todayZuluDate()}.json`;
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
      }
      function importJSON(obj) {
        if (!obj || typeof obj !== 'object') return alert('JSON invalide.');
        if (!confirm('Importer ce fichier ? Les données existantes seront remplacées par celles du fichier.')) return;
        const migrated = migrateState({ ...obj });
        setFlights(migrated.flights || []);
        setAircraft(migrated.aircraft || []);
        setDocuments(migrated.documents || []);
        setCategories(migrated.categories || DEFAULT_CATEGORIES);
        setSettings(migrated.settings || { askBeforeDelete: true });
        setMaintenance(migrated.maintenance || []);
        setCompanyDocs(migrated.companyDocs || []);
        setPilots(migrated.pilots || []);
        setPilotStatuses(migrated.pilotStatuses || []);
        setDutyPeriods(migrated.dutyPeriods || []);
        alert('Import terminé.');
      }
      function clearAll() {

        if (!confirm('Confirmation finale : effacer toutes les données locales ?')) return;
        setFlights([]); setAircraft([]); setDocuments([]); setCategories(DEFAULT_CATEGORIES);
        setMaintenance([]); setCompanyDocs([]); setPilots([]); setPilotStatuses([]); setDutyPeriods([]);
      }

      const tT = (key) => (TRANSLATIONS[lang]?.[key]) || (TRANSLATIONS.fr[key]) || key;

      // Applique le thème (clair / sombre) au root via une classe CSS.
      // Recompute si l'heure change (auto-time) ou si le système change (auto-system).
      useEffect(() => {
        function apply() {

        return () => {

        };
      }, [settings.theme]);

              </div>
            </div>
            <div className="flex items-center gap-3 flex-shrink-0">
              {/* Sélecteur de langue rapide — accessible depuis tous les onglets */}
              <div className="flex items-center gap-1">
                <select
                  className="bg-[var(--bg-elev)] border border-[var(--border)] rounded-md text-xs px-1.5 py-1"

              <div className="text-right">
                <div className="text-xs text-[var(--text-dim)]">{tT('app.zulu')}</div>
                <div className="text-base"><ZuluClock /></div>
              </div>
            </div>
          </header>

          {/* Onglets en haut sur iPad/desktop (scroll horizontal si nécessaire) */}
          <nav className="tabnav-desktop hidden sm:flex justify-start gap-1 px-4 py-3 border-b border-[var(--border-soft)] glass overflow-x-auto">
            {tabs.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`tabbtn px-3 py-1.5 rounded-lg whitespace-nowrap text-sm font-semibold flex items-center gap-1.5 ${tab===t.id?'active tabbtn-active bg-[var(--bg-elev)]':''}`}>
                <span className="text-base leading-none">{t.icon}</span><span>{t.label}</span>
              </button>
            ))}
          </nav>

          {/* Contenu */}
          <main className="flex-1 px-3 sm:px-6 py-3 max-w-4xl w-full mx-auto pb-28 sm:pb-10">
            {tab==='logbook' && <LogbookScreen
              flights={flights} aircraft={aircraft} pilots={pilots} addExpense={addExpense}
              settings={settings}
              onAddOrUpdate={upsert(setFlights)} onDelete={remove(setFlights)} />}
            {tab==='staff' && <StaffScreen
              flights={flights} aircraft={aircraft} pilots={pilots}
              addExpense={addExpense}
              onUpsertFlight={upsert(setFlights)} onDeleteFlight={remove(setFlights)} />}
            {tab==='calendar' && <CalendarScreen
              flights={flights} aircraft={aircraft} pilots={pilots} addExpense={addExpense}
              onAddFlights={addFlights}
              onUpsertFlight={upsert(setFlights)} onDeleteFlight={remove(setFlights)}
              pilotStatuses={pilotStatuses} setPilotStatuses={setPilotStatuses} />}
            {tab==='aircraft' && <AircraftScreen
              aircraft={aircraft} flights={flights}
              onAddOrUpdate={upsert(setAircraft)} onDelete={remove(setAircraft)} />}
            {tab==='pilots' && <PilotsScreen
              pilots={pilots} flights={flights}
              onAddOrUpdate={upsert(setPilots)} onDelete={remove(setPilots)} />}
            {tab==='duty' && <DutyScreen
              flights={flights} pilots={pilots} dutyPeriods={dutyPeriods}
              onAddOrUpdate={upsert(setDutyPeriods)} onDelete={remove(setDutyPeriods)} />}
            {tab==='maintenance' && <MaintenanceScreen
              maintenance={maintenance} aircraft={aircraft} flights={flights}
              onAddOrUpdate={upsert(setMaintenance)} onDelete={remove(setMaintenance)} />}
            {tab==='documents' && <DocumentsScreen
              documents={documents} aircraft={aircraft} categories={categories}
              onAddOrUpdate={upsert(setDocuments)} onDelete={remove(setDocuments)} />}
            {tab==='company' && <CompanyDocsScreen
              companyDocs={companyDocs} aircraft={aircraft}
              onAddOrUpdate={upsert(setCompanyDocs)} onDelete={remove(setCompanyDocs)} />}
            {tab==='stats' && <StatsScreen
              flights={flights} aircraft={aircraft} documents={documents} categories={categories} pilots={pilots}
              onExportJSON={exportJSON} onImportJSON={importJSON} onClearAll={clearAll}
              settings={settings} onUpdateSettings={setSettings} />}
            {tab==='settings' && <SettingsScreen
              settings={settings} onUpdateSettings={setSettings}
              onExportJSON={exportJSON} onImportJSON={importJSON} onClearAll={clearAll}
              syncStatus={syncStatus} onSyncPull={syncPull} onSyncPush={syncPush} />}
          </main>

          {/* Tab bar bas (mobile) — scroll horizontal */}
          <nav className="sm:hidden glass safe-bottom fixed bottom-0 left-0 right-0 z-40 border-t border-[var(--border-soft)] overflow-x-auto">
            <div className="flex">
              {tabs.map(t => (
                <button key={t.id} onClick={()=>setTab(t.id)}
                  className={`tabbtn relative flex flex-col items-center py-3 px-5 min-w-[88px] flex-shrink-0 ${tab===t.id?'active':''}`}>
                  <span className={`text-2xl leading-none transition-transform ${tab===t.id?'scale-110':''}`}>{t.icon}</span>
                  <span className="text-[11px] mt-1.5 whitespace-nowrap font-semibold">{t.label}</span>
                  {tab===t.id && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-[3px] rounded-b bg-[var(--accent)] shadow-[0_0_8px_var(--accent-glow)]" />}
                </button>
              ))}
            </div>
          </nav>
        </div>
        </I18nContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // === Service Worker — mise à jour automatique du PWA iOS ===
    // Enregistre sw.js qui sert le HTML en network-first.
    // Quand une nouvelle version est détectée, on prévient l'utilisateur
    // via une petite bannière en bas de l'écran avec un bouton "Recharger".
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // Détecte une mise à jour disponible (nouveau SW en attente)
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner();
              }
            });
          });
          // Force un check de mise à jour à chaque ouverture
          reg.update();
        }).catch(()=>{ /* SW indispo (Safari privé, etc.) — pas grave, l'app marche quand même */ });

        // Recharge la page quand le nouveau SW prend le contrôle
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });

      function showUpdateBanner() {
        // Évite les doublons
        if (document.getElementById('aerodeck-update-banner')) return;
        const b = document.createElement('div');
        b.id = 'aerodeck-update-banner';
        b.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);' +
          'background:linear-gradient(180deg,#0ea5e9,#0284c7);color:#fff;padding:10px 18px;' +
          'border-radius:14px;font:600 13px -apple-system,system-ui,sans-serif;' +
          'box-shadow:0 8px 24px -8px rgba(14,165,233,.6),0 0 0 1px rgba(255,255,255,.15) inset;' +
          'z-index:9999;display:flex;gap:12px;align-items:center;cursor:pointer;animation:slideUp .35s ease;';
        b.innerHTML = '<span>✨ Nouvelle version disponible</span>' +
          '<span style="background:#fff;color:#0284c7;padding:4px 10px;border-radius:8px;font-size:11px;">Recharger</span>';
        b.onclick = () => {
          // Demande au SW en attente de prendre le contrôle → déclenche le reload
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            else window.location.reload();
          });
        };
        document.body.appendChild(b);
      }
    }
  </script>
</body>
</html>

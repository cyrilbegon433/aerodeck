    // Chip rond/carré coloré contenant un icon Lucide.
    // Style modernisé : gradient subtil + halo lumineux + bord net + icon stroke 2.5.
    // Inspiré des dernières versions Revolut / Wise / Linear (2024-2025).
    function CategoryIconChip({ name, color, size = 44, iconSize = 22, shape = 'rounded-2xl' }) {
      return (
        <div
          className={`grid place-items-center ${shape} flex-shrink-0 transition-transform`}
          style={{
            width: size, height: size,
            // Gradient diagonal pour donner du relief, plus une luminosité interne en haut.
            background: `linear-gradient(135deg, ${color}33 0%, ${color}14 100%)`,
            boxShadow: [
              `inset 0 1px 0 rgba(255,255,255,0.18)`,    // highlight haut
              `inset 0 0 0 1.25px ${color}80`,           // bord coloré net
              `0 8px 18px -6px ${color}88`,              // halo coloré
              `0 2px 4px rgba(0,0,0,0.18)`,              // ombre douce
            ].join(', '),
            color,
          }}>
          <LucideIcon name={name} size={iconSize} strokeWidth={2.5} />
        </div>
      );
    }
    // FancySelect : dropdown moderne qui remplace les <select> natifs.
    // Native HTML <select> n'est pas stylable côté liste ouverte (effet "Windows 95").
    // Ce composant rend le trigger comme un .select classique mais ouvre un popover
    // custom avec hover, état sélectionné, icônes optionnelles et clic-outside.
    function FancySelect({ value, onChange, options, placeholder = '— sélectionner —', className = '' }) {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        if (!open) return;
        function handler(e) {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [open]);
      const selected = options.find(o => o.value === value);
      // Détecte si l'icône passée est un nom Lucide existant ou un emoji/texte.
      // Si nom Lucide → rendu SVG moderne. Sinon → rendu texte (emoji).
      function renderIcon(opt, size) {
        if (!opt?.icon) return null;
        const isLucide = (typeof LUCIDE_ICONS !== 'undefined') && LUCIDE_ICONS[opt.icon];
        if (isLucide) {
          return (
            <span className="flex-shrink-0" style={{ color: opt.color || 'var(--text-dim)' }}>
              <LucideIcon name={opt.icon} size={size} strokeWidth={2.25} />
            </span>
          );
        }
        return <span className="flex-shrink-0 text-base leading-none">{opt.icon}</span>;
      }
      return (
        <div className={`relative ${className}`} ref={ref}>
          <button type="button"
            onClick={()=>setOpen(o=>!o)}
            className="select w-full text-left flex items-center justify-between gap-2"
            style={{ backgroundImage: 'none', paddingRight: '12px' }}>
            <span className="flex items-center gap-2 min-w-0">
              {renderIcon(selected, 16)}
              <span className="truncate">{selected ? selected.label : placeholder}</span>
            </span>
            <span className="flex-shrink-0 text-[var(--text-dim)] transition-transform" style={{ transform: open ? 'rotate(180deg)' : 'rotate(0deg)' }}>
              <LucideIcon name="chevronRight" size={16} strokeWidth={2.5} />
            </span>
          </button>
          {open && (
            <div className="absolute left-0 right-0 mt-2 z-30 rounded-xl shadow-2xl border border-[var(--border)] overflow-hidden"
              style={{ background: 'var(--bg-card)', maxHeight: '60vh', overflowY: 'auto' }}>
              {options.map(opt => {
                const isSelected = opt.value === value;
                return (
                  <button key={opt.value} type="button"
                    onClick={()=>{ onChange(opt.value); setOpen(false); }}
                    className={`w-full text-left px-3 py-2.5 hover:bg-[var(--bg-elev)] flex items-center gap-2.5 transition-colors text-sm ${
                      isSelected ? 'font-semibold' : ''
                    }`}
                    style={isSelected ? { background: 'rgba(56,189,248,0.10)', color: 'var(--accent)' } : {}}>
                    {renderIcon(opt, 18)}
                    <span className="flex-1 truncate">{opt.label}</span>
                    {isSelected && <span className="flex-shrink-0 text-[var(--accent)]"><LucideIcon name="check" size={16} strokeWidth={3} /></span>}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // Mapping catégorie de dépense → nom d'icône Lucide.
    // Icônes choisies pour être distinctes les unes des autres et
    // immédiatement reconnaissables (style appli finance moderne).
    const CATEGORY_LUCIDE = {
      fuel_aircraft: 'fuel',          // pompe (carburant avion)
      oil:           'droplet',       // goutte (huile)
      handling:      'planeLanding',  // avion qui atterrit (handling)
      hangar:        'warehouse',     // entrepôt avec portes (hangar)
      maintenance:   'wrench',        // clé à molette
      catering:      'coffee',        // tasse de café (catering)
      navigation:    'mapPin',        // épingle sur carte (navigation)
      insurance:     'shieldCheck',   // bouclier coché (assurance validée)
      training:      'graduationCap', // toque diplôme
      fees:          'creditCard',    // carte bancaire (frais financiers)
      mechanic_visit:'cog',           // engrenage (visite mécanicien — distinct de wrench)
      car_rental:    'car',           // voiture
      car_fuel:      'fuel',          // pompe (carburant voiture — couleur distincte)
      tolls:         'ticket',        // ticket (péages)
      car_parking:   'parkingSquare', // parking
      taxi:          'car',           // voiture
      other:         'package',       // paquet (autre)
    };

    // ------------------------------------------------------------------
    // Hint : bloc d'explication pliable. Affiche un petit lien
    // "ℹ Aide" cliquable qui déroule le texte d'explication. Permet
    // d'alléger l'interface sans perdre l'aide contextuelle.
    // ------------------------------------------------------------------
    function Hint({ title = 'Aide', children, defaultOpen = false }) {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div className="text-xs">
          <button
            type="button"
            onClick={()=>setOpen(o=>!o)}
            className="inline-flex items-center gap-1 text-[var(--text-dim)] hover:text-[var(--accent)] transition-colors py-0.5"
            title={open ? 'Masquer' : 'Afficher'}>
            <span className="inline-block transition-transform" style={{ transform: open ? 'rotate(90deg)' : 'rotate(0deg)' }}>▸</span>
            <span className="italic">ℹ {title}</span>
          </button>
          {open && (
            <div className="mt-1 px-2 py-2 rounded-md bg-[var(--bg-elev)] border border-[var(--border-soft)] text-[var(--text-dim)] anim-pop">
              {children}
            </div>
          )}
        </div>
      );
    }

    // ------------------------------------------------------------------
    // DocViewer : visionneuse interne pour PDF / images. Évite window.open
    // qui sortait l'utilisateur de l'app PWA (difficile de revenir sur iOS).
    // ------------------------------------------------------------------
    function DocViewer({ doc, onClose }) {
      const tx = useTx();
      if (!doc) return null;
      const isPdf = doc.mime === 'application/pdf';
      // Ferme avec la touche Escape (utile sur Mac/desktop)
      useEffect(() => {
        function onKey(e) { if (e.key === 'Escape') onClose(); }
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [onClose]);
      // === Geste tactile : swipe vertical sur le header ferme la visionneuse ===
      // Marche pour swipe vers le haut OU vers le bas (selon préférence utilisateur).
      // Limité au header pour ne pas casser le scroll natif du PDF / image.
      const touchRef = useRef({ y0: null, x0: null });
      function onTouchStart(e) {
        const t = e.touches[0];
        touchRef.current = { y0: t.clientY, x0: t.clientX };
      }
      function onTouchEnd(e) {
        const start = touchRef.current;
        if (start.y0 == null) return;
        const t = e.changedTouches[0];
        const dy = t.clientY - start.y0;
        const dx = t.clientX - start.x0;
        // Seuil de 60 px verticalement, et le mouvement doit être surtout vertical
        if (Math.abs(dy) > 60 && Math.abs(dy) > Math.abs(dx)) {
          onClose();
        }
        touchRef.current = { y0: null, x0: null };
      }
      return (
        <div className="fixed inset-0 z-[60] flex flex-col bg-[var(--bg)] anim-pop" data-docviewer
             style={{ overscrollBehavior: 'contain' }}>
          {/* Header avec marge généreuse au-dessus pour éviter l'encoche / status bar.
              On utilise paddingTop inline pour garantir un minimum de 70 px sur tous
              les appareils, plus l'inset système le cas échéant.
              Swipe vertical (haut ou bas) sur cette barre = fermer la visionneuse. */}
          <div
            className="flex items-center justify-between gap-3 px-3 glass border-b border-[var(--border-soft)] cursor-grab active:cursor-grabbing select-none"
            onTouchStart={onTouchStart}
            onTouchEnd={onTouchEnd}
            style={{
              paddingTop: 'calc(max(env(safe-area-inset-top), 12px) + 14px)',
              paddingBottom: '14px',
              minHeight: '64px',
              touchAction: 'pan-y',
            }}>
            <button
              type="button"
              onClick={onClose}
              className="btn btn-primary !py-2 !px-4 text-sm font-semibold flex-shrink-0"
              title={tx('Retour (Esc, ou balaye la barre)','Back (Esc, or swipe the bar)')}>
              ← {tx('Retour','Back')}
            </button>
            <div className="text-sm font-semibold truncate flex-1 text-center">
              <div>{doc.fileName || 'Document'}</div>
              <div className="text-[9px] text-[var(--text-dim)] font-normal -mt-0.5 hidden sm:block">
                {tx('Esc ou balaye cette barre pour fermer','Esc or swipe this bar to close')}
              </div>
              <div className="text-[9px] text-[var(--text-dim)] font-normal -mt-0.5 sm:hidden">
                ↕ {tx('Balaye pour fermer','Swipe to close')}
              </div>
            </div>
            <a
              href={doc.dataUrl}
              download={doc.fileName || 'document'}
              className="btn btn-secondary !py-2 !px-3 text-sm flex-shrink-0"
              title={tx('Télécharger le fichier','Download file')}>
              ⬇
            </a>
          </div>
          <div className="flex-1 min-h-0 overflow-auto" style={{ background: isPdf ? '#525659' : '#000' }}>
            {isPdf ? (
              <embed src={doc.dataUrl} type="application/pdf" style={{ width: '100%', height: '100%', minHeight: '70vh' }} />
            ) : (
              <div className="grid place-items-center h-full p-2">
                <img src={doc.dataUrl} alt={doc.fileName||''} style={{ maxWidth: '100%', maxHeight: '100%' }} />
              </div>
            )}
          </div>
        </div>
      );
    }

    function Modal({ open, onClose, title, children, footer }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center"
             data-modal
             onClick={onClose}
             style={{ overscrollBehavior: 'contain', touchAction: 'none', overflow: 'hidden' }}>
          <div className="absolute inset-0 bg-black/50" />
          <div
            className="relative card w-full sm:max-w-2xl max-h-[92vh] anim-pop"
            style={{
              borderRadius: '20px 20px 0 0',
              overscrollBehavior: 'contain',
              WebkitOverflowScrolling: 'touch',
              touchAction: 'pan-y pinch-zoom',
              overflowY: 'auto',
              overflowX: 'hidden',           // bloque tout mouvement horizontal de la fiche
              maxWidth: '100vw',
            }}
            onClick={(e)=>e.stopPropagation()}
          >
            <div className="sticky top-0 glass z-10 flex items-center justify-between px-4 py-3" style={{borderRadius:'20px 20px 0 0'}}>
              <h3 className="font-semibold text-base">{title}</h3>
              <button className="btn btn-secondary !py-1 !px-2 text-sm" onClick={onClose}>Fermer</button>
            </div>
            {/* overflow-x:hidden aussi sur le wrapper du contenu : empêche tout enfant
                trop large (input long, badge, label) de provoquer un scroll latéral. */}
            <div className="p-4" style={{ overflowX: 'hidden', maxWidth: '100%' }}>{children}</div>
            {footer && <div className="px-4 py-3 flex justify-end gap-2 border-t border-[var(--border-soft)]" style={{ overflowX: 'hidden' }}>{footer}</div>}
          </div>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 9) DOCUMENTS PAR VOL (W&B, briefing, plan vol, NOTAM, METAR…)
    // ------------------------------------------------------------------

    // Volets principaux affichés (fixes, dans cet ordre).
    // `lucide` = nom d'icône Lucide à utiliser dans le JSX (icônes modernes).
    // `icon` reste pour fallback / migration legacy (utilisé si lucide absent).
    const FLIGHT_DOC_TYPES = [
      { id: 'wb',    label: 'Weight & Balance', labelEn: 'Weight & Balance', icon: '⚖️',  lucide: 'scale',     color: '#a78bfa' },
      { id: 'fpl',   label: 'FPL',              labelEn: 'FPL',              icon: '📋',  lucide: 'fileText',  color: '#38bdf8' },
      { id: 'ofpl',  label: 'OFPL',             labelEn: 'OFPL',             icon: '🗺️', lucide: 'mapPinned', color: '#34d399' },
      { id: 'other', label: 'Autre',            labelEn: 'Other',            icon: '📄',  lucide: 'file',      color: '#94a3b8' },
    ];
    // Libellés humains pour les anciens types (compatibilité ascendante).
    // Les documents existants importés sous ces types restent accessibles via la
    // section "Autres pièces jointes" en bas du panneau.
    const LEGACY_FLIGHT_DOC_LABELS = {
      briefing:    { label: 'Briefing',          icon: '📝' },
      flightplan:  { label: 'Plan de vol',       icon: '🗺️' },
      notam:       { label: 'NOTAM',             icon: '📡' },
      metar:       { label: 'METAR / TAF',       icon: '🌦️' },
      performance: { label: 'Performance',       icon: '📈' },
      fuel_calc:   { label: 'Calcul carburant',  icon: '⛽' },
    };

    // Lecture d'un fichier en dataURL (image OU PDF). Pour les images on redimensionne ;
    // pour les PDF on conserve tel quel mais on alerte si > 2 Mo (limite localStorage).
    async function fileToStoredDoc(file, typeId='other') {
      const isImage = (file.type||'').startsWith('image/');
      const isPdf = file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
      let dataUrl;
      if (isImage) {
        dataUrl = await fileToResizedDataURL(file, 1500, 0.8);
      } else if (isPdf) {
        dataUrl = await new Promise((resolve, reject) => {
          const r = new FileReader(); r.onerror=()=>reject(r.error);
          r.onload = ()=>resolve(r.result); r.readAsDataURL(file);
        });
        const sizeMB = (dataUrl.length * 0.75) / (1024*1024);
        if (sizeMB > 2) {
          if (!confirm(_i18n(
            `Ce PDF fait ~${sizeMB.toFixed(1)} Mo. Le stocker localement risque de saturer le navigateur (limite ~5 Mo). Continuer ?`,
            `This PDF is ~${sizeMB.toFixed(1)} MB. Storing it locally may saturate the browser (~5 MB limit). Continue?`
          ))) {
            throw new Error(_i18n('Import annulé.','Import cancelled.'));
          }
        }
      } else {
        throw new Error(_i18n('Type non supporté (image ou PDF uniquement).','Unsupported type (image or PDF only).'));
      }
      return {
        id: 'fdoc_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        type: typeId,
        fileName: file.name || (isPdf ? 'document.pdf' : 'image.jpg'),
        mime: isPdf ? 'application/pdf' : 'image/jpeg',
        dataUrl,
        addedAt: Date.now(),
      };
    }

    function FlightDocumentsEditor({ docs, onChange, flight, onUpdateFlight }) {
      const tx = useTx();
      const { lang } = React.useContext(I18nContext);
      // 4 volets fixes — l'utilisateur voit W&B, FPL, OFPL, Autre.
      // Chaque volet ouvre un MODAL centré (cohérent FR & EN, mobile + desktop)
      // avec, pour FPL, les champs ETD/ETA/Distance, puis :
      //   1) Scanner (caméra) — masqué sur desktop (pas d'utilité)
      //   2) Importer depuis Téléchargements (file picker)
      //   3) Bouton Valider qui ferme la modal
      // Les anciens docs (briefing, NOTAM, etc.) restent visibles dans une section
      // "Autres pièces jointes" repliable (rien n'est jamais supprimé silencieusement).

      const [busy, setBusy]           = useState(false);
      const [activeMenu, setActiveMenu] = useState(null);  // id du volet dont le menu est ouvert
      const [pendingType, setPendingType] = useState(null); // type vers lequel le prochain fichier sera attaché
      const [showLegacy, setShowLegacy] = useState(false);

      // Détection desktop vs mobile (breakpoint Tailwind md à 768px).
      // Réactive aux changements de viewport (rotation tablette, redim. fenêtre).
      const [isMobile, setIsMobile] = useState(() =>
        typeof window !== 'undefined' && window.matchMedia('(max-width: 767px)').matches
      );
      useEffect(() => {
        if (typeof window === 'undefined' || !window.matchMedia) return;
        const mq = window.matchMedia('(max-width: 767px)');
        const handler = (e) => setIsMobile(e.matches);
        mq.addEventListener ? mq.addEventListener('change', handler) : mq.addListener(handler);
        return () => {
          mq.removeEventListener ? mq.removeEventListener('change', handler) : mq.removeListener(handler);
        };
      }, []);

      // Horloge Zulu live (HH:MM:SS) — affichée en haut du popup FPL pour aider
      // à saisir ETD/ETA. Tick chaque seconde uniquement quand un menu est ouvert
      // pour ne pas re-render inutilement le reste du composant.
      const [zuluClock, setZuluClock] = useState(() => nowZulu());
      useEffect(() => {
        if (activeMenu !== 'fpl') return; // tick seulement quand le modal FPL est ouvert
        const id = setInterval(() => setZuluClock(nowZulu()), 1000);
        return () => clearInterval(id);
      }, [activeMenu]);

      const cameraRef = useRef(null);  // input dédié au scan caméra
      const filesRef  = useRef(null);  // input dédié à l'import depuis Téléchargements

      const visibleIds = FLIGHT_DOC_TYPES.map(t => t.id);
      const docsForType = (typeId) => (docs||[]).filter(d => d.type === typeId);
      const legacyDocs  = (docs||[]).filter(d => !visibleIds.includes(d.type));

      function typeLabel(typeId) {
        return FLIGHT_DOC_TYPES.find(t=>t.id===typeId)
            || LEGACY_FLIGHT_DOC_LABELS[typeId]
            || { label: typeId || 'Document', icon: '📄' };
      }

      // Ouverture du sélecteur (caméra ou fichier). On définit pendingType juste avant
      // de cliquer sur l'input pour qu'il soit lu par handleFiles à la sélection.
      function triggerCamera(typeId) {
        setPendingType(typeId);
        setActiveMenu(null);
        setTimeout(() => cameraRef.current?.click(), 0);
      }
      function triggerFiles(typeId) {
        setPendingType(typeId);
        setActiveMenu(null);
        setTimeout(() => filesRef.current?.click(), 0);
      }

      async function handleFiles(e) {
        const files = Array.from(e.target.files || []);
        const targetType = pendingType;
        e.target.value = '';
        setPendingType(null);
        if (!files.length || !targetType) return;
        setBusy(true);
        try {
          const newDocs = [];
          for (const f of files) {
            try { newDocs.push(await fileToStoredDoc(f, targetType)); }
            catch (err) { alert(`"${f.name}" : ${err.message}`); }
          }
          if (newDocs.length) onChange([...(docs||[]), ...newDocs]);
        } finally {
          setBusy(false);
        }
      }

      function removeDoc(id) {
        if (!confirmDelete(tx('Retirer ce document ? (Pense à exporter en JSON avant si tu veux le conserver.)','Remove this document? (Export JSON first if you want to keep it.)'))) return;
        onChange((docs||[]).filter(d => d.id !== id));
      }
      // Visionneuse interne (avec bouton ← Retour) au lieu d'ouvrir un nouvel
      // onglet : sur iOS PWA, l'onglet externe est très difficile à fermer.
      const [viewingDoc, setViewingDoc] = useState(null);
      function openDoc(d) { setViewingDoc(d); }

      function DocRow({ d }) {
        const t = typeLabel(d.type);
        const isPdf = d.mime === 'application/pdf';
        // État archivé : binaire absent. On affiche "OK archivé" dès que dataUrl est
        // vide/manquant (3 cas couverts : flag explicite, archivedAt présent, ou doc
        // arrivé via sync sans dataUrl mais avec métadonnées). Évite l'affichage
        // d'une image/icône cassée non cliquable.
        const isArchived = !!d.archived
          || (!d.dataUrl && !!d.archivedAt)
          || (!d.dataUrl && !!d.id && !!(d.fileName || d.type));
        if (isArchived) {
          return (
            <div className="flex items-center gap-2 p-2">
              <div className="flex-1 min-w-0 text-xs">
                <div className="truncate font-semibold text-[var(--ok)] inline-flex items-center gap-1.5">
                  <LucideIcon name="check" size={12} strokeWidth={2.5} />
                  {tx('OK archivé','Archived OK')}
                </div>
                {/* Mobile : titre seul (W&B / FPL / OFPL). Desktop : titre + nom fichier. */}
                <div className="truncate text-[var(--text-dim)]">
                  {lang === 'en' && t.labelEn ? t.labelEn : t.label}
                  {d.fileName && <span className="hidden sm:inline"> · {d.fileName}</span>}
                </div>
              </div>
              <button type="button"
                title={tx('Retirer ce document','Remove this document')}
                className="grid place-items-center w-9 h-9 rounded-lg text-[var(--err)] hover:bg-[var(--err)]/15 transition-colors flex-shrink-0"
                onClick={()=>removeDoc(d.id)}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
              </button>
            </div>
          );
        }
        return (
          // Document validé : transparent. Sur desktop, le nom de fichier est déjà
          // affiché dans l'en-tête du slot — on masque donc la zone texte ici (filename + type)
          // pour éviter le doublon. Sur mobile on garde filename + type comme avant.
          <div className="flex items-center gap-2 p-2">
            {isPdf ? (
              <div className="w-10 h-10 grid place-items-center bg-[var(--bg-elev)] rounded text-xl flex-shrink-0">📄</div>
            ) : (
              <img src={d.dataUrl} alt="" className="w-10 h-10 object-cover rounded flex-shrink-0" />
            )}
            {/* Bloc texte filename + type — masqué sur desktop (md+), visible mobile */}
            <div className="flex-1 min-w-0 text-xs md:hidden">
              <div className="truncate font-medium">{d.fileName}</div>
              <div className="truncate text-[var(--text-dim)] inline-flex items-center gap-1">
                {t.lucide
                  ? <span style={{ color: t.color || 'var(--accent)' }}><LucideIcon name={t.lucide} size={11} strokeWidth={2.5} /></span>
                  : <span>{t.icon}</span>}
                {lang === 'en' && t.labelEn ? t.labelEn : t.label}
              </div>
            </div>
            {/* Spacer desktop pour pousser les boutons à droite quand le texte est masqué */}
            <div className="hidden md:block flex-1"></div>
            <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs" onClick={()=>openDoc(d)}>{tx('Ouvrir','Open')}</button>
            <button type="button"
              title={tx('Retirer ce document','Remove this document')}
              className="grid place-items-center w-9 h-9 rounded-lg text-[var(--err)] hover:bg-[var(--err)]/15 transition-colors flex-shrink-0"
              onClick={()=>removeDoc(d.id)}>
              <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
            </button>
          </div>
        );
      }

      return (
        <div className="card p-3">
          <div className="label">{tx('Documents joints au vol','Flight attachments')}</div>

          {/* Visionneuse interne — bouton "← Retour" pour revenir à l'app */}
          <DocViewer doc={viewingDoc} onClose={()=>setViewingDoc(null)} />

          <div className="space-y-2">
            {FLIGHT_DOC_TYPES.map(v => {
              const list = docsForType(v.id);
              const menuOpen = activeMenu === v.id;
              return (
                <div key={v.id} className="bg-[var(--bg-elev)] p-3 rounded-lg">
                  <div className="flex items-center justify-between gap-2">
                    <div className="flex items-center gap-2 min-w-0 flex-1">
                      {v.lucide
                        ? <CategoryIconChip name={v.lucide} color={v.color} size={36} iconSize={18} shape="rounded-xl" />
                        : <span className="text-2xl">{v.icon}</span>}
                      <span className="font-medium truncate">{lang === 'en' && v.labelEn ? v.labelEn : v.label}</span>
                      {/* Chip vert "Joint/Attached" + nom de fichier inline sur desktop */}
                      {list.length > 0 && (
                        <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider"
                          style={{ background: 'rgba(34,197,94,0.18)', color: 'var(--ok)', border: '1px solid rgba(34,197,94,0.40)' }}>
                          <LucideIcon name="check" size={10} strokeWidth={2.75} />
                          {list.length === 1 ? tx('Joint','Attached') : `${list.length} ${tx('joints','attached')}`}
                        </span>
                      )}
                      {/* Nom du fichier inline à droite du chip — DESKTOP UNIQUEMENT.
                          Sur mobile il reste affiché dans le DocRow ci-dessous. */}
                      {!isMobile && list.length > 0 && (
                        <span className="hidden md:inline text-xs text-[var(--text-dim)] truncate min-w-0">
                          {list.map(d => d.fileName || tx('Sans nom','Unnamed')).join(' · ')}
                        </span>
                      )}
                    </div>
                    <div className="relative flex-shrink-0">
                      <button type="button" className="btn btn-primary !py-1 !px-3 text-sm" disabled={busy}
                        onClick={()=> setActiveMenu(menuOpen ? null : v.id)}>
                        {busy && pendingType===v.id ? tx('Import…','Import…') : tx('+ Ajouter','+ Add')}
                      </button>
                      {menuOpen && isMobile && v.id !== 'fpl' && (
                        <>
                          {/* === Mobile NON-FPL : popover ancré simple (préservé) ===
                              + bouton Valider en bas pour cohérence avec FPL/desktop. */}
                          <div className="fixed inset-0 z-20" onClick={()=>setActiveMenu(null)} />
                          <div className="absolute right-0 top-full mt-1 z-30 card p-3 anim-pop min-w-[230px]">
                            <button type="button" className="btn btn-secondary w-full mb-1 justify-start"
                              onClick={()=>triggerCamera(v.id)}>
                              <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />{tx("Scanner avec l'appareil photo",'Scan with camera')}</span>
                            </button>
                            <button type="button" className="btn btn-secondary w-full justify-start mb-2"
                              onClick={()=>triggerFiles(v.id)}>
                              <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />{tx('Importer depuis Téléchargements','Import from Downloads')}</span>
                            </button>
                            <button type="button" className="btn btn-primary w-full"
                              onClick={()=>setActiveMenu(null)}>
                              <span className="inline-flex items-center gap-1.5"><LucideIcon name="check" size={14} strokeWidth={2.5} />{tx('Valider','Validate')}</span>
                            </button>
                          </div>
                        </>
                      )}
                      {menuOpen && (v.id === 'fpl' || !isMobile) && (() => {
                        // === Modal CENTRÉ ===
                        // Affiché pour FPL (toutes plateformes) ET tous les slots sur desktop.
                        // Le bloc ETD/ETA/Distance n'apparaît que pour FPL.
                        // Le bouton "Scanner avec caméra" est masqué sur desktop (inutile).
                        const isFpl = v.id === 'fpl';
                        const autoNM = flight ? distanceBetweenICAO(flight.from, flight.to) : null;
                        const etdMin = flight ? parseHHMM(flight.etd) : null;
                        const etaMin = flight ? parseHHMM(flight.eta) : null;
                        let plannedDurMin = null;
                        if (etdMin != null && etaMin != null) {
                          plannedDurMin = etaMin - etdMin;
                          if (plannedDurMin < 0) plannedDurMin += 24*60;
                        }
                        const distUsed = flight ? (parseFloat(flight.distanceNM) || autoNM || 0) : 0;
                        const computedSpeedKt = (plannedDurMin > 0 && distUsed > 0)
                          ? (distUsed / (plannedDurMin / 60))
                          : null;
                        const slotLabel = lang === 'en' && v.labelEn ? v.labelEn : v.label;
                        const subtitle = isFpl
                          ? tx('Données plan de vol','Flight plan data')
                          : tx('Joindre le document','Attach the document');
                        return (
                          <div className="fixed inset-0 z-40 flex items-center justify-center p-4"
                               style={{ background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(4px)' }}
                               onClick={()=>setActiveMenu(null)}>
                            <div className="card anim-pop w-full max-w-md p-5"
                                 onClick={e=>e.stopPropagation()}>
                              {/* En-tête modal */}
                              <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-2">
                                  <CategoryIconChip name={v.lucide || 'file'} color={v.color} size={32} iconSize={16} shape="rounded-lg" />
                                  <div>
                                    <div className="font-semibold text-base">{slotLabel}</div>
                                    <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-bold">
                                      {subtitle}
                                    </div>
                                  </div>
                                </div>
                                <button type="button"
                                  className="text-[var(--text-dim)] hover:text-[var(--text)] p-1"
                                  onClick={()=>setActiveMenu(null)}>
                                  <LucideIcon name="x" size={18} strokeWidth={2.25} />
                                </button>
                              </div>

                              {/* Horloge Zulu live — UNIQUEMENT POUR FPL.
                                  Affichage HH:MM:SS Z, format mono, mise en avant pour
                                  aider à saisir ETD/ETA d'un coup d'œil. */}
                              {isFpl && (
                                <div className="mb-3 flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl bg-[var(--bg-elev)] border border-[var(--border-soft)]">
                                  <LucideIcon name="clock" size={14} strokeWidth={2.5} />
                                  <span className="text-[10px] uppercase tracking-[0.15em] text-[var(--text-dim)] font-bold">
                                    {tx('Heure Zulu','Zulu time')}
                                  </span>
                                  <span className="font-mono font-bold text-lg tracking-wider text-[var(--accent)]">
                                    {zuluClock}
                                  </span>
                                </div>
                              )}

                              {/* Bloc Champs ETD / ETA / Distance — UNIQUEMENT POUR FPL */}
                              {isFpl && flight && onUpdateFlight && (
                                <div className="space-y-3">

                                        ETA <span className="opacity-70">Z</span>

                                      <input
                                        className="w-full bg-transparent border-0 outline-none font-mono text-2xl font-bold text-center tracking-widest mt-1 focus:text-[var(--accent)]"
                                        inputMode="numeric" maxLength={5}
                                        placeholder="1015"
                                        value={flight.eta || ''}
                                        onChange={e=>onUpdateFlight({ eta: e.target.value.replace(/[^0-9:]/g,'') })} />
                                    </div>
                                  </div>
                                  <div className="bg-[var(--bg-elev)] rounded-xl p-3 border border-[var(--border-soft)]">
                                    <div className="flex items-center justify-between">
                                      <div className="text-[10px] uppercase tracking-[0.15em] text-[var(--text-dim)] font-bold">
                                        {tx('Distance','Distance')} <span className="opacity-70">NM</span>
                                      </div>
                                      {autoNM != null && (parseFloat(flight.distanceNM)||0) === 0 && (
                                        <button type="button"
                                          className="text-[10px] text-[var(--accent)] font-bold hover:underline"
                                          onClick={()=>onUpdateFlight({ distanceNM: Math.round(autoNM) })}>
                                          {tx('Utiliser auto','Use auto')} {autoNM.toFixed(0)}
                                        </button>
                                      )}
                                    </div>
                                    <input
                                      type="number" step="1" min="0"
                                      className="w-full bg-transparent border-0 outline-none font-mono text-2xl font-bold text-center tracking-wider mt-1 focus:text-[var(--accent)]"
                                      placeholder={autoNM != null ? autoNM.toFixed(0) : '—'}
                                      value={flight.distanceNM || ''}
                                      onChange={e=>onUpdateFlight({ distanceNM: parseFloat(e.target.value||'0') })} />
                                  </div>
                                  {computedSpeedKt != null && (
                                    <div className="flex items-center gap-2 px-3 py-2 rounded-full self-start"
                                      style={{ background: 'var(--accent)' + '22', border: '1px solid ' + 'var(--accent)' + '55' }}>
                                      <LucideIcon name="cog" size={13} strokeWidth={2.5} />
                                      <span className="text-[11px] uppercase tracking-wider font-bold text-[var(--accent)]">
                                        {tx('Vitesse FPL','FPL speed')}

                                        {computedSpeedKt.toFixed(0)} kt
                                      </span>
                                      <span className="text-[10px] text-[var(--text-dim)]">
                                        ({fmtDuration(plannedDurMin)})

                                    </div>
                                  )}
                                  {autoNM == null && flight.from && flight.to && flight.from.length === 4 && flight.to.length === 4 && (
                                    <div className="text-[11px] text-[var(--warn)]">
                                      ⚠ {tx('OACI hors base — saisir distance manuelle','ICAO not in DB — enter distance manually')}
                                    </div>
                                  )}
                                </div>
                              )}

                              {/* Actions d'attache document — séparateur seulement si bloc FPL au-dessus */}
                              <div className={`${isFpl ? 'border-t border-[var(--border-soft)] mt-4 pt-4 ' : ''}space-y-2`}>
                                {/* Caméra : MASQUÉE sur desktop (pas d'utilité), visible mobile uniquement */}
                                {isMobile && (
                                  <button type="button" className="btn btn-secondary w-full justify-start"
                                    onClick={()=>triggerCamera(v.id)}>
                                    <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />{tx("Scanner avec l'appareil photo",'Scan with camera')}</span>
                                  </button>
                                )}
                                <button type="button" className="btn btn-secondary w-full justify-start"
                                  onClick={()=>triggerFiles(v.id)}>
                                  <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />{tx('Importer depuis Téléchargements','Import from Downloads')}</span>
                                </button>
                              </div>

                              {/* Bouton Valider — ferme la modal */}
                              <button type="button" className="btn btn-primary w-full mt-4"
                                onClick={()=>setActiveMenu(null)}>
                                <span className="inline-flex items-center gap-2">
                                  <LucideIcon name="check" size={16} strokeWidth={2.5} />

                        );
                      })()}
                    </div>
                  </div>
                  {list.length > 0 && (
                    <div className="mt-2 space-y-1">
                      {list.map(d => <DocRow key={d.id} d={d} />)}
                    </div>
                  )}

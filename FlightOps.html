              const licenseColor  = expiryColor(p.licenseExpiry, 14, 5)  || 'var(--ok)';
              const passportColor = expiryColor(p.passportExpiry, 60, 14) || 'var(--ok)';
              // Total temps de vol (heures décimales) cumulé pour ce pilote
              const totalMinPilot = (flights || [])
                .filter(f => f.pilotId === p.id || f.copilotId === p.id)
                .reduce((sum, f) => sum + (parseInt(f.flightTime,10) || 0), 0);
              const totalH = (totalMinPilot / 60).toFixed(1);
              return (
                <div key={p.id} className="card p-4 cursor-pointer hover:border-[var(--accent)]/40 transition-colors"
                     onClick={()=>{ setEditing(p); setShowForm(true); }}>
                  {/* Layout : sur desktop 3 colonnes (identité / contact / stats),
                      sur mobile empilé. La largeur de la card est étendue à max-w-7xl
                      pour exploiter l'espace écran. */}
                  <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                    {/* Colonne 1 — Identité (2/12) — ultra-compacte pour pousser
                        contact + médical/licence très à gauche / très à droite. */}
                    <div className="md:col-span-2 min-w-0">
                      <div className="text-lg md:text-xl font-semibold tracking-wide truncate">{pilotDisplayName(p)}</div>
                      {/* Sous-ligne : seulement base + âge (CPL et N° licence sont déjà

                          {p.dateOfBirth && computeAge(p.dateOfBirth) != null && `${computeAge(p.dateOfBirth)} ${tx('ans','yrs')}`}
                        </div>

                      {/* Badges licence : drapeau circulaire + type + numéro, mêmes

                              <div key={lic.id || i}
                                className="inline-flex items-center gap-2 pl-1 pr-3 md:pr-4 py-1 md:py-1.5 rounded-full border border-[var(--border-soft)] bg-[var(--bg-elev)]"
                                title={auth ? auth.label : lic.authority}>
                                {/* Pastille ronde drapeau (style sélecteur de langue) */}
                                <span className="grid place-items-center w-7 h-7 md:w-8 md:h-8 rounded-full bg-[var(--bg-card)] text-base md:text-lg shadow-sm">
                                  {auth ? auth.flag : '🌐'}

                                  {lic.number && <span className="ml-1.5 text-[var(--text-dim)] font-mono font-normal">{lic.number}</span>}
                                </span>
                              </div>

                          {/* Mobile uniquement : chips Médical / License sans numéros, juste état coloré */}
                          {p.medicalExpiry && (
                            <span className="md:hidden inline-flex items-center gap-1 text-xs font-semibold" style={{ color: medicalColor }}>
                              <LucideIcon name="shieldCheck" size={12} strokeWidth={2.5} />

                              <LucideIcon name="ticket" size={12} strokeWidth={2.5} />

                      {p.ratings && <div className="text-xs text-[var(--text-dim)] truncate mt-2">{tx('QT','Ratings')} : {p.ratings}</div>}
                    </div>

                    {/* Colonne 2 — Contact (3/12 sur desktop) — collé à droite de l'identité */}
                    <div className="md:col-span-3 min-w-0 text-sm md:text-base text-[var(--text-dim)]">
                      <div className="flex flex-col gap-2 md:gap-2.5">

                        Liste cyan/orange selon récence d'activité. Masqué sur mobile. */}
                    <div className="hidden md:block md:col-start-6 md:col-span-2 min-w-0 text-sm md:text-base text-[var(--text-dim)]">
                      {(p.aircraftAuthorizations || []).length > 0 && (
                        <div className="flex flex-col gap-1.5">
                          {(p.aircraftAuthorizations || []).map(a => {

                    </div>
                    {/* Colonne 3 — Médical / Licence / Passeport (cols 8-9) — encore plus à droite.
                        Stats (col 4) restent à l'extrême droite.
                        Masquée sur mobile (chips compacts visibles en col 1).
                        Les dates sont en gris (text-dim), seuls icône + label se colorent
                        en orange/rouge si proche expiration. */}
                    <div className="hidden md:block md:col-start-8 md:col-span-2 min-w-0 text-sm md:text-base text-[var(--text-dim)]">
                      {(p.medicalExpiry || p.licenseExpiry || p.passportId || p.passportExpiry) && (
                        // Grille 2 colonnes : labels auto-width à gauche (icône + texte),
                        // valeurs à droite alignées verticalement entre elles.
                        <div className="grid grid-cols-[auto_1fr] gap-x-4 gap-y-3 items-center">
                          {p.medicalExpiry && (
                            <>
                              <div className="inline-flex items-center gap-2 whitespace-nowrap">
                                <span style={{ color: medicalColor }}>
                                  <LucideIcon name="shieldCheck" size={16} strokeWidth={2.5} />
                                </span>
                                <span className="font-semibold" style={{ color: medicalColor }}>
                                  {tx('Médical','Medical')}
                                </span>
                              </div>
                              <span className="font-mono text-[var(--text-dim)] whitespace-nowrap">{fmtDate(p.medicalExpiry)}</span>

                            <>
                              <div className="inline-flex items-center gap-2 whitespace-nowrap">
                                <span style={{ color: licenseColor }}>
                                  <LucideIcon name="ticket" size={16} strokeWidth={2.5} />
                                </span>
                                <span className="font-semibold" style={{ color: licenseColor }}>
                                  {tx('Licence','License')}
                                </span>
                              </div>
                              <span className="font-mono text-[var(--text-dim)] whitespace-nowrap">{fmtDate(p.licenseExpiry)}</span>

                          {(p.passportId || p.passportExpiry) && (
                            <>
                              <div className="inline-flex items-center gap-2 whitespace-nowrap">
                                <span style={{ color: passportColor }}>
                                  <LucideIcon name="shield" size={16} strokeWidth={2.5} />
                                </span>

                                {p.passportId && p.passportExpiry && <span className="text-[var(--text-dim)] mx-1">·</span>}
                                {p.passportExpiry && (
                                  <span style={{ color: passportColor === 'var(--ok)' ? 'var(--text-dim)' : passportColor }}>

                    {/* Colonne 4 — Stats (cols 10-12 sur desktop) — extrême droite */}
                    <div className="md:col-start-10 md:col-span-3 flex md:flex-col md:items-end md:justify-center gap-3 md:gap-2">
                      <div className="text-right">
                        <div className="text-2xl md:text-3xl font-mono font-bold text-[var(--accent)] leading-none">{count}</div>
                        <div className="text-[10px] md:text-xs uppercase tracking-wider text-[var(--text-dim)] font-bold mt-0.5">{tx('vols','flights')}</div>

                      {totalMinPilot > 0 && (

                  {(medicalSoon || licenseSoon) && (

                      <LucideIcon name="cog" size={12} strokeWidth={2.5} />

          <Modal

                }
              }}
                className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors"

          >
            <PilotForm initial={editing} flights={flights} aircraft={aircraft} onCancel={()=>setShowForm(false)} onSave={(p)=>{ onAddOrUpdate(p); setShowForm(false); }} />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12f) FUEL & OIL ENTRIES EDITORS (multi-entrées avec scan facture)
    // ------------------------------------------------------------------
    // Ces deux éditeurs sont presque identiques mais traitent des unités et
    // des catégories de dépense différentes. La logique commune (scan + création
    // automatique d'une dépense) est factorisée dans useScanToExpense.

    function useScanToExpense({ categoryId, addExpense, aircraftId, flightDate, getEntry, setEntry }) {
      const tx = useTx();
      // Renvoie deux callbacks : triggerCamera, triggerFiles. Quand un fichier est sélectionné,
      // on l'enregistre comme image / PDF, on crée une dépense automatiquement, et on stocke
      // l'id de la dépense dans l'entrée concernée pour permettre un suivi.
      const cameraRef = useRef(null);
      const filesRef  = useRef(null);
      const [busy, setBusy] = useState(false);

      const handleFiles = useCallback(async (e) => {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (!file) return;
        setBusy(true);
        try {
          const stored = await fileToStoredDoc(file, categoryId);
          // On crée une dépense
          const entry = getEntry();
          const expenseId = 'doc_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
          const invNote = entry?.invoiceNumber ? `N° facture : ${entry.invoiceNumber}` : '';
          const expense = {
            id: expenseId,
            date: entry?.date || flightDate || todayZuluDate(),
            supplier: entry?.supplier || '',
            amount: entry?.amount || '',
            currency: entry?.currency || 'EUR',
            categoryId,                    // 'fuel_aircraft' ou 'oil'
            aircraftId: aircraftId || '',
            thumbnail: stored.mime === 'application/pdf' ? '' : stored.dataUrl,
            ocrText: '',
            fileName: stored.fileName,
            mime: stored.mime,
            dataUrl: stored.dataUrl,       // on garde le PDF/image dans la dépense aussi
            invoiceNumber: entry?.invoiceNumber || '',
            notes: ['Créé automatiquement depuis le carnet (vol).', invNote].filter(Boolean).join('\n'),
            sourceFlightEntryId: entry?.id || '',
            addedAt: Date.now(),
          };
          addExpense(expense);
          // Met à jour l'entrée pour la lier
          setEntry({
            ...entry,
            invoiceDocId: expenseId,
            invoiceDataUrl: stored.mime === 'application/pdf' ? '' : stored.dataUrl,
            invoiceFileName: stored.fileName,
            invoiceMime: stored.mime,
          });
        } catch (err) {
          alert(tx('Import facture : ','Import invoice: ') + err.message);
        } finally { setBusy(false); }
      }, [categoryId, addExpense, aircraftId, flightDate, getEntry, setEntry]);

      function triggerCamera() { setTimeout(()=>cameraRef.current?.click(), 0); }
      function triggerFiles()  { setTimeout(()=>filesRef.current?.click(),  0); }

      const inputs = (
        <>
          {/* Pas de capture="environment" → sélecteur natif avec option "Scan Documents" iOS / scanner Android. */}
          <input ref={cameraRef} type="file" accept="image/*,application/pdf"
                 className="hidden" onChange={handleFiles} />
          <input ref={filesRef}  type="file" accept="image/*,application/pdf"
                 className="hidden" onChange={handleFiles} />
        </>
      );

      return { triggerCamera, triggerFiles, busy, inputs };
    }

    // Composant rangée d'aperçu de facture rattachée.
    // Trois états visuels :
    //  - Aucune facture (invoiceDocId vide) : ne rien afficher.
    //  - Facture présente avec aperçu (dataUrl ou nom de fichier) : aperçu + ✓.
    //  - Facture archivée (invoiceDocId existe mais dataUrl ET fileName vides,
    //    ce qui arrive quand l'utilisateur a archivé en ZIP et purgé le cache) :
    //    mention "Facture sauvegardée (archivée hors app)".
    function InvoicePreview({ entry }) {
      const tx = useTx();
      if (!entry?.invoiceDocId) return null;
      const isPdf = entry.invoiceMime === 'application/pdf';
      const hasPreview = !!(entry.invoiceDataUrl || entry.invoiceFileName);
      // Cas archivé : la dépense existe toujours mais le binaire a été purgé
      if (!hasPreview) {
        return (
          <div className="flex items-center gap-2 mt-2 text-xs bg-[var(--bg-card)] p-2 rounded border border-[var(--border-soft)]">
            <span style={{ color: 'var(--accent)' }}><LucideIcon name="save" size={18} strokeWidth={2.25} /></span>
            <div className="flex-1 min-w-0">
              <div className="text-[var(--accent)] font-medium">{tx('Facture sauvegardée (archivée)','Invoice saved (archived)')}</div>
              <div className="text-[var(--text-dim)]">{tx("Le fichier original a été archivé en ZIP. La dépense reste dans l'onglet Dépenses · Carburant Avion.",'The original file was archived to ZIP. The expense stays in Expenses · Aircraft Fuel.')}</div>
            </div>
          </div>
        );
      }
      return (
        <div className="flex items-center gap-2 mt-2 text-xs bg-[var(--bg-card)] p-2 rounded">
          {isPdf ? <span className="text-xl">📄</span> : (entry.invoiceDataUrl ? <img src={entry.invoiceDataUrl} alt="" className="w-8 h-8 object-cover rounded" /> : <span className="text-xl">🧾</span>)}
          <div className="flex-1 min-w-0 truncate">
            <div className="text-[var(--ok)]">✓ Facture rattachée</div>
            <div className="text-[var(--text-dim)] truncate">{entry.invoiceFileName || '(facture)'}  → onglet Dépenses · Carburant Avion / Huile</div>
          </div>
        </div>
      );
    }

    function FuelOrOilRow({ entry, index, onChange, onRemove, kind, addExpense, aircraftId, flightDate, flights=[], currentFlightId=null }) {
      const tx = useTx();
      // kind = 'fuel' (note : on n'utilise plus FuelOrOilRow pour 'oil' depuis v4 — l'huile a son
      // propre composant simplifié OilEntryRow. On garde le paramètre kind pour rétrocompat.)
      const isFuel = kind === 'fuel';
      const categoryId = isFuel ? 'fuel_aircraft' : 'oil';
      const units = isFuel ? ['L','kg','USG'] : ['qt','L'];
      const labelQty = tx('Quantité','Quantity');
      const [menuOpen, setMenuOpen] = useState(false);
      const [viewingInvoice, setViewingInvoice] = useState(false);

      // Détection desktop pour masquer le bouton "Scanner avec caméra"
      // (pas d'utilité sur Mac/PC). Réactive à la rotation/redim.
      const [isMobile, setIsMobile] = useState(() =>
        typeof window !== 'undefined' && window.matchMedia('(max-width: 767px)').matches
      );
      useEffect(() => {
        if (typeof window === 'undefined' || !window.matchMedia) return;
        const mq = window.matchMedia('(max-width: 767px)');
        const handler = (e) => setIsMobile(e.matches);
        mq.addEventListener ? mq.addEventListener('change', handler) : mq.addListener(handler);
        return () => {
          mq.removeEventListener ? mq.removeEventListener('change', handler) : mq.removeListener(handler);
        };
      }, []);

      // Critère "rempli" : qty > 0 ET montant > 0 (les deux infos minimales utiles).
      // Le repli n'est jamais automatique pendant la frappe (sinon dès que l'utilisateur
      // tape "5" pour amorcer "500", la ligne se replie). On replie uniquement :
      //   - au montage si la ligne est déjà remplie (rouverture d'un vol existant),
      //   - via le bouton "Replier" explicite.
      const qtyN = parseFloat(entry.qty) || 0;
      const amtN = parseFloat(entry.amount) || 0;
      const isFilled = qtyN > 0 && amtN > 0;
      const [collapsed, setCollapsed] = useState(isFilled);

      // === Détection : le vol PRÉCÉDENT (même avion, chronologiquement antérieur) ===
      // a-t-il un fuelEntry avec full=true ET location='arrival' ?
      // Si oui, le réservoir est déjà plein au départ → on bloque "Full au départ"
      // de ce vol-ci avec un popup explicatif.
      const previousFlightFullArrival = useMemo(() => {
        if (!isFuel || !aircraftId) return null;
        // Trouve les vols du MÊME avion, ANTÉRIEURS au vol courant (par date+id)
        const currentDate = entry.date || flightDate || '';
        const idMs2 = (id) => {
          const m = String(id||'').match(/_(\d{10,})/);
          return m ? parseInt(m[1], 10) : 0;
        };
        const currentMs = idMs2(currentFlightId);
        const candidates = (flights || [])
          .filter(f => f.aircraftId === aircraftId && f.id !== currentFlightId)
          .filter(f => {
            const cmp = (f.date || '').localeCompare(currentDate);
            if (cmp < 0) return true;
            if (cmp > 0) return false;
            // Même date : comparer ms de l'id (plus ancien = précédent)
            return idMs2(f.id) < currentMs;
          })
          .sort((a, b) => {
            const cmp = (b.date || '').localeCompare(a.date || '');
            if (cmp !== 0) return cmp;
            return idMs2(b.id) - idMs2(a.id);
          });
        // Cherche le premier (= plus récent antérieur) qui a un fuel Full at arrival
        for (const f of candidates) {
          const fe = (f.fuelEntries || []).find(e => e.full === true && (e.location || 'departure') === 'arrival');
          if (fe) return { flight: f, fuelEntry: fe };
        }
        return null;
      }, [flights, aircraftId, currentFlightId, entry.date, flightDate, isFuel]);

      // Garde-fou : tente de cocher Full → si location=departure ET vol précédent
      // avait Full@arrival, on bloque avec un popup explicatif.
      function tryToggleFull(nextChecked) {
        if (nextChecked && (entry.location || 'departure') === 'departure' && previousFlightFullArrival) {
          const prev = previousFlightFullArrival.flight;
          alert(tx(
            `Le plein "Full" est déjà coché à l'arrivée du vol précédent (${prev.date} · ${prev.from || '?'}→${prev.to || '?'}). Le réservoir est donc déjà plein au départ — pas besoin de cocher Full au départ ici. Décoche d'abord Full sur le vol précédent, OU change la localisation de ce plein en "Arrivée".`,
            `"Full" is already checked on the arrival of the previous flight (${prev.date} · ${prev.from || '?'}→${prev.to || '?'}). The tank is already full at departure — no need to check Full at departure here. Uncheck Full on the previous flight first, OR change this uplift's location to "Arrival".`
          ));
          return;
        }
        set('full', nextChecked);
      }
      // Garde-fou symétrique : tente de switcher la location vers "departure" alors
      // que Full=true ET vol précédent Full@arrival → bloque + popup explicatif.
      function trySetLocation(nextLoc) {
        if (nextLoc === 'departure' && entry.full && previousFlightFullArrival) {
          const prev = previousFlightFullArrival.flight;
          alert(tx(
            `Impossible de mettre ce plein Full au Départ : le vol précédent (${prev.date} · ${prev.from || '?'}→${prev.to || '?'}) a déjà Full coché à l'Arrivée. Décoche Full ici d'abord, OU décoche Full sur le vol précédent.`,
            `Can't set this Full uplift to Departure: the previous flight (${prev.date} · ${prev.from || '?'}→${prev.to || '?'}) already has Full checked at Arrival. Uncheck Full here first, OR uncheck Full on the previous flight.`
          ));
          return;
        }
        set('location', nextLoc);
      }

      const { triggerCamera, triggerFiles, busy, inputs } = useScanToExpense({
        categoryId, addExpense, aircraftId, flightDate,
        getEntry: () => entry,
        setEntry: (e) => onChange(e),
      });

      function set(k,v){ onChange({...entry, [k]: v}); }

      // Mode replié : pastille verte récapitulative + bouton Modifier + Retirer.
      // L'utilisateur ne peut pas perdre les données : seules les actions explicites
      // (Modifier puis modifier les champs, ou Retirer) modifient l'entrée.
      if (collapsed && isFilled) {
        const summary = [
          `${qtyN} ${entry.unit || 'L'}`,
          `${amtN.toFixed(2)} ${entry.currency || 'EUR'}`,
          entry.supplier && entry.supplier.trim(),
          entry.invoiceNumber && `N° ${entry.invoiceNumber}`,
        ].filter(Boolean).join(' · ');
        return (
          // Vue compacte du plein "rempli" : pas d'encadré (transparent comme DocRow archivé).
          // Bouton Modifier moderne sans icône, bouton trash en icône seule (style W&B).
          <div className="flex items-center gap-3 p-2">
            <div className="grid place-items-center w-9 h-9 rounded-full bg-[var(--ok)]/15 text-[var(--ok)] font-bold text-base flex-shrink-0">
              <LucideIcon name="check" size={16} strokeWidth={2.75} />
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-sm font-semibold text-[var(--ok)]">OK</div>
              <div className="text-xs text-[var(--text-dim)] truncate">{summary}</div>
              {entry.invoiceDocId && (
                <div className="text-[10px] text-[var(--ok)]/80 mt-0.5 inline-flex items-center gap-1">
                  <LucideIcon name="check" size={10} strokeWidth={2.5} />
                  {entry.invoiceDataUrl || entry.invoiceFileName ? tx('Facture rattachée','Invoice attached') : tx('Facture archivée','Invoice archived')}
                </div>
              )}
            </div>
            <button type="button"
              className="px-3 py-1.5 rounded-lg text-xs font-semibold text-[var(--accent)] hover:bg-[var(--accent)]/10 border border-[var(--accent)]/40 transition-colors flex-shrink-0"
              onClick={()=>setCollapsed(false)}>
              {tx('Modifier','Edit')}
            </button>
            <button type="button"
              title={tx('Retirer ce plein','Remove this fuel uplift')}
              className="grid place-items-center w-9 h-9 rounded-lg text-[var(--err)] hover:bg-[var(--err)]/15 transition-colors flex-shrink-0"
              onClick={onRemove}>
              <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
            </button>
          </div>
        );
      }

      return (
        <div className="bg-[var(--bg-elev)] p-3 rounded-lg space-y-2">
          <div className="flex items-center justify-between">
            <div className="text-sm font-medium">
              <span className="inline-flex items-center gap-1.5">
                <LucideIcon name={isFuel ? 'fuel' : 'droplet'} size={13} strokeWidth={2.5} />
                {isFuel ? tx('Plein','Fuel uplift') : tx("Ajout d'huile",'Oil entry')} #{index+1}
              </span>
              {isFilled && (
                <span className="ml-2 text-xs text-[var(--ok)] font-normal">— {tx('rempli, sera replié auto','filled, will collapse automatically')}</span>
              )}
            </div>
            <div className="flex items-center gap-1">
              {isFilled && (
                <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs" onClick={()=>setCollapsed(true)}>
                  ⬆ {tx('Replier','Collapse')}
                </button>
              )}
              <button type="button"
                onClick={onRemove}
                className="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg border border-[var(--err)] text-[var(--err)] text-xs font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={12} strokeWidth={2.5} />
                {tx('Retirer','Remove')}
              </button>
            </div>
          </div>
          {/* Date du plein puis N° facture en dessous (évite l'empiètement quand
              le numéro est long ou sur écran étroit). */}
          <div>
            <div className="label whitespace-nowrap">{tx('Date du plein','Uplift date')}</div>
            <input type="date" className="input" value={entry.date || flightDate || ''} onChange={e=>{ if (e.target.value) set('date', e.target.value); }} />
          </div>
          {/* Localisation du plein : avant ou après le vol — utile pour suivi conso. */}
          {isFuel && (
            <div>
              <div className="label whitespace-nowrap">{tx('Localisation du plein','Uplift location')}</div>
              <div className="grid grid-cols-2 gap-2">
                <button type="button"
                  onClick={()=>trySetLocation('departure')}
                  className={`p-2 rounded-lg border text-sm font-medium inline-flex items-center justify-center gap-2 transition-colors ${
                    (entry.location||'departure')==='departure'
                      ? 'bg-[var(--accent)]/15 border-[var(--accent)] text-[var(--accent)]'
                      : 'bg-[var(--bg-elev)] border-[var(--border-soft)] text-[var(--text-dim)] hover:border-[var(--border)]'
                  }`}>
                  <LucideIcon name="planeTakeoff" size={18} strokeWidth={2.25} />
                  {tx('Départ','Departure')}
                </button>
                <button type="button"
                  onClick={()=>trySetLocation('arrival')}
                  className={`p-2 rounded-lg border text-sm font-medium inline-flex items-center justify-center gap-2 transition-colors ${
                    entry.location==='arrival'
                      ? 'bg-[var(--accent)]/15 border-[var(--accent)] text-[var(--accent)]'
                      : 'bg-[var(--bg-elev)] border-[var(--border-soft)] text-[var(--text-dim)] hover:border-[var(--border)]'
                  }`}>
                  <LucideIcon name="planeLanding" size={18} strokeWidth={2.25} />
                  {tx('Arrivée','Arrival')}
                </button>
              </div>
            </div>
          )}
          <div>
            <div className="label whitespace-nowrap">{tx('N° de facture','Invoice #')}</div>
            <input className="input" placeholder={tx('ex: 2026-04-001234','e.g. 2026-04-001234')} value={entry.invoiceNumber||''} onChange={e=>set('invoiceNumber', e.target.value)} />
          </div>
          <div className="grid grid-cols-3 gap-2">
            <div className="col-span-2">
              <div className="label">{labelQty}</div>
              <input type="number" min="0" step={isFuel?'0.1':'0.25'} className="input" value={entry.qty} onChange={e=>set('qty', e.target.value)} placeholder="0" />
            </div>
            <div>
              <div className="label">{tx('Unité','Unit')}</div>
              <select className="select" value={entry.unit} onChange={e=>set('unit', e.target.value)}>
                {units.map(u => <option key={u} value={u}>{u==='qt'?tx('pintes (qt)','quarts (qt)'):u}</option>)}
              </select>
            </div>
          </div>
          {/* Case Full : indique que les réservoirs sont au maximum après ce plein.
              Permet de calculer la conso réelle entre deux pleins "Full" (méthode tab-to-tab).
              Bloquée si vol précédent Full@Arrivée + cette location='Départ' (popup). */}
          {isFuel && (<>
            <label className="flex items-center gap-2 select-none cursor-pointer text-sm bg-[var(--bg-card)] p-2 rounded">
              <input type="checkbox" className="w-5 h-5 accent-[#22d3ee]"
                checked={!!entry.full}
                onChange={e=>tryToggleFull(e.target.checked)} />
              <span className="font-medium">Full</span>
              <span className="text-xs text-[var(--text-dim)]">— {tx('réservoirs au max après ce plein','tanks at max after this uplift')}</span>
            </label>
            {/* Bandeau info quand Full@Arrivée précédent → on rappelle que le réservoir
                arrive plein, sans bloquer. Aide visuelle pour comprendre les blocages. */}
            {previousFlightFullArrival && (entry.location || 'departure') === 'departure' && (
              <div className="mt-1 px-2 py-1.5 rounded-md bg-[var(--accent)]/10 border border-[var(--accent)]/30 text-[11px] text-[var(--accent)] inline-flex items-start gap-1.5">
                <span className="mt-[1px]"><LucideIcon name="check" size={12} strokeWidth={2.5} /></span>
                <span>
                  {tx(
                    `Réservoir déjà plein au départ : Full coché à l'arrivée du vol précédent (${previousFlightFullArrival.flight.date} · ${previousFlightFullArrival.flight.from || '?'}→${previousFlightFullArrival.flight.to || '?'}).`,
                    `Tank already full at departure: Full was checked on the arrival of the previous flight (${previousFlightFullArrival.flight.date} · ${previousFlightFullArrival.flight.from || '?'}→${previousFlightFullArrival.flight.to || '?'}).`
                  )}
                </span>
              </div>
            )}
          </>)}
          {/* Fournisseur en pleine largeur, Montant en dessous (gros chiffre),
              Devise sous le Montant — pas de tassement, tout est lisible. */}
          <div>
            <div className="label whitespace-nowrap">{tx('Fournisseur','Supplier')}</div>
            <input className="input" placeholder={isFuel?tx('ex: Total Energies Aviation','e.g. Total Energies Aviation'):tx('ex: AeroShell W100','e.g. AeroShell W100')} value={entry.supplier||''} onChange={e=>set(isFuel?'supplier':'brand', e.target.value)} />
          </div>
          <div>
            <div className="label whitespace-nowrap">{tx('Montant','Amount')}</div>
            <input type="number" step="0.01"
                   className="input font-mono text-lg"
                   placeholder="0.00"
                   value={entry.amount} onChange={e=>set('amount', e.target.value)} />
          </div>
          <div>
            <div className="label whitespace-nowrap">{tx('Devise','Currency')}</div>
            <select className="select" value={entry.currency||'EUR'} onChange={e=>set('currency', e.target.value)}>
              <option>EUR</option><option>USD</option><option>GBP</option><option>CHF</option><option>CAD</option>
            </select>
          </div>
          {/* Conso depuis le dernier plein FULL (méthode tab-to-tab).
              On rassemble TOUS les fuelEntries de cet avion à travers tous les vols,
              on les trie chronologiquement (date + id ms), puis pour l'entrée courante
              (si elle est full) on cherche le dernier full précédent et on somme tous
              les qty (convertis en L) entre les deux (exclusif de l'ancien, inclusif du courant). */}
          {isFuel && entry.full && (() => {
            const toL = (q, u) => {
              const v = parseFloat(q) || 0;
              if (u === 'L') return v;
              if (u === 'kg') return v / 0.72;
              if (u === 'USG') return v * 3.785;
              return v;
            };
            const idMs = (id) => {
              const m = String(id||'').match(/_(\d{10,})/);
              return m ? parseInt(m[1], 10) : 0;
            };
            // Pool global de fuel entries pour cet avion (vols sauvés + vol courant en mémoire)
            const others = (flights || [])
              .filter(f => f.aircraftId === aircraftId && f.id !== currentFlightId)
              .flatMap(f => (f.fuelEntries || []).map(fe => ({ ...fe, _flightDate: f.date })));
            // L'entrée courante est dans le state local du form, pas encore dans flights.
            // On l'ajoute au pool en utilisant flightDate comme date fallback.
            const pool = [...others, { ...entry, _flightDate: entry.date || flightDate }];
            // Tri chronologique strict
            pool.sort((a, b) => {
              const da = (a._flightDate || a.date || '');
              const db = (b._flightDate || b.date || '');
              if (da !== db) return da.localeCompare(db);
              return idMs(a.id) - idMs(b.id);
            });
            const idx = pool.findIndex(x => x.id === entry.id);
            // Cherche le dernier full STRICTEMENT avant
            let prevFullIdx = -1;
            for (let i = idx - 1; i >= 0; i--) {
              if (pool[i].full && (parseFloat(pool[i].qty) || 0) > 0) { prevFullIdx = i; break; }
            }
            if (prevFullIdx === -1) {
              return (
                <div className="text-xs text-[var(--text-dim)] italic bg-[var(--bg-card)] p-2 rounded">
                  {tx("Pas encore d'autre plein « Full » enregistré pour cet avion — la conso depuis dernier full sera calculée dès qu'un autre plein Full existera.",'No other "Full" uplift recorded yet for this aircraft — burn since last full will be calculated once another Full uplift exists.')}
                </div>
              );
            }
            const prev = pool[prevFullIdx];
            // Somme des qty entre prev (exclusif) et current (inclusif)
            let burnedL = 0;
            for (let i = prevFullIdx + 1; i <= idx; i++) {
              burnedL += toL(pool[i].qty, pool[i].unit);
            }
            return (
              <div className="bg-[var(--ok)]/10 border border-[var(--ok)]/30 p-2 rounded text-sm">
                <div className="flex items-center justify-between gap-2">
                  <span className="text-[var(--ok)] font-semibold inline-flex items-center gap-1.5">
                    <LucideIcon name="fuel" size={13} strokeWidth={2.5} />
                    {tx('Brûlé depuis le dernier Full','Burned since last Full')}
                  </span>
                  <span className="font-mono tabular-nums font-bold text-[var(--ok)]">{burnedL.toFixed(1)} L</span>
                </div>
                <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                  {tx('Dernier Full','Last Full')} : {prev._flightDate || prev.date || '?'} ({(parseFloat(prev.qty)||0).toFixed(1)} {prev.unit}). {tx('Méthode tab-to-tab.','Tab-to-tab method.')}
                </div>
              </div>
            );
          })()}

          {/* Zone facture : si une facture est rattachée, on l'affiche en rangée
              compacte style DocRow (thumb + nom + Ouvrir + Retirer), comme sur les
              W&B/FPL/OFPL. Sinon, on propose le bouton + Ajouter une facture. */}
          {entry.invoiceDocId ? (
            (() => {
              const isPdf = entry.invoiceMime === 'application/pdf';
              const hasBinary = !!(entry.invoiceDataUrl);
              // Détection d'archive : on se fie d'abord au flag invoiceArchived posé
              // par archiveAndFreeDocuments. Fallback : pas de binaire dispo = archivé.
              const archived = !!entry.invoiceArchived || (!hasBinary && !!entry.invoiceDocId);
              if (archived) {
                return (
                  // Pas d'encadré : aligné sur DocRow archivé (transparent, trash en icône seule)
                  <div className="flex items-center gap-2 p-2">
                    <div className="flex-1 min-w-0 text-xs">
                      <div className="truncate font-semibold text-[var(--ok)] inline-flex items-center gap-1.5">
                        <LucideIcon name="check" size={12} strokeWidth={2.5} />
                        {tx('OK archivé','Archived OK')}
                      </div>
                      <div className="truncate text-[var(--text-dim)]">{tx('Facture','Invoice')}{entry.invoiceFileName ? ` · ${entry.invoiceFileName}` : ''}</div>
                    </div>
                    <button type="button"
                      title={tx('Retirer la facture','Remove invoice')}
                      className="grid place-items-center w-9 h-9 rounded-lg text-[var(--err)] hover:bg-[var(--err)]/15 transition-colors flex-shrink-0"
                      onClick={()=>{
                        if (!confirmDelete(tx("Retirer la facture rattachée à ce plein ? La dépense correspondante restera dans l'onglet Dépenses (non supprimée).",'Remove the invoice attached to this uplift? The matching expense will remain in the Expenses tab (not deleted).'))) return;
                        onChange({
                          ...entry,
                          invoiceDocId: '',
                          invoiceDataUrl: '',
                          invoiceFileName: '',
                          invoiceMime: '',
                          invoiceArchived: false,
                        });
                      }}>
                      <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
                    </button>
                  </div>
                );
              }
              return (
                <div className="flex items-center gap-2 bg-[var(--bg-card)] p-2 rounded-lg">
                  {isPdf ? (
                    <div className="w-10 h-10 grid place-items-center bg-[var(--bg-elev)] rounded text-xl flex-shrink-0">📄</div>
                  ) : hasBinary ? (
                    <img src={entry.invoiceDataUrl} alt="" className="w-10 h-10 object-cover rounded flex-shrink-0" />
                  ) : (
                    <div className="w-10 h-10 grid place-items-center bg-[var(--bg-elev)] rounded text-xl flex-shrink-0">🧾</div>
                  )}
                  <div className="flex-1 min-w-0 text-xs">
                    <div className="truncate font-medium">{entry.invoiceFileName || tx('Facture','Invoice')}</div>
                    <div className="truncate text-[var(--text-dim)]">✓ {tx('Facture rattachée','Invoice attached')}</div>
                  </div>
                  {hasBinary && (
                    <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs"
                      onClick={()=>setViewingInvoice(true)}>
                      {tx('Ouvrir','Open')}
                    </button>
                  )}
                  <button type="button" className="btn btn-danger !py-1 !px-2 text-xs"
                    onClick={()=>{
                      if (!confirmDelete(tx("Retirer la facture rattachée à ce plein ? La dépense correspondante restera dans l'onglet Dépenses (non supprimée).",'Remove the invoice attached to this uplift? The matching expense will remain in the Expenses tab (not deleted).'))) return;
                      onChange({
                        ...entry,
                        invoiceDocId: '',
                        invoiceDataUrl: '',
                        invoiceFileName: '',
                        invoiceMime: '',
                      });
                    }}>
                    {tx('Retirer','Remove')}
                  </button>
                </div>
              );
            })()
          ) : (
            <div className="relative">
              <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs" disabled={busy}
                onClick={()=>setMenuOpen(o=>!o)}>
                {busy ? tx('Import…','Import…') : tx('🧾 + Ajouter une facture','🧾 + Add an invoice')}
              </button>
              {menuOpen && (
                <>
                  <div className="fixed inset-0 z-20" onClick={()=>setMenuOpen(false)} />
                  <div className="absolute left-0 top-full mt-1 z-30 card p-2 min-w-[230px] anim-pop">
                    {/* Caméra masquée sur desktop (inutile) */}
                    {isMobile && (
                      <button type="button" className="btn btn-secondary w-full mb-1 justify-start"
                        onClick={()=>{ setMenuOpen(false); triggerCamera(); }}>
                        <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />{tx("Scanner avec l'appareil photo",'Scan with camera')}</span>
                      </button>
                    )}
                    <button type="button" className="btn btn-secondary w-full justify-start mb-2"
                      onClick={()=>{ setMenuOpen(false); triggerFiles(); }}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />{tx('Importer depuis Téléchargements','Import from Downloads')}</span>
                    </button>
                    <button type="button" className="btn btn-primary w-full"
                      onClick={()=>setMenuOpen(false)}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="check" size={14} strokeWidth={2.5} />{tx('Valider','Validate')}</span>
                    </button>
                  </div>
                </>
              )}
            </div>
          )}
          {/* Bouton "Remplacer" séparé quand une facture est déjà attachée — utile
              si le scan initial est flou ou le mauvais fichier */}
          {entry.invoiceDocId && entry.invoiceDataUrl && (
            <div className="relative">
              <button type="button" className="btn btn-secondary !py-1 !px-2 text-xs" disabled={busy}
                onClick={()=>setMenuOpen(o=>!o)}>
                {busy ? tx('Import…','Import…') : tx('🔁 Remplacer la facture','🔁 Replace invoice')}
              </button>
              {menuOpen && (
                <>
                  <div className="fixed inset-0 z-20" onClick={()=>setMenuOpen(false)} />
                  <div className="absolute left-0 top-full mt-1 z-30 card p-2 min-w-[230px] anim-pop">
                    {isMobile && (
                      <button type="button" className="btn btn-secondary w-full mb-1 justify-start"
                        onClick={()=>{ setMenuOpen(false); triggerCamera(); }}>
                        <span className="inline-flex items-center gap-1.5"><LucideIcon name="camera" size={14} strokeWidth={2.25} />{tx("Scanner avec l'appareil photo",'Scan with camera')}</span>
                      </button>
                    )}
                    <button type="button" className="btn btn-secondary w-full justify-start mb-2"
                      onClick={()=>{ setMenuOpen(false); triggerFiles(); }}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="download" size={14} strokeWidth={2.25} />{tx('Importer depuis Téléchargements','Import from Downloads')}</span>
                    </button>
                    <button type="button" className="btn btn-primary w-full"
                      onClick={()=>setMenuOpen(false)}>
                      <span className="inline-flex items-center gap-1.5"><LucideIcon name="check" size={14} strokeWidth={2.5} />{tx('Valider','Validate')}</span>
                    </button>
                  </div>
                </>
              )}
            </div>
          )}
          {inputs}
          {/* Visionneuse interne pour la facture (même UX que les W&B/FPL/OFPL) */}
          {viewingInvoice && entry.invoiceDocId && (
            <DocViewer
              doc={{
                dataUrl: entry.invoiceDataUrl,
                fileName: entry.invoiceFileName || tx('Facture','Invoice'),
                mime: entry.invoiceMime,
              }}
              onClose={()=>setViewingInvoice(false)}
            />
          )}
          {entry.notes && <div className="text-xs text-[var(--text-dim)] italic">{entry.notes}</div>}
        </div>
      );
    }

    function FuelEntriesEditor({ entries, onChange, addExpense, aircraftId, flightDate, flights=[], currentFlightId=null, defaultUnit='L', defaultCurrency='EUR' }) {
      const tx = useTx();
      function addEntry() {
        const next = [...(entries||[]), {
          id: 'fe_'+Date.now(),
          date: flightDate || todayZuluDate(),  // pré-rempli avec la date du vol, modifiable
          invoiceNumber: '',
          qty: '', unit: defaultUnit, supplier: '', amount: '', currency: defaultCurrency,
          invoiceDocId: '', invoiceDataUrl: '', invoiceFileName: '', invoiceMime: '',
          location: 'departure', // 'departure' = plein avant le vol, 'arrival' = plein à l'arrivée
          full: false,           // true = réservoirs au max après ce plein
          notes: '',
        }];
        onChange(next);
      }
      function updateEntry(i, e) {
        const next = [...entries]; next[i] = e; onChange(next);
      }
      function removeEntry(i) {
        const e = entries[i];
        const hasLinkedExpense = !!(e && e.invoiceDocId);
        const msg = hasLinkedExpense
          ? tx('Retirer ce plein ? La dépense Carburant Avion liée sera également supprimée à l\'enregistrement du vol.','Remove this fuel uplift? The linked Aircraft Fuel expense will also be deleted when the flight is saved.')
          : tx('Retirer ce plein ?','Remove this fuel uplift?');
        if (!confirmDelete(msg)) return;
        const next = [...entries]; next.splice(i,1); onChange(next);
      }

      const totals = (entries||[]).reduce((acc, e) => {
        const v = parseFloat(e.qty)||0;
        if (e.unit==='L') acc.L += v;
        else if (e.unit==='kg') acc.kg += v;
        else if (e.unit==='USG') acc.USG += v;
        return acc;
      }, { L:0, kg:0, USG:0 });

      return (
        <div className="card p-3">
          <div className="flex items-center justify-between pr-3">
            <div className="label !mb-0 inline-flex items-center gap-1.5">
              <span style={{ color: 'var(--accent-2)' }}><LucideIcon name="fuel" size={14} strokeWidth={2.5} /></span>
              {tx('Carburant Avion','Aircraft Fuel')}
            </div>
            <button type="button" className="btn btn-primary !py-1 !px-3 text-sm" onClick={addEntry}>{tx('+ Ajouter un plein','+ Add fuel uplift')}</button>
          </div>
          {(entries||[]).length === 0 && (
            <div className="text-xs text-[var(--text-dim)] mt-2">{tx('Aucun plein enregistré pour ce vol. Tu peux en ajouter plusieurs si tu fais escale.','No fuel uplift recorded for this flight. You can add several if you make a stopover.')}</div>
          )}
          <div className="space-y-2 mt-2">
            {(entries||[]).map((e, i) => (
              <FuelOrOilRow key={e.id||i} entry={e} index={i} kind="fuel"
                onChange={(ne)=>updateEntry(i, ne)} onRemove={()=>removeEntry(i)}
                addExpense={addExpense} aircraftId={aircraftId} flightDate={flightDate}
                flights={flights} currentFlightId={currentFlightId} />
            ))}
          </div>
          {(entries||[]).length > 0 && (
            <div className="text-xs text-[var(--text-dim)] mt-2">

    function OilEntriesEditor({ entries, onChange, defaultUnit='qt', isMonomotor=false }) {
      const tx = useTx();
      function addEntry() {
        const next = [...(entries||[]), {
          id: 'oe_'+Date.now(),
          qty: '', unit: defaultUnit,
          engineLeft: false, engineRight: false,
          notes: '',
        }];
        onChange(next);
      }
      function updateEntry(i, e) {
        const next = [...entries]; next[i] = e; onChange(next);
      }
      function removeEntry(i) {
        if (!confirmDelete(tx('Retirer cet ajout d\'huile ? (Aucune facture liée — ajoute la facture séparément dans Dépenses si besoin.)','Remove this oil entry? (No linked invoice — add the invoice separately in Expenses if needed.)'))) return;
        const next = [...entries]; next.splice(i,1); onChange(next);
      }
      const totals = (entries||[]).reduce((acc, e) => {
        const v = parseFloat(e.qty)||0;
        if (e.unit==='qt') acc.qt += v;
        else if (e.unit==='L') acc.L += v;
        return acc;
      }, { qt:0, L:0 });
      return (
        <div className="card p-3">
          <div className="flex items-center justify-between pr-3">
            <div className="label !mb-0 inline-flex items-center gap-1.5">

            {(entries||[]).map((e, i) => (

    // ------------------------------------------------------------------
    // 12h) ÉCRAN — STAFF (logbook tableau par pilote, vue tableau pure)
    // ------------------------------------------------------------------
    function aircraftDescriptor(ac) {
      if (!ac) return '—';
      const parts = [];
      if (ac.type) parts.push(ac.type);
      const enginePart = [];
      if (ac.engineCount) {
        enginePart.push(ac.engineCount === 1 ? 'Mono' : ac.engineCount === 2 ? 'Bi' : `${ac.engineCount}-mot.`);
      }
      if (ac.engineType) {
        const t = ac.engineType === 'piston' ? 'Piston'
                : ac.engineType === 'turbine' ? 'Turbine'
                : ac.engineType === 'jet' ? 'Jet'
                : ac.engineType === 'electric' ? 'Élec.' : ac.engineType;
        enginePart.push(t);
      }
      if (enginePart.length) parts.push(enginePart.join(' '));
      return parts.join(' · ');
    }
    // Classe d'avion seule : Mono / Bi / N-mot.
    function aircraftClass(ac) {
      if (!ac || !ac.engineCount) return '—';
      if (ac.engineCount === 1) return 'Mono';
      if (ac.engineCount === 2) return 'Bi';
      return ac.engineCount + '-mot.';
    }

    // Formulaire pour saisir une "ligne externe" — c'est-à-dire une ligne de vol
    // tirée d'un autre logbook (papier ou électronique). Cette ligne ne crée AUCUN
    // vol dans l'application : elle apparaît uniquement dans le tableau Staff,
    // marquée d'un badge orange "Externe" dans une colonne dédiée.
    function ExternalFlightForm({ pilot, initial, onSave, onCancel, onDelete }) {
      const tx = useTx();
      const m2h = (m) => (m && m > 0) ? (m / 60).toFixed(2) : '';
      const h2m = (h) => {
        const v = parseFloat(h);
        return (!isNaN(v) && v > 0) ? Math.round(v * 60) : 0;
      };
      const isEdit = !!(initial && initial.id);
      const [d, setD] = useState({
        id: initial?.id || null,
        date: initial?.date || '',
        aircraft: initial?.aircraft || '',
        from: initial?.from || '',
        to: initial?.to || '',
        pic: initial?.pic || (pilot ? pilotDisplayName(pilot) : ''),
        sic: initial?.sic || '',
        flightType: initial?.flightType || '',
        rules: initial?.rules || 'VFR',
        ft: m2h(initial?.ft),
        se: m2h(initial?.se),
        me: m2h(initial?.me),
        ir: m2h(initial?.ir),
        nav: m2h(initial?.nav),
        night: m2h(initial?.night),
        takeoffs: initial?.takeoffs || '',
        landings: initial?.landings || '',
        notes: initial?.notes || '',
      });
      function set(k, v) { setD(p => ({ ...p, [k]: v })); }
      function save() {
        onSave({
          id: d.id || ('ext_' + Date.now()),
          date: d.date || '',
          aircraft: (d.aircraft || '').trim(),
          from: (d.from || '').trim().toUpperCase(),
          to: (d.to || '').trim().toUpperCase(),
          pic: (d.pic || '').trim(),
          sic: (d.sic || '').trim(),
          flightType: (d.flightType || '').trim(),
          rules: d.rules || 'VFR',
          ft: h2m(d.ft),
          se: h2m(d.se),
          me: h2m(d.me),
          ir: h2m(d.ir),
          nav: h2m(d.nav),
          night: h2m(d.night),
          takeoffs: parseInt(d.takeoffs) || 0,
          landings: parseInt(d.landings) || 0,
          notes: (d.notes || '').trim(),
        });
      }
      return (
        <div className="space-y-3">
          <div className="text-sm text-[var(--text-dim)] leading-relaxed">
            {tx(
              'Saisis ici une ligne de vol issue d\'un autre logbook (papier ou électronique). Cette ligne apparaîtra dans le tableau Staff avec un badge orange « Externe » mais ne créera aucun vol dans l\'application.',
              'Enter a flight row from another (paper or electronic) logbook. This row will appear in the Staff table with an orange "External" badge but will not create any flight in the app.'
            )}
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div>
              <div className="label">{tx('Date','Date')}</div>
              <input type="date" className="input" value={d.date} onChange={e=>{ if (e.target.value) set('date', e.target.value); }} />
            </div>
            <div className="sm:col-span-2">
              <div className="label">{tx('Avion (immat · type)','Aircraft (reg · type)')}</div>
              <input className="input" placeholder="F-GXYZ · C172" value={d.aircraft} onChange={e=>set('aircraft', e.target.value)} />
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div>
              <div className="label">PIC</div>
              <input className="input" value={d.pic} onChange={e=>set('pic', e.target.value)} />
            </div>
            <div>
              <div className="label">SIC</div>
              <input className="input" placeholder={tx('Optionnel','Optional')} value={d.sic} onChange={e=>set('sic', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Type de vol','Flight type')}</div>
              <input className="input" placeholder={tx('Solo, Multi, Charter…','Solo, Multi, Charter…')} value={d.flightType} onChange={e=>set('flightType', e.target.value)} />
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div>
              <div className="label">{tx('Départ','Dep')}</div>
              <input className="input uppercase" maxLength={4} placeholder="LFPB" value={d.from} onChange={e=>set('from', e.target.value.toUpperCase())} />
            </div>
            <div>
              <div className="label">{tx('Arrivée','Arr')}</div>
              <input className="input uppercase" maxLength={4} placeholder="EGLL" value={d.to} onChange={e=>set('to', e.target.value.toUpperCase())} />
            </div>
            <div>
              <div className="label">{tx('Régime','Rules')}</div>
              <select className="select" value={d.rules} onChange={e=>set('rules', e.target.value)}>
                <option value="VFR">VFR</option>
                <option value="IFR">IFR</option>
              </select>
            </div>
          </div>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <div>
              <div className="label">FT (h)</div>
              <input type="number" step="0.1" min="0" className="input font-mono" placeholder="0.0" value={d.ft} onChange={e=>set('ft', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Mono (h)','SE (h)')}</div>
              <input type="number" step="0.1" min="0" className="input font-mono" placeholder="0.0" value={d.se} onChange={e=>set('se', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Multi (h)','ME (h)')}</div>
              <input type="number" step="0.1" min="0" className="input font-mono" placeholder="0.0" value={d.me} onChange={e=>set('me', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Heures IR (h)','IR (h)')}</div>
              <input type="number" step="0.1" min="0" className="input font-mono" placeholder="0.0" value={d.ir} onChange={e=>set('ir', e.target.value)} />
            </div>
            <div>
              <div className="label">Nav (h)</div>
              <input type="number" step="0.1" min="0" className="input font-mono" placeholder="0.0" value={d.nav} onChange={e=>set('nav', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Nuit (h)','Night (h)')}</div>
              <input type="number" step="0.1" min="0" className="input font-mono" placeholder="0.0" value={d.night} onChange={e=>set('night', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Décollages','Take-offs')}</div>
              <input type="number" min="0" className="input font-mono" value={d.takeoffs} onChange={e=>set('takeoffs', e.target.value)} />
            </div>
            <div>
              <div className="label">{tx('Atterrissages','Landings')}</div>
              <input type="number" min="0" className="input font-mono" value={d.landings} onChange={e=>set('landings', e.target.value)} />
            </div>
          </div>
          <div>
            <div className="label">{tx('Notes (optionnel)','Notes (optional)')}</div>
            <textarea className="textarea" rows={2} value={d.notes} onChange={e=>set('notes', e.target.value)} />
          </div>
          <div className="flex justify-between items-center gap-2 pt-2">
            {isEdit && onDelete ? (
              <button type="button"
                onClick={()=>{
                  if (confirmDelete(tx('Supprimer cette ligne externe ?','Delete this external row?'))) onDelete(d.id);
                }}
                className="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors text-sm"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={14} strokeWidth={2.5} />
                {tx('Supprimer','Delete')}
              </button>
            ) : <span />}
            <div className="flex gap-2">
              <button className="btn btn-secondary" onClick={onCancel}>{tx('Annuler','Cancel')}</button>
              <button className="btn btn-primary" onClick={save}>{tx('Enregistrer','Save')}</button>
            </div>
          </div>
        </div>
      );
    }

    function StaffScreen({ flights, aircraft, pilots=[], addExpense, onUpsertFlight, onDeleteFlight, onUpsertPilot }) {
      const tx = useTx();
      const { lang } = React.useContext(I18nContext);
      const [pilotFilter, setPilotFilter] = useState('all');
      const [showAll, setShowAll] = useState(false);
      const [editing, setEditing] = useState(null);
      const [showForm, setShowForm] = useState(false);
      // Modal d'import du logbook reporté (papier ou autre logbook électronique).
      // Une seule fiche modale, identique sur mobile et desktop.
      const [showImportLogbook, setShowImportLogbook] = useState(false);
      function openImport() { setShowImportLogbook(true); }
      function saveImport(data) {
        if (onUpsertPilot && selectedPilot) {
          onUpsertPilot({ ...selectedPilot, previousLogbook: data });
        }
        setShowImportLogbook(false);
      }

      // Modal pour saisir une ligne externe (vol issu d'un autre logbook).
      // editingExternal = null → pas d'édition, sinon entrée externe en cours d'édition.
      const [editingExternal, setEditingExternal] = useState(null);
      const [showExternalForm, setShowExternalForm] = useState(false);
      function openNewExternal() {
        setEditingExternal(null);
        setShowExternalForm(true);
      }
      function openEditExternal(entry) {
        setEditingExternal(entry);
        setShowExternalForm(true);
      }
      function saveExternal(entry) {
        if (!onUpsertPilot || !selectedPilot) return;
        const list = [...(selectedPilot.externalFlights || [])];
        const idx = list.findIndex(e => e.id === entry.id);
        if (idx >= 0) list[idx] = entry; else list.push(entry);
        onUpsertPilot({ ...selectedPilot, externalFlights: list });
        setShowExternalForm(false);
        setEditingExternal(null);
      }
      function deleteExternal(id) {
        if (!onUpsertPilot || !selectedPilot) return;
        const list = (selectedPilot.externalFlights || []).filter(e => e.id !== id);
        onUpsertPilot({ ...selectedPilot, externalFlights: list });
        setShowExternalForm(false);
        setEditingExternal(null);
      }

      const selectedPilot = pilotFilter !== 'all' ? pilots.find(p => p.id === pilotFilter) : null;
      const prevLog = selectedPilot?.previousLogbook;
      const hasPrevLog = !!prevLog && (
        (prevLog.ft||0) || (prevLog.se||0) || (prevLog.me||0) ||
        (prevLog.ir||0) || (prevLog.nav||0) || (prevLog.night||0) ||
        (prevLog.takeoffs||0) || (prevLog.landings||0)
      );

      const sorted = useMemo(() => {
        let arr = flights.filter(f => {
          if (pilotFilter === 'all') return true;
          return f.pilotId === pilotFilter || f.copilotId === pilotFilter;
        });
        // On marque les vols réguliers (non externes) pour la suite.
        arr = arr.map(f => ({ ...f, _kind: 'flight' }));
        // Lignes externes du pilote sélectionné (mélangées au tri par date).
        if (pilotFilter !== 'all') {
          const selPilot = pilots.find(p => p.id === pilotFilter);
          const ext = (selPilot?.externalFlights || []).map(e => ({ ...e, _kind: 'external' }));
          arr = [...arr, ...ext];
        }
        arr.sort((a,b) => (a.date||'').localeCompare(b.date||'') || (a.id||'').localeCompare(b.id||''));
        return arr;
      }, [flights, pilotFilter, pilots]);

      // Génère un PDF du logbook via window.print() sur une fenêtre dédiée :
      // l'utilisateur clique "Save as PDF" dans le dialog d'impression du navigateur.
      // Aucune lib externe — fonctionne offline.
      function exportTablePDF() {
        const pilName = pilotFilter==='all'
          ? tx('Tous les pilotes','All pilots')
          : pilotDisplayName(pilots.find(p=>p.id===pilotFilter)) || pilotFilter;
        const today = new Date().toISOString().slice(0,10);
        // En-têtes localisés
        const H = {
          date:    tx('Date','Date'),
          ac:      tx('Avion','Aircraft'),
          pic:     'PIC',
          sic:     'SIC',
          type:    tx('Type','Type'),
          ft:      'FT',
          rules:   tx('Régime','Rules'),
          se:      tx('Mono','SE'),
          me:      tx('Multi','ME'),
          ir:      tx('Heures IR','IR Hours'),
          tldg:    'T/LDG',
          nav:     'Nav',
          night:   tx('Nuit','Night'),
          from:    tx('Départ','Dep'),
          to:      tx('Arrivée','Arr'),
        };
        // Lignes
        const rows = sorted.map(f => {
          const ac  = aircraft.find(a => a.id === f.aircraftId);
          const pic = pilots.find(p => p.id === f.pilotId);
          const sic = pilots.find(p => p.id === f.copilotId);
          const ft  = f.flightTime || 0;
          const ec  = ac?.engineCount || 1;
          const seTime = ec <= 1 ? ft : 0;
          const meTime = ec >= 2 ? ft : 0;
          const ifrTime = f.rules === 'IFR' ? ft : 0;
          const navTime = f.isNavigation ? ft : 0;
          const nightTime = f.nightTime || 0;
          const totalTO  = ((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0);
          const totalLDG = ((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0);
          const dur = (m) => m > 0 ? fmtDuration(m) : '';
          return {
            date: f.date || '',
            ac: (ac?.registration||'?') + (ac?.type ? ' · ' + ac.type : ''),
            pic: pic ? pilotDisplayName(pic) : '',
            sic: sic ? pilotDisplayName(sic) : '',
            type: flightTypeLabel(f.flightType, lang),
            ft: dur(ft),
            rules: f.rules || '',
            se: dur(seTime),
            me: dur(meTime),
            ir: dur(ifrTime),
            tldg: (totalTO || totalLDG) ? `${totalTO}/${totalLDG}` : '',
            nav: dur(navTime),
            night: dur(nightTime),
            from: f.from || '',
            to: f.to || '',
          };
        });
        const escHtml = s => String(s||'').replace(/[&<>"']/g, c => ({
          '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
        const headerRow = `<tr>${['date','ac','pic','sic','type','ft','rules','se','me','ir','tldg','nav','night','from','to']
          .map(k => `<th>${escHtml(H[k])}</th>`).join('')}</tr>`;
        const bodyRows = rows.map(r => `<tr>${
          ['date','ac','pic','sic','type','ft','rules','se','me','ir','tldg','nav','night','from','to']
            .map(k => `<td>${escHtml(r[k])}</td>`).join('')
        }</tr>`).join('');
        // Ligne de totaux : on recalcule depuis sorted pour avoir les totaux numériques
        let tFT=0, tSE=0, tME=0, tIR=0, tNav=0, tNight=0, tTO=0, tLDG=0;
        for (const f of sorted) {
          const ac = aircraft.find(a => a.id === f.aircraftId);
          const ec = ac?.engineCount || 1;
          const fft = f.flightTime || 0;
          tFT += fft;
          if (ec <= 1) tSE += fft; else tME += fft;
          if (f.rules === 'IFR') tIR += fft;
          if (f.isNavigation) tNav += fft;
          tNight += (f.nightTime || 0);
          tTO  += ((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0);
          tLDG += ((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0);
        }
        const totalRow = `<tr style="background:#e8f4fc;font-weight:bold;border-top:2px solid #0284c7;">
          <td>${escHtml(tx('Total','Total'))}</td>
          <td>${rows.length} ${escHtml(tx('vol(s)','flight(s)'))}</td>
          <td>—</td><td>—</td><td>—</td>
          <td>${escHtml(tFT>0?fmtDuration(tFT):'—')}</td>
          <td>—</td>
          <td>${escHtml(tSE>0?fmtDuration(tSE):'—')}</td>
          <td>${escHtml(tME>0?fmtDuration(tME):'—')}</td>
          <td>${escHtml(tIR>0?fmtDuration(tIR):'—')}</td>
          <td>${tTO}/${tLDG}</td>
          <td>${escHtml(tNav>0?fmtDuration(tNav):'—')}</td>
          <td>${escHtml(tNight>0?fmtDuration(tNight):'—')}</td>
          <td>—</td><td>—</td>
        </tr>`;
        const html = `<!DOCTYPE html>
<html lang="${lang}">
<head>
<meta charset="utf-8">
<title>Logbook — ${escHtml(pilName)} — ${today}</title>
<style>
  @page { size: A4 landscape; margin: 12mm; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #111; margin: 0; padding: 0; font-size: 10pt; }
  h1 { font-size: 16pt; margin: 0 0 4pt; }
  .meta { color: #555; font-size: 9pt; margin-bottom: 12pt; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #999; padding: 4px 6px; text-align: left; vertical-align: top; }
  th { background: #f0f0f0; font-size: 8.5pt; text-transform: uppercase; letter-spacing: 0.02em; }
  td { font-size: 9pt; }
  td.num, th.num { text-align: center; font-variant-numeric: tabular-nums; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  tr:nth-child(even) td { background: #fafafa; }
  .footer { margin-top: 12pt; font-size: 8pt; color: #777; }
  @media print { .no-print { display: none; } }
</style>
</head>
<body>
  <h1>Logbook — ${escHtml(pilName)}</h1>
  <div class="meta">${escHtml(tx('Généré le','Generated on'))} ${today} · ${escHtml(tx('Total vols','Total flights'))} : ${rows.length}</div>
  <table>
    <thead>${headerRow}</thead>
    <tbody>${bodyRows}</tbody>
    <tfoot>${totalRow}</tfoot>
  </table>
  <div class="footer">${escHtml(tx('Exporté depuis AeroDeck','Exported from AeroDeck'))}</div>
  <button class="no-print" onclick="window.print()" style="position:fixed;top:8mm;right:8mm;padding:8px 14px;background:#0284c7;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;">
    ${escHtml(tx('Imprimer / Sauver en PDF','Print / Save as PDF'))}
  </button>
  <script>
    // Auto-déclenche le dialog d'impression au chargement (l'utilisateur peut choisir "Save as PDF").
    window.addEventListener('load', () => setTimeout(() => window.print(), 300));
  <\/script>
</body>
</html>`;
        const w = window.open('', '_blank');
        if (!w) {
          alert(tx('Le navigateur a bloqué la fenêtre d\'impression. Autorise les popups pour ce site.','Browser blocked the print window. Allow popups for this site.'));
          return;
        }
        w.document.open();
        w.document.write(html);
        w.document.close();
      }

      function exportTableCSV() {
        const headers = ['date','from','to','registration','aircraft_name','class','flight_time_min',
                         'ifr_min','nav_min','duo_min','night_min','PIC','SIC','to','ldg','flight_type','notes'];
        const rows = sorted.map(f => {
          const ac = aircraft.find(a => a.id === f.aircraftId);
          const pic = pilots.find(p => p.id === f.pilotId);
          const sic = pilots.find(p => p.id === f.copilotId);
          const ft = f.flightTime || 0;
          return [
            f.date, f.from, f.to,
            ac?.registration||'', ac?.type||'',
            aircraftClass(ac),
            ft,
            f.rules === 'IFR' ? ft : 0,
            f.isNavigation ? ft : 0,
            isDuoFlight(f) ? ft : 0,
            f.nightTime||0,
            pic ? pilotDisplayName(pic) : '',
            sic ? pilotDisplayName(sic) : '',
            (f.takeoffsPic||0) + (f.takeoffsSic||0),
            (f.landingsPic||0) + (f.landingsSic||0),
            flightTypeLabel(f.flightType, lang),
            (f.notes||'').replace(/[\n\r]+/g,' '),
          ];
        });
        const esc = (v) => {
          const s = String(v??'');
          if (/[",;\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
          return s;
        };
        const out = [headers.join(';'), ...rows.map(r => r.map(esc).join(';'))].join('\n');
        const blob = new Blob([out], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const pilName = pilotFilter==='all' ? 'tous_pilotes' : (pilots.find(p=>p.id===pilotFilter)?.lastName||pilotFilter);
        a.href = url; a.download = `logbook_${pilName}.csv`;
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
      }

      const limit = showAll ? sorted.length : Math.min(sorted.length, 200);
      const visible = sorted.slice(0, limit);

      // Totaux par colonne (basés sur les vols visibles + lignes externes)
      const totals = useMemo(() => {
        let ft=0, se=0, me=0, ir=0, nav=0, night=0, to=0, ldg=0;
        for (const f of visible) {
          if (f._kind === 'external') {
            // Ligne externe : les minutes sont déjà pré-calculées.
            ft    += f.ft    || 0;
            se    += f.se    || 0;
            me    += f.me    || 0;
            ir    += f.ir    || 0;
            nav   += f.nav   || 0;
            night += f.night || 0;
            to    += f.takeoffs || 0;
            ldg   += f.landings || 0;
          } else {
            const ac = aircraft.find(a => a.id === f.aircraftId);
            const ec = ac?.engineCount || 1;
            const fft = f.flightTime || 0;
            ft += fft;
            if (ec <= 1) se += fft; else me += fft;
            if (f.rules === 'IFR') ir += fft;
            if (f.isNavigation) nav += fft;
            night += (f.nightTime || 0);
            to  += ((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0);
            ldg += ((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0);
          }
        }
        return { ft, se, me, ir, nav, night, to, ldg, count: visible.length };
      }, [visible, aircraft]);

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between gap-2 flex-wrap">
            <h2 className="text-xl font-semibold">Staff — Logbook</h2>
            <div className="flex items-center gap-2 flex-wrap">
              <button className="btn btn-secondary" onClick={exportTableCSV}
                title={tx('Télécharger un fichier CSV (Excel, Numbers, Sheets)','Get a CSV file (Excel, Numbers, Sheets)')}>
                <span className="inline-flex items-center gap-1.5"><LucideIcon name="upload" size={14} strokeWidth={2.25} />{tx('Export CSV','Upload CSV')}</span>
              </button>
              <button className="btn btn-secondary" onClick={exportTablePDF}
                title={tx('Imprimer ou sauvegarder en PDF (paysage A4)','Print or save as PDF (A4 landscape)')}>
                <span className="inline-flex items-center gap-1.5"><LucideIcon name="upload" size={14} strokeWidth={2.25} />{tx('Export PDF','Upload PDF')}</span>
              </button>
            </div>
          </div>

          <div className="card p-3">
            <div className="label">{tx('Pilote','Pilot')}</div>
            <FancySelect
              value={pilotFilter}
              onChange={setPilotFilter}
              options={[
                { value: 'all', label: tx('Tous les pilotes','All pilots'), icon: 'users', color: 'var(--accent)' },
                ...pilots.map(p => ({ value: p.id, label: pilotDisplayName(p), icon: 'user' })),
              ]}
            />

            {/* Boutons modernes : importer logbook reporté + ajouter ligne externe.
                Visibles uniquement quand un pilote précis est sélectionné. */}
            {pilotFilter !== 'all' && selectedPilot && (
              <div className="mt-3 flex flex-col gap-2">
                <div className="flex flex-col sm:flex-row sm:items-center gap-2 flex-wrap">
                  <button type="button"
                    onClick={openImport}
                    className="inline-flex items-center justify-center gap-2 px-4 py-2 rounded-full border-2 border-[var(--accent)] text-[var(--accent)] font-semibold hover:bg-[var(--accent)]/10 transition-all hover:scale-105 active:scale-95 self-start"
                    style={{ background: 'transparent' }}>
                    <LucideIcon name={hasPrevLog ? 'clipboard' : 'plus'} size={16} strokeWidth={2.5} />
                    <span>{hasPrevLog

    function App() {
      const initial = migrateState(loadState());
      const [tab, setTab] = useState('logbook');
      const [flights, setFlights]     = useState(initial?.flights     || []);
      const [aircraft, setAircraft]   = useState(initial?.aircraft    || []);
      const [documents, setDocuments] = useState(initial?.documents   || []);
      const [categories, setCategories] = useState(initial?.categories || DEFAULT_CATEGORIES);
      const [settings, setSettings]   = useState(initial?.settings    || { askBeforeDelete: true });
      const [maintenance, setMaintenance] = useState(initial?.maintenance || []);
      // Visites mécanicien (déplacements + frais) — répartis sur N avions concernés.
      // Comptés dans Stats > Coût d'exploitation par avion sauf si includeInOpex=false.
      const [mechanicVisits, setMechanicVisits] = useState(initial?.mechanicVisits || []);
      // Tombstones de visites supprimées : { id, deletedAt }. Propagés via sync pour
      // que la suppression sur un appareil se répande sur les autres (sans quoi le
      // merge union par id ferait revivre l'élément supprimé). GC après 30 jours.
      const [mechanicVisitTombstones, setMechanicVisitTombstones] = useState(initial?.mechanicVisitTombstones || []);
      const [companyDocs, setCompanyDocs] = useState(initial?.companyDocs || []);
      const [pilots,      setPilots]      = useState(initial?.pilots      || []);
      const [pilotStatuses, setPilotStatuses] = useState(initial?.pilotStatuses || []);
      const [dutyPeriods, setDutyPeriods] = useState(initial?.dutyPeriods || []);
      const [lang,        setLang]        = useState(initial?.settings?.language || 'fr');

      // === Détection quota stockage : popup auto pour archiver ===
      const [storageFullModal, setStorageFullModal] = useState(null); // { lastEditedId } | null
      const lastEditedFlightIdRef = useRef(null); // suit le dernier vol modifié
      // Demande à LogbookScreen de rouvrir une fiche vol après archivage. Utile
      // pour ramener l'utilisateur exactement où il en était quand le popup
      // stockage plein s'est déclenché (ex: pendant l'ajout d'un OFPL).
      const [reopenFlightId, setReopenFlightId] = useState(null);

      // Détecte le dernier vol modifié pour pouvoir l'exclure de l'archivage auto.
      // Quand le contenu de flights change, on prend l'ID du vol avec le createdAt
      // ou l'updatedAt le plus récent. Heuristique simple mais qui marche pour
      // l'usage réel (l'utilisateur ouvre puis modifie un vol → c'est le plus récent).
      useEffect(() => {
        if (!flights || flights.length === 0) return;
        // On prend juste le dernier id ajouté (plus récent en bas après tri par date)
        // ou celui en cours d'édition si dispo via une ref.
        // Pour l'instant : le vol au plus grand id (timestamp dans 'flt_TIMESTAMP')
        const sorted = [...flights].sort((a,b) => {
          const ta = parseInt((a.id||'').replace(/^flt_/, ''), 10) || 0;
          const tb = parseInt((b.id||'').replace(/^flt_/, ''), 10) || 0;
          return tb - ta;
        });
        if (sorted[0]?.id) lastEditedFlightIdRef.current = sorted[0].id;
      }, [flights]);

      // persistance auto + détection quota
      useEffect(() => {
        const ok = saveState({ flights, aircraft, documents, categories, settings: { ...settings, language: lang }, maintenance, mechanicVisits, mechanicVisitTombstones, companyDocs, pilots, pilotStatuses, dutyPeriods });
        if (!ok) {
          // Quota dépassé : propose à l'utilisateur d'archiver les autres vols
          // pour libérer de l'espace et continuer à remplir le vol en cours.
          console.warn('Sauvegarde locale impossible — quota dépassé.');
          setStorageFullModal({ lastEditedId: lastEditedFlightIdRef.current });
        }
      }, [flights, aircraft, documents, categories, settings, maintenance, mechanicVisits, mechanicVisitTombstones, companyDocs, pilots, pilotStatuses, dutyPeriods, lang]);

      // Force l'affichage de la popup pour tester (utilisé par bouton dans Réglages).
      // En mode test on n'exclut AUCUN vol, comme ça l'utilisateur voit
      // l'archivage complet fonctionner.
      function triggerStorageFullPopupForTest() {
        setStorageFullModal({ lastEditedId: null, isTest: true });
      }

      // Handler du bouton "Archiver et continuer" depuis la popup.
      // Comportement :
      //   - Le ZIP contient TOUS les documents (y compris ceux du vol courant)
      //     pour avoir une sauvegarde complète sur disque.
      //   - L'app supprime localement les docs des AUTRES vols (libère l'espace)
      //     mais GARDE les docs du vol courant intacts pour pouvoir continuer
      //     à les voir et les éditer.
      async function handleArchiveAndContinue() {
        const keep = storageFullModal?.lastEditedId || null;
        // Compte total dans le ZIP (tous les vols + docs compagnie + factures Dépenses)
        let docCount = 0;
        for (const f of flights) {
          docCount += (f.documents||[]).filter(d=>d.dataUrl).length;
          docCount += (f.fuelEntries||[]).filter(e=>e.invoiceDataUrl).length;
        }
        docCount += (companyDocs||[]).filter(d=>d.dataUrl).length;
        docCount += (documents||[]).filter(d=>d.thumbnail).length;
        if (docCount === 0) {
          setStorageFullModal(null);
          alert('Aucun document à archiver.');
          return;
        }
        try {
          const ok = await archiveAndFreeDocuments({ keepInAppFlightId: keep, autoConfirm: true });
          setStorageFullModal(null);
          if (ok) {
            alert(`✓ ${docCount} document(s) archivé(s) dans le ZIP. Les documents affichent maintenant « OK archivé » dans tes vols.`);
            // Ramène l'utilisateur sur la fiche vol qu'il était en train de remplir,
            // pour qu'il puisse continuer à le compléter et le valider Complet.
            if (keep) {
              setTab('logbook');
              setReopenFlightId(keep);
            }
          } else {
            alert('L\'archivage n\'a pas pu être complété. Vérifie la console du navigateur pour plus d\'infos.');
          }
        } catch (e) {
          setStorageFullModal(null);
          alert('Erreur pendant l\'archivage : ' + (e.message || e));
        }
      }

      // === Synchronisation cloud (GitHub Gist) ============================
      // État local non-persisté (juste UI)
      const [syncStatus, setSyncStatus] = useState({ status: 'idle', message: '', lastSyncAt: 0 });
      // Empêche de pousser pendant l'hydratation initiale (sinon écrase le distant)
      const hydratedRef = useRef(false);
      // Marqueur du dernier `updated_at` distant qu'on a vu (pour polling)
      const lastSeenUpdatedAtRef = useRef('');

      // Construit le snapshot complet à synchroniser.
      // ⚠ IMPORTANT : on EXCLUT settings.gh (token + gistId) du snapshot,
      // sinon GitHub détecte le token dans le contenu du gist et le révoque
      // automatiquement par sécurité. Le token reste local à chaque appareil.
      // En plus on passe le JSON dans un sanitizer qui retire toute chaîne
      // ressemblant à un token GitHub (par sécurité, au cas où il se glisserait
      // quelque part — ex: collé par erreur dans une note de vol).
      function buildSnapshot() {
        const { gh: _ghStripped, ...settingsClean } = settings || {};
        // Strip des binaires (base64) avant push : le gist GitHub tronque les
        // fichiers > ~1MB, ce qui casse le JSON. On envoie uniquement les métadonnées.
        // Les binaires (factures scannées, photos) restent en local sur chaque appareil.
        // Les références (invoiceDocId, fileName, mime, invoiceNumber) sont conservées
        // pour que l'autre appareil sache qu'il y a une facture archivée et affiche
        // la mention "Facture sauvegardée (archivée)".
        const stripBinary = (obj) => {
          const { dataUrl, thumbnail, invoiceDataUrl, ...rest } = obj || {};
          return rest;
        };
        const flightsLite = (flights || []).map(f => ({
          ...f,
          fuelEntries: (f.fuelEntries || []).map(stripBinary),
          // documents : tableau plat des W&B/FPL/OFPL/Autres avec dataUrl à stripper
          // pour rester sous la limite Gist + ne pas écraser les flags archived locaux
          documents: (f.documents || []).map(stripBinary),
          // documentsByCategory : ancien format multi-volets (rétrocompat)
          documentsByCategory: f.documentsByCategory
            ? Object.fromEntries(Object.entries(f.documentsByCategory).map(([k, list]) => [
                k, (list || []).map(stripBinary)
              ]))
            : undefined,
        }));
        const documentsLite = (documents || []).map(stripBinary);
        const companyDocsLite = (companyDocs || []).map(stripBinary);
        const maintenanceLite = (maintenance || []).map(m => ({
          ...m,
          attachments: (m.attachments || []).map(stripBinary),
        }));

        const raw = {
          __sync: { lastWrittenAt: Date.now(), version: 2 },
          flights: flightsLite,
          aircraft,
          documents: documentsLite,
          categories,
          settings: { ...settingsClean, language: lang },
          maintenance: maintenanceLite,
          mechanicVisits,
          mechanicVisitTombstones,
          companyDocs: companyDocsLite,
          pilots, pilotStatuses, dutyPeriods,
        };
        // Sanitisation profonde : remplace tous les motifs de tokens GitHub
        // par "[redacted-pat]" dans tout le JSON sérialisé.
        const json = JSON.stringify(raw);
        const safe = json.replace(/github_pat_[A-Za-z0-9_]+/g, '[redacted-pat]')
                         .replace(/ghp_[A-Za-z0-9]{36,}/g, '[redacted-classic-pat]')
                         .replace(/ghs_[A-Za-z0-9]{36,}/g, '[redacted-server-token]');
        return JSON.parse(safe);
      }
      // Fusion intelligente : applique le remote SANS écraser les binaires locaux ET
      // sans perdre les items locaux qui ne sont pas (encore) dans le remote.
      function mergeKeepLocalBinaries(remoteList, localList, idKey = 'id') {
        const remote = Array.isArray(remoteList) ? remoteList : [];
        const local  = Array.isArray(localList)  ? localList  : [];
        const localById = new Map(local.map(x => [x[idKey], x]));
        const remoteIds = new Set(remote.map(x => x[idKey]));
        // 1) Merge des items présents dans remote
        const merged = remote.map(r => {
          const localItem = localById.get(r[idKey]);
          if (!localItem) return r;
          const m = { ...r };
          if (localItem.dataUrl) m.dataUrl = localItem.dataUrl;
          if (localItem.thumbnail) m.thumbnail = localItem.thumbnail;
          if (localItem.invoiceDataUrl) m.invoiceDataUrl = localItem.invoiceDataUrl;
          // Préserve les flags archived locaux (peuvent ne pas avoir été poussés)
          if (localItem.archived) {
            m.archived = true;
            m.archivedAt = localItem.archivedAt || m.archivedAt;
          }
          if (localItem.invoiceArchived) {
            m.invoiceArchived = true;
            m.invoiceArchivedAt = localItem.invoiceArchivedAt || m.invoiceArchivedAt;
          }
          return m;
        });
        // 2) Ajoute les items locaux qui ne sont pas dans le remote (création récente
        //    pas encore poussée, ou item perdu côté remote).
        for (const li of local) {
          if (!li[idKey] || remoteIds.has(li[idKey])) continue;
          merged.push(li);
        }
        return merged;
      }
      // Fusion docs vol : union par id + préservation du flag archived + restauration
      // du binaire local. Évite TROIS cas de perte :
      //   1) Doc fraîchement scanné en local pas encore poussé → on garde le local
      //   2) État archived local pas encore poussé → on garde archived=true
      //   3) Binaire local (dataUrl) jamais transmis par le gist → on le restaure
      function mergeDocsKeepLocalArchive(remoteList, localList) {
        const remote = Array.isArray(remoteList) ? remoteList : [];
        const local  = Array.isArray(localList)  ? localList  : [];
        const localById  = new Map(local.map(x => [x.id, x]));
        const remoteIds  = new Set(remote.map(x => x.id));
        // 1) Pour chaque doc du remote : merge avec local s'il existe
        const merged = remote.map(r => {
          const localDoc = localById.get(r.id);
          if (!localDoc) return r;
          const m = { ...r };
          if (localDoc.dataUrl) m.dataUrl = localDoc.dataUrl;
          if (localDoc.archived) {
            m.archived = true;
            m.archivedAt = localDoc.archivedAt || m.archivedAt;
            m.dataUrl = '';
          }
          return m;
        });
        // 2) Ajoute les docs LOCAUX qui ne sont pas dans le remote (créations récentes
        //    ou docs préservés que le remote a perdus). Critique pour ne pas vider la
        //    liste quand le remote est vide ou plus ancien.
        for (const ld of local) {
          if (!ld.id || remoteIds.has(ld.id)) continue;
          merged.push(ld);
        }
        return merged;
      }
      // Fusion union par id : prend le remote + ajoute les items locaux qui n'existent
      // pas en remote (typiquement des créations récentes pas encore poussées).
      // Évite que le pull écrase une création locale toute fraîche pendant la fenêtre
      // de 5s du debounce push. Trade-off : si un item a été supprimé sur l'autre
      // appareil, il peut momentanément réapparaître ici jusqu'à la prochaine sync.
      function mergeUnionById(remoteList, localList, idKey = 'id') {
        const remote = Array.isArray(remoteList) ? remoteList : [];
        const local  = Array.isArray(localList)  ? localList  : [];
        const remoteIds = new Set(remote.map(x => x[idKey]));
        const localOnly = local.filter(x => x[idKey] && !remoteIds.has(x[idKey]));
        return [...remote, ...localOnly];
      }
      // Applique un snapshot reçu (remplace l'état local) MAIS conserve les binaires
      // (dataUrl, thumbnail, invoiceDataUrl) qui n'étaient pas dans le snapshot.
      function applySnapshot(snap) {
        if (!snap) return;
        const m = migrateState({ ...snap });
        // Fusion : on prend les données remote mais on restaure les binaires locaux
        // (qui n'existent pas dans le snapshot pour cause de strip).
        const remoteFlights = (m.flights || []).map(rf => {
          const local = (flights || []).find(f => f.id === rf.id);
          if (!local) return rf;
          // Merge intelligent : on prend le remote, mais on restaure les binaires
          // (dataUrl) du local SI ils existent encore (pas archivés). Si le local
          // est archivé (archived=true), on garde ce flag même si le remote ne l'a
          // pas — sinon un push antérieur écraserait l'état archive.
          const mergedDocs = mergeDocsKeepLocalArchive(rf.documents, local.documents);
          // Préserve le verificationStatus 'complete' local si remote ne l'a pas
          // (sans timestamp par enregistrement, on suppose que 'complete' est plus
          // précieux qu'un autre état — décision explicite du pilote/dispatch).
          const mergedStatus = (local.verificationStatus === 'complete' && rf.verificationStatus !== 'complete')
            ? 'complete'
            : rf.verificationStatus;
          return {
            ...rf,
            verificationStatus: mergedStatus,
            documents: mergedDocs,
            fuelEntries: mergeKeepLocalBinaries(rf.fuelEntries, local.fuelEntries),
            documentsByCategory: rf.documentsByCategory
              ? Object.fromEntries(Object.entries(rf.documentsByCategory).map(([k, list]) => [
                  k, mergeKeepLocalBinaries(list, (local.documentsByCategory||{})[k])
                ]))
              : rf.documentsByCategory,
          };
        });
        setFlights(remoteFlights);
        setAircraft(m.aircraft || []);
        setDocuments(mergeKeepLocalBinaries(m.documents || [], documents));
        setCategories(m.categories || DEFAULT_CATEGORIES);
        setSettings(prev => ({ ...(m.settings || prev), gh: prev.gh })); // garde la config gh locale
        const remoteMaint = (m.maintenance || []).map(rm => {
          const local = (maintenance || []).find(x => x.id === rm.id);
          if (!local) return rm;
          return { ...rm, attachments: mergeKeepLocalBinaries(rm.attachments, local.attachments) };
        });
        setMaintenance(remoteMaint);
        // mechanicVisits : merge union par id (préserve créations locales pas encore
        // poussées) PUIS filtre par tombstones (suppressions propagées dans les 2 sens).
        // IMPORTANT : on lit l'état via REF, pas via la closure, car applySnapshot
        // est appelée depuis des listeners (polling/focus) qui capturent l'état au
        // moment de leur création. Sans ref, on perdrait toute modif locale faite
        // depuis (ex: un tombstone créé après un setup du polling).
        const remoteVisits     = m.mechanicVisits || [];
        const remoteTombstones = m.mechanicVisitTombstones || [];
        const localVisits      = mechanicVisitsRef.current || [];
        const localTombstones  = mechanicVisitTombstonesRef.current || [];
        const tombMap = new Map();
        for (const t of localTombstones) if (t && t.id) tombMap.set(t.id, t);
        for (const t of remoteTombstones) {
          if (!t || !t.id) continue;
          const exist = tombMap.get(t.id);
          if (!exist || ((t.deletedAt || 0) > (exist.deletedAt || 0))) tombMap.set(t.id, t);
        }
        const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
        const cleanedTombs = [...tombMap.values()].filter(t => (t.deletedAt || 0) > cutoff);
        const tombIds = new Set(cleanedTombs.map(t => t.id));
        const mergedVisits = mergeUnionById(remoteVisits, localVisits)
          .filter(v => v && v.id && !tombIds.has(v.id));
        setMechanicVisits(mergedVisits);
        setMechanicVisitTombstones(cleanedTombs);
        setCompanyDocs(mergeKeepLocalBinaries(m.companyDocs || [], companyDocs));
        setPilots(mergeUnionById(m.pilots || [], pilots));
        setPilotStatuses(m.pilotStatuses || []);
        setDutyPeriods(mergeUnionById(m.dutyPeriods || [], dutyPeriods));
        if (m.settings?.language) setLang(m.settings.language);
      }

      // Pull manuel (utilisé au démarrage et par le bouton "Sync now")
      async function syncPull() {
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token || !gh.gistId) return;
        setSyncStatus(prev => ({ status: 'syncing', message: 'Téléchargement…', lastSyncAt: prev.lastSyncAt }));
        try {
          const { data, updatedAt } = await ghReadGist(gh.token, gh.gistId);
          lastSeenUpdatedAtRef.current = updatedAt;
          const remoteTs = data?.__sync?.lastWrittenAt || 0;
          const localTs  = (settings.gh?.lastWrittenAt) || 0;
          if (remoteTs > localTs) {
            // Distant plus récent : applique
            applySnapshot(data);
            setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), lastWrittenAt: remoteTs }}));
            setSyncStatus({ status: 'synced', message: 'Reçu du cloud ✓', lastSyncAt: Date.now() });
          } else if (remoteTs < localTs) {
            // Local plus récent : pousse
            await syncPush();
          } else {
            setSyncStatus({ status: 'synced', message: 'À jour', lastSyncAt: Date.now() });
          }
        } catch (e) {
          // Cas spécial : le gist distant est corrompu (JSON malformé, tronqué…).
          // On peut le réparer en poussant la version locale (qui est valide).
          // Évite de proposer ça si on n'a aucune donnée locale (sinon on écrirait
          // un gist vide par erreur).
          const isCorrupt = /malformé|JSON Parse/i.test(e.message || '');
          const hasLocalData = (flights?.length || 0) > 0 || (aircraft?.length || 0) > 0;
          if (isCorrupt && hasLocalData) {
            setSyncStatus(prev => ({ status: 'syncing', message: 'Gist corrompu — réparation par push local…', lastSyncAt: prev.lastSyncAt }));
            try {
              await syncPush();
              setSyncStatus({ status: 'synced', message: 'Gist réparé ✓ (poussé depuis cet appareil)', lastSyncAt: Date.now() });
              return;
            } catch (e2) {
              setSyncStatus(prev => ({ status: 'error', message: 'Réparation échouée : ' + e2.message, lastSyncAt: prev.lastSyncAt }));
              return;
            }
          }
          setSyncStatus(prev => ({ status: 'error', message: 'Pull : ' + e.message, lastSyncAt: prev.lastSyncAt }));
        }
      }
      // Push manuel ou debouncé
      async function syncPush() {
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token) return;
        const snap = buildSnapshot();
        setSyncStatus(prev => ({ status: 'syncing', message: 'Envoi…', lastSyncAt: prev.lastSyncAt }));
        try {
          let gistId = gh.gistId;
          if (!gistId) {
            // Première sync : crée le gist
            gistId = await ghCreateGist(gh.token, snap);
            setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), gistId, lastWrittenAt: snap.__sync.lastWrittenAt } }));
          } else {
            const r = await ghWriteGist(gh.token, gistId, snap);
            lastSeenUpdatedAtRef.current = r.updated_at;
            setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), lastWrittenAt: snap.__sync.lastWrittenAt } }));
          }
          setSyncStatus({ status: 'synced', message: 'Envoyé ✓', lastSyncAt: Date.now() });
        } catch (e) {
          setSyncStatus(prev => ({ status: 'error', message: 'Push : ' + e.message, lastSyncAt: prev.lastSyncAt }));
        }
      }

      // Pull au démarrage si la sync est activée
      useEffect(() => {
        const gh = settings.gh || {};
        if (gh.enabled && gh.token && gh.gistId && !hydratedRef.current) {
          syncPull().finally(() => { hydratedRef.current = true; });
        } else {
          hydratedRef.current = true;
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      // Push debouncé : 5 sec après la dernière modification
      useEffect(() => {
        if (!hydratedRef.current) return;
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token) return;
        const t = setTimeout(() => { syncPush(); }, 5000);
        return () => clearTimeout(t);
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [flights, aircraft, documents, categories, maintenance, mechanicVisits, companyDocs, pilots, pilotStatuses, dutyPeriods]);

      // Pull au retour de focus de la fenêtre / onglet (catch les modifs faites
      // sur l'autre appareil pendant que cet appareil était en arrière-plan).
      // Important pour le scénario : tu modifies sur mobile, tu reviens sur
      // desktop → on doit tirer immédiatement, sans attendre le polling 30s.
      useEffect(() => {
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token || !gh.gistId) return;
        function onVisible() {
          if (document.visibilityState === 'visible') {
            syncPull();
          }
        }
        function onFocus() { syncPull(); }
        document.addEventListener('visibilitychange', onVisible);
        window.addEventListener('focus', onFocus);
        return () => {
          document.removeEventListener('visibilitychange', onVisible);
          window.removeEventListener('focus', onFocus);
        };
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [settings.gh?.enabled, settings.gh?.token, settings.gh?.gistId]);

      // Polling : check toutes les 30 sec si le distant a changé
      useEffect(() => {
        const gh = settings.gh || {};
        if (!gh.enabled || !gh.token || !gh.gistId) return;
        const id = setInterval(async () => {
          try {
            const { data, updatedAt } = await ghReadGist(gh.token, gh.gistId);
            if (updatedAt && updatedAt !== lastSeenUpdatedAtRef.current) {
              lastSeenUpdatedAtRef.current = updatedAt;
              const remoteTs = data?.__sync?.lastWrittenAt || 0;
              const localTs = settings.gh?.lastWrittenAt || 0;
              if (remoteTs > localTs) {
                applySnapshot(data);
                setSettings(prev => ({ ...prev, gh: { ...(prev.gh||{}), lastWrittenAt: remoteTs } }));
                setSyncStatus({ status: 'synced', message: 'Reçu du cloud ✓', lastSyncAt: Date.now() });
              }
            }
          } catch (e) { /* silence le polling */ }
        }, 30000);
        return () => clearInterval(id);
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [settings.gh?.enabled, settings.gh?.token, settings.gh?.gistId]);

      // -- handlers --
      function upsert(arrSetter) {
        return (item) => arrSetter(prev => {
          const i = prev.findIndex(x => x.id === item.id);
          if (i === -1) return [...prev, item];
          const copy = [...prev]; copy[i] = item; return copy;
        });
      }
      function remove(arrSetter) {
        return (id) => arrSetter(prev => prev.filter(x => x.id !== id));
      }

      // Helper : ajout d'une dépense (utilisé par le scan facture depuis le carnet)
      const addExpense = useCallback((doc) => {
        setDocuments(prev => [...prev, doc]);
      }, []);

      // Ref vers documents pour éviter de recréer le wrapper upsertFlight à
      // chaque modif. La détection de doublons lit toujours la valeur la plus récente.
      const documentsRef = useRef(documents);
      useEffect(() => { documentsRef.current = documents; }, [documents]);
      // Ref vers flights pour comparer ancien vs nouveau au save (cascade delete).
      const flightsRef = useRef(flights);
      useEffect(() => { flightsRef.current = flights; }, [flights]);
      // Refs vers mechanicVisits + tombstones : applySnapshot est appelée depuis le
      // polling/focus listener qui captent ces variables dans leur closure. Sans ref,
      // applySnapshot lirait des valeurs obsolètes et perdrait les modifs récentes
      // (ex: une suppression jamais propagée car le tombstone fraîchement créé n'est
      // pas vu par la closure).
      const mechanicVisitsRef = useRef(mechanicVisits);
      useEffect(() => { mechanicVisitsRef.current = mechanicVisits; }, [mechanicVisits]);
      const mechanicVisitTombstonesRef = useRef(mechanicVisitTombstones);
      useEffect(() => { mechanicVisitTombstonesRef.current = mechanicVisitTombstones; }, [mechanicVisitTombstones]);

      // Wrapper d'upsert vol qui crée automatiquement les dépenses Carburant Avion
      // pour chaque ligne de fuel ayant un montant + un N° de facture, sans dépense déjà liée.
      // Détection doublons : si une dépense (catégorie fuel_aircraft) existe déjà avec
      // le même N° invoice + même montant + même date, demande confirmation. Si l'utilisateur
      // refuse, on lie la ligne à la dépense existante (évite de re-prompter au prochain save).
      const upsertFlightWithFuelExpenses = useCallback((flight) => {
        const docsNow = documentsRef.current || [];
        const flightsNow = flightsRef.current || [];
        // Cascade delete : repère les fuelEntries qui existaient avant et qui ont
        // disparu de ce save. Pour chacune, on enlève la dépense liée si elle existe.
        const previousFlight = flightsNow.find(f => f.id === flight.id);
        const removedExpenseIds = [];
        if (previousFlight) {
          const newIds = new Set((flight.fuelEntries || []).map(e => e.id));
          for (const oldE of (previousFlight.fuelEntries || [])) {
            if (!oldE.id || newIds.has(oldE.id)) continue;
            // Cette ligne a été retirée du vol. Si elle référence une dépense qui
            // existe vraiment, on programme sa suppression.
            if (oldE.invoiceDocId && docsNow.some(d => d.id === oldE.invoiceDocId)) {
              removedExpenseIds.push(oldE.invoiceDocId);
            }
          }
        }
        const justAdded = []; // dépenses créées dans ce save (pour détecter doublons intra-save)
        const updatedFuelEntries = (flight.fuelEntries || []).map(e => {
          const amt = parseFloat(e.amount);
          const inv = (e.invoiceNumber || '').trim();
          if (!(amt > 0 && inv)) return e; // données minimales requises

          // Cas 1 : la ligne pointe vers une dépense (invoiceDocId) qui existe RÉELLEMENT
          // dans documents → on ne fait rien, le lien est valide.
          // Cas 2 : invoiceDocId existe mais doc orphelin (perdu après sync corrompu,
          // suppression manuelle, etc.) → on traite comme une ligne neuve à créer.
          if (e.invoiceDocId) {
            const linked = docsNow.find(d => d.id === e.invoiceDocId);
            if (linked) return e; // lien sain, rien à faire
            // sinon : orphelin, on continue pour recréer la dépense
          }

          const entryDate = e.date || flight.date;
          const sameKey = (d) =>
            d.categoryId === 'fuel_aircraft' &&
            (d.invoiceNumber || '').trim() === inv &&
            Math.abs((parseFloat(d.amount) || 0) - amt) < 0.005 &&
            d.date === entryDate;

          const dup = docsNow.find(sameKey) || justAdded.find(sameKey);
          if (dup) {
            const ok = confirm(
              `Une dépense Carburant Avion existe déjà :\n` +
              `  N° ${dup.invoiceNumber} · ${dup.amount} ${dup.currency || ''} · ${dup.date}\n\n` +
              `OK : ajouter quand même comme nouvelle dépense.\n` +
              `Annuler : lier cette ligne à la dépense existante (recommandé).`
            );
            if (!ok) {
              return { ...e, invoiceDocId: dup.id };
            }
          }

          const expenseId = 'doc_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
          const expense = {
            id: expenseId,
            date: entryDate || todayZuluDate(),
            supplier: e.supplier || '',
            amount: e.amount,
            currency: e.currency || 'EUR',
            categoryId: 'fuel_aircraft',
            aircraftId: flight.aircraftId || '',
            thumbnail: '',
            ocrText: '',
            fileName: '',
            mime: '',
            dataUrl: '',
            invoiceNumber: inv,
            notes: 'Créé automatiquement depuis le carnet (vol) — pas de facture jointe.',
            sourceFlightEntryId: e.id || '',
            addedAt: Date.now(),
          };
          justAdded.push(expense);
          addExpense(expense);
          return { ...e, invoiceDocId: expenseId };
        });

        const flightToSave = updatedFuelEntries === flight.fuelEntries
          ? flight
          : { ...flight, fuelEntries: updatedFuelEntries };
        upsert(setFlights)(flightToSave);
        // Cascade : retire les dépenses liées aux fuelEntries supprimées
        if (removedExpenseIds.length > 0) {
          setDocuments(prev => prev.filter(d => !removedExpenseIds.includes(d.id)));
        }
      }, [addExpense]);

      function exportJSON() {
        const data = { exportedAt: new Date().toISOString(), flights, aircraft, documents, categories, settings, maintenance, companyDocs, pilots, pilotStatuses, dutyPeriods };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `flightops_backup_${todayZuluDate()}.json`;
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
      }

      // === Archivage des documents joints en ZIP local ===
      // Génère un .zip structuré par vol (date + route + immat) qui contient tous
      // les W&B, FPL, OFPL, Autres, factures carburant + docs compagnie. Une fois
      // téléchargé, l'utilisateur peut le déplacer dans iCloud Drive et l'app
      // libère l'espace local en retirant les dataUrl (les références restent
      // pour montrer "archivé le X" mais le contenu binaire est purgé).
      // Options :
      //   - keepInAppFlightId : le ZIP inclut TOUS les vols (sauvegarde
      //     complète) MAIS on ne purge PAS les docs de ce vol-là dans l'app
      //     (utile quand on remplit un vol et qu'on veut continuer à travailler
      //     dessus avec ses docs visibles).
      //   - autoConfirm : skip les popups (utile pour l'archivage auto suite
      //     à un quota error)
      async function archiveAndFreeDocuments(opts = {}) {
        // Compatibilité ascendante : ancien nom excludeFlightId → keepInAppFlightId
        const keepInAppFlightId = opts.keepInAppFlightId || opts.excludeFlightId || null;
        const autoConfirm = !!opts.autoConfirm;
        if (typeof JSZip === 'undefined') {
          if (!autoConfirm) alert('La librairie de compression ZIP n\'est pas chargée. Recharge la page et réessaye.');
          return false;
        }
        // Le ZIP couvre TOUS les vols (sauvegarde complète, même si un vol reste actif dans l'app)
        const targetFlights = flights;
        // Compte ce qui sera dans le ZIP
        let docCount = 0;
        for (const f of targetFlights) {
          docCount += (f.documents||[]).filter(d=>d.dataUrl).length;
          docCount += (f.fuelEntries||[]).filter(e=>e.invoiceDataUrl).length;
        }
        docCount += (companyDocs||[]).filter(d=>d.dataUrl).length;
        // Factures / scans de l'onglet Dépenses (documents top-level)
        docCount += (documents||[]).filter(d=>d.thumbnail).length;
        if (docCount === 0) {
          if (!autoConfirm) alert('Aucun document à archiver.');
          return false;
        }
        if (!autoConfirm) {
          const msg = keepInAppFlightId
            ? `Archiver ${docCount} document(s) en ZIP (sauvegarde complète) puis libérer l'espace des AUTRES vols ?\n\nLes documents du vol que tu modifies restent visibles dans l'app.\n\nÉtapes :\n1. Le ZIP va se télécharger\n2. Déplace-le dans iCloud Drive\n3. L'app retire les fichiers des autres vols de son stockage`
            : `Archiver ${docCount} document(s) en ZIP puis libérer l'espace local ?\n\nÉtapes :\n1. Le fichier ZIP va se télécharger\n2. Déplace-le dans iCloud Drive (ou autre)\n3. L'app retire les fichiers de son stockage (les références restent visibles avec mention « archivé »)\n\nTu pourras toujours rouvrir les documents depuis le ZIP.`;
          if (!confirm(msg)) return false;
        }

        const zip = new JSZip();
        // Helper : transforme dataURL → Blob pour JSZip
        function dataUrlToBytes(dataUrl) {
          const base64 = dataUrl.split(',')[1] || '';
          const binary = atob(base64);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          return bytes;
        }
        // Sanitise un nom pour le système de fichiers
        function safe(s) { return String(s||'').replace(/[\/\\?%*:|"<>]/g, '-').slice(0, 60); }
        // Détermine extension d'après le mime
        function extFor(mime, fallback) {
          if (mime === 'application/pdf') return 'pdf';
          if (mime?.startsWith('image/')) return mime.split('/')[1].replace('jpeg','jpg');
          return fallback || 'bin';
        }
        const TYPE_FOLDERS = { wb: 'WB', fpl: 'FPL', ofpl: 'OFPL', other: 'Autres' };

        // === Approche flat-path : on collecte d'abord tous les fichiers à archiver
        //     puis on les ajoute via zip.file(fullPath, bytes). JSZip ne crée que les
        //     dossiers parents nécessaires — aucun dossier vide ne peut être généré. ===
        const entries = []; // { path: string, bytes: Uint8Array }

        // --- Vols : un sous-dossier par vol UNIQUEMENT pour ceux qui ont un fichier ---
        for (const f of targetFlights) {
          const ac = aircraft.find(a => a.id === f.aircraftId);
          const reg = ac?.registration || 'NOREG';
          const folderName = `${f.date || 'sans-date'}_${safe(f.from)}-${safe(f.to)}_${safe(reg)}`;
          // W&B / FPL / OFPL / Autre
          for (const d of (f.documents||[])) {
            if (!d.dataUrl) continue;
            const sub = TYPE_FOLDERS[d.type] || 'Autres';
            const ext = extFor(d.mime, 'pdf');
            const name = d.fileName || `${TYPE_FOLDERS[d.type]||'doc'}.${ext}`;
            entries.push({
              path: `${folderName}/${sub}/${safe(name)}`,
              bytes: dataUrlToBytes(d.dataUrl),
            });
          }
          // Factures carburant
          for (const e of (f.fuelEntries||[])) {
            if (!e.invoiceDataUrl) continue;
            const ext = extFor(e.invoiceMime, 'pdf');
            const name = e.invoiceFileName || `facture_${e.invoiceNumber||e.id}.${ext}`;
            entries.push({
              path: `${folderName}/Factures/${safe(name)}`,
              bytes: dataUrlToBytes(e.invoiceDataUrl),
            });
          }
        }

        // --- Documents Compagnie ---
        for (const d of (companyDocs||[])) {
          if (!d.dataUrl) continue;
          const ext = extFor(d.mime, 'pdf');
          const prefix = (d.effectiveDate ? d.effectiveDate+'_' : '');
          const name = prefix + (d.fileName || `${d.title||'doc'}.${ext}`);
          entries.push({
            path: `Documents-Compagnie/${safe(name)}`,
            bytes: dataUrlToBytes(d.dataUrl),
          });
        }

        // --- DÉPENSES : Dépenses / <Catégorie> / <YYYY-MM> / <date>_<fournisseur>_<montant><devise>.<ext>
        for (const d of (documents||[])) {
          if (!d.thumbnail) continue;
          const cat = categories.find(c => c.id === d.categoryId) || categories[categories.length-1];
          const dateStr = d.date || 'sans-date';
          const ym = dateStr.length >= 7 ? dateStr.slice(0,7) : 'sans-date';
          const day = dateStr.length >= 10 ? dateStr.slice(8,10) : '00';
          const supplier = safe(d.supplier || 'inconnu').replace(/\s+/g, '-');
          const amount = d.amount ? `${parseFloat(d.amount).toFixed(2)}${d.currency||'EUR'}` : '';
          const baseName = [day, supplier, amount].filter(Boolean).join('_');
          const ext = extFor(null, 'jpg');
          const fileName = `${baseName || 'facture'}.${ext}`;
          entries.push({
            path: `Dépenses/${safe(cat.name)}/${ym}/${safe(fileName)}`,
            bytes: dataUrlToBytes(d.thumbnail),
          });
        }

        // Ajout au ZIP via zip.file(fullPath, bytes) — JSZip crée uniquement les
        // dossiers parents nécessaires (pas de dossier vide possible).
        for (const e of entries) {
          zip.file(e.path, e.bytes);
        }

        // Génère et télécharge le ZIP
        const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 }});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `AeroDeck-Archive-${todayZuluDate()}.zip`;
        a.click();
        setTimeout(()=>URL.revokeObjectURL(url), 2000);

        // Confirmation finale avant suppression locale (skip si autoConfirm depuis quota error)
        if (!autoConfirm) {
          if (!confirm('ZIP téléchargé.\n\nVérifie qu\'il est bien dans tes téléchargements / iCloud, puis confirme pour libérer l\'espace local. Les références aux documents restent dans l\'app (mention « archivé ») mais le contenu sera retiré.')) {
            alert('Aucune modification : tes documents sont toujours dans l\'app.');
            return false;
          }
        }
        // Purge des dataUrl pour TOUS les vols (y compris le vol courant si présent).
        // Les métadonnées sont conservées (filename, type, date d'archive, statut de
        // validation) — on garde une trace pour que chaque doc affiche « ✓ OK archivé »
        // et que le vol garde son liseré vert s'il était validé Complet.
        // Note : keepInAppFlightId est ignoré désormais — l'utilisateur veut tout
        // archiver pour libérer un maximum d'espace.
        const stamp = new Date().toISOString();
        setFlights(prev => prev.map(f => {
          return {
            ...f,
            // Tous les docs perdent leur dataUrl ET reçoivent le flag archived (même
            // ceux qui n'avaient pas de binaire localement, p.ex. arrivés via sync)
            // → garantit l'affichage cohérent "✓ OK archivé" partout.
            documents: (f.documents||[]).map(d => ({
              ...d, dataUrl: '', archived: true, archivedAt: d.archivedAt || stamp,
            })),
            fuelEntries: (f.fuelEntries||[]).map(e => e.invoiceDocId ? {
              ...e, invoiceDataUrl: '', invoiceArchived: true, invoiceArchivedAt: e.invoiceArchivedAt || stamp,
            } : e),
          };
        }));
        setCompanyDocs(prev => prev.map(d => d.dataUrl ? { ...d, dataUrl:'', archived: true, archivedAt: stamp } : d));
        // Purge des thumbnails de l'onglet Dépenses (factures scannées)
        // Garde les métadonnées (montant, fournisseur, date, catégorie)
        setDocuments(prev => prev.map(d => d.thumbnail ? { ...d, thumbnail:'', archived: true, archivedAt: stamp } : d));
        if (!autoConfirm) alert('✓ Documents archivés en ZIP et espace local libéré.');
        return true;
      }
      function importJSON(obj) {
        if (!obj || typeof obj !== 'object') return alert('JSON invalide.');
        if (!confirm('Importer ce fichier ? Les données existantes seront remplacées par celles du fichier.')) return;
        const migrated = migrateState({ ...obj });
        setFlights(migrated.flights || []);
        setAircraft(migrated.aircraft || []);
        setDocuments(migrated.documents || []);
        setCategories(migrated.categories || DEFAULT_CATEGORIES);
        setSettings(migrated.settings || { askBeforeDelete: true });
        setMaintenance(migrated.maintenance || []);
        setCompanyDocs(migrated.companyDocs || []);
        setPilots(migrated.pilots || []);
        setPilotStatuses(migrated.pilotStatuses || []);
        setDutyPeriods(migrated.dutyPeriods || []);
        alert('Import terminé.');
      }
      function clearAll() {
        if (!confirm('Tout effacer ? Cette action est irréversible. Pense à exporter en JSON avant.')) return;
        if (!confirm('Confirmation finale : effacer toutes les données locales ?')) return;
        setFlights([]); setAircraft([]); setDocuments([]); setCategories(DEFAULT_CATEGORIES);
        setMaintenance([]); setCompanyDocs([]); setPilots([]); setPilotStatuses([]); setDutyPeriods([]);
      }

      const tT = (key) => (TRANSLATIONS[lang]?.[key]) || (TRANSLATIONS.fr[key]) || key;
      // Onglets avec icônes Lucide (SVG line-art moderne) au lieu d'emojis.
      // L'icon est désormais un nom de clé Lucide rendu via <LucideIcon />.
      const tabs = [
        { id:'logbook',     label: tT('tab.logbook'),      icon:'plane'        },
        { id:'calendar',    label: tT('tab.calendar'),     icon:'calendar'     },
        { id:'aircraft',    label: tT('tab.aircraft'),     icon:'planeTakeoff' },
        { id:'pilots',      label: tT('tab.pilots'),       icon:'user'         },
        { id:'duty',        label: tT('tab.duty'),         icon:'clock'        },
        { id:'maintenance', label: tT('tab.maintenance'),  icon:'wrench'       },
        { id:'documents',   label: tT('tab.expenses'),     icon:'receipt'      },
        { id:'company',     label: tT('tab.company'),      icon:'folder'       },
        { id:'staff',       label: tT('tab.staff'),        icon:'users'        },
        { id:'stats',       label: tT('tab.stats'),        icon:'barChart3'    },
        { id:'settings',    label: tT('tab.settings'),     icon:'settings'     },
      ];

      // Applique le thème (clair / sombre) au root via une classe CSS.
      // Recompute si l'heure change (auto-time) ou si le système change (auto-system).
      useEffect(() => {
        function apply() {
          const t = effectiveTheme(settings.theme || 'dark');
          document.documentElement.classList.toggle('theme-light', t === 'light');
        }
        apply();
        // Auto-time : revérifier toutes les 5 minutes
        const id = (settings.theme === 'auto-time') ? setInterval(apply, 5*60*1000) : null;
        // Auto-system : écouter le changement
        let mq = null;
        if (settings.theme === 'auto-system' && window.matchMedia) {
          mq = window.matchMedia('(prefers-color-scheme: light)');
          mq.addEventListener && mq.addEventListener('change', apply);
        }
        return () => {
          if (id) clearInterval(id);
          if (mq && mq.removeEventListener) mq.removeEventListener('change', apply);
        };
      }, [settings.theme]);

      // Append helper utilisé par l'import ICS pour ajouter en lot
      function addFlights(arr) {
        if (!arr || !arr.length) return;
        setFlights(prev => [...prev, ...arr]);
      }

      return (
        <I18nContext.Provider value={{ lang, setLang }}>
        {/* Popup automatique quand le stockage local est plein.
            Propose d'archiver tous les autres vols (sauf le vol courant) en
            ZIP local pour libérer de la place et continuer à remplir le vol. */}
        {storageFullModal && (
          <div className="fixed inset-0 z-[70] flex items-end sm:items-center justify-center" data-storage-modal
               style={{ overscrollBehavior: 'contain', touchAction: 'none', overflow: 'hidden' }}>
            <div className="absolute inset-0 bg-black/60" onClick={()=>setStorageFullModal(null)} />
            <div className="relative card w-full sm:max-w-lg max-h-[90vh] anim-pop p-5"
                 style={{
                   borderRadius: '20px 20px 0 0',
                   overscrollBehavior: 'contain',
                   WebkitOverflowScrolling: 'touch',
                   touchAction: 'pan-y pinch-zoom',
                   overflowY: 'auto',
                   overflowX: 'hidden',
                   maxWidth: '100vw',
                 }}>
              <div className="text-center mb-3">
                <div className="grid place-items-center mx-auto mb-2 w-14 h-14 rounded-2xl"
                     style={{ background: 'rgba(245,158,11,0.18)', color: 'var(--warn)', boxShadow: 'inset 0 0 0 1.25px rgba(245,158,11,0.45)' }}>
                  <LucideIcon name="database" size={28} strokeWidth={2.25} />
                </div>
                <h3 className="text-lg font-semibold">Stockage local plein</h3>
              </div>
              <div className="text-sm text-[var(--text-dim)] space-y-2 mb-4">
                <p>L'app a atteint la limite de stockage du navigateur (~5 MB). Le dernier ajout n'a pas pu être sauvegardé.</p>
                <p><strong className="text-[var(--ok)]">✓ Tous tes vols restent dans l'app</strong> avec leur statut de validation (liseré vert si Complet). Seuls les fichiers binaires (photos, scans, PDF) sont déplacés dans un ZIP de sauvegarde pour libérer la place.</p>
                <ul className="list-disc pl-5 text-xs space-y-1">
                  <li>Un fichier ZIP avec dossier par vol (date/route/immat) sera téléchargé</li>
                  <li>Range-le dans iCloud Drive (ou autre)</li>
                  <li>Chaque document (W&B, FPL, OFPL, factures…) affiche « ✓ OK archivé » à la place de son aperçu</li>
                  <li>Tu peux toujours retirer un document archivé pour libérer la trace</li>
                </ul>
              </div>
              <div className="flex flex-col gap-2">
                <button className="btn btn-primary" onClick={handleArchiveAndContinue}>
                  <LucideIcon name="package" size={16} strokeWidth={2.25} />
                  <span>Archiver les autres vols et continuer</span>
                </button>
                <button className="btn btn-secondary" onClick={()=>setStorageFullModal(null)}>
                  Plus tard (j'ouvrirai Réglages → Données)
                </button>
              </div>
            </div>
          </div>
        )}

        <div className="min-h-full flex flex-col">
          {/* Header */}
          <header className="glass safe-top sticky top-0 z-40 px-4 py-2.5 flex items-center justify-between">
            <div className="flex items-center gap-3 min-w-0">
              <div className="brand-logo">
                {/* Logo simple : silhouette d'avion vue de dessus, monochromatique cyan */}
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"
                     style={{ color: 'var(--accent)' }}>
                  <path d="M12 2 L13.5 9.5 L22 12 L13.5 13 L13 19 L15 21 L15 22 L12 21 L9 22 L9 21 L11 19 L10.5 13 L2 12 L10.5 9.5 Z" />
                </svg>
              </div>
              <div className="min-w-0">
                <div className="brand-title leading-tight text-[17px]">{APP_NAME}</div>
                {/* MOBILE : badge sync texte sous le titre AeroDeck.
                    Vert si OK, jaune si en cours, rouge clignotant lent si erreur. */}
                {(settings.gh?.enabled && settings.gh?.token) && (
                  <button
                    type="button"
                    onClick={() => syncPull()}
                    onContextMenu={(e) => { e.preventDefault(); setTab('settings'); }}
                    title={
                      syncStatus.status === 'syncing' ? 'Sync en cours…'
                      : syncStatus.status === 'error' ? 'Erreur sync — clique pour réessayer'
                      : syncStatus.status === 'synced' ? `Sync OK — clique pour resynchroniser (pull + push)`
                      : 'Sync — clique pour synchroniser maintenant'
                    }
                    className={`sm:hidden inline-flex items-center mt-0.5 text-[11px] leading-none font-bold uppercase tracking-wider px-1.5 py-0.5 rounded-md transition-all hover:scale-105 ${syncStatus.status === 'error' ? 'anim-slow-blink' : ''}`}
                    style={{
                      color: syncStatus.status === 'syncing' ? 'var(--warn)'
                           : syncStatus.status === 'error'   ? 'var(--err)'
                           : syncStatus.status === 'synced'  ? 'var(--ok)'
                           : 'var(--text-dim)',
                    }}>
                    {syncStatus.status === 'syncing' ? 'Sync…'
                      : syncStatus.status === 'error' ? 'Sync KO'
                      : syncStatus.status === 'synced' ? 'Sync OK'
                      : 'Sync'}
                  </button>
                )}
              </div>
            </div>
            <div className="flex items-center gap-3 flex-shrink-0">
              {/* DESKTOP : badge sync texte (vert OK / jaune en cours / rouge clignotant si erreur).
                  Click = push manuel. Clic-droit = ouvre Réglages. */}
              {(settings.gh?.enabled && settings.gh?.token) && (
                <button
                  type="button"
                  onClick={() => syncPush()}
                  onContextMenu={(e) => { e.preventDefault(); setTab('settings'); }}
                  title={
                    syncStatus.status === 'syncing' ? 'Sync en cours…'
                    : syncStatus.status === 'error' ? 'Erreur sync — clique pour réessayer'
                    : syncStatus.status === 'synced' ? `Sync OK — clique pour pousser`
                    : 'Sync — clique pour pousser maintenant'
                  }
                  className={`hidden sm:inline-flex items-center text-xs font-bold uppercase tracking-wider px-2 py-1 rounded-md transition-all hover:scale-105 ${syncStatus.status === 'error' ? 'anim-slow-blink' : ''}`}
                  style={{
                    color: syncStatus.status === 'syncing' ? 'var(--warn)'
                         : syncStatus.status === 'error'   ? 'var(--err)'
                         : syncStatus.status === 'synced'  ? 'var(--ok)'
                         : 'var(--text-dim)',
                  }}>
                  {syncStatus.status === 'syncing' ? 'Sync…'
                    : syncStatus.status === 'error' ? 'Sync KO'
                    : syncStatus.status === 'synced' ? 'Sync OK'
                    : 'Sync'}
                </button>
              )}
              {/* Sélecteur de langue : drapeau rond cliquable qui bascule FR ↔ EN.
                  mt-3 sur mobile pour le descendre un peu sous l'encoche.
                  Le drapeau affiché = langue ACTIVE (claire visuellement). */}
              <button
                type="button"
                onClick={() => setLang(lang === 'fr' ? 'en' : 'fr')}
                title={lang === 'fr' ? 'Langue : Français — cliquer pour passer en anglais' : 'Language: English — click to switch to French'}
                aria-label={lang === 'fr' ? 'Changer la langue : passer en anglais' : 'Change language: switch to French'}
                className="rounded-full p-0.5 transition-transform hover:scale-110 active:scale-95 translate-y-2 sm:translate-y-0"
                style={{
                  boxShadow: '0 0 0 1.5px var(--border), 0 4px 10px -2px rgba(0,0,0,0.4)',
                  background: 'var(--bg-elev)',
                  lineHeight: 0,
                }}
              >
                <FlagIcon code={lang} size={20} />
              </button>
              <ClockBlock zuluLabel={tT('app.zulu')} />
            </div>
          </header>

          {/* Onglets en haut sur iPad/desktop (scroll horizontal si nécessaire) */}
          <nav className="tabnav-desktop hidden sm:flex justify-start gap-1 px-4 py-3 border-b border-[var(--border-soft)] glass overflow-x-auto">
            {tabs.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`tabbtn px-3 py-1.5 rounded-lg whitespace-nowrap text-sm font-semibold flex items-center gap-1.5 ${tab===t.id?'active tabbtn-active bg-[var(--bg-elev)]':''}`}>
                <span className="leading-none" style={{ color: tab===t.id ? 'var(--accent)' : 'currentColor' }}>
                  <LucideIcon name={t.icon} size={16} />
                </span>
                <span>{t.label}</span>
              </button>
            ))}
          </nav>

          {/* Contenu — Staff/Stats utilisent toute la largeur pour leurs gros tableaux. */}
          <main className={`flex-1 px-3 sm:px-6 py-3 w-full mx-auto pb-28 sm:pb-10 ${(tab==='staff' || tab==='stats') ? 'max-w-7xl' : 'max-w-4xl'}`}>
            {tab==='logbook' && <LogbookScreen
              flights={flights} aircraft={aircraft} pilots={pilots} addExpense={addExpense}
              settings={settings}
              reopenFlightId={reopenFlightId}
              onConsumeReopen={()=>setReopenFlightId(null)}
              onAddOrUpdate={upsertFlightWithFuelExpenses} onDelete={remove(setFlights)} />}
            {tab==='staff' && <StaffScreen
              flights={flights} aircraft={aircraft} pilots={pilots}
              addExpense={addExpense}
              onUpsertFlight={upsertFlightWithFuelExpenses} onDeleteFlight={remove(setFlights)} />}
            {tab==='calendar' && <CalendarScreen
              flights={flights} aircraft={aircraft} pilots={pilots} addExpense={addExpense}
              onAddFlights={addFlights}
              onUpsertFlight={upsertFlightWithFuelExpenses} onDeleteFlight={remove(setFlights)}
              pilotStatuses={pilotStatuses} setPilotStatuses={setPilotStatuses} />}
            {tab==='aircraft' && <AircraftScreen
              aircraft={aircraft} flights={flights}
              onAddOrUpdate={upsert(setAircraft)} onDelete={remove(setAircraft)} />}
            {tab==='pilots' && <PilotsScreen
              pilots={pilots} flights={flights}
              onAddOrUpdate={upsert(setPilots)} onDelete={remove(setPilots)} />}
            {tab==='duty' && <DutyScreen
              flights={flights} pilots={pilots} dutyPeriods={dutyPeriods}
              onAddOrUpdate={upsert(setDutyPeriods)} onDelete={remove(setDutyPeriods)} />}
            {tab==='maintenance' && <MaintenanceScreen
              maintenance={maintenance} aircraft={aircraft} flights={flights}
              onAddOrUpdate={upsert(setMaintenance)} onDelete={remove(setMaintenance)}
              onAircraftUpdate={upsert(setAircraft)}
              mechanicVisits={mechanicVisits}
              onMechanicVisitUpsert={upsert(setMechanicVisits)}
              onMechanicVisitDelete={(id) => {
                // Soft delete : retire de la liste + ajoute un tombstone pour propager la
                // suppression vers les autres appareils via sync. Sans le tombstone, le
                // merge union ré-ajouterait l'élément depuis le remote.
                setMechanicVisits(prev => prev.filter(v => v.id !== id));
                setMechanicVisitTombstones(prev => {
                  if (prev.some(t => t.id === id)) return prev;
                  return [...prev, { id, deletedAt: Date.now() }];
                });
              }} />}
            {tab==='documents' && <DocumentsScreen
              documents={documents} aircraft={aircraft} categories={categories} pilots={pilots}
              flights={flights}
              mechanicVisits={mechanicVisits}
              onAddOrUpdate={upsert(setDocuments)} onDelete={remove(setDocuments)}
              onOpenMaintenanceTab={()=>setTab('maintenance')} />}
            {tab==='company' && <CompanyDocsScreen
              companyDocs={companyDocs} aircraft={aircraft}
              onAddOrUpdate={upsert(setCompanyDocs)} onDelete={remove(setCompanyDocs)} />}
            {tab==='stats' && <StatsScreen
              flights={flights} aircraft={aircraft} documents={documents} categories={categories} pilots={pilots}
              mechanicVisits={mechanicVisits}
              onExportJSON={exportJSON} onImportJSON={importJSON} onClearAll={clearAll}
              settings={settings} onUpdateSettings={setSettings} />}
            {tab==='settings' && <SettingsScreen
              settings={settings} onUpdateSettings={setSettings}
              onExportJSON={exportJSON} onImportJSON={importJSON} onClearAll={clearAll}
              syncStatus={syncStatus} onSyncPull={syncPull} onSyncPush={syncPush}
              onArchiveDocs={archiveAndFreeDocuments}
              onTestStorageFullPopup={triggerStorageFullPopupForTest} />}
          </main>

          {/* Tab bar bas (mobile) — scroll horizontal */}
          <nav className="sm:hidden glass safe-bottom fixed bottom-0 left-0 right-0 z-40 border-t border-[var(--border-soft)] overflow-x-auto">
            <div className="flex">
              {tabs.map(t => (
                <button key={t.id} onClick={()=>setTab(t.id)}
                  className={`tabbtn relative flex flex-col items-center py-3 px-5 min-w-[88px] flex-shrink-0 ${tab===t.id?'active':''}`}>
                  <span className={`leading-none transition-transform ${tab===t.id?'scale-110':''}`}
                        style={{ color: tab===t.id ? 'var(--accent)' : 'currentColor' }}>
                    <LucideIcon name={t.icon} size={22} />
                  </span>
                  <span className="text-[11px] mt-1.5 whitespace-nowrap font-semibold">{t.label}</span>
                  {tab===t.id && <span className="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-[3px] rounded-b bg-[var(--accent)] shadow-[0_0_8px_var(--accent-glow)]" />}
                </button>
              ))}
            </div>
          </nav>
        </div>
        </I18nContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // === Service Worker — mise à jour automatique du PWA iOS ===
    // Enregistre sw.js qui sert le HTML en network-first.
    // Quand une nouvelle version est détectée, on prévient l'utilisateur
    // via une petite bannière en bas de l'écran avec un bouton "Recharger".
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then((reg) => {
          // Détecte une mise à jour disponible (nouveau SW en attente)
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (!newSW) return;
            newSW.addEventListener('statechange', () => {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner();
              }
            });
          });
          // Force un check de mise à jour à chaque ouverture
          reg.update();
        }).catch(()=>{ /* SW indispo (Safari privé, etc.) — pas grave, l'app marche quand même */ });

        // Recharge la page quand le nouveau SW prend le contrôle
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });

      function showUpdateBanner() {
        // Évite les doublons
        if (document.getElementById('aerodeck-update-banner')) return;
        const b = document.createElement('div');
        b.id = 'aerodeck-update-banner';
        b.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);' +
          'background:linear-gradient(180deg,#0ea5e9,#0284c7);color:#fff;padding:10px 18px;' +
          'border-radius:14px;font:600 13px -apple-system,system-ui,sans-serif;' +
          'box-shadow:0 8px 24px -8px rgba(14,165,233,.6),0 0 0 1px rgba(255,255,255,.15) inset;' +
          'z-index:9999;display:flex;gap:12px;align-items:center;cursor:pointer;animation:slideUp .35s ease;';
        b.innerHTML = '<span>✨ Nouvelle version disponible</span>' +
          '<span style="background:#fff;color:#0284c7;padding:4px 10px;border-radius:8px;font-size:11px;">Recharger</span>';
        b.onclick = () => {
          // Demande au SW en attente de prendre le contrôle → déclenche le reload
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            else window.location.reload();
          });
        };
        document.body.appendChild(b);
      }
    }
  </script>
</body>
</html>

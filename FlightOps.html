                    <span className="text-[var(--text-dim)]">{label}</span>
                    <span className="font-mono tabular-nums">
                      <span className="text-[var(--text-dim)]">{typeof prev === 'number' ? (prev > 0 ? fmtDuration(prev) : '—') : prev}</span>
                      <span className="mx-1 text-[var(--text-dim)]">→</span>
                      <span className="text-[var(--accent)] font-bold">{typeof total === 'number' ? (total > 0 ? fmtDuration(total) : '—') : total}</span>
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* === MOBILE : cards verticales (1 vol = 1 card), aucun scroll horizontal === */}
          {visible.length > 0 && (
            <div className="sm:hidden space-y-2">
              {visible.map(f => {
                const ac = aircraft.find(a => a.id === f.aircraftId);
                const pic = pilots.find(p => p.id === f.pilotId);
                const sic = pilots.find(p => p.id === f.copilotId);
                const ft = f.flightTime || 0;
                const ifrTime = f.rules === 'IFR' ? ft : 0;
                const navTime = f.isNavigation ? ft : 0;
                const duoTime = isDuoFlight(f) ? ft : 0;
                const totalTO = ((f.takeoffsPic||0)+(f.takeoffsSic||0)) || (f.takeoffs||0);
                const totalLDG = ((f.landingsPic||0)+(f.landingsSic||0)) || (f.landings||0);
                return (
                  <div key={f.id} className="card p-3 cursor-pointer"
                       onClick={()=>{ setEditing(f); setShowForm(true); }}>
                    <div className="flex items-start justify-between gap-2">
                      <div className="min-w-0 flex-1">
                        <div className="text-xs text-[var(--text-dim)] font-mono">{fmtDate(f.date)}</div>
                        <div className="font-semibold tracking-wide font-mono">{f.from}→{f.to}</div>
                        <div className="text-xs text-[var(--text-dim)] truncate">
                          <span className="font-mono">{ac?.registration||'?'}</span> · {ac?.type||'—'} · {aircraftClass(ac)}
                        </div>
                      </div>
                      <div className="text-right flex-shrink-0">
                        <div className="text-[10px] uppercase text-[var(--text-dim)] font-semibold">FT</div>
                        <div className="font-mono tabular-nums text-base text-[var(--accent)]">{fmtDuration(f.flightTime)}</div>
                      </div>
                    </div>
                    <div className="text-xs mt-1 space-y-0.5">
                      {pic && <div><span className="text-[var(--accent)] font-semibold">PIC :</span> {pilotDisplayName(pic)}</div>}
                      {sic && <div><span className="text-[var(--accent)] font-semibold">SIC :</span> {pilotDisplayName(sic)}</div>}
                    </div>
                    <div className="flex flex-wrap gap-1 mt-2 text-[10px]">
                      {ifrTime > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="radio" size={11} strokeWidth={2.5} />IFR {fmtDuration(ifrTime)}</span>}
                      {navTime > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="compass" size={11} strokeWidth={2.5} />Nav {fmtDuration(navTime)}</span>}
                      {duoTime > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="users" size={11} strokeWidth={2.5} />Duo {fmtDuration(duoTime)}</span>}
                      {(f.nightTime||0) > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="moon" size={11} strokeWidth={2.5} />{fmtDuration(f.nightTime)}</span>}
                      {(totalTO + totalLDG) > 0 && <span className="badge inline-flex items-center gap-1"><LucideIcon name="planeLanding" size={11} strokeWidth={2.5} />{totalTO}/{totalLDG}</span>}
                      <span className="badge">{flightTypeLabel(f.flightType, lang)}</span>
                    </div>
                    {/* Bouton corbeille — même style que la colonne supprimer du tableau Staff desktop. */}
                    <div className="flex justify-end mt-2">
                      <button type="button"
                        className="text-[var(--err)] hover:opacity-80 p-1"
                        title={tx('Supprimer ce vol','Delete this flight')}
                        onClick={(e)=>{
                          e.stopPropagation();
                          if (confirmDelete(tx(`Supprimer définitivement le vol du ${f.date} (${f.from}→${f.to}) ? Pense à exporter en JSON avant.`,`Permanently delete the flight on ${f.date} (${f.from}→${f.to})? Export JSON first as backup.`))) {
                            onDeleteFlight && onDeleteFlight(f.id);
                          }
                        }}>
                        <LucideIcon name="trash2" size={18} strokeWidth={2.25} />
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {sorted.length > limit && (
            <div className="text-center">
              <button className="btn btn-secondary" onClick={()=>setShowAll(true)}>
                {tx(`Afficher les ${sorted.length - limit} vols suivants`,`Show next ${sorted.length - limit} flights`)}
              </button>
            </div>
          )}

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing ? `${tx('Vol','Flight')} ${editing.date} ${editing.from}→${editing.to}` : tx('Vol','Flight')}
            footer={editing && (
              <button onClick={()=>{
                if (confirmDelete(tx('Supprimer définitivement ce vol ? (Préfère un export JSON avant.)','Permanently delete this flight? (Export JSON first as backup.)'))) {
                  onDeleteFlight && onDeleteFlight(editing.id);
                  setShowForm(false);
                }
              }}
                className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
                {tx('Supprimer','Delete')}
              </button>
            )}
          >
            <FlightForm
              initial={editing}
              aircraft={aircraft}
              pilots={pilots}
              addExpense={addExpense}
              flights={flights}
              onCancel={()=>setShowForm(false)}
              onSave={(f)=>{ onUpsertFlight && onUpsertFlight(f); setShowForm(false); }}
              onAutoSave={(f)=>{ onUpsertFlight && onUpsertFlight(f); /* persiste sans fermer */ }}
            />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12j) ÉCRAN — DUTY (CARs 702 Canada)
    // ------------------------------------------------------------------
    function DutyForm({ initial, pilots, onSave, onCancel }) {
      const tx = useTx();
      const blank = {
        id: null,
        pilotId: pilots[0]?.id || '',
        date: todayZuluDate(),
        startTime: '',
        endTime: '',
        timezone: 'local',
        notes: '',
      };
      const [d, setD] = useState({ ...blank, ...(initial || {}) });
      function set(k, v) { setD(p => ({...p, [k]: v})); }
      const duration = dutyMinutes(d);
      const overLimit = duration > CARS_702_LIMITS.dailyDuty;

      return (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">{tx('Pilote','Pilot')}</div>
              <select className="select" value={d.pilotId} onChange={e=>set('pilotId', e.target.value)}>
                {pilots.length === 0 && <option value="">{tx('— roster vide —','— empty roster —')}</option>}
                {pilots.map(p => <option key={p.id} value={p.id}>{pilotDisplayName(p)}</option>)}
              </select>
            </div>
            <div>
              <div className="label">{tx('Date','Date')}</div>
              <input type="date" className="input" value={d.date} onChange={e=>{ if (e.target.value) set('date', e.target.value); }} />
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="label">{tx('Début duty (HHMM)','Duty start (HHMM)')}</div>
              <input className="input font-mono" inputMode="numeric" maxLength={5}
                placeholder="0600"
                value={d.startTime} onChange={e=>set('startTime', e.target.value.replace(/[^0-9:]/g,''))} />
            </div>
            <div>
              <div className="label">{tx('Fin duty (HHMM)','Duty end (HHMM)')}</div>
              <input className="input font-mono" inputMode="numeric" maxLength={5}
                placeholder="2000"
                value={d.endTime} onChange={e=>set('endTime', e.target.value.replace(/[^0-9:]/g,''))} />
            </div>
          </div>

          <div>
            <div className="label">{tx('Fuseau horaire','Timezone')}</div>
            <div className="flex gap-2">
              {[['local',tx('Heure locale','Local time')], ['zulu','Zulu (UTC)']].map(([id, label]) => (
                <button key={id} type="button"
                  onClick={()=>set('timezone', id)}
                  className={`btn ${d.timezone===id?'btn-primary':'btn-secondary'}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div className={`card p-3 text-center ${overLimit ? 'border-[var(--err)]' : ''}`}>
            <div className="label">{tx('Durée duty calculée','Calculated duty duration')}</div>
            <div className={`text-3xl font-mono tabular-nums ${overLimit ? 'text-[var(--err)]' : 'text-[var(--accent)]'}`}>
              {fmtDuration(duration)}
            </div>
            {overLimit && (
              <div className="text-xs text-[var(--err)] mt-1">
                ⚠ {tx('Dépasse la limite CARs 702 de 14h','Exceeds CARs 702 14h limit')} ({fmtDuration(CARS_702_LIMITS.dailyDuty)})
              </div>
            )}
          </div>

          <div>
            <div className="label">{tx('Notes','Notes')}</div>
            <textarea className="textarea" rows={2} value={d.notes} onChange={e=>set('notes', e.target.value)} placeholder={tx('Ex : déplacement avant vol, briefing client, attente passager…','E.g. pre-flight transit, customer briefing, passenger wait…')} />
          </div>

          <div className="flex justify-end gap-2 pt-2">
            <button className="btn btn-secondary" onClick={onCancel}>{tx('Annuler','Cancel')}</button>
            <button className="btn btn-primary" onClick={()=>{
              if (!d.pilotId) return alert(tx('Sélectionne un pilote.','Select a pilot.'));
              if (!d.startTime || !d.endTime) return alert(tx('Heures de début et fin requises.','Start and end times required.'));
              onSave({ ...d, id: d.id || 'dp_'+Date.now() });
            }}>{tx('Enregistrer','Save')}</button>
          </div>
        </div>
      );
    }

    function DutyScreen({ flights, pilots = [], dutyPeriods = [], onAddOrUpdate, onDelete }) {
      const tx = useTx();
      const [pilotFilter, setPilotFilter] = useState(pilots[0]?.id || 'all');
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const today = todayZuluDate();

      // Cumuls flight time fenêtres glissantes pour le pilote sélectionné
      const cumuls = useMemo(() => ({
        d1:   flightTimeWindow(flights, pilotFilter, today, 1),
        d7:   flightTimeWindow(flights, pilotFilter, today, 7),
        d30:  flightTimeWindow(flights, pilotFilter, today, 30),
        d90:  flightTimeWindow(flights, pilotFilter, today, 90),
        d365: flightTimeWindow(flights, pilotFilter, today, 365),
      }), [flights, pilotFilter, today]);

      // Liste consolidée des duty effectives (auto depuis vols + override manuels)
      const effectiveDuties = useMemo(
        () => getEffectiveDuties(flights, dutyPeriods, pilotFilter),
        [flights, dutyPeriods, pilotFilter]
      );

      // Duty time aujourd'hui pour le pilote (somme des effectives sur today)
      const todayDutyMin = useMemo(() => {
        return effectiveDuties
          .filter(p => p.date === today)
          .reduce((sum, p) => sum + dutyMinutes(p), 0);
      }, [effectiveDuties, today]);

      // Cumuls duty time fenêtres glissantes (pour CAR 700.16 charge globale)
      const dutyCumuls = useMemo(() => ({
        d7:  dutyTimeWindow(effectiveDuties, today, 7),
        d30: dutyTimeWindow(effectiveDuties, today, 30),
      }), [effectiveDuties, today]);

      // Repos minimum depuis dernière duty (CAR 700.15) — inclut détection hors base
      const lastRest = useMemo(() => {
        const pilot = pilotFilter !== 'all' ? pilots.find(p => p.id === pilotFilter) : null;
        return minRestSinceLastDuty(effectiveDuties, today, flights, pilot);
      }, [effectiveDuties, today, flights, pilots, pilotFilter]);

      // Prochaine prise de service possible (date + heure UTC)
      // = fin de la dernière duty + 8h (base) ou 10h (hors base)
      const nextDuty = useMemo(() => {
        const pilot = pilotFilter !== 'all' ? pilots.find(p => p.id === pilotFilter) : null;
        return nextDutyStartAt(effectiveDuties, today, flights, pilot);
      }, [effectiveDuties, today, flights, pilots, pilotFilter]);

      // ===== CAR 702.91-702.98 : Time-free from duty =====
      // Plus longue plage libre dans les 7 derniers jours (mode on-call)
      const longestFree7 = useMemo(
        () => longestFreeStretch(effectiveDuties, today, 7),
        [effectiveDuties, today]
      );
      // Nombre de "24h consécutives off" dans les 90 derniers jours (≥ 13)
      const off24hIn90 = useMemo(
        () => count24hOffInWindow(effectiveDuties, today, 90),
        [effectiveDuties, today]
      );
      // Nombre de "24h consécutives off" dans les 30 derniers jours (≥ 3)
      const off24hIn30 = useMemo(
        () => count24hOffInWindow(effectiveDuties, today, 30),
        [effectiveDuties, today]
      );
      // Plus longue série de jours calendaires consécutifs off dans les 17 jours (mode on-call ≥ 3)
      const longestOffStreak17 = useMemo(
        () => longestConsecutiveOffDays(effectiveDuties, today, 17),
        [effectiveDuties, today]
      );

      const sortedPeriods = effectiveDuties; // déjà triées par getEffectiveDuties

      // Quand on save : si l'entry était une auto (id commence par "auto_"), on génère
      // un nouvel id manuel et on l'ajoute aux dutyPeriods. Sinon update direct.
      function handleSave(p) {
        const isAuto = (editing?.source === 'auto') || /^auto_/.test(p.id || '');
        const final = isAuto
          ? { ...p, id: 'dp_' + Date.now() }   // nouvelle entrée manuelle
          : p;
        // On n'envoie pas le champ 'source' dans dutyPeriods (recalculé à l'affichage)
        const { source, ...clean } = final;
        onAddOrUpdate(clean);
      }
      function handleDelete(id) {
        if (/^auto_/.test(id)) {
          alert(tx("Cette duty est calculée automatiquement depuis les vols — on ne peut pas la supprimer (elle disparaîtra automatiquement si tu retires les vols correspondants).",'This duty is auto-calculated from flights — it cannot be deleted (it will disappear automatically if you remove the matching flights).'));
          return;
        }
        onDelete(id);
      }

      // Render barre de progression colorée vs limite
      function LimitBar({ label, value, limit }) {
        const pct = Math.min(100, (value / limit) * 100);
        const color = pct >= 90 ? 'var(--err)' : pct >= 70 ? 'var(--warn)' : 'var(--ok)';
        return (
          <div>
            <div className="flex justify-between text-sm mb-1">
              <span>{label}</span>
              <span className="font-mono tabular-nums">
                <span style={{ color }}>{fmtDuration(value)}</span>
                <span className="text-[var(--text-dim)]"> / {fmtDuration(limit)}</span>
              </span>
            </div>
            <div className="h-2 bg-[var(--bg-elev)] rounded">
              <div className="h-2 rounded" style={{ width: `${pct}%`, background: color, transition: 'width .3s ease' }} />
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div>
              <h2 className="text-xl font-semibold">⏱️ Duty — CARs 702</h2>
              <div className="text-xs text-[var(--text-dim)]">{tx('Travail aérien Canada — limites de service et de vol','Canada aerial work — duty and flight time limits')}</div>
            </div>
            <button className="btn btn-primary" onClick={()=>{ setEditing(null); setShowForm(true); }} disabled={pilots.length===0}>
              {tx('+ Nouvelle duty','+ New duty')}
            </button>
          </div>

          <div className="card p-3">
            <div className="label">{tx('Pilote suivi','Tracked pilot')}</div>
            <FancySelect
              value={pilotFilter}
              onChange={setPilotFilter}
              options={[
                { value: 'all', label: tx('Tous (cumulé)','All (cumulative)'), icon: 'users', color: 'var(--accent)' },
                ...pilots.map(p => ({ value: p.id, label: pilotDisplayName(p), icon: 'user' })),
              ]}
            />
          </div>

          {/* Cumuls flight time vs limites CARs 702 */}
          <div className="card p-3 space-y-3">
            <div className="label">{tx('Cumuls flight time vs limites CARs 702 — CAR 700.21','Flight time cumulative vs CARs 702 limits — CAR 700.21')}</div>
            <LimitBar label={tx("Aujourd'hui (vol)",'Today (flight)')} value={cumuls.d1}   limit={CARS_702_LIMITS.dailyFlight} />
            <LimitBar label={tx('7 jours glissants','Rolling 7 days')}  value={cumuls.d7}   limit={CARS_702_LIMITS.window7Flight} />
            <LimitBar label={tx('30 jours glissants','Rolling 30 days')} value={cumuls.d30}  limit={CARS_702_LIMITS.window30Flight} />
            <LimitBar label={tx('90 jours glissants','Rolling 90 days')} value={cumuls.d90}  limit={CARS_702_LIMITS.window90Flight} />
            <LimitBar label={tx('365 jours glissants','Rolling 365 days')} value={cumuls.d365} limit={CARS_702_LIMITS.window365Flight} />
            <div className="mt-2">
              <Hint title={tx('Légende des couleurs','Color legend')}>
                {tx('Vert = <70%, Jaune = 70-90%, Rouge = ≥90%. Calcul basé sur le Flight Time des vols où ce pilote est PIC ou SIC.','Green = <70%, Yellow = 70-90%, Red = ≥90%. Based on Flight Time of flights where this pilot is PIC or SIC.')}
              </Hint>
            </div>
          </div>

          {/* Duty time : aujourd'hui + cumuls 7/30 jours */}
          <div className="card p-3 space-y-3">
            <div className="label">{tx('Duty time — CAR 700.16','Duty time — CAR 700.16')}</div>
            <LimitBar label={`${tx("Aujourd'hui",'Today')} (${today})`} value={todayDutyMin} limit={CARS_702_LIMITS.dailyDuty} />
            <LimitBar label={tx('Duty cumulé 7 jours','Cumulative duty 7 days')}  value={dutyCumuls.d7}  limit={7  * CARS_702_LIMITS.dailyDuty} />
            <LimitBar label={tx('Duty cumulé 30 jours','Cumulative duty 30 days')} value={dutyCumuls.d30} limit={30 * CARS_702_LIMITS.dailyDuty} />
            <div className="mt-2">
              <Hint title={tx('Limite quotidienne CARs 702','CARs 702 daily limit')}>
                {tx('Limite quotidienne : 14h de duty consécutive. Le cumul 7/30 jours sert à visualiser la charge globale ; les seuils affichés sont les maxima théoriques (14h × n jours).','Daily limit: 14h of consecutive duty. The 7/30-day cumulative is to visualize overall load; the shown thresholds are theoretical maxima (14h × n days).')}
              </Hint>
            </div>
          </div>

          {/* Repos & jours OFF — CAR 700.15 et 700.19 */}
          <div className="card p-3 space-y-3">
            <div className="label">{tx('Repos & jours OFF — CAR 700.15 / 700.19','Rest & OFF days — CAR 700.15 / 700.19')}</div>
            {/* Repos depuis la fin de la dernière duty — règle ajustée si hors base */}
            {lastRest ? (() => {
              const requiredRest = lastRest.awayFromBase
                ? CARS_702_LIMITS.minRestAfterDutyAwayFromBase
                : CARS_702_LIMITS.minRestAfterDuty;
              const ok = lastRest.restMin >= requiredRest;
              return (
                <div>
                  <div className="flex justify-between text-sm mb-1">
                    <span>
                      {tx('Repos depuis la dernière duty','Rest since last duty')}
                      {lastRest.awayFromBase
                        ? <span className="ml-1 text-[var(--warn)] text-xs">{tx('(hors base)','(away from base)')}</span>
                        : <span className="ml-1 text-[var(--text-dim)] text-xs">{tx('(à la base)','(at base)')}</span>}
                    </span>
                    <span className="font-mono tabular-nums">
                      <span style={{ color: ok ? 'var(--ok)' : 'var(--err)' }}>{fmtDuration(lastRest.restMin)}</span>
                      <span className="text-[var(--text-dim)]"> / {tx('min','min')} {fmtDuration(requiredRest)}</span>
                    </span>
                  </div>
                  {!ok && (
                    <div className="text-xs text-[var(--err)]">
                      ⚠ {lastRest.awayFromBase
                        ? tx('Repos minimum 10h hors base (8h sommeil + transport/repas/hygiène) non respecté.','Minimum rest 10h away from base (8h sleep + transport/meals/hygiene) not met.')
                        : tx('Repos minimum 8h après duty non respecté.','Minimum 8h rest after duty not met.')}
                    </div>
                  )}
                  {pilotFilter === 'all' && (
                    <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                      {tx('Sélectionne un pilote pour la détection hors base (basée sur baseAirport du pilote).','Select a pilot for away-from-base detection (based on pilot baseAirport).')}
                    </div>
                  )}
                </div>
              );
            })() : (
              <div className="text-xs text-[var(--text-dim)] italic">{tx('Pas encore de duty terminée — repos non calculable.','No completed duty yet — rest not computable.')}</div>
            )}
            {/* Prochaine prise de service possible (= fin dernière duty + repos minimum) */}
            {nextDuty && nextDuty.date && (() => {
              const d = nextDuty.date;
              const pad = n => String(n).padStart(2,'0');
              const iso = `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
              const time = `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}Z`;
              const nowMs = Date.now();
              const isPast = d.getTime() <= nowMs;
              const restRequired = nextDuty.awayFromBase ? '10h' : '8h';
              return (
                <div className="card p-2.5 bg-[var(--bg-elev)]/40 border border-[var(--accent)]/30 flex items-start gap-2.5">
                  <span style={{ color: 'var(--accent)' }} className="flex-shrink-0 mt-0.5">
                    <LucideIcon name="clock" size={18} strokeWidth={2.5} />
                  </span>
                  <div className="flex-1 min-w-0">
                    <div className="text-[10px] uppercase tracking-wider font-bold text-[var(--text-dim)]">
                      {tx('Prochaine prise de service possible','Next possible duty start')}
                    </div>
                    <div className="font-mono tabular-nums text-base font-bold mt-0.5" style={{ color: isPast ? 'var(--ok)' : 'var(--accent)' }}>
                      {iso} · {time}
                    </div>
                    <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                      {tx('Fin dernière duty','Last duty end')} + {restRequired} ({nextDuty.awayFromBase ? tx('hors base','away from base') : tx('base','base')}).
                      {isPast ? ` ✓ ${tx('Pilote disponible.','Pilot available.')}` : ''}
                    </div>
                  </div>
                </div>
              );
            })()}
            {/* CAR 702.91-702.98 : 24h consécutives off — 13 fois sur 90 jours */}
            <div>
              <div className="flex justify-between text-sm mb-1">
                <span>{tx('Périodes 24h off — 90 derniers jours','24h-off periods — last 90 days')}</span>
                <span className="font-mono tabular-nums">
                  <span style={{ color: off24hIn90 >= CARS_702_LIMITS.timeFree24hIn90Days ? 'var(--ok)' : 'var(--err)' }}>
                    {off24hIn90} ×
                  </span>
                  <span className="text-[var(--text-dim)]"> / {tx('min','min')} {CARS_702_LIMITS.timeFree24hIn90Days} ×</span>
                </span>
              </div>
              {off24hIn90 < CARS_702_LIMITS.timeFree24hIn90Days && (
                <div className="text-xs text-[var(--err)]">⚠ {tx('Au moins 13 périodes de 24h consécutives off requises sur toute fenêtre 90 jours.','At least 13 consecutive 24h-off periods required in any 90-day window.')}</div>
              )}
            </div>
            {/* CAR 702.91-702.98 : 24h consécutives off — 3 fois sur 30 jours */}
            <div>
              <div className="flex justify-between text-sm mb-1">
                <span>{tx('Périodes 24h off — 30 derniers jours','24h-off periods — last 30 days')}</span>
                <span className="font-mono tabular-nums">
                  <span style={{ color: off24hIn30 >= CARS_702_LIMITS.timeFree24hIn30Days ? 'var(--ok)' : 'var(--err)' }}>
                    {off24hIn30} ×
                  </span>
                  <span className="text-[var(--text-dim)]"> / {tx('min','min')} {CARS_702_LIMITS.timeFree24hIn30Days} ×</span>
                </span>
              </div>
              {off24hIn30 < CARS_702_LIMITS.timeFree24hIn30Days && (
                <div className="text-xs text-[var(--err)]">⚠ {tx('Au moins 3 périodes de 24h consécutives off requises sur toute fenêtre 30 jours.','At least 3 consecutive 24h-off periods required in any 30-day window.')}</div>
              )}
            </div>
            {/* CAR 702 on-call : 36h libres dans 7j (existant) + 3 jours consécutifs off dans 17j (nouveau) */}
            <div className="card p-2.5 bg-[var(--bg-elev)]/40 mt-1">
              <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-bold mb-1.5">
                {tx('Mode on-call (un des deux suffit)','On-call mode (either one works)')}
              </div>
              <div className="space-y-1.5">
                <div>
                  <div className="flex justify-between text-sm">
                    <span>{tx('36h consécutives off — 7 derniers jours','36h consecutive off — last 7 days')}</span>
                    <span className="font-mono tabular-nums">
                      <span style={{ color: longestFree7 >= CARS_702_LIMITS.onCall36hIn7Days ? 'var(--ok)' : 'var(--text-dim)' }}>
                        {fmtDuration(longestFree7)}
                      </span>
                      <span className="text-[var(--text-dim)]"> / {tx('min','min')} {fmtDuration(CARS_702_LIMITS.onCall36hIn7Days)}</span>
                    </span>
                  </div>
                </div>
                <div>
                  <div className="flex justify-between text-sm">
                    <span>{tx('3 jours consécutifs off — 17 derniers jours','3 consecutive off days — last 17 days')}</span>
                    <span className="font-mono tabular-nums">
                      <span style={{ color: longestOffStreak17 >= CARS_702_LIMITS.onCall3DaysIn17Days ? 'var(--ok)' : 'var(--text-dim)' }}>
                        {longestOffStreak17} {tx('j','d')}
                      </span>
                      <span className="text-[var(--text-dim)]"> / {tx('min','min')} {CARS_702_LIMITS.onCall3DaysIn17Days} {tx('j','d')}</span>
                    </span>
                  </div>
                </div>
                {longestFree7 < CARS_702_LIMITS.onCall36hIn7Days && longestOffStreak17 < CARS_702_LIMITS.onCall3DaysIn17Days && (
                  <div className="text-xs text-[var(--err)]">⚠ {tx('Si pilote on-call : 36h consécutives off dans 7j OU 3 jours consécutifs off dans 17j requis.','If on-call pilot: 36h consecutive off in 7 days OR 3 consecutive off days in 17 days required.')}</div>
                )}
              </div>
            </div>
            <div className="mt-1">
              <Hint title={tx('Règles CAR 702.91-702.98 (Flight & Duty Time Limitations)','CAR 702.91-702.98 rules (Flight & Duty Time Limitations)')}>
                {tx(
                  'Max Duty : 14h consécutives max sur 24h (déjà couvert ci-dessus). Repos : au moins 24h consécutives off, 13 fois sur 90 jours et 3 fois sur 30 jours. On-call : 36h consécutives off dans 7 jours, OU 3 jours consécutifs off dans 17 jours. Note 700.15 : hors base, le repos minimum est 10h (sommeil 8h + hébergement/transport/repas) — détecté quand l\'arrivée ≠ baseAirport du pilote.',
                  'Max Duty: 14h consecutive max in 24h (covered above). Rest: at least 24h consecutive off, 13 times in 90 days and 3 times in 30 days. On-call: 36h consecutive off in 7 days, OR 3 consecutive off days in 17 days. Note 700.15: away from base, minimum rest is 10h (8h sleep + lodging/transport/meals) — detected when arrival ≠ pilot baseAirport.'
                )}
              </Hint>
            </div>
          </div>

          {/* Historique des périodes duty (auto + manuelles consolidées) */}
          <div className="card p-3">
            <div className="flex items-center justify-between gap-2 flex-wrap">
              <div className="label !mb-0">{tx('Périodes duty (auto depuis vols + overrides manuels)','Duty periods (auto from flights + manual overrides)')}</div>
              <div className="text-xs text-[var(--text-dim)]">
                {sortedPeriods.filter(p=>p.source==='auto').length} {tx('auto','auto')} · {sortedPeriods.filter(p=>p.source==='manual').length} {tx('manuelles','manual')}
              </div>
            </div>
            {sortedPeriods.length === 0 && (
              <div className="text-sm text-[var(--text-dim)] italic mt-2">
                {tx(
                  "Aucune duty. Les duty se calculent automatiquement dès qu'un vol est saisi (Block Out − 1h → Block In + 1h). Bouton « + Nouvelle duty » pour ajouter une duty manuelle (jour sans vol, briefing, déplacement, etc.).",
                  'No duty. Duties are calculated automatically as soon as a flight is logged (Block Out − 1h → Block In + 1h). Use "+ New duty" to add a manual duty (no-flight day, briefing, transit, etc.).'
                )}
              </div>
            )}
            <div className="space-y-1 mt-2">
              {sortedPeriods.slice(0, 100).map(p => {
                const pi = pilots.find(x => x.id === p.pilotId);
                const dur = dutyMinutes(p);
                const over = dur > CARS_702_LIMITS.dailyDuty;
                const isAuto = p.source === 'auto';
                return (
                  <button key={p.id} type="button"
                    className="w-full text-left p-2 rounded hover:bg-[var(--bg-elev)] flex items-center justify-between gap-2"
                    onClick={()=>{ setEditing(p); setShowForm(true); }}>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm flex items-center gap-2 flex-wrap">
                        <span className="font-mono">{p.date}</span>
                        <span className="text-[var(--text-dim)]">·</span>
                        <span className="font-mono">{p.startTime} → {p.endTime}</span>
                        <span className="text-[var(--text-dim)]">·</span>
                        <span className="text-[var(--text-dim)]">{p.timezone === 'zulu' ? 'Z' : tx('local','local')}</span>
                        <span className="badge"
                          style={{
                            background: isAuto ? 'rgba(56,189,248,.15)' : 'rgba(251,191,36,.15)',
                            color: isAuto ? 'var(--accent)' : 'var(--warn)',
                            borderColor: isAuto ? 'var(--accent)' : 'var(--warn)',
                          }}>
                          {isAuto ? `⚙ ${tx('Auto','Auto')}` : `✎ ${tx('Manuel','Manual')}`}
                        </span>
                      </div>
                      <div className="text-xs text-[var(--text-dim)] truncate">
                        {pi ? pilotDisplayName(pi) : tx('— pilote —','— pilot —')}{p.notes && ` · ${p.notes}`}
                      </div>
                    </div>
                    <span className={`badge font-mono ${over ? '!text-[var(--err)] !border-[var(--err)]' : ''}`}>
                      {fmtDuration(dur)}{over && ' ⚠'}
                    </span>
                  </button>
                );
              })}
              {sortedPeriods.length > 100 && (
                <div className="text-xs text-[var(--text-dim)] text-center pt-2">
                  +{sortedPeriods.length - 100} {tx('entrées plus anciennes.','older entries.')}
                </div>
              )}
            </div>
            <div className="mt-3 border-t border-[var(--border-soft)] pt-2">
              <Hint title={tx('Règle de calcul auto','Auto-calculation rule')}>
                {tx(
                  "Chaque jour avec un ou plusieurs vols génère une duty = (1er Block Out − 1h) → (dernier Block In + 1h). Cliquer sur une duty auto permet de la modifier manuellement — elle devient alors une duty manuelle qui prend le pas sur l'auto.",
                  'Each day with one or more flights generates a duty = (1st Block Out − 1h) → (last Block In + 1h). Clicking an auto duty lets you edit it manually — it then becomes a manual duty that overrides the auto.'
                )}
              </Hint>
            </div>
          </div>

          <Modal
            open={showForm}
            onClose={()=>setShowForm(false)}
            title={editing
              ? (editing.source === 'auto' ? tx('Modifier la duty (depuis auto)','Edit duty (from auto)') : tx('Modifier la duty manuelle','Edit manual duty'))
              : tx('Nouvelle duty manuelle','New manual duty')}
            footer={editing && (
              <button onClick={()=>{
                if (editing.source === 'auto') {
                  alert(tx("Cette duty est calculée automatiquement depuis les vols. Pour la retirer, supprime les vols correspondants dans le carnet.",'This duty is auto-calculated from flights. To remove it, delete the matching flights in the logbook.'));
                  return;
                }
                if (confirmDelete(tx("Supprimer cette période duty manuelle ? La duty auto reprendra si des vols existent ce jour-là.",'Delete this manual duty period? Auto duty will resume if flights exist that day.'))) {
                  handleDelete(editing.id); setShowForm(false);
                }
              }}
                className="inline-flex items-center gap-2 px-4 py-2 rounded-lg border border-[var(--err)] text-[var(--err)] font-semibold hover:bg-[var(--err)]/10 transition-colors"
                style={{ background: 'transparent' }}>
                <LucideIcon name="trash2" size={16} strokeWidth={2.25} />
                {tx('Supprimer','Delete')}
              </button>
            )}
          >
            <DutyForm
              initial={editing}
              pilots={pilots}
              onCancel={()=>setShowForm(false)}
              onSave={(p)=>{ handleSave(p); setShowForm(false); }}
            />
          </Modal>
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12h) ÉCRAN — EN VOL (tracking visuel temps réel des avions en l'air)
    // ------------------------------------------------------------------
    // Affiche une ligne par vol "en cours" : OACI départ ←—✈—→ OACI arrivée.
    // Position de l'avion = % de progression basé sur :
    //   t_écoulé = now - takeOffTime (Zulu, du jour)
    //   t_total  = distance_NM / cruiseSpeed_kt (en heures, ×60 pour minutes)
    //   pct      = clamp(t_écoulé / t_total, 0, 1)
    // Vol "en cours" = takeOff renseigné + landing vide + date == aujourd'hui.
    // Couleur : vert si verificationStatus === 'complete', orange sinon
    // (= "expected not verified" : les heures sont supposées correctes mais
    // pas encore validées par le pilote).
    // Onglet desktop only — la barre tab mobile n'inclut pas cet onglet.
    function InFlightScreen({ flights, aircraft, pilots }) {
      const tx = useTx();
      // Re-render toutes les 30s pour faire avancer l'icône avion sans intervention
      const [, tick] = useState(0);
      useEffect(() => {
        const id = setInterval(() => tick(t => t + 1), 10 * 1000);
        return () => clearInterval(id);
      }, []);

      const todayISO = todayZuluDate();
      const nowMin = nowZulu().slice(0, 5); // "HH:MM"
      const nowAbsMin = parseHHMM(nowMin) || 0;

      // Vols visibles dans OPS :
      //   1) en cours = takeOff saisi + landing/blockIn vides
      //   2) tout juste atterris = landing OU blockIn saisi dans les 60 dernières min
      // Au-delà de 60 min après l'atterrissage, le vol s'efface automatiquement de OPS
      // (le vol lui-même reste intact dans l'onglet Vol).
      const inFlight = useMemo(() => {
        return flights.filter(f => {
          if (f.date !== todayISO) return false;
          const hasTO = f.takeOff && parseHHMM(f.takeOff) != null;
          if (!hasTO) return false;
          // "Posé" = landing OU blockIn rempli (le premier qui arrive)
          const ldgMin = (f.landing && parseHHMM(f.landing) != null) ? parseHHMM(f.landing) : null;
          const biMin  = (f.blockIn && parseHHMM(f.blockIn) != null) ? parseHHMM(f.blockIn) : null;
          const arrMin = ldgMin != null ? ldgMin : biMin;
          if (arrMin == null) return true; // toujours en l'air
          // Vient d'atterrir : on garde affiché 60 min
          let sinceMin = nowAbsMin - arrMin;
          if (sinceMin < 0) sinceMin += 24 * 60; // passage minuit
          return sinceMin <= 60;
        });
      }, [flights, todayISO, nowAbsMin]);

      // Pour chaque vol, calcule progression et données affichées
      const rows = useMemo(() => {
        return inFlight.map(f => {
          const ac = aircraft.find(a => a.id === f.aircraftId);
          const pic = pilots.find(p => p.id === f.pilotId);
          // Distance : priorité au champ manuel, sinon calcul OACI auto
          let distNM = parseFloat(f.distanceNM) || 0;
          if (!distNM) {
            const auto = distanceBetweenICAO(f.from, f.to);
            if (auto) distNM = auto;
          }
          // === Vitesse : priorité 1 = vitesse FPL calculée si ETD + ETA + distance,
          //              priorité 2 = cruiseSpeed avion, priorité 3 = 150 kt défaut. ===
          const etdMin = parseHHMM(f.etd);
          const etaMin = parseHHMM(f.eta);
          let speedKt = 0;
          let speedSource = 'default';
          if (etdMin != null && etaMin != null && distNM > 0) {
            let plannedDurMin = etaMin - etdMin;
            if (plannedDurMin < 0) plannedDurMin += 24 * 60;
            if (plannedDurMin > 0) {
              speedKt = distNM / (plannedDurMin / 60);
              speedSource = 'fpl';
            }
          }
          if (!speedKt && parseFloat(ac?.cruiseSpeed) > 0) {
            speedKt = parseFloat(ac.cruiseSpeed);
            speedSource = 'aircraft';
          }
          if (!speedKt) {
            speedKt = 150;
            speedSource = 'default';
          }
          // Durée prévue en minutes
          const totalMin = (distNM > 0 && speedKt > 0) ? (distNM / speedKt) * 60 : 0;
          // Temps écoulé depuis Take Off (en minutes, sans gérer minuit pour l'instant)
          const toAbsMin = parseHHMM(f.takeOff) || 0;
          let elapsedMin = nowAbsMin - toAbsMin;
          if (elapsedMin < 0) elapsedMin += 24 * 60; // passage minuit basique
          const pct = totalMin > 0 ? Math.min(100, Math.max(0, (elapsedMin / totalMin) * 100)) : 0;
          const remainingMin = Math.max(0, totalMin - elapsedMin);
          // === Statut tracking : VERT si toutes les données sont là ===
          // Conditions : ETD + ETA + distance connue + Take Off rempli + Landing vide.
          // Sinon ORANGE (données partielles, suivi approximatif).
          const hasETD  = !!f.etd && parseHHMM(f.etd) != null;
          const hasETA  = !!f.eta && parseHHMM(f.eta) != null;
          const hasTO   = !!f.takeOff && parseHHMM(f.takeOff) != null;
          const hasDist = distNM > 0;
          const isTracked = hasETD && hasETA && hasTO && hasDist;
          // === Statut "vient d'atterrir" : Landing OU Block In rempli, dans les 60 dernières min ===
          const ldMin = (f.landing && parseHHMM(f.landing) != null) ? parseHHMM(f.landing) : null;
          const biMin = (f.blockIn && parseHHMM(f.blockIn) != null) ? parseHHMM(f.blockIn) : null;
          const arrMin = ldMin != null ? ldMin : biMin; // landing prioritaire, sinon blockIn
          const hasLD = arrMin != null;
          let justLanded = false;
          let minSinceLanding = 0;
          if (hasLD) {
            minSinceLanding = nowAbsMin - arrMin;
            if (minSinceLanding < 0) minSinceLanding += 24 * 60;
            justLanded = minSinceLanding <= 60;
          }
          // === Statut "Missing Input" : pas de Landing, on est >20 min après l'ETA ===
          // ETA cible = ETA manuelle si saisie, sinon ETA estimée = TakeOff + (distance/speed).
          // Date+heure combinées en timestamp UTC pour gérer correctement le passage de minuit.
          let minPastEta = null;
          if (!hasLD && f.date) {
            const [yy, mm, dd] = f.date.split('-').map(Number);
            let etaTs = null;
            if (etaMin != null) {
              etaTs = Date.UTC(yy, mm - 1, dd, Math.floor(etaMin/60), etaMin % 60);
            } else if (totalMin > 0 && parseHHMM(f.takeOff) != null) {
              // ETA estimée = Take Off + durée prévue
              const toMin2 = parseHHMM(f.takeOff);
              let etaCalcMin = toMin2 + totalMin;
              let etaDayOffset = 0;
              while (etaCalcMin >= 24 * 60) { etaCalcMin -= 24 * 60; etaDayOffset++; }
              etaTs = Date.UTC(yy, mm - 1, dd + etaDayOffset, Math.floor(etaCalcMin/60), etaCalcMin % 60);
            }
            if (etaTs != null) {
              minPastEta = (Date.now() - etaTs) / (60 * 1000);
            }
          }
          const missingInput = !justLanded && !hasLD && minPastEta != null && minPastEta > 20;
          return { f, ac, pic, speedKt, speedSource, distNM, totalMin, elapsedMin, pct, remainingMin, isTracked, justLanded, minSinceLanding, missingInput, minPastEta };
        });
      }, [inFlight, aircraft, pilots, nowAbsMin]);

      return (
        <div className="space-y-3">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div>
              <h2 className="text-xl font-semibold inline-flex items-center gap-2">
                <LucideIcon name="radio" size={22} strokeWidth={2.25} />
                {tx('OPS','OPS')}
              </h2>
              <div className="text-xs text-[var(--text-dim)]">
                {tx('Estimated position (FPL), not real time','Estimated position (FPL), not real time')}
              </div>
            </div>
            <div className="text-xs font-mono text-[var(--text-dim)]">
              {nowMin}Z · {tx('rafraîchissement auto 10 s','auto refresh 10 s')}
            </div>
          </div>

          {rows.length === 0 && (() => {
            // === Panneau de diagnostic : pourquoi rien ne s'affiche ? ===
            // On calcule les vols du jour UTC et on classe chacun avec un verdict.
            // Aide l'utilisateur à voir si la date Zulu, le takeOff ou le landing
            // explique l'absence dans la liste.
            const todaysFlights = flights.filter(f => f.date === todayISO);
            // Aussi : vols dont la date est ±1 jour autour d'aujourd'hui Zulu,
            // utile si le user a saisi la date locale au lieu de Zulu.
            const yISO = (() => {
              const d = new Date(); d.setUTCDate(d.getUTCDate() - 1);
              return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
            })();
            const tISO = (() => {
              const d = new Date(); d.setUTCDate(d.getUTCDate() + 1);
              return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
            })();
            const adjacent = flights.filter(f => f.date === yISO || f.date === tISO);
            // Verdict pour chaque vol du jour
            const verdicts = todaysFlights.map(f => {
              const hasTO = !!f.takeOff && parseHHMM(f.takeOff) != null;
              const hasLD = !!f.landing && parseHHMM(f.landing) != null;
              let label, color;
              if (!hasTO && !hasLD) { label = tx('Pas encore parti (Take Off vide)','Not departed yet (Take Off empty)'); color = 'var(--text-dim)'; }
              else if (hasTO && hasLD) { label = tx('Vol terminé (Landing rempli)','Flight completed (Landing filled)'); color = 'var(--ok)'; }
              else if (hasTO && !hasLD) { label = tx('EN VOL — devrait apparaître','IN FLIGHT — should appear'); color = 'var(--warn)'; }
              else { label = tx('État inhabituel (Landing sans Take Off)','Unusual state (Landing without Take Off)'); color = 'var(--err)'; }
              return { f, hasTO, hasLD, label, color };
            });
            return (
              <>
                <div className="card p-8 text-center text-[var(--text-dim)]">
                  <LucideIcon name="planeLanding" size={36} strokeWidth={1.75} />
                  <div className="mt-3">{tx("Aucun avion en vol pour l'instant.",'No aircraft currently airborne.')}</div>
                  <div className="text-xs mt-1">{tx('Un vol apparaît ici dès que son Take Off est saisi (et tant que le Landing est vide).','A flight appears here as soon as its Take Off is entered (and while Landing is empty).')}</div>
                </div>
                {/* === Diagnostic détaillé === */}
                <div className="card p-3">
                  <div className="flex items-center gap-2 mb-2">
                    <LucideIcon name="cog" size={14} strokeWidth={2.25} />
                    <span className="text-xs uppercase tracking-wider font-bold">
                      {tx('Diagnostic','Diagnostic')}
                    </span>
                  </div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-[11px] mb-3">
                    <div className="bg-[var(--bg-elev)] rounded p-2">
                      <div className="text-[9px] uppercase tracking-wider text-[var(--text-dim)] font-bold">{tx('Date Zulu utilisée','Zulu date used')}</div>
                      <div className="font-mono font-bold mt-0.5">{todayISO}</div>
                    </div>
                    <div className="bg-[var(--bg-elev)] rounded p-2">
                      <div className="text-[9px] uppercase tracking-wider text-[var(--text-dim)] font-bold">{tx('Heure Zulu','Zulu time')}</div>
                      <div className="font-mono font-bold mt-0.5">{nowMin}Z</div>
                    </div>
                    <div className="bg-[var(--bg-elev)] rounded p-2">
                      <div className="text-[9px] uppercase tracking-wider text-[var(--text-dim)] font-bold">{tx('Total vols','Total flights')}</div>
                      <div className="font-mono font-bold mt-0.5">{flights.length}</div>
                    </div>
                    <div className="bg-[var(--bg-elev)] rounded p-2">
                      <div className="text-[9px] uppercase tracking-wider text-[var(--text-dim)] font-bold">{tx('Vols à cette date','Flights on this date')}</div>
                      <div className="font-mono font-bold mt-0.5">{todaysFlights.length}</div>
                    </div>
                  </div>
                  {todaysFlights.length === 0 && adjacent.length > 0 && (
                    <div className="bg-[var(--warn)] bg-opacity-10 border border-[var(--warn)] rounded-lg p-2 mb-3 text-[11px]">
                      <div className="font-bold text-[var(--warn)]">⚠ {tx("Aucun vol à la date Zulu d'aujourd'hui",'No flight on today\'s Zulu date')}</div>
                      <div className="mt-0.5">
                        {tx("Mais il y a","But there are")} {adjacent.length} {tx("vol(s) sur les jours adjacents (la veille / le lendemain Zulu).",'flight(s) on adjacent days (Zulu yesterday / tomorrow).')}
                      </div>
                      <div className="mt-1 text-[10px] text-[var(--text-dim)]">
                        {tx("Vérifie que la date du vol est bien en UTC. Si tu es au Québec à 22h locale, on est déjà demain UTC.","Check that the flight date is in UTC. If you're in Quebec at 10pm local, it's already tomorrow UTC.")}
                      </div>
                      <div className="mt-1 font-mono text-[10px]">
                        {tx('Hier Zulu','Zulu yesterday')} : {yISO} · {tx('Demain Zulu','Zulu tomorrow')} : {tISO}
                      </div>
                    </div>
                  )}
                  {verdicts.length > 0 && (
                    <div className="space-y-1">
                      <div className="text-[10px] uppercase tracking-wider text-[var(--text-dim)] font-bold mb-1">
                        {tx("Vols à la date Zulu d'aujourd'hui",'Flights on today\'s Zulu date')}
                      </div>
                      {verdicts.map(({ f, hasTO, hasLD, label, color }) => {
                        const ac = aircraft.find(a => a.id === f.aircraftId);
                        return (
                          <div key={f.id} className="bg-[var(--bg-elev)] rounded p-2 text-[11px]">
                            <div className="flex items-center justify-between gap-2 flex-wrap">
                              <div className="font-mono">
                                <span className="font-bold text-[var(--accent)]">{ac?.registration || '?'}</span>
                                <span className="text-[var(--text-dim)] ml-1">{f.from || '????'} → {f.to || '????'}</span>
                              </div>
                              <span className="text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded"
                                style={{ background: color + '22', color: color }}>{label}</span>
                            </div>
                            <div className="mt-1 grid grid-cols-3 gap-2 text-[10px] font-mono">
                              <div>
                                <span className="text-[var(--text-dim)]">Date:</span> {f.date || '—'}
                              </div>
                              <div>
                                <span className="text-[var(--text-dim)]">TO:</span>{' '}
                                <span style={{ color: hasTO ? 'var(--ok)' : 'var(--text-dim)' }}>{f.takeOff || '—'}</span>
                              </div>
                              <div>
                                <span className="text-[var(--text-dim)]">LDG:</span>{' '}
                                <span style={{ color: hasLD ? 'var(--ok)' : 'var(--text-dim)' }}>{f.landing || '—'}</span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </>
            );
          })()}

          {rows.map(({ f, ac, pic, speedKt, speedSource, distNM, totalMin, elapsedMin, pct, remainingMin, isTracked, justLanded, minSinceLanding, missingInput, minPastEta }) => {
            // Couleur cascade : justLanded → vert, missingInput → rouge,
            // isTracked → vert, sinon orange. La card reste neutre (pas de fond coloré).
            let color;
            if (justLanded) color = 'var(--ok)';
            else if (missingInput) color = 'var(--err)';
            else if (isTracked) color = 'var(--ok)';
            else color = 'var(--warn)';
            // Heure d'arrivée affichée : landing prioritaire, sinon blockIn
            const arrivalDisplayTime = f.landing || f.blockIn || '';
            return (

                    {ac?.type && <span className="text-[var(--text-dim)] ml-2">· {ac.type}</span>}
                    {pic && <span className="text-[var(--text-dim)] ml-2">· PIC : {pilotDisplayName(pic)}</span>}
                  </div>
                  {/* Badge cascade : Just Landed > Missing Input > Activated > Données partielles */}
                  <span className="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full"
                    style={{ background: color + '33', color: color }}>
                    {justLanded
                      ? `✓ ${tx('Just Landed','Just Landed')}`
                      : missingInput
                        ? `✗ ${tx('Missing Input','Missing Input')}`
                        : (isTracked
                            ? `✓ ${tx('Activated','Activated')}`
                            : `⚠ ${tx('Données partielles','Partial data')}`)}
                  </span>
                </div>
                {/* === Ligne principale : OACI dep ←—✈—→ OACI arr ===
                    OACI codes TOUJOURS visibles, même justLanded ou missingInput.
                    Garde la même hauteur de card pour cohérence multi-vols. */}
                <div className="flex items-center gap-2">
                  <div className="text-2xl font-mono font-bold flex-shrink-0 w-16 text-right">{f.from || '????'}</div>
                  {/* Conteneur de la ligne — hauteur fixe (h-12) pour préserver
                      les dimensions de la card quel que soit le statut. */}
                  <div className="flex-1 relative h-12 flex items-center justify-center">
                    {justLanded ? (
                      // Just Landed : texte centré en gros, vert
                      <div className="text-center">
                        <div className="text-2xl font-bold tracking-wide" style={{ color: 'var(--ok)' }}>
                          {tx('Just Landed','Just Landed')}
                        </div>
                        <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                          {arrivalDisplayTime && (<>
                            <span className="font-mono">{arrivalDisplayTime}Z</span>
                            {' '}({Math.max(0, Math.round(minSinceLanding))} min)
                          </>)}
                        </div>
                      </div>
                    ) : missingInput ? (
                      // Missing Input : texte centré en rouge
                      <div className="text-center">
                        <div className="text-2xl font-bold tracking-wide" style={{ color: 'var(--err)' }}>
                          {tx('Missing Input','Missing Input')}
                        </div>
                        <div className="text-[10px] text-[var(--text-dim)] mt-0.5">
                          {tx('ETA dépassée de','ETA passed by')} {Math.round(minPastEta)} min
                        </div>
                      </div>
                    ) : (<>
                      {/* Ligne de fond — fine */}
                      <div className="absolute inset-x-0 h-[2px] rounded-full top-1/2 -translate-y-1/2"
                        style={{ background: 'var(--bg-elev)' }} />
                      {/* Ligne de progression (parcourue) — illuminée vert/orange */}
                      <div className="absolute left-0 h-[2px] rounded-full top-1/2 -translate-y-1/2 transition-all"
                        style={{ width: pct + '%', background: color, boxShadow: `0 0 8px ${color}`, transition: 'width 1s ease-out' }} />
                      {/* Marqueurs aéroports (cercles aux extrémités) */}
                      <div className="absolute left-0 w-3 h-3 rounded-full top-1/2 -translate-y-1/2 -translate-x-1/2"
                        style={{ background: color, boxShadow: '0 0 0 2px var(--bg-card)' }} />
                      <div className="absolute right-0 w-3 h-3 rounded-full top-1/2 -translate-y-1/2 translate-x-1/2"
                        style={{ background: 'var(--bg-elev)', border: `2px solid ${color}` }} />
                      {/* Icône avion BLANC, nez vers la droite, parfaitement centrée
                          via translate(-50%, -50%) + rotate(45deg) combinés. */}
                      <div className="absolute"
                        style={{
                          left: `${pct}%`,
                          top: '50%',
                          transform: 'translate(-50%, -50%) rotate(45deg)',
                          transition: 'left 1s ease-out',
                        }}>
                        <span style={{
                            color: '#ffffff',
                            display: 'inline-flex',
                            filter: 'drop-shadow(0 2px 6px rgba(0,0,0,0.5))'
                          }}>
                          <LucideIcon name="plane" size={32} strokeWidth={2.25} />
                        </span>
                      </div>
                    </>)}
                  </div>
                  <div className="text-2xl font-mono font-bold flex-shrink-0 w-16">{f.to || '????'}</div>
                </div>
                {/* Sous-ligne : stats voyage — taille augmentée pour lisibilité */}
                <div className="flex items-center justify-between text-sm text-[var(--text-dim)] mt-3 flex-wrap gap-x-5 gap-y-1.5">
                  <span>
                    <span className="font-semibold">TO :</span> <span className="font-mono">{fmtHHMMZ(f.takeOff)}</span>
                  </span>
                  <span>
                    <span className="font-semibold">{tx('Distance','Distance')} :</span>{' '}
                    <span className="font-mono">{distNM > 0 ? `${distNM.toFixed(0)} NM` : '—'}</span>
                  </span>
                  <span>
                    <span className="font-semibold">{tx('Vitesse','Speed')} :</span> <span className="font-mono">{speedKt.toFixed(0)} kt</span>
                    {speedSource === 'fpl' && <span className="opacity-70 text-xs"> ({tx('FPL','FPL')})</span>}
                    {speedSource === 'aircraft' && <span className="opacity-70 text-xs"> ({tx('avion','aircraft')})</span>}
                    {speedSource === 'default' && <span className="opacity-70 text-xs"> ({tx('défaut','default')})</span>}
                  </span>
                  <span>
                    <span className="font-semibold">{tx('Progression','Progress')} :</span>{' '}
                    {/* Pourcentage en BLANC pour bon contraste sur card neutre */}
                    <span className="font-mono font-bold text-base text-white">{pct.toFixed(0)}%</span>
                  </span>
                  {totalMin > 0 && (
                    <span>
                      <span className="font-semibold">{tx('ETA','ETA')} :</span>{' '}
                      <span className="font-mono">~{fmtDuration(Math.round(remainingMin))}</span>
                    </span>
                  )}
                </div>
                {/* Avertissement si données manquantes */}
                {distNM === 0 && (
                  <div className="text-[10px] text-[var(--warn)] mt-1">
                    ⚠ {tx("Distance inconnue (OACI hors base et champ Distance vide dans la fiche vol). L'icône avion ne se déplace pas.",'Unknown distance (ICAO not in database and Distance field empty in flight form). The aircraft icon does not move.')}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // ------------------------------------------------------------------
    // 12i) ÉCRAN — RÉGLAGES (langue, thème, heure, unités, formats)

    function SettingsScreen({ settings, onUpdateSettings, onExportJSON, onImportJSON, onClearAll, syncStatus = {}, onSyncPull, onSyncPush, onArchiveDocs, onTestStorageFullPopup }) {
      const { lang, setLang } = React.useContext(I18nContext);
      const t = useT();
      const tx = useTx();
      function update(k, v) { onUpdateSettings({ ...settings, [k]: v }); }

      const usage = storageUsageMB();
      const themeApplied = effectiveTheme(settings.theme || 'dark');

      const gh = settings.gh || { enabled: false, token: '', gistId: '', lastWrittenAt: 0 };
      // État local : montrer/masquer le token (par défaut masqué pour la sécurité)
      const [showToken, setShowToken] = useState(false);
      const [testResult, setTestResult] = useState('');
      function updateGh(patch) {
        onUpdateSettings({ ...settings, gh: { ...gh, ...patch } });
      }
      // Test simple : GET /user → si le token marche, on récupère le login.
      async function testToken() {
        if (!gh.token) { setTestResult('❌ Token vide.'); return; }
        setTestResult('⏳ Test en cours…');
        try {
          // On essaie d'abord avec "Bearer" puis avec "token" si ça échoue
          let r = await fetch('https://api.github.com/user', {
            headers: {
              'Authorization': `Bearer ${gh.token}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
            },
          });
          if (r.status === 401) {
            // Réessaie avec "token" (ancien format, parfois plus tolérant)
            r = await fetch('https://api.github.com/user', {
              headers: {
                'Authorization': `token ${gh.token}`,
                'Accept': 'application/vnd.github+json',
              },
            });
          }
          if (r.ok) {
            const j = await r.json();
            setTestResult(`✅ Token OK — connecté en tant que "${j.login}". Tu peux maintenant cliquer "Pousser maintenant".`);
          } else {
            const text = await r.text();
            setTestResult(`❌ HTTP ${r.status} — ${text.slice(0, 200)}`);
          }
        } catch (e) {
          setTestResult('❌ Erreur réseau : ' + e.message);
        }
      }
      const syncBg = syncStatus.status === 'syncing' ? 'bg-[var(--warn)]/15 text-[var(--warn)] border-[var(--warn)]/30'
                  : syncStatus.status === 'synced'  ? 'bg-[var(--ok)]/15 text-[var(--ok)] border-[var(--ok)]/30'
                  : syncStatus.status === 'error'   ? 'bg-[var(--err)]/15 text-[var(--err)] border-[var(--err)]/30'
                  : 'bg-[var(--bg-elev)] text-[var(--text-dim)] border-[var(--border-soft)]';
      const syncIcon = syncStatus.status === 'syncing' ? '⏳' : syncStatus.status === 'synced' ? '✓' : syncStatus.status === 'error' ? '⚠' : '·';

      return (
        <div className="space-y-3">
          <h2 className="text-xl font-semibold">⚙️ {tx('Réglages','Settings')}</h2>

          {/* === Synchronisation cloud GitHub Gist === */}
          <div className="card p-3 space-y-3">
            <div className="flex items-center justify-between gap-2 flex-wrap">
              <div className="label !mb-0 inline-flex items-center gap-1.5">
                <span style={{ color: 'var(--accent)' }}><LucideIcon name="cloud" size={14} strokeWidth={2.5} /></span>
                {tx('Synchronisation Mac ↔ iPhone','Mac ↔ iPhone sync')}
              </div>
              {gh.enabled && (
                <div className={`text-xs px-2 py-1 rounded-md border font-mono ${syncBg}`}>
                  {syncIcon} {syncStatus.message || tx('inactive','inactive')}
                </div>
              )}
            </div>
            <Hint title={tx('Comment activer la synchro (~3 min)','How to enable sync (~3 min)')}>
              {tx(
                '1. Va sur github.com/settings/tokens (token fine-grained). 2. Generate new token → nom : "AeroDeck sync" → expiration au choix. 3. Dans Permissions → Account permissions → Gists = Read and write. 4. Crée le token et copie-le. Colle-le ci-dessous, active la sync, puis clique Activer. Le token reste sur ton appareil (localStorage). Le gist créé est privé. Sur ton autre appareil, colle le même token + le même Gist ID (visible ici après création) pour synchroniser.',
                '1. Go to github.com/settings/tokens (fine-grained token). 2. Generate new token → name: "AeroDeck sync" → expiration up to you. 3. Under Permissions → Account permissions → Gists = Read and write. 4. Create the token and copy it. Paste it below, enable sync, then click Enable. The token stays on your device (localStorage). The created gist is private. On your other device, paste the same token + same Gist ID (visible here after creation) to sync.'
              )}
            </Hint>
            <div className="flex items-center gap-2">
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" checked={!!gh.enabled} onChange={e=>updateGh({ enabled: e.target.checked })} />
                <span>{tx('Activer la synchro','Enable sync')}</span>
              </label>
            </div>
            <div>
              <div className="label whitespace-nowrap">{tx('Personal Access Token (gist scope)','Personal Access Token (gist scope)')}</div>
              <div className="flex gap-2">
                <input
                  type={showToken ? 'text' : 'password'}
                  className="input font-mono text-xs"
                  placeholder="github_pat_..."
                  value={gh.token || ''}
                  onChange={e=>updateGh({ token: e.target.value.trim() })}
                  autoComplete="off"
                  spellCheck="false"
                />
                <button type="button"
                  className="btn btn-secondary !py-1.5 !px-3 text-sm"
                  onClick={()=>setShowToken(s => !s)}
                  title={showToken ? tx('Masquer','Hide') : tx('Afficher','Show')}>
                  <LucideIcon name={showToken ? 'eyeOff' : 'eye'} size={16} strokeWidth={2.25} />
                </button>
              </div>
              {gh.token && (
                <div className="text-[10px] text-[var(--text-dim)] mt-1 font-mono">
                  {tx('Longueur','Length')} : {gh.token.length} {tx('caractères','characters')}
                  {!gh.token.startsWith('github_pat_') && gh.token.length > 0 && (
                    <span className="text-[var(--warn)]"> · ⚠ {tx('devrait commencer par "github_pat_"','should start with "github_pat_"')}</span>
                  )}
                </div>
              )}
            </div>
            <div>
              <div className="label whitespace-nowrap">Gist ID</div>
              <input
                className="input font-mono text-xs"
                placeholder={tx('(créé automatiquement à la 1re sync)','(auto-created on first sync)')}
                value={gh.gistId || ''}
                onChange={e=>updateGh({ gistId: e.target.value.trim() })}
                autoComplete="off"
              />
              <div className="text-xs text-[var(--text-dim)] mt-1">
                {tx('Sur ton 2e appareil, copie cet ID après la 1re sync sur le 1er appareil.','On your 2nd device, copy this ID after the 1st sync on the 1st device.')}
              </div>
            </div>
            <div className="flex flex-wrap gap-2">
              <button
                className="btn btn-secondary !py-1.5 !px-3 text-sm"
                disabled={!gh.token}
                onClick={testToken}>
                🧪 {tx('Tester le token','Test token')}
              </button>
              <button
                className="btn btn-primary !py-1.5 !px-3 text-sm"
                disabled={!gh.enabled || !gh.token}
                onClick={()=>onSyncPush?.()}>
                {gh.gistId ? tx('↑ Pousser maintenant','↑ Push now') : tx('↑ Activer (créer le gist)','↑ Enable (create gist)')}
              </button>
              <button
                className="btn btn-secondary !py-1.5 !px-3 text-sm"
                disabled={!gh.enabled || !gh.token || !gh.gistId}
                onClick={()=>onSyncPull?.()}>
                {tx('↓ Récupérer maintenant','↓ Pull now')}
              </button>
            </div>
            {testResult && (
              <div className={`text-xs px-2 py-2 rounded-md font-mono break-all ${
                testResult.startsWith('✅') ? 'bg-[var(--ok)]/15 text-[var(--ok)]' :
                testResult.startsWith('❌') ? 'bg-[var(--err)]/15 text-[var(--err)]' :
                'bg-[var(--bg-elev)] text-[var(--text-dim)]'
              }`}>
                {testResult}
              </div>
            )}
            {gh.enabled && syncStatus.lastSyncAt > 0 && (
              <div className="text-xs text-[var(--text-dim)]">
                {tx('Dernière sync','Last sync')} : {new Date(syncStatus.lastSyncAt).toLocaleTimeString()} · {tx('Push auto 5 sec après modif · Pull auto toutes les 30 sec','Auto push 5s after change · Auto pull every 30s')}
              </div>
            )}
          </div>

          {/* Apparence */}
          <div className="card p-3 space-y-3">
            <div className="label">🎨 {tx('Apparence','Appearance')}</div>
            <div>
              <div className="label">{tx('Thème','Theme')}</div>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                {[
                  ['dark',        tx('🌙 Nuit','🌙 Dark')],
                  ['light',       tx('☀️ Jour','☀️ Light')],
                  ['auto-system', tx('🖥️ Auto (système)','🖥️ Auto (system)')],
                  ['auto-time',   tx('🕐 Auto (heure)','🕐 Auto (time)')],
                ].map(([id, label]) => (
                  <button key={id} type="button"
                    onClick={()=>update('theme', id)}
                    className={`btn ${settings.theme===id?'btn-primary':'btn-secondary'}`}>
                    {label}
                  </button>
                ))}
              </div>
              <div className="text-xs text-[var(--text-dim)] mt-2">
                {tx('Mode actuellement appliqué','Currently applied mode')} : <span className="font-semibold inline-flex items-center gap-1">
                  <LucideIcon name={themeApplied === 'light' ? 'sun' : 'moon'} size={12} strokeWidth={2.5} />
                  {themeApplied === 'light' ? tx('Jour','Light') : tx('Nuit','Dark')}
                </span>.
                {' '}{tx('Auto système = suit ton OS. Auto heure = clair entre 7h et 20h locale, sombre sinon.','Auto system = follows your OS. Auto time = light between 7am and 8pm local, dark otherwise.')}
              </div>
            </div>
            <div>
              <div className="label inline-flex items-center gap-1.5">
                <span style={{ color: 'var(--accent)' }}><LucideIcon name="languages" size={14} strokeWidth={2.5} /></span>
                {tx("Langue de l'interface",'Interface language')}
              </div>
              <select className="select max-w-xs" value={lang} onChange={e=>setLang(e.target.value)}>
                {LANGUAGES.map(l => <option key={l.code} value={l.code}>{l.label}</option>)}
              </select>
            </div>
          </div>

          {/* Heure */}
          <div className="card p-3 space-y-3">
            <div className="label">🕐 {tx('Affichage des heures','Time display')}</div>
            <div className="grid grid-cols-3 gap-2">
              {[
                ['zulu',  'Zulu (UTC)'],
                ['local', tx('Heure locale','Local time')],
                ['both',  tx('Zulu + locale','Zulu + local')],
              ].map(([id, label]) => (
                <button key={id} type="button"
                  onClick={()=>update('timeDisplay', id)}
                  className={`btn ${settings.timeDisplay===id?'btn-primary':'btn-secondary'}`}>
                  {label}
                </button>
              ))}
            </div>
            <div className="text-xs text-[var(--text-dim)]">
              {tx("La saisie reste toujours en Zulu (norme aéronautique). Seul l'affichage des heures dans les bannières et listes est converti. Le fuseau local est celui de cet appareil.",'Input is always in Zulu (aviation standard). Only the displayed times in banners and lists are converted. The local timezone is this device\'s.')}
            </div>
          </div>

          {/* Unités */}
          <div className="card p-3 space-y-3">
            <div className="label">📏 {tx('Unités par défaut','Default units')}</div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              <div>
                <div className="label">{tx('Carburant','Fuel')}</div>
                <select className="select" value={settings.defaultFuelUnit||'L'} onChange={e=>update('defaultFuelUnit', e.target.value)}>
                  <option value="L">{tx('Litres (L)','Liters (L)')}</option>
                  <option value="kg">{tx('Kilogrammes (kg)','Kilograms (kg)')}</option>
                  <option value="USG">{tx('Gallons US (USG)','US Gallons (USG)')}</option>
                </select>
              </div>
              <div>
                <div className="label">{tx('Huile moteur','Engine oil')}</div>
                <select className="select" value={settings.defaultOilUnit||'qt'} onChange={e=>update('defaultOilUnit', e.target.value)}>
                  <option value="qt">{tx('Pintes (qt)','Quarts (qt)')}</option>
                  <option value="L">{tx('Litres (L)','Liters (L)')}</option>
                </select>

              <div>
                <div className="label">{tx('Devise','Currency')}</div>
                <select className="select" value={settings.defaultCurrency||'EUR'} onChange={e=>update('defaultCurrency', e.target.value)}>

              {tx("Ces unités sont pré-sélectionnées quand tu crées un nouveau plein, ajout d'huile ou facture. Tu peux toujours les changer ponctuellement.",'These units are pre-selected when you create a new fuel uplift, oil entry or invoice. You can always change them on a case-by-case basis.')}
            </div>
          </div>

          {/* Format de date */}
          <div className="card p-3 space-y-3">
            <div className="label inline-flex items-center gap-1.5">
              <span style={{ color: 'var(--accent)' }}><LucideIcon name="calendar" size={14} strokeWidth={2.5} /></span>
              {tx('Format de date','Date format')}
            </div>
            <div className="grid grid-cols-3 gap-2">
              {[
                ['iso', 'ISO  ' + fmtDateBySetting(todayZuluDate(),'iso')],
                ['fr',  'FR  ' + fmtDateBySetting(todayZuluDate(),'fr')],
                ['us',  'US  ' + fmtDateBySetting(todayZuluDate(),'us')],
              ].map(([id, label]) => (
                <button key={id} type="button"
                  onClick={()=>update('dateFormat', id)}
                  className={`btn ${settings.dateFormat===id?'btn-primary':'btn-secondary'}`}>
                  <span className="font-mono text-xs">{label}</span>
                </button>
              ))}
            </div>
            <div className="text-xs text-[var(--text-dim)]">
              {tx("Format affiché dans les bannières et listes. Les sauvegardes JSON gardent toujours le format ISO (norme internationale, échangeable).",'Format shown in banners and lists. JSON backups always keep ISO format (international, exchangeable standard).')}
            </div>
          </div>

          {/* Confidentialité */}
          <div className="card p-3 space-y-2">
            <div className="label inline-flex items-center gap-1.5">
              <span style={{ color: '#34d399' }}><LucideIcon name="shieldCheck" size={14} strokeWidth={2.5} /></span>
              Confidentialité & sécurité
            </div>
            <label className="flex items-center gap-2 select-none cursor-pointer">
              <input type="checkbox" className="w-5 h-5 accent-[#38bdf8]"
                checked={!!settings.askBeforeDelete}
                onChange={e=>update('askBeforeDelete', e.target.checked)} />
              <span>{tx('Demander confirmation avant chaque suppression (recommandé)','Confirm before each deletion (recommended)')}</span>
            </label>
            <div className="text-xs text-[var(--text-dim)]">
              {tx('Toutes les données restent dans le navigateur de cet appareil — aucune transmission réseau.','All data stays in this device\'s browser — no network transmission.')}
            </div>
          </div>

          {/* Données */}
          <div className="card p-3 space-y-2">
            <div className="label inline-flex items-center gap-1.5">
              <span style={{ color: 'var(--accent)' }}><LucideIcon name="database" size={14} strokeWidth={2.5} /></span>
              {tx('Données — Sauvegardes','Data — Backups')}
            </div>
            <div className="text-xs text-[var(--text-dim)]">
              {tx('Stockage local utilisé','Local storage used')} : <span className="font-mono text-[var(--text)]">{usage.toFixed(2)} MB</span>
              {' '}/ {tx('~5 MB (limite navigateur).','~5 MB (browser limit).')}
